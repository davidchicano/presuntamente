titulo: "El País — Pablo Iglesias, elegido secretario general de Podemos en la Asamblea Ciudadana Vista Alegre I"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El País del 15 de octubre de 2014 sobre la elección de
  Pablo Iglesias como Secretario General de Podemos en la primera
  Asamblea Ciudadana del partido, celebrada en el Pabellón Vista Alegre
  de Madrid. Iglesias obtuvo el 88,6% de los votos de los inscritos.
  Cruzable con cobertura de elDiario.es y El Mundo del mismo día, que
  recogen el porcentaje y el resultado de la votación. Tres líneas
  editoriales distintas informan del mismo dato.
