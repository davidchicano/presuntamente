titulo: "El País — Yolanda Díaz lanza Sumar como coalición electoral de izquierdas de cara a las elecciones generales de 2023"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El País del 2 de abril de 2023 sobre el lanzamiento oficial
  del proyecto Sumar con Yolanda Díaz como coordinadora. Sumar es presentado
  como espacio político de confluencia de la izquierda española que integra
  a Izquierda Unida, Más País, Comunes y otras fuerzas. Cruzable con
  cobertura de elDiario.es y La Vanguardia del mismo periodo, que recogen
  la constitución y el rol de Díaz como coordinadora de la coalición.
  Tres líneas editoriales distintas informan del mismo dato.
