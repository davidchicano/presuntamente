id: boe-stc-124-2001-filesa
titulo: "STC 124/2001, de 4 de junio de 2001 — Recurso de amparo 4703/97 (Josep Maria Sala i Grisó)"
tipo: sentencia
nivel_fuente: 1
nivel_fuente_justificacion: |
  Sentencia del Tribunal Constitucional publicada en el Boletín Oficial
  del Estado (id BOE-T-2001-12757). El dominio boe.es está en la lista
  blanca DominiosOficiales. Desestima íntegramente el recurso de amparo
  de Josep Maria Sala i Grisó: el TC rechazó las quejas sobre
  prerrogativas parlamentarias, tutela judicial y presunción de inocencia.
  Las condenas de la STS 1/1997 (un año de prisión por falsedad en
  documento mercantil y dos años de prisión más seis años y un día de
  inhabilitación especial por asociación ilícita) quedaron plenamente
  firmes. Nota: la NOTES.md inicial registraba una estimación parcial
  del amparo que la lectura directa del BOE no confirma; se corrige aquí.
