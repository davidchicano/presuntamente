id: boe-indulto-olivero-filesa-2000
titulo: "Real Decreto 2699/2000, de 1 de diciembre, por el que se indulta a don Luis Oliveró Capellades"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Publicado en el Boletín Oficial del Estado (id BOE-A-2000-23958).
  El dominio boe.es está en la lista blanca DominiosOficiales. El Real
  Decreto 2699/2000 otorga el indulto parcial de la mitad de las penas
  privativas de libertad e inhabilitación impuestas a Luis Oliveró
  Capellades por la STS 1/1997, aprobado por el Consejo de Ministros el
  1 de diciembre de 2000 a propuesta del Ministro de Justicia.
