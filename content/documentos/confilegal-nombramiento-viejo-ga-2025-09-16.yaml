titulo: "Confilegal — Antonio Viejo asume el Juzgado de Instrucción 19 de Madrid, competente en la causa contra Alberto González Amador (16 sept 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística especializada del acuerdo de la Comisión
  Permanente del Consejo General del Poder Judicial por el que se
  designa al magistrado Antonio Viejo titular del Juzgado de
  Instrucción nº 19 de Madrid en sustitución de Inmaculada Iglesias,
  jubilada el 18 de agosto de 2025. Nivel 4 por tratarse de un medio
  de comunicación especializado en información jurídica. Se cruza con
  cobertura coetánea de El Confidencial Digital sobre la jubilación de
  Iglesias y el debate sobre el relevo, en línea editorial distinta,
  para cumplir la regla V-13.
