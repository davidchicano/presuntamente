id: boe-rd738-2021-nombramiento-yolanda-diaz-vicepresidenta
titulo: "BOE — Real Decreto 523/2021, de 10 de julio, por el que se nombra Vicepresidenta Segunda del Gobierno a doña Yolanda Díaz Pérez"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición oficial publicada en el Boletín Oficial del Estado el 12 de
  julio de 2021, código BOE-A-2021-11529. Firmado por S.M. el Rey
  Felipe VI. Fuente primaria directa (N1): órgano emisor es la Jefatura
  del Estado. El nombramiento como Vicepresidenta Segunda se produce en
  sustitución de Pablo Iglesias, que había dimitido el 4 de mayo de 2021;
  formaliza la reestructuración del gobierno en julio de 2021. PDF
  íntegro descargado a `/public/documentos/_globales/` con `hash_sha256`
  verificado contra el mirror oficial.

  Nota: el slug del fichero (`boe-rd738-2021-...`) y del id se conserva
  por estabilidad de referencias, aunque el número de Real Decreto real
  es 523/2021 (no 738). El identificador BOE canónico
  (BOE-A-2021-11529), el título completo y el PDF descargado son los del
  RD 523/2021 efectivamente firmado el 10-07-2021.
