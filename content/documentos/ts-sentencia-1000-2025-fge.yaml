nivel_fuente_justificacion: |
  Texto íntegro (238 páginas) de la Sentencia 1000/2025 de la Sala
  Segunda del Tribunal Supremo dictada el 9 de diciembre de 2025 en
  la Causa Especial nº 20557/2024 contra Álvaro García Ortiz por
  delito de revelación de datos reservados del artículo 417.1 CP,
  incluyendo el voto particular conjunto de las magistradas Susana
  Polo García y Ana María Ferrer García. El documento conservado en
  el repo en `/public/documentos/fiscal-general-del-estado/ts-sentencia-1000-2025-fge.pdf`
  preserva los metadatos PDF originales generados por el sistema
  ofimático del Tribunal Supremo (Author: `g.tejedor`, CreationDate:
  2025-12-09T10:48:20+01:00, producido en Microsoft Word para
  Microsoft 365), coincidentes con la fecha de notificación de la
  sentencia.
  A fecha de PR2 no se localiza el texto íntegro en CENDOJ ni en
  `poderjudicial.es` con URL canónica (la nota oficial CGPJ
  asociada sí está). La URL canónica adoptada apunta al mirror más
  estable y verificable disponible en abierto; la fidelidad del
  documento se cruza con un segundo mirror independiente
  (civil-mercantil.com — 182 páginas, sentencia sin voto particular,
  con autoría PDF `ex352038` y CreationDate 2025-12-10), que
  coincide byte a byte en el cuerpo común de la sentencia. La
  diferencia de tamaño entre ambos PDFs se explica por la inclusión
  del voto particular (56 páginas adicionales) sólo en el mirror
  conservado. El nivel se ajusta a 3 (institucional / pericial /
  filtrado verificado) por la convención editorial sobre documentos
  jurisdiccionales sin URL oficial pero verificables por mirrors
  estables y por autoría del propio sistema ofimático del órgano
  productor. Cuando aparezca en CENDOJ se elevará a nivel 1
  conservando el mismo `id` del documento y el mismo
  `hash_sha256` de la copia local como prueba de fidelidad.
