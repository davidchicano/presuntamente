titulo: "Nota de prensa del CGPJ sobre la declaracion de recurso desierto y extincion de responsabilidad penal de Miguel Blesa (tarjetas black)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: >-
  Comunicado oficial del Consejo General del Poder Judicial (CGPJ) publicado en
  poderjudicial.es, con fecha de publicacion 21 de noviembre de 2017, sobre el auto
  del Tribunal Supremo por el que se declaraba desierto el recurso de casacion de
  Miguel Blesa tras su fallecimiento el 28-07-2017, y se declaraba extinguida su
  responsabilidad criminal. El CGPJ es fuente N1 institucional. URL verificada el
  2026-05-30:
