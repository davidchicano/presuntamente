id: elindependiente-ap-malaga-archiva-atico-2020-11-13
titulo: "El Independiente — La Audiencia de Málaga archiva el caso del ático de Ignacio González (13 nov 2020)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística generalista del auto de la Audiencia
  Provincial de Málaga que desestima el recurso de apelación
  contra el sobreseimiento provisional y archivo del caso del
  ático de Estepona acordado por el Juzgado de Primera Instancia
  e Instrucción nº 5 de Estepona en julio de 2020. La cobertura
  confirma que la Audiencia ratifica «en su integridad» lo
  dictado por el juzgado de Estepona y recoge la posición de la
  defensa de Ignacio González («todas las imputaciones
  realizadas a González y a su esposa carecen de base legal»).
  Segunda línea editorial distinta de Confilegal para el mismo
  hito procesal (V-13). Nivel 4 por tratarse de un medio de
  comunicación; el auto íntegro de la AP de Málaga no se ha
  localizado en fuente oficial (pendiente_primario en NOTES).
