titulo: "Maldita.es — De MAR y González Amador a García Ortiz: cronología del caso contra el Fiscal General del Estado (21 oct 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cronología documental del caso del Fiscal General del Estado
  publicada por Maldita.es en su sección de divulgación de
  procedimientos judiciales (Maldita Te Explica). Recoge con
  detalle y fecha verificada los hitos previos a la apertura de la
  causa especial ante el Tribunal Supremo: denuncia ICAM
  (20-mar-2024), querella González Amador ante el TSJ Madrid
  (3-abr-2024), admisión y designación del instructor Goyena
  (7-may-2024), comparecencia de García Ortiz en la que asume la
  autoría de la nota informativa (11-jun-2024) y elevación de
  exposición razonada al Tribunal Supremo (15-jul-2024). Útil para
  cruzar fechas verificables con otras coberturas. Nivel 4 por
  tratarse de un medio de comunicación.
