id: auto-jci4-rechazo-acusaciones-diligencias-pu-2026-06-16
titulo: "Nota CGPJ — El JCI nº 4 rechaza que todas las acusaciones populares del caso Plus Ultra estén presentes en las diligencias de investigación (16 jun 2026)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial publicada en `poderjudicial.es` (dominio oficial en lista
  blanca DominiosOficiales de [doc 01 — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados))
  sobre el auto del JCI nº 4 de la Audiencia Nacional de 16 de junio de
  2026. Recoge que el magistrado José Luis Calama rechaza que todas las
  acusaciones populares personadas puedan estar presentes en las diligencias
  de investigación y desestima los recursos de reforma contra la unificación
  de su representación y defensa. Cumple V-12.
