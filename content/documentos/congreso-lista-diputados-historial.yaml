  Fuente primaria N1: portal oficial del Congreso de los Diputados
  (congreso.es) con buscador de diputados históricos por legislatura,
  circunscripción y nombre. Permite verificar la condición de diputado/a,
  la circunscripción y las fechas de cada legislatura para cualquier
