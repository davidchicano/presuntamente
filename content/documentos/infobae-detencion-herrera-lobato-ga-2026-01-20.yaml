id: infobae-detencion-herrera-lobato-ga-2026-01-20
titulo: "Infobae — Detienen a David Herrera Lobato en Arahal (Sevilla), uno de los presuntos colaboradores de González Amador en las gestiones de Quirón (20 ene 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la detención de David Herrera Lobato por
  la Policía Nacional el 20 de enero de 2026 en Arahal (Sevilla), por
  orden de la Sección Segunda de la Sala de lo Penal de la Audiencia
  Nacional, en el marco de una pieza separada del procedimiento contra
  Alberto González Amador que investiga presuntos delitos de
  corrupción en los negocios y administración desleal en relación con
  operaciones facturadas a Quirón Prevención S.L. en 2020 por importe
  próximo a 1,9 millones de euros. Nivel 4 por tratarse de un medio
  de comunicación. Se cruza con la cobertura coetánea de El Plural
  sobre la rama sevillana del procedimiento, en línea editorial
  distinta, para cumplir la regla V-13.
