nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en poderjudicial.es (dominio N1).
  Resume la sentencia del Tribunal Supremo de 27 de julio de 2015,
  ponente Juan Saavedra Ruiz, que resuelve 48 recursos de casación
  contra la sentencia 535/2013 de la Audiencia Provincial de Málaga.
  La nota es el documento más autorizado públicamente disponible sobre
  la firmeza del caso Malaya.
