id: boe-rd1823-2011-nombramiento-rajoy-presidente
titulo: "BOE — Real Decreto 1822/2011, de 21 de diciembre, por el que se nombra Presidente del Gobierno a don Mariano Rajoy Brey"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición oficial publicada en el Boletín Oficial del Estado el 23 de
  diciembre de 2011, código BOE-A-2011-19861. Firmado por S.M. el Rey
  Juan Carlos I. Fuente primaria directa (N1): órgano emisor es la
  Jefatura del Estado. El nombramiento se produce tras la victoria del
  Partido Popular en las elecciones generales del 20 de noviembre de
  2011 y la investidura parlamentaria de Mariano Rajoy en el Congreso
  de los Diputados. PDF íntegro descargado a
  `/public/documentos/_globales/` con `hash_sha256` verificado contra
  el mirror oficial.

  Nota: el slug del fichero (`boe-rd1823-2011-...`) y del id se conserva
  por estabilidad de referencias, aunque el número de Real Decreto real
  es 1822/2011 (no 1823). El identificador BOE canónico
  (BOE-A-2011-19861), el título completo del documento y el PDF
  descargado son los del RD 1822/2011 efectivamente firmado el 21-12-2011
  por la Jefatura del Estado.
