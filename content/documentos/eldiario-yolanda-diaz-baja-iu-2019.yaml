id: eldiario-yolanda-diaz-baja-iu-2019
titulo: "elDiario.es — Yolanda Díaz se dio de baja de IU en 2019 por discrepancias durante las negociaciones fallidas con el PSOE"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de elDiario.es sobre la baja de Yolanda Díaz en IU en
  2019, que confirma retroactivamente su militancia y cargo como
  coordinadora de Esquerda Unida (federación gallega de IU) hasta ese
  año. Cruzable con el fact-check de Newtral (20260219) que documenta
  su trayectoria en IU Galicia desde 2005, con cargos electos en el
  Parlamento de Galicia y el Congreso bajo las siglas de IU. Dos
  líneas editoriales distintas (elDiario.es y Newtral) confirman la
  militancia y el cargo.
