id: theobjective-juicio-inassa-lezo-2022-10-11
titulo: "The Objective — La Audiencia Nacional pone fecha para el primer juicio del caso Lezo: el 24 de mayo (11 oct 2022)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del señalamiento por la Sección Segunda
  de la Sala de lo Penal de la Audiencia Nacional del primer
  juicio del caso Lezo correspondiente a la pieza Inassa,
  iniciado el 24 de mayo de 2023. Detalla que el auto de
  procesamiento del magistrado Manuel García-Castellón envió a
  juicio a un total de veintidós personas, entre las que
  destacan los ex consejeros del gobierno de Alberto
  Ruiz-Gallardón Pedro Calvo y Juan Bravo. Recoge la petición de
  la Fiscalía Anticorrupción de siete años de prisión y quince
  de inhabilitación absoluta para los dos ex consejeros por
  presuntos delitos de malversación de caudales públicos en
  concurso con prevaricación, además de una responsabilidad
  civil conjunta y solidaria próxima a los diecinueve millones
  de euros por «sobreprecio pagado» en la compra en 2001 por
  Canal de Isabel II de la sociedad colombiana Inassa por
  setenta y tres millones de dólares a través de la sociedad
  panameña Aguas de América (SAA). Cruzado con cobertura de
  Confilegal y Madridiario coincidente en cuantías y peticiones
  de pena. Nivel 4 por tratarse de un medio de comunicación.
