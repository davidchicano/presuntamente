id: publico-uco-pendiente-ga-2026-05-10
titulo: "Público — La UCO sigue sin entregar el informe sobre el novio de Ayuso encargado hace 11 meses y el juez lleva medio año sin autorizar el acceso a sus cuentas (10 may 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística que confirma, casi un año después del
  encargo, que la Unidad Central Operativa de la Guardia Civil no ha
  entregado el informe encomendado por la jueza Inmaculada Iglesias el
  27 de junio de 2025, y que el nuevo titular del Juzgado de
  Instrucción nº 19 de Madrid, Antonio Viejo, lleva seis meses sin
  autorizar el acceso a las cuentas bancarias del investigado
  solicitado por la UCO en diciembre de 2025. Nivel 4 por tratarse
  de un medio de comunicación. Se cruza con la cobertura de Infobae
  del propio encargo del 27-jun-2025 en línea editorial distinta para
  cumplir la regla V-13.
