nivel_fuente_justificacion: |
  Sentencia de órgano jurisdiccional (AP Málaga, Sección 1ª) dictada
  el 4 de octubre de 2013, nº 535/2013, Rollo de Sala Sumario 21/2007.
  Magistrados firmantes: José Godino (presidente y ponente), Rafael
  Linares y Manuel Caballero. El texto íntegro consta de cinco tomos y
  más de 5.000 folios, publicados en CENDOJ. La sentencia es la segunda
  más consultada en CENDOJ durante 2024. La URL del tomo 4 (El Mundo)
  se incluye como mirror de acceso público verificado, pero el documento
  primario es la sentencia registrada en CENDOJ.
