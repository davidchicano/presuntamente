titulo: "El País — Feijóo toma posesión como presidente de la Xunta de Galicia"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El País de marzo de 2009 sobre la toma de posesión de
  Alberto Núñez Feijóo como Presidente de la Xunta de Galicia tras la
  victoria del PP en las elecciones autonómicas gallegas del 1 de marzo
  de 2009. Feijóo fue investido presidente por el Parlamento de Galicia
  y tomó posesión el 21 de marzo de 2009. Cruzable con la cobertura de
  La Voz de Galicia y Faro de Vigo, cabeceras gallegas que documentaron
  el acto de posesión. Tres líneas editoriales distintas confirman la
  fecha y el cargo.
