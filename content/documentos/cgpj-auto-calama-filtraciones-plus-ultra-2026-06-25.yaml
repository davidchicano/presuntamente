nivel_fuente_justificacion: |
  Nota oficial publicada en `poderjudicial.es` (dominio oficial en lista
  blanca DominiosOficiales de [doc 01 — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados))
  sobre el auto del JCI nº 4 de la Audiencia Nacional de 25 de junio de
  2026. La nota informa de que el magistrado José Luis Calama deduce
  testimonio para investigar filtraciones del caso Plus Ultra y acuerda
  formar una pieza de información sensible para preservar el carácter
  reservado de actuaciones. Se conserva copia HTML local con hash.
