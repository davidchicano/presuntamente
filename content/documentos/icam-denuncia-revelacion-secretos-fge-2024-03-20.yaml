titulo: "ICAM — La Abogacía de Madrid denuncia al Ministerio Fiscal por revelación de secretos (20 mar 2024)"
tipo: nota_prensa_institucional
nivel_fuente: 2
nivel_fuente_justificacion: |
  Comunicado institucional propio del Ilustre Colegio de la Abogacía
  de Madrid (ICAM), corporación de derecho público con personalidad
  jurídica propia, anunciando la presentación de denuncia ante el
  Tribunal Superior de Justicia de Madrid contra los responsables
  del Ministerio Fiscal por presunto delito de revelación de
  secretos en relación con la divulgación del contenido del correo
  electrónico del letrado colegiado Carlos Neira. Aunque el dominio
  `web.icam.es` no figura en la lista blanca DominiosOficiales del
  doc 01 §3 (lista pensada para órganos del Estado central), el
  ICAM es por su naturaleza una corporación de derecho público
  representativa de los abogados ejercientes en el partido judicial
  de Madrid, de modo que su comunicado oficial sobre actos propios
  encaja en la franja N2 (oficial secundaria / instructora) y no
  en N4 (cobertura periodística). Verificable por cruce con
  cobertura periodística cruzada de El Español, eldiario.es,
  Libertad Digital y Telemadrid coincidentes en fecha y contenido.
