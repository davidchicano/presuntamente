titulo: "elDiario.es — Pablo Iglesias dimite como secretario general de Podemos tras la derrota en las elecciones madrileñas"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de elDiario.es del 4 de mayo de 2021 sobre la dimisión de
  Pablo Iglesias como Secretario General de Podemos, anunciada la noche
  electoral de las elecciones a la Comunidad de Madrid. Iglesias había
  renunciado a su escaño de diputado en el Congreso en marzo de 2021 para
  presentarse como candidato a la Presidencia de la Comunidad de Madrid;
  tras la derrota, anuncia su retirada de la primera línea política.
  Cruzable con cobertura de El País y La Sexta del mismo día.
