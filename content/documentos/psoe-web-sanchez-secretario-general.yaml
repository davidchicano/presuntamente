titulo: "PSOE.es — Perfil oficial de Pedro Sánchez Pérez-Castejón como Secretario General del PSOE"
tipo: nota_prensa_institucional
nivel_fuente: 2
nivel_fuente_justificacion: |
  Página oficial del PSOE (psoe.es/conocenos/comision-ejecutiva-federal/pedro-sanchez-perez-castejon/)
  que acredita a Pedro Sánchez Pérez-Castejón como Secretario General del partido.
  La web institucional del propio partido acredita la titularidad del cargo con
  detalle biográfico: miembro del PSOE desde 1993, primer SG elegido por sufragio
  directo de la militancia en el Congreso Extraordinario de julio de 2014;
  revalidó el cargo en las primarias del 21-22 de mayo de 2017 con el 49,8% de
  los votos frente a Susana Díaz y Patxi López. Nivel N2 por ser fuente del
  propio órgano emisor (web institucional del partido), sin ser disposición BOE.
