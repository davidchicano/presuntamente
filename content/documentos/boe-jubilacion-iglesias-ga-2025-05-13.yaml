titulo: "BOE — Acuerdo de 13 de mayo de 2025 de la Comisión Permanente del CGPJ, jubilación voluntaria de la magistrada María Inmaculada Iglesias Sánchez (JI nº 19 de Madrid) con efectos 10 de agosto de 2025"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Fuente oficial primaria publicada en el Boletín Oficial del Estado
  (boe.es, dominio en lista blanca). Acuerdo del 13 de mayo de 2025
  de la Comisión Permanente del Consejo General del Poder Judicial
  por el que se declara la jubilación voluntaria de la magistrada
  doña María Inmaculada Iglesias Sánchez, con destino en el Juzgado
  de Instrucción número 19 de Madrid, con efectos del 10 de agosto
  de 2025.
