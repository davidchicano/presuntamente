id: boe-jubilacion-iglesias-ga-2025-05-13
titulo: "BOE-A-2025-16497 — Acuerdo de 13 de mayo de 2025 de la Comisión Permanente del Consejo General del Poder Judicial, jubilación voluntaria de la magistrada María Inmaculada Iglesias Sánchez (JI nº 19 de Madrid) con efectos 10 de agosto de 2025 (publicado en BOE núm. 191 de 9 de agosto de 2025)"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Fuente oficial primaria publicada en el Boletín Oficial del Estado
  el 9 de agosto de 2025 con el código BOE-A-2025-16497. Acuerdo del
  13 de mayo de 2025 de la Comisión Permanente del Consejo General
  del Poder Judicial por el que se declara la jubilación voluntaria
  de la magistrada doña María Inmaculada Iglesias Sánchez, con
  destino en el Juzgado de Instrucción número 19 de Madrid, con
  efectos del 10 de agosto de 2025. Firmado en Madrid por la
  Presidenta del CGPJ María Isabel Perelló Doménech. Copia íntegra
  descargada del propio BOE (`boe.es`, dominio en lista blanca
  DominiosOficiales): PDF de 1 página (192.177 bytes) cuyos
  metadatos confirman autoría institucional (`Author: CONSEJO
  GENERAL DEL PODER JUDICIAL`, `Creator: eBOE`, `Producer: Antenna
  House PDF Output Library 6.6.1477 (Linux64); modified using
  OpenPDF 1.3.39`, `CreationDate: Fri Aug 8 17:35:02 2025 CEST`) y
  XML estructurado oficial. Cumple V-12.
