titulo: "Infobae — Alberto Núñez Feijóo, elegido nuevo presidente del Partido Popular con el 98,35% de los votos"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de Infobae del 2 de abril de 2022 sobre la elección de Alberto Núñez
  Feijóo como presidente del PP en el XX Congreso Extraordinario celebrado en Sevilla.
  El artículo informa de los resultados: 2.619 votos (98,35%) de los compromisarios.
  Fuente N4 cruzable con la cobertura de El Español (elespanol.com), que reporta
  los mismos datos (2.030 votos en primera vuelta de afiliados y 98,35% en el
  congreso), y de Diario de Avisos / El Español regional. Tres líneas editoriales
  distintas informan el mismo dato con la misma cifra.
