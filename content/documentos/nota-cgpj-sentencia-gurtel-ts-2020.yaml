id: nota-cgpj-sentencia-gurtel-ts-2020
titulo: "Nota del CGPJ: el Tribunal Supremo confirma penas de hasta 51 años de prisión para los procesados en el caso Gürtel"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  poderjudicial.es (lista blanca DominiosOficiales) que resume la
  sentencia 507/2020 de la Sala Segunda del Tribunal Supremo del 14 de
  octubre de 2020, ponente Juan Ramón Berdugo, por la que se resuelven
  los recursos de casación contra la sentencia de la Época I de Gürtel,
  confirmando con ligeras variaciones las penas y la responsabilidad
  civil a título lucrativo del Partido Popular.
