titulo: "Auto de transformación a procedimiento abreviado en el caso Pujol"
tipo: auto_judicial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Resolución del órgano instructor (Juzgado Central de Instrucción nº 5 de la
  Audiencia Nacional, juez José de la Mata) que concluye la instrucción y
  transforma la causa en procedimiento abreviado. Nivel 1 por proceder del
  órgano emisor. Fecha confirmada (16 de julio de 2020) mediante cobertura
  cruzada. Los autos de instrucción de los juzgados centrales no se publican en
  CENDOJ ni generan nota del CGPJ, por lo que el documento queda como
  acceso_restringido_pero_citable, a la espera de copia íntegra auditable del
  órgano emisor.
