nivel_fuente_justificacion: |
  Auto judicial del JCI nº 5 AN (juez Santiago Pedraz) del 26 de mayo de 2026, publicado
  íntegro por el medio El Lliberal Cat el 27 de mayo de 2026. Se modela como N3
  `filtrado_verificado` porque el auto es el documento jurisdiccional original pero llega
  al público a través de un medio periodístico, no de una nota oficial CGPJ ni de CENDOJ.
  El auto abre la pieza separada del JCI nº 5 e imputa a Cerdán, Zarrías, Fuentes Pacheco,
  Pérez Dolset, Oliver, Teijelo y Sánchez Yepes, y autoriza el requerimiento de documentación
  en la sede federal del PSOE (Ferraz). El medio El Lliberal Cat es una publicación
  independiente catalana que publicó el texto íntegro atribuido al auto.
  Pendiente: verificar si el CGPJ publicó nota oficial sobre este auto (N1 disponible).
  Pendiente: localizar en CENDOJ cuando sea accesible (posible elevación a N1 futura).
