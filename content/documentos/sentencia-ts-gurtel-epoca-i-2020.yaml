nivel_fuente_justificacion: |
  Sentencia 507/2020, de 14 de octubre de 2020, de la Sala Segunda (de
  lo Penal) del Tribunal Supremo, identificador europeo
  ECLI:ES:TS:2020:3191, ponente Juan Ramón Berdugo, que resuelve los
  recursos de casación contra la sentencia 20/2018 de la Audiencia
  Nacional sobre la Época I de Gürtel y confirma su firmeza. Recurso de
  casación ante órgano del Tribunal Supremo localizable en CENDOJ por
  su ECLI; Nivel 1 por ser resolución del propio órgano emisor con
  identificador oficial. Pendiente fijar la URL CENDOJ exacta y, en su
  caso, descargar copia local (pendiente_primario).
