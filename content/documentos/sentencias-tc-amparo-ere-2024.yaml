# Verificado 2026-05-30 desde encabezados BOE. Síntesis del impacto:
# - STC 99/2024 (Chaves): amparo parcialmente estimado por vulneración del
#   derecho a la legalidad penal (art. 25.1 CE). La condena por prevaricación
#   en actos pre-legislativos (aprobación de anteproyectos de ley de
#   presupuestos) anulada. Retroacción a AP Sevilla para nueva sentencia.
#   La condena por actos ejecutivos del Consejo de Gobierno (modificaciones
#   presupuestarias) se consideró válidamente enjuiciable.
# - STC 100/2024 (Griñán): amparo parcialmente estimado. Condena por
#   malversación ANULADA (vulneración del derecho a la presunción de inocencia:
#   las sentencias no acreditaron su participación directa en los actos de
#   disposición). Condena por prevaricación retroactada a AP Sevilla para
#   nueva sentencia (aplicar el mismo criterio que en Chaves sobre actos
#   pre-legislativos vs. ejecutivos).
# - STC 95/2024 (A. Fernández García): amparo estimado, condena por
#   malversación anulada. Retroacción para nueva sentencia.
# - STC 93/2024 (M. Álvarez): amparo parcialmente estimado, condena por
#   prevaricación parcialmente anulada (idem criterio actos pre-legislativos).
# - STC 101/2024 (Márquez Contreras): amparo DESESTIMADO. Condena firme.
# PENDIENTE: desglosar en Documentos individuales cuando se descarguen los
# primarios íntegros (el mantenedor decide el timing).
# Estado de la pieza política: AP Sevilla debe dictar NUEVA SENTENCIA
# (tribunal reforzado constituido en noviembre 2024; no dictada aún a 05-2026).
