titulo: "Nota del CGPJ: la Audiencia Nacional condena a penas de hasta 8 años de cárcel por la adjudicación de contratos de eficiencia energética en ayuntamientos de la Comunidad de Madrid (pieza Cofely del caso Púnica)"
