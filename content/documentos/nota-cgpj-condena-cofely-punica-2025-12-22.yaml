nivel_fuente_justificacion: |
  Nota oficial de la Oficina de Comunicación de la Audiencia Nacional
  publicada en poderjudicial.es (dominio oficial en lista blanca).
  Recoge la sentencia dictada el 22 de diciembre de 2025 en la pieza
  de la trama Púnica relativa a los contratos de eficiencia
  energética adjudicados a Cofely España. Pendiente de localizar la
  sentencia íntegra en CENDOJ; cuando aparezca se elevará el
  documento sentencia a N1 con su propio id.
