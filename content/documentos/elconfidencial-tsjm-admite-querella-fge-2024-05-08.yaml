titulo: "El Confidencial Digital — Admitida la querella del novio de Ayuso por revelación de secretos: el TSJ Madrid designa instructor a Goyena (8 may 2024)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la admisión a trámite, por la Sala
  Civil y Penal del Tribunal Superior de Justicia de Madrid, por
  auto del 7 de mayo de 2024, de la querella interpuesta el 3 de
  abril de 2024 por Alberto González Amador contra Pilar Rodríguez
  Fernández (Fiscal Jefa Provincial de Madrid) y Julián Salto
  Torres (Fiscal de Delitos Económicos) por presunto delito de
  revelación de secretos. El TSJM designa instructor de la causa
  al magistrado Francisco José Goyena Salgado, integrante de la
  Sala Civil y Penal del propio tribunal. Cobertura cruzada V-13
  con Newtral y la cronología del caso publicada por Maldita.es.
  Nivel 4 por tratarse de un medio de comunicación; el auto del
  TSJM no se ha localizado con URL canónica.
