titulo: "El Español — La UCO detecta adjudicaciones premeditadas y sin cumplir la normativa en el software de la UCM para Begoña Gómez (25 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del informe pericial de la Unidad Central
  Operativa de la Guardia Civil entregado al JI nº 41 de Madrid el 25
  de mayo de 2026, que concluye —según la cobertura de El Español—
  que las adjudicaciones del software de la UCM habrían sido planeadas
  con anterioridad y sin cumplir la normativa de contratación pública.
  Nivel 4 por tratarse de un medio de comunicación. Segundo documento
  de respaldo (línea editorial distinta a elDiario.es), cumpliendo V-13.
