nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de OKDIARIO sobre el auto de la Sección
  Tercera de la Sala de lo Penal de la Audiencia Nacional del 24 de
  febrero de 2023 que rechaza reabrir la investigación contra María
  Dolores de Cospedal García y deja firme el sobreseimiento
  provisional en la fase de instrucción. Cumple V-13 al cruzarse en
  línea editorial distinta con la cobertura de The Objective sobre el
  mismo auto.
