titulo: "Infobae — La jueza ordena a la UCO investigar el caso de la pareja de Ayuso por posible corrupción en los negocios y administración desleal (27 jun 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto del 27 de junio de 2025 por el que
  la magistrada Inmaculada Iglesias, titular del Juzgado de
  Instrucción nº 19 de Madrid, encomienda a la Unidad Central
  Operativa (UCO) de la Guardia Civil la investigación de los
  hechos investigados en la pieza separada por presuntos delitos de
  corrupción en los negocios y administración desleal en relación
  con un presunto pago encubierto presentado como comisión de
  500.000 euros vinculado a la presidencia de Quirón Prevención.
  Nivel 4 por tratarse de un medio de comunicación. Se cruza con la
  cobertura coetánea de eldiariodemadrid.es y de Público.es en
  líneas editoriales distintas para cumplir la regla V-13.
