titulo: "Público — El exministro Jorge Fernández Díaz y su número dos en Interior declaran en el juicio de 'Kitchen' (28 may 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de Público del 28 de mayo de 2026 sobre la
  declaración como acusados, en una misma sesión, del ex secretario de
  Estado de Seguridad Francisco Martínez Vázquez y del ex ministro del
  Interior Jorge Fernández Díaz, primeros de los procesados en declarar
  tras la fase de prueba testifical y documental en el juicio de la
  pieza séptima de las Diligencias Previas 96/2017 (Operación Kitchen).
  Cumple V-13 al cruzarse en líneas editoriales distintas con la
  cobertura de El Independiente y de El Diario de la misma fecha.
