id: iustel-ratifica-procesamiento-ga-2025-11-07
titulo: "Iustel — La Audiencia de Madrid ratifica el procesamiento de González Amador por el presunto fraude fiscal (7 nov 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística especializada del auto de la Sección Tercera
  de la Audiencia Provincial de Madrid del 7 de noviembre de 2025 por
  el que se desestima el recurso de apelación interpuesto por la
  defensa de Alberto González Amador y de la mercantil Maxwell Cremona
  S.L. contra el auto del Juzgado de Instrucción nº 19 de Madrid del
  29 de mayo de 2025, ratificando el procesamiento y la apertura del
  juicio oral. Nivel 4 por tratarse de un medio de comunicación
  especializado en información jurídica. Se cruza con la cobertura
  coetánea de Infobae en línea editorial distinta para cumplir la
  regla V-13.
