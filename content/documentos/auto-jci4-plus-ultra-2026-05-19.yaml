id: auto-jci4-plus-ultra-2026-05-19
titulo: "Auto del JCI nº 4 de la Audiencia Nacional de 19 de mayo de 2026 (caso Plus Ultra): levantamiento del secreto y citación de investigado"
tipo: auto_judicial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Auto del Juzgado Central de Instrucción nº 4 de la Audiencia Nacional
  cuya existencia, fecha, autor y contenido sustancial constan en la
  nota oficial del CGPJ publicada en poderjudicial.es (Oficina de
  Comunicación del Poder Judicial · Audiencia Nacional · Noticias
  Judiciales), dominio incluido en la lista blanca DominiosOficiales
  de [doc 01 — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados). El texto íntegro del auto no se ha localizado
  todavía publicado en CENDOJ; la cita se hace a partir del extracto
  institucional del CGPJ, que recoge los fundamentos del juez
  Calama sobre el indicio de tráfico de influencias, la decisión de
  no acordar el registro domiciliario por desproporcionado y la
  citación del investigado para el 2 de junio.
  Se conserva en el árbol del proyecto una copia íntegra del HTML
  de la nota CGPJ en
  `/public/documentos/plus-ultra/auto-jci4-plus-ultra-2026-05-19.html`
  (109 322 bytes, codificación UTF-8, plantilla institucional CGPJ
  con encabezados Oficina de Comunicación / Audiencia Nacional /
  Noticias Judiciales). El `hash_sha256` registrado abajo permite
  verificar la fidelidad de esa copia en el futuro, incluso si la
  URL canónica del CGPJ rota su slug o cambia de plantilla.
  Cuando aparezca el auto íntegro firmado en CENDOJ se descargará
  como documento adicional conservando el `id` de este registro
  como referencia a la nota institucional original.
