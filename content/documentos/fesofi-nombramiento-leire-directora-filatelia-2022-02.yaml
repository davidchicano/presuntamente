id: fesofi-nombramiento-leire-directora-filatelia-2022-02
titulo: "FESOFI anuncia el nombramiento de Leire Díez Castro como nueva Directora de Filatelia de Correos (febrero 2022)"
tipo: nota_prensa_institucional
productor_organizacion_id: fesofi
nivel_fuente: 3
nivel_fuente_justificacion: |
  Nota de la Federación Española de Sociedades Filatélicas (FESOFI), publicada el 8 de
  febrero de 2022, anunciando el nombramiento de Leire Díez Castro como Directora de
  Filatelia de Correos en sustitución de Jordi Escruelas. FESOFI es el interlocutor
  sectorial habitual de Correos en materia filatélica y recibe comunicaciones directas
  de la dirección de la empresa. La nota incluye información biográfica (formación y
  cargo previo de Leire Díez como jefa del área de Relaciones Institucionales de la
  Vicesecretaría General y el Consejo de Correos) que sólo procede de una comunicación
  directa de Correos a la federación. No hay nota de prensa pública de Correos ni
  publicación en BOE o BORME para este cargo directivo de segundo nivel. Se asigna
  nivel 3 (institucional) y no nivel 4 (prensa) porque FESOFI es un interlocutor
  institucional del sector, no un medio de comunicación. Sin embargo, la ausencia de
  fuente primaria directa de Correos limita la trazabilidad; el dato del cargo queda
  cruzado con la confirmación en BORME de los poderes de apoderada otorgados a
  partir del 01/04/2022 (primer acto registral en BORME núm. 161348), lo que acredita
  su vinculación formal con Correos a esa fecha.
