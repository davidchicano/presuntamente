titulo: "Confilegal — Presunto fraude fiscal y pertenencia a grupo criminal: la jueza abre juicio oral contra Alberto González Amador (22 sept 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística especializada del auto del Juzgado de
  Instrucción nº 19 de Madrid del 22 de septiembre de 2025 por el que
  se acuerda la apertura del juicio oral contra Alberto González
  Amador y otros cuatro investigados, recogiendo las peticiones de
  pena de la Fiscalía, la Abogacía del Estado y las acusaciones
  populares del PSOE y Más Madrid. Nivel 4 por tratarse de un medio
  de comunicación, si bien especializado en información jurídica. Se
  cruza con cobertura coetánea de Artículo 14 en línea editorial
  distinta para cumplir la regla V-13.
