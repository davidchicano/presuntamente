titulo: "The Objective — La UCO señala que Begoña Gómez simuló contratos para «dar apariencia de legalidad» (25 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística N4 del informe pericial de la Unidad Central
  Operativa de la Guardia Civil entregado al JI nº 41 de Madrid el 25 de
  mayo de 2026, que detalla las irregularidades de contratación del
  software de la cátedra (contratos «premeditados» y «ofertas simuladas»
  para dar «apariencia de legalidad» a servicios previamente acordados
  con Deloitte). Tercera línea editorial sobre el contenido del informe
  (distinta de elDiario.es y El Español), refuerza V-13.
