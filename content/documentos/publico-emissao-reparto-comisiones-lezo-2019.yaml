id: publico-emissao-reparto-comisiones-lezo-2019
titulo: "Público — Un exdirectivo de Inassa confirma que se repartió 5,5 millones de euros con Ignacio González por la compra de Emissao (2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la declaración prestada ante el
  magistrado instructor Manuel García-Castellón por un ex
  directivo de Inassa en la pieza Emissao del caso Lezo, en la
  que confirma que se habría repartido en torno a 5,5 millones
  de euros con el ex presidente de la Comunidad de Madrid
  Ignacio González González con motivo de la compra en 2013 por
  el Canal de Isabel II de la sociedad brasileña Emissao por
  unos treinta millones de dólares, cuantía considerada
  sobreprecio por la Fiscalía Anticorrupción. Cruzado con
  cobertura de El Mundo y Noticias Jurídicas coincidente en el
  contenido del testimonio. Nivel 4 por tratarse de un medio de
  comunicación.
