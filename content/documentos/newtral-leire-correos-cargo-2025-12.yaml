id: newtral-leire-correos-cargo-2025-12
titulo: "Qué sabemos del papel de Leire Díez en Correos durante las elecciones generales de 2023 (Newtral, diciembre 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Artículo de verificación de Newtral (medio independiente de fact-checking), publicado
  el 16 de diciembre de 2025, firmado por Julia F. Cadenas. Recoge el perfil de LinkedIn
  de Leire Díez para documentar su cargo de "directora de Filatelia y Relaciones
  Institucionales" desde febrero de 2022 hasta comienzos de 2024. Aporta la segunda
  línea editorial (independiente de centro) para el cruce V-13 junto a FESOFI (nivel 3).
  El artículo también cita que Correos desmintió que Díez fuera responsable del voto
  por correo, lo que acredita que Correos reconoció su cargo directivo pero acotó su
  ámbito de competencias.
