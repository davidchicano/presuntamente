titulo: "El Español — Isabel Díaz Ayuso elegida presidenta del PP de Madrid con el 99,12% de los votos en el XVII Congreso Extraordinario"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El Español del 20-21 de mayo de 2022 sobre el XVII Congreso
  Extraordinario del PP de Madrid celebrado en Ifema, en el que Isabel Díaz
  Ayuso fue elegida presidenta del PP de Madrid con 2.030 votos de los
  2.052 compromisarios (99,12%). La cobertura es verificable también desde
  Okdiario (okdiario.com), que reporta los mismos resultados del congreso
  y nombra a Alfonso Serrano como nuevo secretario general del PP madrileño.
  Dos líneas editoriales distintas (El Español y Okdiario) confirman los
  resultados con las mismas cifras. La noticia es un hecho de registro
  público (resultado de un congreso de partido).
