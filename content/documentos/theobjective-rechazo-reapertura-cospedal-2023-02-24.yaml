titulo: "The Objective — La Audiencia Nacional rechaza reabrir el caso Kitchen para investigar a Cospedal (feb 2023)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de The Objective sobre el auto de la Sección
  Tercera de la Sala de lo Penal de la Audiencia Nacional del 24 de
  febrero de 2023 por el que se desestiman los recursos de apelación
  interpuestos por la Fiscalía Anticorrupción, por Unidas Podemos y
  por el PSOE como acusaciones populares contra el sobreseimiento
  provisional confirmado el 7 de diciembre de 2022 respecto de María
  Dolores de Cospedal García e Ignacio López del Hierro Bravo. Cumple
  V-13 al cruzarse en línea editorial distinta con la cobertura de
  okdiario sobre el mismo auto.
