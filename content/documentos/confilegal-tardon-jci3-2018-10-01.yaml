id: confilegal-tardon-jci3-2018-10-01
titulo: "Confilegal — María Tardón será la nueva magistrada del Juzgado Central de Instrucción 3 de la Audiencia Nacional (1 oct 2018)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística jurídica de la designación de la
  magistrada María Tardón Olmos como titular del Juzgado
  Central de Instrucción nº 3 de la Audiencia Nacional con
  efectos del 1 de octubre de 2018. Recoge su trayectoria
  profesional, ingreso en la Carrera Judicial en 1987 y rol
  como titular del JCI nº 3 al ser la persona de la carrera
  judicial con más antigüedad de las que solicitaron la plaza
  vacante por el nombramiento de Carmen Lamela como magistrada
  de la Sala de lo Penal del Tribunal Supremo. Esta plaza la
  capacitaría posteriormente para asumir interinamente las
  causas pendientes del JCI nº 6 entre la jubilación de
  García-Castellón (2-sept-2024) y la toma de posesión de
  Antonio Piña (8-ene-2025). Confilegal es publicación
  especializada en información jurídica. Cruzado con cobertura
  de la Asociación Judicial Francisco de Vitoria y de
  Servimedia. Nivel 4 por tratarse de un medio de
  comunicación.
