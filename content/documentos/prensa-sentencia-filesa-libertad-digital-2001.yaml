nivel_fuente_justificacion: |
  Artículo de Libertad Digital (libertaddigital.com) publicado el 4 de
  junio de 2001 que detalla las penas individuales de los ocho
  condenados del caso Filesa. Se usa como fuente N4 de los datos de
  condena individuales que la STS 1/1997 no tiene disponible en N1
  completo. Los datos son coherentes con la STC 126/2001 y 127/2001
  (N1) respecto a Oliveró, Álvarez y Molledo, lo que permite su uso
  por V-13 (cruce de líneas editoriales).
