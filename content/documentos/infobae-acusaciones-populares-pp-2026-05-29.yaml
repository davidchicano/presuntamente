titulo: >-
  El juez da al PP el timón de las acusaciones populares del 'caso Plus Ultra'
  y dice que tiene "más implantación" que Vox (Infobae, 29-may-2026)
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: >-
  Cobertura periodística de Infobae España del 29-may-2026 que detalla el auto
  de Calama del 29-may: agrupa las ocho acusaciones populares personadas y
  designa al PP titular de su representación y dirección letrada conjunta,
  razonando que la personación de Vox no era válida por falta de poder de
  representación y que el PP "presenta una implantación institucional más
  relevante". Nivel 4 por ser medio de comunicación sin acceso directo al auto.
  Segunda fuente (línea editorial distinta de The Objective) para cumplir V-13.
  Pendiente de sustitución por el auto íntegro en CENDOJ o nota CGPJ.
