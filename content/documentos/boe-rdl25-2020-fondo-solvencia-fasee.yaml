id: boe-rdl25-2020-fondo-solvencia-fasee
titulo: "BOE-A-2020-7311 — Real Decreto-ley 25/2020, de 3 de julio, de medidas urgentes para apoyar la reactivación económica y el empleo (publicado en BOE núm. 185 de 6 de julio de 2020). Crea en su artículo 2 el Fondo de Apoyo a la Solvencia de Empresas Estratégicas (FASEE), instrumento del que el 9 de marzo de 2021 el Consejo de Ministros autorizó el préstamo de 53 millones de euros a Plus Ultra Líneas Aéreas hoy investigado por el JCI nº 4 de la Audiencia Nacional."
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Fuente oficial primaria publicada en el Boletín Oficial del Estado el 6 de
  julio de 2020 con el código BOE-A-2020-7311 (BOE núm. 185, pp. 47684 a
  47742). Disposición de la Jefatura del Estado: Real Decreto-ley 25/2020,
  de 3 de julio, de medidas urgentes para apoyar la reactivación económica
  y el empleo. Es la norma con rango de ley que **crea** el Fondo de Apoyo
  a la Solvencia de Empresas Estratégicas (FASEE) en su artículo 2.1:

  > "se crea el Fondo de apoyo a la solvencia de empresas estratégicas,
  > fondo carente de personalidad jurídica (en adelante el «Fondo»),
  > adscrito a la Administración General del Estado, a través del
  > Ministerio de Hacienda" (Art. 2.1, BOE núm. 185, p. 47688)

  Y le adscribe la gestión a la SEPI:

  > "gestionado, a través de la Sociedad Estatal de Participaciones
  > Industriales (SEPI)" (Art. 2.1)

  Con dotación inicial de 10.000 millones de euros para operaciones
  financieras temporales con empresas no financieras consideradas
  estratégicas afectadas por la pandemia. El FASEE es el vehículo
  financiero del que emanó, el 9 de marzo de 2021, el préstamo de 53
  millones de euros a Plus Ultra Líneas Aéreas que el Juzgado Central de
  Instrucción nº 4 de la Audiencia Nacional investiga desde 2025 por
  presunta concesión irregular (auto del 19 de mayo de 2026 de imputación
  de José Luis Rodríguez Zapatero y otros).

