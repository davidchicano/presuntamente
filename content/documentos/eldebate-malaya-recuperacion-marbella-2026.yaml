nivel_fuente_justificacion: |
  Reportaje de El Debate del 2 de abril de 2026 sobre el balance
  económico de Marbella veinte años después de la Operación Malaya.
  Detalla el dinero recuperado (92 M€ en condenas, más de 60 M€ por
  venta de bienes de Roca), las deudas heredadas (450 M€) y el estado
  de la ejecución de condenas. Fuente N4, cruzada con Wikipedia y la
  nota CGPJ para las cifras principales.
