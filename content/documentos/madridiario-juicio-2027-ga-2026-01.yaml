titulo: "Madridiario — El juicio contra Alberto González Amador se retrasa a 2027 por saturación en los juzgados"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de Madridiario (14 de enero de 2026) que da la
  noticia del señalamiento del juicio oral contra Alberto González
  Amador para 2027. Atribuye el retraso a la saturación de los juzgados
  de lo penal de Madrid y a la reforma de eficiencia de la Justicia
  ("reforma Bolaños"), con origen en fuentes de la Cadena SER. Nivel 4
  por tratarse de un medio de comunicación. Cobertura cruzada con El
  Plural y elDiario.es (líneas editoriales distintas), cumpliendo V-13.
