id: auto-jci4-rechazo-medidas-zapatero-pu-2026-06-17
titulo: "Nota CGPJ — El JCI nº 4 rechaza imponer medidas cautelares a José Luis Rodríguez Zapatero tras su declaración en el caso Plus Ultra (17 jun 2026)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial publicada en `poderjudicial.es` (dominio oficial en lista
  blanca DominiosOficiales de [doc 01 — "Enums catalogados"](docs/diseno/01-modelo-de-datos.md#3-enums-catalogados))
  sobre el auto del JCI nº 4 de la Audiencia Nacional de 17 de junio de
  2026, dictado tras la declaración de José Luis Rodríguez Zapatero como
  investigado. La nota resume que el magistrado José Luis Calama rechaza la
  retirada del pasaporte y las comparecencias periódicas al no apreciar un
  riesgo procesal actual que justifique esas medidas. Cumple V-12.
