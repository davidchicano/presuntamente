id: confilegal-archivo-gallardon-inassa-lezo-2019-05-30
titulo: "Confilegal — El juez de Lezo archiva la investigación a Gallardón e Ignacio González por la compra de Inassa (30 may 2019)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística jurídica del auto del titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  Manuel María García-Castellón García-Lomas, fechado el 30 de
  mayo de 2019, por el que se acuerda el sobreseimiento
  provisional de la pieza Inassa respecto del ex presidente del
  Gobierno de la Comunidad de Madrid y posterior alcalde de
  Madrid y ministro de Justicia Alberto Ruiz-Gallardón
  Jiménez, así como del ex teniente de alcalde de Madrid
  Manuel Cobo Vega, del propio Ignacio González González en
  esta pieza y de otros doce investigados. La decisión se
  adopta a petición del Ministerio Fiscal, que el 22 de mayo
  de 2019 presentó escrito al considerar agotada la
  instrucción de esta pieza separada respecto de los catorce
  desimputados. La causa sigue abierta contra los veintidós
  procesados que serán juzgados en juicio oral. Confilegal es
  publicación especializada en información jurídica. Cruzado
  con cobertura de El Independiente, Público, El Español y la
  cobertura posterior del recurso del PSOE y Podemos contra
  el archivo. Nivel 4 por tratarse de un medio de
  comunicación.
