titulo: "El Supremo confirma las penas a Crespo, Correa y 'El Bigotes' por defraudar con la visita del Papa"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística (Nivel 4) de El Español sobre la confirmación
  por la Sala Segunda del Tribunal Supremo, en abril de 2023, de las
  condenas de la pieza valenciana relativa al fraude vinculado a la
  visita del papa Benedicto XVI a Valencia en 2006. Se cruza con la
  cobertura de eldiario.es sobre la misma rama (V-13, líneas
  editoriales distintas). Pendiente localizar la nota oficial del CGPJ
  o el ECLI de la sentencia para elevar a Nivel 1 (pendiente_primario).
