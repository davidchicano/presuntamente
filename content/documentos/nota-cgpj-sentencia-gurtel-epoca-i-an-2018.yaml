nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  poderjudicial.es (dominio en lista blanca DominiosOficiales) que
  resume la sentencia 20/2018 de la Sección Segunda de la Sala de lo
  Penal de la Audiencia Nacional sobre la Época I (1999-2005) de la
  trama Gürtel. Detalla número de acusados, condenas individuales y la
  condena al Partido Popular como partícipe a título lucrativo.
  Pendiente la sentencia íntegra como primario local
  (pendiente_primario).
