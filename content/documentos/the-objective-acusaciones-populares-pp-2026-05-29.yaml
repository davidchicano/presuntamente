nivel_fuente_justificacion: >-
  Cobertura periodística de The Objective del 29-may-2026, de redacción propia
  (no de agencia), sobre el auto del JCI nº 4 que agrupa las acusaciones
  populares del caso Plus Ultra bajo la representación y dirección letrada
  conjunta del Partido Popular. Nivel 4 por ser medio de comunicación sin
  acceso directo al auto. Verificación cruzada con Infobae España (mismo día,
  línea editorial distinta) y con cobertura adicional (Moncloa.com,
  ElNacional.cat, Estrella Digital, Público). Pendiente de sustitución por el
  auto íntegro en CENDOJ o por nota del CGPJ cuando aparezca.
