id: boe-rd838-nombramiento-viejo-ga-2025-09-22
titulo: "BOE-A-2025-19789 — Real Decreto 838/2025, de 22 de septiembre, por el que se destina al magistrado Antonio Viejo Llorente al Juzgado de Instrucción nº 19 de Madrid (publicado en BOE núm. 240 de 6 de octubre de 2025)"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Fuente oficial primaria publicada en el Boletín Oficial del Estado
  el 6 de octubre de 2025 con el código BOE-A-2025-19789. El Real
  Decreto 838/2025, de 22 de septiembre, recoge en su apartado Sexto
  el destino del magistrado don Antonio Viejo Llorente, con destino
  previo en la Audiencia Provincial de Madrid (orden penal), a la
  plaza del Juzgado de Instrucción número 19 de Madrid (Instrucción
  y Control de los Centros de Internamiento de Extranjeros y de las
  Salas de Inadmisión de fronteras), como consecuencia del concurso
  resuelto por Acuerdo de la Comisión Permanente del Consejo General
  del Poder Judicial de 16 de septiembre de 2025. Copia íntegra
  descargada del propio BOE (`boe.es`, dominio en lista blanca
  DominiosOficiales): PDF de 10 páginas (243.380 bytes) cuyos
  metadatos confirman autoría institucional (`Author: CONSEJO GENERAL
  DEL PODER JUDICIAL`, `Creator: eBOE`, `Producer: Antenna House PDF
  Output Library 6.6.1477 (Linux64); modified using OpenPDF 1.3.39`,
  `CreationDate: Fri Oct 3 18:07:29 2025 CEST`) y XML estructurado
  oficial. Cumple V-12.
