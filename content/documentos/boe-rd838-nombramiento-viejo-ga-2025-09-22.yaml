titulo: "BOE — Real Decreto 838/2025, de 22 de septiembre, destina al magistrado Antonio Viejo Llorente al Juzgado de Instrucción nº 19 de Madrid"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Fuente oficial primaria publicada en el Boletín Oficial del Estado
  (boe.es, dominio en lista blanca). El Real Decreto 838/2025, de 22
  de septiembre, recoge en su apartado Sexto el destino del magistrado
  don Antonio Viejo Llorente a la plaza del Juzgado de Instrucción nº
  19 de Madrid (Instrucción y Control de los Centros de Internamiento
  de Extranjeros y de las Salas de Inadmisión de fronteras), como
  consecuencia del concurso resuelto por Acuerdo de la Comisión
  Permanente del Consejo General del Poder Judicial de 16 de
  septiembre de 2025.
