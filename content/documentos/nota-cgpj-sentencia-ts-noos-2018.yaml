nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial (poderjudicial.es, en lista blanca)
  publicada el día de la sentencia (12 de junio de 2018). Informa del fallo de la Sala Segunda
  del Tribunal Supremo (STS 277/2018, ECLI:ES:TS:2018:2056, ponente Antonio del Moral García).
  Confirma los delitos, las penas exactas para cada condenado, y la responsabilidad civil de
  Cristina de Borbón (136.950 €) y Ana María Tejeiro (172.550 €) como partícipes a título lucrativo.
