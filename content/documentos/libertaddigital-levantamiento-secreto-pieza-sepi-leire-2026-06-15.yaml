nivel_fuente_justificacion: |
  Cobertura de Libertad Digital (línea editorial de derecha, redacción propia) sobre el auto
  por el que Pedraz alza el secreto de la pieza separada relativa a presuntas irregularidades
  en operaciones de la SEPI dentro del caso Leire. Recoge expresamente que la resolución
  permite a las partes acceder a la pieza y la conecta con la derivada Tubos Reunidos.
  Cruzado con Euronews para V-13.
