titulo: "BOE-A-2022-12946 — Real Decreto 675/2022, de 1 de agosto, por el que se nombra Fiscal General del Estado a don Álvaro García Ortiz"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición publicada en el Boletín Oficial del Estado nº 184, de 2 de
  agosto de 2022, con el código BOE-A-2022-12946. Real Decreto 675/2022,
  de 1 de agosto, firmado por el Rey Felipe VI y refrendado por el
  Presidente del Gobierno Pedro Sánchez, por el que se nombra a Álvaro
  García Ortiz Fiscal General del Estado. El Fiscal General del Estado
  es nombrado por el Rey a propuesta del Gobierno y oído el Consejo
  General del Poder Judicial (art. 124.4 CE y art. 29 EOMF). boe.es está
  en la lista blanca DominiosOficiales del proyecto. PDF íntegro
  descargado a `/public/documentos/fiscal-general-del-estado/` con
  `hash_sha256` verificado contra el mirror oficial. Cumple V-12.
