id: boe-nombramiento-fernandez-guerrero-sepi-2018
titulo: "BOE-A-2018-8601 — Real Decreto 616/2018, de 22 de junio, por el que se nombra Presidente de la Sociedad Estatal de Participaciones Industriales a don Vicente Fernández Guerrero"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición publicada en el Boletín Oficial del Estado nº 152, de 23 de
  junio de 2018, con el código BOE-A-2018-8601. Real Decreto 616/2018, de
  22 de junio, firmado por el Rey Felipe VI y refrendado por la Ministra
  de Hacienda María Jesús Montero Cuadrado, por el que se nombra Presidente
  de la Sociedad Estatal de Participaciones Industriales (SEPI) a Vicente
  Fernández Guerrero. boe.es está en la lista blanca DominiosOficiales del
  proyecto. PDF íntegro descargado desde el mirror PDF oficial del BOE
  (boe.es/boe/dias/2018/06/23/pdfs/BOE-A-2018-8601.pdf) con hash_sha256
  verificado. Cumple V-12.
