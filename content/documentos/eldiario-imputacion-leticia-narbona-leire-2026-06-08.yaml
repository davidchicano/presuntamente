titulo: "elDiario.es: el juez Pedraz imputa a la abogada Leticia de la Hoz en el caso Leire y cita a Cristina Narbona para el 10 de julio (8 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de elDiario.es (línea editorial de centroizquierda) sobre la resolución por la
  que Pedraz cita como investigada a Leticia de la Hoz Calvo, señala su declaración para el
  14 de julio y cita como testigo a Cristina Narbona para el 10 de julio. También recoge el
  requerimiento a la Fiscalía General del Estado sobre reuniones con Leire Díez y otros
  investigados. Cruzado con Euronews para V-13.
