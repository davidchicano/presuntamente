titulo: "Estrella Digital — El juzgado ve indicios suficientes para seguir con la causa contra González Amador y acuerda el archivo de Gómez Fidalgo (29 may 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto del Juzgado de Instrucción nº 19 de
  Madrid del 29 de mayo de 2025 por el que se mantiene la causa
  contra Alberto González Amador y los demás investigados y se acuerda
  simultáneamente el sobreseimiento provisional respecto al asesor
  fiscal Javier Luis Gómez Fidalgo. Cita el pasaje del auto: "no se ha
  aportado documentación técnica, contractual o mercantil que respalde
  de forma suficiente la realidad de los servicios facturados". Nivel
  4 por tratarse de un medio de comunicación. Se cruza con la
  cobertura coetánea de El Español en línea editorial distinta para
  cumplir la regla V-13.
