nivel_fuente_justificacion: |
  Cobertura periodística en directo del JCI nº 4 de la AN sobre las
  diligencias acordadas el 25 de mayo de 2026: bloqueo de 490.780 € en
  cuentas de José Luis Rodríguez Zapatero, auto de acceso a correos de
  Zapatero y sus hijas (Acens Technologies) y secreto absoluto sobre
  la UDEF en la causa. Nivel 4 por tratarse de cobertura periodística.
  Sirve como documento principal del hito; cobertura cruzada con
  Actualidad.es (línea editorial distinta), cumpliendo V-13.
