titulo: "El Español — Sentencia Gürtel: Luis Bárcenas condenado a 33 años de prisión como extesorero del PP"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El Español del 24 de mayo de 2018 sobre la sentencia de la
  Audiencia Nacional en el caso Gürtel (primera pieza, 1999-2005). El artículo
  acredita que Luis Bárcenas fue gerente del PP desde 1990 y tesorero desde
  2008, y que la sentencia le condena a 33 años de prisión como extesorero
  del Partido Popular. Cumple V-13: los mismos datos sobre su condición de
  extesorero y los cargos del PP se cruzan con la cobertura de Público
  (publico.es), que igualmente identifica a Bárcenas como extesorero del PP
  condenado en la sentencia Gürtel, y con la cobertura de Infolibre
  (infolibre.es), que confirma la condena del Tribunal Supremo. Tres líneas
  editoriales distintas.
