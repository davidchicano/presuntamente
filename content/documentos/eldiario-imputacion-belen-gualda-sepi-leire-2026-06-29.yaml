id: eldiario-imputacion-belen-gualda-sepi-leire-2026-06-29
titulo: "elDiario.es: el juez del caso Leire imputa a la presidenta de la SEPI y a otras personas por supuestos amaños en adjudicaciones (29 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de elDiario.es sobre la resolución por la que el magistrado Pedraz incorpora
  como investigada a la presidenta de SEPI, María Belén Gualda González, y a otras personas
  en la derivada de presuntas adjudicaciones irregulares vinculadas a SEPI/Tubos Reunidos.
  Se cruza con The Objective para V-13. Al no disponer aún del auto íntegro, se modela el
  hito con fuente N4 y se evita estructurar cifras nuevas.
