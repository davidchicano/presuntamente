id: nota-cgpj-sentencia-gurtel-visita-papa-ts-2023
titulo: "Nota del CGPJ: el Tribunal Supremo confirma la sentencia de la Audiencia Nacional en la pieza 'visita del Papa' del caso Gürtel, al rechazar el recurso de siete acusados"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del Consejo General del Poder Judicial publicada en
  poderjudicial.es (dominio en lista blanca DominiosOficiales) que resume
  la sentencia del Tribunal Supremo (ECLI:ES:TS:2023:1286, 10 de abril de
  2023) por la que se confirma íntegramente la sentencia de la Audiencia
  Nacional en la pieza de la visita del papa Benedicto XVI a Valencia en
  2006. El Tribunal Supremo rechazó los recursos de siete de los acusados,
  haciendo firme la condena para los 19 condenados. La nota indica que el
  sobrecoste con cargo a fondos públicos ascendió a 3.205.375,11 euros
  (RTVV). No detalla penas individuales por acusado: ese dato procede de
  cobertura N4. URL verificada accesible el 2026-05-30.
