id: boe-stc-125-2001-filesa
titulo: "STC 125/2001, de 4 de junio de 2001 — Recurso de amparo 4705/97 (Alberto Flores Valencia)"
tipo: sentencia
nivel_fuente: 1
nivel_fuente_justificacion: |
  Sentencia del Tribunal Constitucional publicada en el Boletín Oficial
  del Estado (id BOE-T-2001-12758). El dominio boe.es está en la lista
  blanca DominiosOficiales. Desestima el recurso de amparo de Alberto
  Flores Valencia, confirmando la firmeza constitucional de las condenas
  impuestas por la STS 1/1997: dos delitos continuados de falsedad
  (3 años cada uno), asociación ilícita (2 años más inhabilitación)
  y delito contra la Hacienda pública (2 años más multa de 258.827.765
  pesetas). Constituye soporte N1 para los hechos derivados de la condena
  de Flores Valencia.
