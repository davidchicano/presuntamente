nivel_fuente_justificacion: |
  Fuente primaria N1: Real Decreto 373/2022 publicado en el BOE
  (BOE-A-2022-7789) con fecha de 12 de mayo de 2022. Acredita la
  fecha exacta del cese de Alberto Núñez Feijóo como Presidente de la
  Xunta (implícita en el nombramiento de su sucesor) y el inicio del
  mandato de Alfonso Rueda Valenzuela. Emitido por la Presidencia del
  Gobierno y publicado en el BOE.
