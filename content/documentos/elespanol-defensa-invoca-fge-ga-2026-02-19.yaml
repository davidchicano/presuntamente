titulo: "El Español — La pareja de Ayuso invoca la condena a García Ortiz para sortear la acusación de fraude fiscal: «No es un proceso justo» (19 feb 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del escrito presentado el 19 de febrero de
  2026 por la defensa de Alberto González Amador, en el que invoca la
  condena del Tribunal Supremo contra el ex-Fiscal General del Estado
  Álvaro García Ortiz por revelación de secretos como vulneración del
  derecho a un proceso penal justo y a la presunción de inocencia, y
  pide aplicar sus consecuencias al procedimiento principal por
  fraude fiscal. Incluye cita literal: "Este procedimiento penal
  constituye, desde antes de existir y durante todo su desarrollo, la
  antítesis del procedimiento penal justo en un Estado
  Constitucional". Nivel 4 por tratarse de un medio de comunicación.
