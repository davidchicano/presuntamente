titulo: "El Español — La juez propone juzgar a González Amador, novio de Ayuso, por fraude fiscal y falsedad documental (29 may 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del auto de la magistrada Inmaculada Iglesias
  del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo de 2025,
  por el que se cierra la instrucción y se propone el enjuiciamiento
  de Alberto González Amador y otros cuatro investigados. Cita pasajes
  del auto sobre el sistema indiciario de facturas que no se
  correspondían con servicios efectivamente prestados. Nivel 4 por
  tratarse de un medio de comunicación. Se cruza con cobertura
  coetánea de Estrella Digital y de Euronews en línea editorial
  distinta para cumplir la regla V-13.
