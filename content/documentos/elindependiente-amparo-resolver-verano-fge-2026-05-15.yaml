id: elindependiente-amparo-resolver-verano-fge-2026-05-15
titulo: "El Independiente — El Constitucional tiene previsto resolver antes del verano la admisión de los recursos de García Ortiz (15 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística sobre el calendario previsto por el Tribunal
  Constitucional para decidir la admisión a trámite de los dos recursos
  de amparo presentados contra la Sentencia 1000/2025 (Fiscalía,
  10-abr-2026; defensa de García Ortiz, 13-abr-2026). Nivel 4 por
  tratarse de un medio de comunicación; no consta auto ni nota oficial
  del TC sobre la admisión a fecha de este barrido. Sirve como documento
  de respaldo del matiz de calendario añadido a la descripción del hito
  del recurso de amparo, no como acreditación de un acto procesal: la
  "previsión" de resolver antes del verano es una expectativa
  periodística, no una resolución del órgano.
