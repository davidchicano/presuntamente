titulo: "RTVE.es — El juez del caso Begoña Gómez abre una nueva línea de investigación solo sobre el empresario Barrabés (19 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de RTVE.es sobre la providencia fechada el 18
  de junio de 2026 y conocida públicamente el 19 de junio por la que el
  Juzgado de Instrucción nº 41 de Madrid abre una pieza separada
  dirigida únicamente contra Juan Carlos Barrabés por presuntos delitos
  de prevaricación y fraude a los intereses financieros de la Unión
  Europea en una adjudicación de Red.es. Nivel 4 por tratarse de un
  medio de comunicación. Se cruza con cobertura propia de elDiario.es
  para cumplir V-13.
