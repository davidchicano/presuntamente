titulo: "Confilegal — La Audiencia de Málaga confirma el archivo del caso del ático de Ignacio González (13 nov 2020)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística especializada en información jurídica
  del auto de la Sección Novena de la Audiencia Provincial de
  Málaga, fechado el 9 de noviembre de 2020 y notificado el 13
  de noviembre, por el que se desestima el recurso de apelación
  de las acusaciones populares y se confirma el sobreseimiento
  provisional y archivo acordado por el Juzgado de Primera
  Instancia e Instrucción nº 5 de Estepona en julio de 2020. La
  cobertura recoge el razonamiento del tribunal de que no
  constan indicios de cohecho —ningún vínculo se infiere entre
  los contratos de la sociedad Coast Investors y la actuación de
  Ignacio González como vicepresidente o presidente de la
  Comunidad de Madrid— ni de un delito antecedente del que
  procediera el dinero a efectos de blanqueo. Cruzado con
  cobertura de El Independiente, Público e Infolibre coincidente
  en fecha, órgano y contenido. Nivel 4 por tratarse de un medio
  de comunicación; el auto íntegro de la AP de Málaga no se ha
  localizado en fuente oficial (pendiente_primario en NOTES).
