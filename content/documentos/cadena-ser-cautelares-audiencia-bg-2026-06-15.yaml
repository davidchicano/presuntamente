titulo: "Cadena SER — La acusación popular pide la retirada del pasaporte para Begoña Gómez y el juez aplaza la decisión final (15 junio 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística propia de Cadena SER sobre la audiencia
  preliminar celebrada el 15 de junio de 2026 en el Juzgado de
  Instrucción nº 41 de Madrid. El artículo recoge la petición de
  comparecencias quincenales, retirada de pasaporte y prohibición de
  salida de España para Begoña Gómez y Cristina Álvarez, así como el
  aplazamiento de la decisión final por parte del instructor. Nivel 4
  por tratarse de un medio de comunicación. Se usa como segunda línea
  editorial para reforzar la actualización descriptiva del hito de
  audiencia previa.
