id: nota-cgpj-ap-barcelona-pieza-ejecucion-cdc-2022
titulo: "CGPJ — La Audiencia de Barcelona paraliza la pieza de responsabilidad civil sobre los sucesores de CDC en el caso Palau (15 febrero 2022)"
tipo: nota_prensa_institucional
nivel_fuente: 1
nivel_fuente_justificacion: |
  Nota oficial del CGPJ publicada en poderjudicial.es (dominio en lista
  blanca DominiosOficiales). Recoge el auto de 15 de febrero de 2022
  de la Sección 10ª de la Audiencia Provincial de Barcelona por el que
  se declara incompetente para determinar si PDeCat y Junts per Catalunya
  son sucesores de CDC a efectos de la ejecución del comiso de
  6.676.105,58 euros, derivando al Juzgado Mercantil 9 de Barcelona
  como consecuencia del procedimiento concursal abierto contra CDC
  en marzo de 2020.
