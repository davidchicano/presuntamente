nivel_fuente_justificacion: |
  Disposición publicada en el Boletín Oficial del Estado el 10 de
  diciembre de 2025 con el código BOE-A-2025-25144. Real Decreto
  1140/2025, de 9 de diciembre, por el que se nombra Fiscal General
  del Estado a Teresa Peramato Martín, formalizando la sucesión en
  el cargo tras el cese del condenado por el Tribunal Supremo. Se
  conservan copia local del PDF oficial (191 KB, una página, autor
  PRESIDENCIA DEL GOBIERNO) y del XML estructurado del BOE, con
  sus respectivos hashes sha256. `boe.es` está en la lista blanca
  DominiosOficiales del doc 01 §3. Cumple V-12.
