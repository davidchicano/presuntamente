titulo: "Newtral — FACT-CHECK: Yolanda Díaz sí repitió partido en sus inicios políticos pese a lo que dice Olano"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Fact-check de Newtral publicado el 19 de febrero de 2026 que verifica
  y documenta la trayectoria política de Yolanda Díaz, incluyendo su
  cargo como coordinadora nacional de Esquerda Unida (IU Galicia)
  desde 2005. Confirma que Díaz se presentó bajo las siglas de IU en
  hasta cinco ocasiones en elecciones municipales y autonómicas
  gallegas entre 1999 y 2009. Newtral es organización de verificación
  independiente con metodología pública. Cruzable con elDiario.es y
  Wikipedia.
