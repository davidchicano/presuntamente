titulo: "BOE-A-2025-25142 — Real Decreto 1138/2025, de 9 de diciembre, por el que se dispone el cese de don Álvaro García Ortiz como Fiscal General del Estado"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición publicada en el Boletín Oficial del Estado el 10 de
  diciembre de 2025 con el código BOE-A-2025-25142. Real Decreto
  1138/2025, de 9 de diciembre, por el que se dispone el cese de
  Álvaro García Ortiz como Fiscal General del Estado a petición
  propia, tras la apreciación por el Consejo de Ministros de la
  concurrencia de la causa prevista en la ley aplicable, y en
  cumplimiento de la sentencia del Tribunal Supremo que le
  inhabilita para el cargo. `boe.es` está en la lista blanca
  DominiosOficiales del doc 01 §3. Cumple V-12.
