nivel_fuente_justificacion: |
  Sentencia del Tribunal Constitucional publicada en el Boletín Oficial
  del Estado (id BOE-T-2001-12756). El dominio boe.es está en la lista
  blanca DominiosOficiales. Reproduces las condenas exactas de Carlos
  Navarro Gómez impuestas por la STS 1/1997 (Causa Especial 880/1991)
  y desestima el recurso de amparo, con lo que las condenas adquieren
  firmeza constitucional plena. Constituye soporte N1 para los hechos
  derivados de la condena de Navarro.
