titulo: "elDiario.es — La UCO no encuentra ingresos opacos de Begoña Gómez en su último informe sobre el caso (25 mayo 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística del informe pericial de la Unidad Central
  Operativa de la Guardia Civil entregado al JI nº 41 de Madrid el 25
  de mayo de 2026, que concluye —según la cobertura de elDiario.es—
  que no se han encontrado ingresos opacos o irregular en la cuenta de
  Begoña Gómez Fernández. Nivel 4 por tratarse de un medio de
  comunicación. Sirve como documento principal del hito; cobertura
  cruzada con El Español (línea editorial distinta), cumpliendo V-13.
