titulo: "BOCM — Decreto 25/2001, de 20 de septiembre, del Presidente de la Comunidad, por el que se nombra Consejero de Hacienda de la Comunidad de Madrid a don Juan Bravo Rivera"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición oficial publicada en el Boletín Oficial de la Comunidad de
  Madrid (BOCM) nº 225, de 21 de septiembre de 2001, anuncio nº 3264.
  Firmado por el Presidente de la Comunidad de Madrid, Alberto
  Ruiz-Gallardón. Fuente primaria directa (N1): órgano emisor es la
  Presidencia de la Comunidad de Madrid. Disposición textual literal
  (verificada vía pdftotext sobre el BOCM íntegro descargado):
  «DECRETO 25/2001, de 20 de septiembre, del Presidente de la Comunidad,
  por el que se nombra Consejero de Hacienda de la Comunidad de Madrid.
  [...] DISPONGO: Nombrar al excelentísimo señor don Juan Bravo Rivera
  Consejero de Hacienda de la Comunidad de Madrid. Dado en Madrid, a 20
  de septiembre de 2001. El Presidente, ALBERTO RUIZ-GALLARDÓN». El
  decreto figura en la página 20 del boletín íntegro (69 páginas) y forma
  parte de una remodelación gubernamental en la que el Decreto 155/2001
  separó la Consejería de Hacienda de la unidad «Presidencia y Hacienda»
  y el Decreto 156/2001 cesó a Bravo Rivera como Viceconsejero de Hacienda
  (paso previo inmediato al nombramiento). PDF descargado a
  `/public/documentos/lezo/` con `hash_sha256` verificado contra el mirror
  oficial.
