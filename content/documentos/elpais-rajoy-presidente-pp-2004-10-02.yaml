titulo: "El País — Rajoy, elegido presidente del PP en el XVI Congreso Nacional del partido"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura de El País del 2 de octubre de 2004 sobre la elección de
  Mariano Rajoy como presidente del PP en el XVI Congreso Nacional del
  partido, celebrado tras la derrota electoral del 14 de marzo de 2004.
  Rajoy sucede a José María Aznar conforme a un traspaso de poder
  previamente pactado. Cruzable con la cobertura de El Mundo y de la
  propia web del PP que recogen el mismo dato. Tres líneas editoriales
  distintas informan de la misma elección.
