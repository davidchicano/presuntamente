titulo: "El Diario — El exministro Fernández Díaz declara en el juicio de Kitchen acusado de ser la X de la guerra sucia del PP (28 may 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El Diario del 28 de mayo de 2026 sobre el
  inicio de la declaración de los acusados en el juicio de la pieza
  séptima de las Diligencias Previas 96/2017 (Operación Kitchen),
  empezando por el ex secretario de Estado de Seguridad Francisco
  Martínez Vázquez y el ex ministro del Interior Jorge Fernández Díaz,
  y sobre la contradicción entre ambas versiones acerca de quién
  conocía la operación. Cumple V-13 al cruzarse en líneas editoriales
  distintas con la cobertura de El Independiente y de Público de la
  misma fecha.
