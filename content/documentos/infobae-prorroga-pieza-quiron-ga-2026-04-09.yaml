titulo: "Infobae — PSOE y Más Madrid piden prorrogar la investigación al novio de Ayuso por presunta corrupción en negocios (9 abr 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de la solicitud presentada por las acusaciones
  populares del PSOE y Más Madrid el 9 de abril de 2026 ante la
  Sección Segunda de la Sala de lo Penal de la Audiencia Nacional
  pidiendo seis meses adicionales de prórroga de la instrucción en la
  pieza separada por presuntos delitos de corrupción en los negocios
  y administración desleal vinculados a operaciones de Quirón
  Prevención S.L., una vez vencida la prórroga acordada el 23 de
  octubre de 2025. Nivel 4 por tratarse de un medio de comunicación.
