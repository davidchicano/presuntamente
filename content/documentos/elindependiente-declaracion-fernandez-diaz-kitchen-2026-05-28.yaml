titulo: "El Independiente — Fernández Díaz se desvincula del espionaje a Bárcenas y asegura que nadie del PP le trasladó 'ninguna inquietud' sobre él (28 may 2026)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de El Independiente del 28 de mayo de 2026
  sobre la declaración como acusado del ex ministro del Interior Jorge
  Fernández Díaz en el juicio de la pieza séptima de las Diligencias
  Previas 96/2017 (Operación Kitchen) ante la Sección Cuarta de la Sala
  de lo Penal de la Audiencia Nacional, en la que se desvinculó del
  presunto espionaje al ex tesorero del Partido Popular Luis Bárcenas.
  Cumple V-13 al cruzarse en líneas editoriales distintas con la
  cobertura de El Diario y de Público de la misma fecha sobre el inicio
  de la declaración de los acusados.
