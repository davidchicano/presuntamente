nivel_fuente_justificacion: |
  Reportaje periodístico que detalla la identidad y trayectoria de los
  cinco procesados en el caso González Amador, incluyendo la
  confirmación de que los hermanos Carrillo Saborido se llaman José
  Miguel y Agustín. Recoge además el contexto de la detención de
  David Herrera Lobato en Arahal (Sevilla) el 20 de enero de 2026 en
  una rama del procedimiento relacionada con presuntas
  irregularidades en contratos con el grupo sanitario Quirón. Nivel 4
  por tratarse de un medio de comunicación. Cumple V-13 al ser
  combinada con la cobertura coetánea de Infobae en línea editorial
  distinta.
