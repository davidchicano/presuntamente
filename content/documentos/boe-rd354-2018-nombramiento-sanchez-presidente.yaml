id: boe-rd354-2018-nombramiento-sanchez-presidente
titulo: "BOE — Real Decreto 354/2018, de 1 de junio, por el que se nombra Presidente del Gobierno a don Pedro Sánchez Pérez-Castejón"
tipo: boletin_oficial
nivel_fuente: 1
nivel_fuente_justificacion: |
  Disposición oficial publicada en el Boletín Oficial del Estado nº 134
  del 2 de junio de 2018. Firmado por el Jefe del Estado y refrendado por
  la Presidenta del Congreso de los Diputados Ana María Pastor Julián.
  Fuente primaria directa (N1): órgano emisor es la Jefatura del Estado.
  El nombramiento se produce como consecuencia de la aprobación de la
  moción de censura en el Congreso de los Diputados los días 31 de mayo
  y 1 de junio de 2018.
