titulo: "Libertad Digital — La UCO certifica que la asesora de Begoña Gómez era empleada pública nivel 26 adscrita al Gabinete de la Presidencia (1 octubre 2025)"
tipo: articulo_prensa
nivel_fuente: 4
nivel_fuente_justificacion: |
  Cobertura periodística de un informe de la Unidad Central Operativa de la
  Guardia Civil (UCO) que certifica el estatus de María Cristina Álvarez
  Fernández como empleada pública de nivel 26 adscrita al Gabinete de la
  Presidencia del Gobierno desde el 16 de julio de 2018. La UCO es un organismo
  oficial (nivel 2 en sí mismo), pero el acceso al informe es a través de
  cobertura N4 (Libertad Digital); se documenta como nivel 4 hasta que el
  informe UCO sea accesible directamente. Se cruza con la cobertura de Telemadrid
  que también confirma la fecha de incorporación, cumpliendo V-13.
