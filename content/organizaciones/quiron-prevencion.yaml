descripcion_corta: |
  Sociedad española dedicada a la prestación de servicios de prevención
  de riesgos laborales, integrada en el grupo sanitario Quirónsalud.
  Figura como contraparte mercantil de Maxwell Cremona Ingeniería y
  Procesos S.L. en operaciones de facturación correspondientes al
  ejercicio 2020, por importe próximo a 1,9 millones de euros. Es
  objeto, en una pieza separada del procedimiento contra Alberto
  González Amador instruida por la Sección Segunda de la Sala de lo
  Penal de la Audiencia Nacional, de investigación sobre presuntos
  delitos de corrupción en los negocios y administración desleal.
