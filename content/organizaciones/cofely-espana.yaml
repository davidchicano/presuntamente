descripcion_corta: |
  Empresa española de servicios energéticos, filial del grupo
  francés GDF Suez (posteriormente Engie). En la pieza de la trama
  Púnica relativa a los contratos de eficiencia energética
  adjudicados por ayuntamientos de la Comunidad de Madrid entre 2012
  y 2014, fue juzgada como persona jurídica conforme a la
  responsabilidad penal de personas jurídicas (LO 5/2010) y
  condenada por sentencia de la Audiencia Nacional de 22 de
  diciembre de 2025, no firme y recurrible en casación.
sector: "servicios energéticos"
