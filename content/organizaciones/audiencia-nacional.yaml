tipo: tribunal
descripcion_corta: |
  Órgano jurisdiccional con sede en Madrid y competencia en todo el
  territorio nacional para ciertos delitos de especial entidad (entre
  ellos los delitos económicos de alcance estatal, terrorismo y
  narcotráfico). Integra Juzgados Centrales de Instrucción y Salas de lo
  Penal, Contencioso-Administrativo y Social.
jurisdiccion: penal
