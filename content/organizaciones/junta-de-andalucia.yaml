tipo: organismo_publico
descripcion_corta: |
  Institución en la que se organiza el autogobierno de la Comunidad Autónoma de Andalucía,
  con sede en Sevilla. El Consejo de Gobierno, integrado por el presidente, los vicepresidentes
  y los consejeros, ejerce las funciones ejecutivas y administrativas. El presidente es elegido
  por el Parlamento de Andalucía y ejerce la dirección del Gobierno autonómico.
