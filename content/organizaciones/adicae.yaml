id: adicae
nombre: "ADICAE — Asociación de Usuarios de Bancos, Cajas y Seguros"
nombres_alternativos:
  - "ADICAE"
  - "Asociación de Usuarios de Bancos, Cajas y Seguros"
tipo: asociacion_acusacion_popular
descripcion_corta: |
  Asociación española de consumidores especializada en la defensa de usuarios
  de servicios financieros. Ejerció la acusación popular en el juicio oral
  por el caso Fórum Filatélico (y en el caso Afinsa) representando a
  afectados por la estafa piramidal filatélica. Solicitó en el juicio oral
  la imposición de penas que en conjunto sumaban 195 años de prisión.
ambito_territorial: nacional
localidad: "Madrid"
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
