id: ferrovial-agroman
nombre: "Ferrovial Agroman S.A."
nombres_alternativos:
  - "Ferrovial"
  - "Ferrovial-Agroman"
tipo: empresa
descripcion_corta: >-
  Empresa constructora filial del grupo Ferrovial. La sentencia firme del caso
  Palau de la Música Catalana (STS 813/2020) establece que Ferrovial-Agroman
  pagó comisiones a Convergència Democràtica de Catalunya (CDC) a través del
  Palau como intermediario, a cambio de adjudicaciones de obra pública en
  Cataluña durante 1999-2009. Los directivos acusados de la empresa fueron
  absueltos por prescripción de los delitos imputados.
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
