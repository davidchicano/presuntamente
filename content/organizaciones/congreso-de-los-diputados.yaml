descripcion_corta: |
  Cámara baja de las Cortes Generales de España, órgano constitucional
  que representa al pueblo español según los artículos 66-80 de la
  Constitución Española de 1978. Se compone de 350 diputados y
  diputadas elegidos mediante sufragio universal en 52
  circunscripciones provinciales. Tiene sede en el Palacio del
  Congreso de los Diputados, en la plaza de las Cortes (carrera de
  San Jerónimo, Madrid). Junto al Senado, ejerce el poder legislativo
  del Estado, aprueba los Presupuestos Generales del Estado, controla
  la acción del Gobierno y ostenta la prerrogativa de otorgar o
  retirar la confianza al Presidente del Gobierno.
