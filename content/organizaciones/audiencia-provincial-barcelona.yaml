tipo: tribunal
descripcion_corta: |
  Órgano jurisdiccional de segunda instancia con sede en Barcelona,
  competente para el enjuiciamiento de delitos en la provincia de
  Barcelona no atribuidos a otros órganos. Ha conocido el juicio oral
  del caso Palau de la Música Catalana, dictando sentencia en
  enero de 2018.
