id: fundacio-orfeo-catala-palau-musica
nombre: "Fundació Privada Orfeó Català-Palau de la Música Catalana"
nombres_alternativos:
  - "Fundació Orfeó Català"
  - "Fundación Orfeó Català-Palau de la Música"
  - "Fundació Orfeó Català-Palau de la Música Catalana"
tipo: fundacion
descripcion_corta: >-
  Entidad privada gestora del Palau de la Música Catalana en Barcelona.
  Presidida por Fèlix Millet i Tusell entre aproximadamente 1990 y julio de 2009.
  Personada como acusación particular en el procedimiento penal del caso Palau
  y declarada perjudicada con responsabilidad civil de 6.294.063,44 euros en
  la sentencia firme STS 813/2020.
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
