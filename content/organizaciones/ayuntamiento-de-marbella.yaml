descripcion_corta: |
  Administración local de Marbella (Málaga). El ayuntamiento fue
  disuelto por el Consejo de Ministros el 7 de abril de 2006 como
  consecuencia de la Operación Malaya, la primera disolución de un
  consistorio en la historia democrática española. El Ayuntamiento fue
  reconocido como perjudicado en el caso Malaya.

