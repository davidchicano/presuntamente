descripcion_corta: |
  Sociedad mercantil española dedicada a la ingeniería de obra
  pública, fundada en mayo de 2003. Sus socios incluyen, entre
  otros, a Pablo Manuel González González (hermano del ex
  presidente de la Comunidad de Madrid Ignacio González), Juan
  José Caballero Escudier (cuñado del ex presidente) y José
  Antonio Clemente Marín. Figura como sociedad receptora de
  adjudicaciones controvertidas en la pieza relativa al campo de
  golf del Canal de Isabel II del caso Lezo, seguida ante la
  Sección Segunda de la Sala de lo Penal de la Audiencia Nacional
  con juicio oral señalado entre el 13 y el 30 de septiembre de
  2027. La Fiscalía Anticorrupción atribuye en su escrito de
  acusación que TCT habría recibido más de tres millones de euros
  por modificaciones del contrato y 504.780 euros adicionales por
  gestión y explotación distribuidos en cuarenta y nueve entregas
  en sobres de efectivo.
