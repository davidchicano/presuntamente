descripcion_corta: |
  Conjunto de sociedades vinculadas al comisario jubilado José Manuel
  Villarejo Pérez, articuladas en torno a Cenyt Organizational
  Consultancy S.L. como entidad principal y otras filiales (Cenyt Data
  SL, Cenyt Salud SL, Stuart & McKenzie SL, CPD Real State). El grupo
  Cenyt actuó como vehículo comercial a través del cual Villarejo habría
  prestado servicios de inteligencia privada, espionaje e investigación a
  clientes corporativos y particulares entre 2004 y 2017.
  En el marco del caso Tándem (Diligencias Previas 96/2017), el instructor
  considera que Cenyt facturó más de diez millones de euros en trabajos
  de dudosa legalidad. Gemma Alcalá Garcés (esposa de Villarejo) ejercía
  como apoderada de varias de sus sociedades. Rafael Redondo Rodríguez
  participaba en la estructura societaria como socio.
