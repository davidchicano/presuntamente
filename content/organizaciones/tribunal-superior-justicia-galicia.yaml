tipo: tribunal
descripcion_corta: |
  Órgano jurisdiccional superior en Galicia para todos los órdenes
  salvo el constitucional, con sede en A Coruña. Conoce de los
  recursos de apelación contra sentencias de las Audiencias
  Provinciales gallegas y de las causas contra aforados autonómicos.
