tipo: organismo_publico
cif: "S2826007C"
descripcion_corta: |
  Servicio Jurídico del Estado integrado en el Ministerio de Justicia
  encargado del asesoramiento jurídico y de la representación y defensa
  en juicio de la Administración General del Estado, sus organismos
  autónomos y entidades públicas. En el caso González Amador ejerce la
  acusación particular en representación de la Hacienda Pública estatal
  como perjudicada, solicitando 3 años y 9 meses de prisión para el
  investigado principal por dos delitos contra la Hacienda Pública en
  concurso medial con falsedad en documento mercantil.
