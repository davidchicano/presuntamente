tipo: tribunal
descripcion_corta: |
  Órgano jurisdiccional de segunda instancia con sede en Sevilla,
  competente para el enjuiciamiento de delitos en la provincia de
  Sevilla no atribuidos a otros órganos. Ha celebrado el juicio oral
  del caso ERE de Andalucía, dictando en noviembre de 2019 la primera
  sentencia condenatoria del procedimiento.
