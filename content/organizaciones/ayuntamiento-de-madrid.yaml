descripcion_corta: |
  Administración local española correspondiente al municipio de
  Madrid. Como entidad partícipe históricamente de la empresa
  pública Canal de Isabel II junto con la Comunidad de Madrid,
  se personó como acusación particular en el procedimiento Lezo
  durante la alcaldía de Manuela Carmena para defender los
  intereses patrimoniales municipales por los presuntos
  perjuicios derivados de las adjudicaciones controvertidas en
  la empresa pública.
