tipo: tribunal
descripcion_corta: |
  Órgano jurisdiccional de segunda instancia con sede en Palma de
  Mallorca, competente para el enjuiciamiento de delitos en la
  provincia de Illes Balears no atribuidos a otros órganos.
  Celebró el juicio oral del caso Nóos, condenando en febrero
  de 2017 a Iñaki Urdangarín a seis años y tres meses de prisión.
