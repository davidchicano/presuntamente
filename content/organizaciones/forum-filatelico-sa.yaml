tipo: empresa
descripcion_corta: |
  Empresa española de inversión filatélica fundada en 1979 (denominada
  inicialmente «Fondo Filatélico Financiero S.A.»). Operó durante 27 años
  captando el ahorro de cientos de miles de pequeños inversores mediante
  contratos de compraventa de sellos con garantía de recompra y rentabilidades
  prometidas superiores a las bancarias. Fue intervenida judicialmente el
  9 de mayo de 2006 en la denominada «Operación Atrio» por orden del Juzgado
  Central de Instrucción nº 5 de la Audiencia Nacional. El Juzgado de lo
  Mercantil nº 7 de Madrid la declaró en concurso necesario el 22 de junio
  de 2006 con un déficit patrimonial de 2.843.503.812 euros según la
  administración concursal.
fundacion: "1979-06-01"
