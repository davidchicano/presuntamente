descripcion_corta: |
  Órgano jurisdiccional superior en Cataluña para todos los órdenes
  salvo el constitucional, con sede en Barcelona. Conoce de los
  recursos de apelación contra sentencias de las Audiencias
  Provinciales y de las causas contra aforados autonómicos.
