descripcion_corta: |
  Órgano jurisdiccional de segunda instancia con sede en Lugo,
  competente para el enjuiciamiento de delitos en la provincia de
  Lugo no atribuidos a otros órganos. Dictó en julio de 2022 la
  primera sentencia de una pieza de la Operación Pokémon.
