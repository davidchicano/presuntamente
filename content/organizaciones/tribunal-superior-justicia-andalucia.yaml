descripcion_corta: |
  Órgano jurisdiccional superior en Andalucía para todos los órdenes
  salvo el constitucional, con sede en Granada. Conoce de los recursos
  de apelación contra sentencias de las Audiencias Provinciales y de
  las causas contra aforados autonómicos.
