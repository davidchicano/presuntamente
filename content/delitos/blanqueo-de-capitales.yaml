familia: blanqueo_capitales
descripcion_breve: |
  Castiga la adquisición, posesión, utilización, conversión o
  transmisión de bienes a sabiendas de que tienen su origen en una
  actividad delictiva, así como la realización de cualquier acto
  destinado a ocultar o encubrir su origen ilícito o a ayudar a quien
  haya participado en el delito a eludir las consecuencias legales de
  sus actos.
