descripcion: |
  El caso Gürtel y el caso Bárcenas (caja B del PP) comparten dos actores
  procesales principales con roles formales en ambas causas.

  Luis Bárcenas fue el ex tesorero del Partido Popular condenado en el
  caso Gürtel (Época I) por delitos de blanqueo de capitales y fraude
  fiscal, con sentencia firme del Tribunal Supremo (STS 507/2020). En el
  caso Bárcenas (caja B), fue investigado, acusado y condenado por los
  delitos de falsedad documental y delito contra la Hacienda Pública
  derivados de los presuntos sobresueldos en B, con sentencia firme
  del Tribunal Supremo (STS de 2024). Bárcenas es el nexo humano
  central entre ambas causas: fue investigado como presunto receptor
  de fondos negros del PP en la pieza separada que surgió del propio
  juicio oral de la Gürtel.

  Pablo Ruz Gutiérrez fue el magistrado instructor del Juzgado Central
  de Instrucción nº 5 de la Audiencia Nacional tanto de la causa Gürtel
  (desde mayo de 2010 hasta 2015) como de la pieza de la caja B
  (desde la incoación de la pieza separada en enero de 2013 hasta 2015).
  Ambas causas se instruyeron simultáneamente en el JCI nº 5 por el
  mismo magistrado.

  La conexión procesal directa entre ambas causas está acreditada en la
  propia historia de la pieza separada: la caja B se incoó como pieza
  separada de las diligencias previas de la Gürtel, y el instructor fue
  el mismo durante el período clave de la investigación.
