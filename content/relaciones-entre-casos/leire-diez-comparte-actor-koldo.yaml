descripcion: |
  El caso Leire Díez (pieza A, JCI nº 5 AN, juez Pedraz) y el caso Koldo, con pieza de
  mascarillas sentenciada por la Sala Segunda del Tribunal Supremo y piezas conexas en la
  Audiencia Nacional, comparten actores procesales con roles formales en ambos
  procedimientos.

  Primero, Santos Cerdán García figura como investigado en la pieza separada de obras
  públicas del caso Koldo y como investigado por el auto Pedraz del 26 de mayo de 2026 en
  el caso Leire Díez, en relación con la presunta autorización de pagos del PSOE a la red de
  Díez Castro mediante facturas presuntamente falsas.

  Segundo, Joseba Antxon Alonso figura como investigado en la pieza separada de obras
  públicas del caso Koldo, según la Sentencia TS 418/2026, y como investigado en la pieza A
  del caso Leire Díez.

  Tercero, el abogado Ismael Oliver es investigado en la pieza A del caso Leire Díez
  (auto Pedraz del 26 de mayo de 2026, por presunta canalización de pagos) y ejerce
  simultáneamente la defensa de Koldo García Balda en el caso Koldo.

  Nota de transparencia: tras la beta pública urgente de Koldo del 23-jun-2026, los roles
  de Santos Cerdán y Joseba Antxon Alonso ya quedan modelados en Koldo. El rol de Ismael
  Oliver como defensa de Koldo García sigue anotado para una futura pasada si se incorpora
  con fuente procesal directa.
