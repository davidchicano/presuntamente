descripcion: |
  El caso Gürtel y la Operación Kitchen (pieza separada nº 7 del caso
  Tándem) comparten a Luis Bárcenas como actor procesal con rol formal
  en ambas causas.

  En el caso Gürtel, Luis Bárcenas fue condenado con sentencia firme
  (STS 507/2020) por delitos de blanqueo de capitales y fraude fiscal
  como ex tesorero del Partido Popular. En la Operación Kitchen, Bárcenas
  actúa como perjudicado y ejerce la acusación particular: según la
  acusación en la causa Kitchen, fue el objeto de la presunta operación
  parapolicial —coordinada por el Ministerio del Interior y el comisario
  Villarejo— destinada a sustraer documentación comprometedora que
  Bárcenas poseía y que podría haber sido entregada al juez instructor
  del caso Bárcenas (JCI nº 5 AN).

  El nexo entre ambas causas tiene, por tanto, doble dimensión: Bárcenas
  es actor central en las dos (condenado en Gürtel, perjudicado y acusador
  en Kitchen), y los hechos de Kitchen se investigan precisamente en relación
  con la documentación generada en el entorno del juicio oral de Gürtel
  (del que surgió la pieza de la caja B).
estado_publicacion: borrador
