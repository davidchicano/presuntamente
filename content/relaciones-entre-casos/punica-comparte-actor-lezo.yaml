caso_b_id: lezo
tipo: comparte_actor_con
descripcion: |
  El caso Púnica y el caso Lezo comparten un actor procesal con rol
  formal en ambas causas: el magistrado Manuel García-Castellón
  García-Lomas, titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional.

  García-Castellón instruyó el caso Púnica (DP 85/2014, luego PA 91/2016)
  y el caso Lezo de forma simultánea desde julio de 2017 hasta su
  jubilación forzosa el 2 de septiembre de 2024 (Acuerdo de la Comisión
  Permanente del CGPJ publicado en BOE-A-2024-17653). Ambas causas se
  instruyeron ante el mismo Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional durante el mismo período, con el mismo titular.
  La jubilación de García-Castellón generó una situación de transición
  institucional que afectó a ambas causas simultáneamente.
estado_publicacion: borrador
