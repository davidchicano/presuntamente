caso_b_id: tandem
tipo: comparte_actor_con
descripcion: |
  El caso Púnica y el caso Tándem comparten un actor procesal con rol
  formal en ambas causas: el magistrado Manuel García-Castellón
  García-Lomas, titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional.

  García-Castellón instruyó el caso Púnica (DP 85/2014, luego PA 91/2016)
  desde julio de 2017 hasta su jubilación forzosa por edad el 2 de
  septiembre de 2024. Simultáneamente, instruyó el caso Tándem
  (DP 96/2017) desde la incoación de las diligencias el 3 de noviembre
  de 2017, siendo el magistrado que incoa la pieza separada nº 7
  (Operación Kitchen) el 19 de julio de 2018. Ambas causas se instruyeron
  de forma simultánea ante el mismo juzgado (JCI nº 6 AN) y por el
  mismo magistrado instructor durante el período 2017-2024, lo que
  constituye un nexo institucional de primer orden entre ambos procedimientos.
