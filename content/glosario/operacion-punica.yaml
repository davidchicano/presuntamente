descripcion_breve: |
  Nombre con el que se conoce la operación policial de la Unidad
  Central Operativa de la Guardia Civil ejecutada el 27 de octubre
  de 2014 a instancias del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional, y la macrocausa derivada sobre presunta
  corrupción en adjudicaciones y financiación de administraciones
  locales y autonómicas, principalmente en la Comunidad de Madrid.
  La instrucción se dividió en una docena de piezas separadas.
