label: "Papeles de Bárcenas"
nombres_alternativos:
  - "papeles Bárcenas"
  - "contabilidad B del PP"
  - "caja B del PP"
categoria: trama_sobrenombre
descripcion_breve: |
  Documentos de presunta contabilidad paralela del Partido Popular que el
  extesorero Luis Bárcenas habría registrado entre 1990 y 2009 y que El País
  publicó el 31 de enero de 2013. La Audiencia Nacional declaró en sentencia
  de octubre de 2021 (firme en casación en noviembre de 2024) que dichos
  documentos registran hechos reales o plausibles corroborados por otras
  pruebas, aunque sin reconocerles valor contable íntegro. Dieron nombre a la
  pieza separada del caso Gürtel conocida como «caso Bárcenas (caja B del PP)».
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
