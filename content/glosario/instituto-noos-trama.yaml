categoria: trama_sobrenombre
descripcion_breve: |
  Sobrenombre mediático del entramado formado por la Asociación Instituto Nóos y la sociedad
  Nóos Consultoría Estratégica S.L., presididos por Iñaki Urdangarin y gestionados junto con
  Diego Torres, a través del cual se captaron contratos con administraciones autonómicas
  presuntamente de forma irregular entre 2004 y 2007. Nombre dado al caso judicial
  (Pieza 25 del caso Palma Arena) instruido por el Juzgado de Instrucción nº 3 de Palma.
