id: operacion-atrio
label: "Operación Atrio"
nombres_alternativos:
  - "caso Fórum"
  - "estafa piramidal filatélica"
categoria: operacion_policial
descripcion_breve: |
  Operación policial y judicial ejecutada el 9 de mayo de 2006 por orden del
  Juzgado Central de Instrucción nº 5 de la Audiencia Nacional, por la que
  se intervinieron simultáneamente las empresas Fórum Filatélico S.A. y
  Afinsa Bienes Tangibles S.A. al considerarlas operadoras de sendas estafas
  piramidales de inversión en sellos que afectaron a centenares de miles de
  ahorradores en toda España.
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
