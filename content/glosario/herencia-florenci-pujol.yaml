descripcion_breve: >-
  Versión sostenida por la familia Pujol sobre el origen del dinero mantenido
  durante décadas en el extranjero: una herencia del padre de Jordi Pujol Soley,
  Florenci Pujol. La instrucción de la Audiencia Nacional cuestiona esa
  explicación al investigar el origen real del patrimonio. Es una tesis de parte,
  no un hecho acreditado.
