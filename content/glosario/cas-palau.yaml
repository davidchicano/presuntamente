categoria: trama_sobrenombre
descripcion_breve: |
  Trama de expolio y financiación ilegal en la que Fèlix Millet i Tusell
  y Jordi Montull Bagur desviaron más de 23 millones de euros de la
  Fundació Orfeó Català-Palau de la Música Catalana para uso personal,
  y canalizaron comisiones de Ferrovial-Agroman a Convergència Democràtica
  de Catalunya (CDC) a cambio de adjudicaciones de obra pública en
  Cataluña (1999-2009). Sentencia firme del Tribunal Supremo (STS 813/2020).
