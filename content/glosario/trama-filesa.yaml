categoria: trama_sobrenombre
descripcion_breve: |
  Red de empresas pantalla (Filesa, Malesa y Time Export) utilizada
  presuntamente para la financiación irregular del PSOE mediante
  facturas por servicios ficticios o sobrevalorados a grandes empresas
  públicas y privadas, investigada en la Causa Especial nº 880/1991
  ante el Tribunal Supremo. La STS 1/1997 condenó a ocho personas.
