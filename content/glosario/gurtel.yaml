categoria: trama_sobrenombre
descripcion_breve: |
  Sobrenombre mediático y policial de la macrocausa de presunta
  corrupción instruida desde 2009 por la Audiencia Nacional sobre una
  red de adjudicaciones públicas a cambio de comisiones vinculada al
  empresario Francisco Correa y a cargos del Partido Popular. «Gürtel»
  es la traducción al alemán de «correa», apodo usado por los
  investigadores.
estado_publicacion: borrador
