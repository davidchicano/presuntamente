    medio_id: publico-es
    titular: "Villarejo sale en libertad provisional porque Fiscalía nunca pidió cárcel por el resto de las 28 piezas de la causa 'Tándem'"
    fecha_publicacion: "2020-11-04"
    resumen: >
      José Manuel Villarejo abandona la prisión provisional tras más de tres años
      en prisión. La Fiscalía no había solicitado prisión preventiva para las piezas
      distintas de las tres iniciales, por lo que el comisario queda en libertad
      provisional mientras continúa la instrucción de las decenas de piezas pendientes.
    tipo_pieza: noticia
