    medio_id: publico-es
    titular: "El caso Villarejo cumple dos años convertido en macrocausa: casi 50 imputados, 10 piezas y miles de datos por abrir"
    fecha_publicacion: "2019-11-03"
    resumen: >
      Balance de los dos primeros años desde la detención de Villarejo el 3 de noviembre
      de 2017. La causa acumula ya diez piezas separadas y cerca de cincuenta personas
      imputadas. El reportaje describe cómo la instrucción se ha convertido en una
      macrocausa con múltiples focos: espionaje corporativo del Ibex 35, la operación
      Kitchen contra Bárcenas y la filtración del móvil de Dina Bousselham.
    tipo_pieza: reportaje
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    notas: "Pieza de balance en el segundo aniversario de la detención. Referencia histórica para contextualizar el arranque de la macrocausa."

