# Cobertura mediática general — caso tandem
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: tandem
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Tándem"
    - "caso Villarejo"
    - "macrocausa Villarejo"
    - "Operación Tándem"
    - "Cenyt Villarejo"
    - "comisario Villarejo espionaje"
  ventanas_temporales:
    - desde: "2017-11-01"
      hasta: "2018-12-31"
      notas: "Apertura del caso: detención de Villarejo el 3 de noviembre de 2017, incoación de Diligencias Previas 96/2017 en el JCI nº 6 ante Carmen Lamela; primeras revelaciones sobre la estructura de la macrocausa y las piezas."
    - desde: "2019-01-01"
      hasta: "2021-10-31"
      notas: "Instrucción avanzada: ampliación de piezas (hasta 31+), imputación de directivos del Ibex 35 (BBVA, Repsol, Iberdrola, CaixaBank), salida de prisión provisional de Villarejo en noviembre de 2020. Primer juicio oral (Iron/Land/Pintor) iniciado en octubre de 2021."
    - desde: "2023-06-01"
      hasta: "2023-12-31"
      notas: "Primera sentencia de la macrocausa: condena a Villarejo a 19 años de prisión por las piezas Iron, Land y Pintor (24 julio 2023)."
    - desde: "2025-09-01"
      hasta: "2025-12-31"
      notas: "Sentencia de apelación Iron/Land/Pintor: la Sala de Apelación de la AN rebaja la condena de 19 a 13 años (septiembre 2025), absolviendo por falsedad documental."
    - desde: "2026-01-01"
      hasta: "2026-05-30"
      notas: "Hitos recientes: sentencia pieza Dina (mayo 2026, 3 años y medio para Villarejo); confirmación del procesamiento del BBVA y Francisco González (febrero 2026); acusación de Anticorrupción con 173 años pedidos para González (marzo 2026)."
  fuentes_buscadas:
    - eldiario.es
    - infolibre.es
    - publico.es
    - elespanol.com
    - vozpopuli.com
    - okdiario.com
    - el-confidencial.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso Tándem o a Villarejo en el titular o lead.
    Se incluyen noticias, reportajes, análisis y piezas de investigación. Se priorizan
    hitos procesales clave (detención, primeras sentencias, sentencias de apelación,
    nuevas piezas con relevancia) y momentos de revelación editorial significativa
    (investigaciones periodísticas sobre los encargos).
  criterios_exclusion: >
    Se excluyen republicaciones palabra por palabra de agencia sin valor añadido.
    Se excluyen menciones laterales en piezas centradas en otra causa (p. ej. Bárcenas
    o Kitchen como caso independiente). Se excluyen editoriales anónimos sin firma.
    El País (elpais.com), El Mundo (elmundo.es), ABC (abc.es), El Confidencial
    (elconfidencial.com) y La Vanguardia (lavanguardia.com) no son accesibles
    vía WebSearch con filtro de dominio en el entorno del agente; su cobertura
    se anota como limitación pendiente.
  notas: >
    Rastreo inicial v1 sobre cinco ventanas temporales (nov 2017 — may 2026). La macrocausa
    Tándem es la causa judicial más extensa de España contemporánea en número de piezas
    separadas (más de 47); la cobertura periodística es inabarcable y este corpus es un
    muestreo sistemático, no un listado exhaustivo. Las url_archivo se rellenan con
    scripts/archivar-n4.mjs (pnpm archive:catchup). Medios con cobertura propia muy
    relevante no incluida en este rastreo por limitaciones técnicas de acceso: El País,
    El Mundo, El Confidencial, ABC. El Confidencial tiene investigaciones propias
    fundamentales sobre la pieza BBVA/Trampa (periodismo de investigación sobre el
    Proyecto Trampa). Pendiente rastrear en sesión futura con acceso directo.

estado: parcial

