      prisión. Marca el cierre de la ejecución penal de la sentencia más emblemática
      del caso, aunque la causa ya estaba cerrada con firmeza desde junio de 2018.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
