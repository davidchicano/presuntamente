# Cobertura mediática general — caso kitchen
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: kitchen
fecha_rastreo: "2026-05-26"

metodologia:
  terminos_busqueda:
    - "caso Kitchen"
    - "operación Kitchen"
    - "espionaje Bárcenas Interior"
    - "Fernández Díaz Kitchen"
    - "Kitchen pieza séptima Tándem"
  ventanas_temporales:
    - desde: "2019-05-01"
      hasta: "2021-12-31"
      notas: >
        Fase de instrucción: imputación de policías (mayo 2019), auto de
        procesamiento de once personas y sobreseimiento de Cospedal/López
        del Hierro (29 jul 2021).
    - desde: "2022-01-01"
      hasta: "2024-01-31"
      notas: >
        Fase de instrucción avanzada: confirmación del sobreseimiento de Cospedal
        (dic 2022), auto de la Sección 3ª desestimando apelaciones (24 feb 2023),
        auto de apertura de juicio oral (13 oct 2023) y auto rectificador que
        excluye secuestro y organización criminal (23 ene 2024).
    - desde: "2026-04-01"
      hasta: "2026-05-26"
      notas: >
        Fase de juicio oral: inicio de la vista oral (6 abr 2026), rechazo del
        tribunal a suspender el juicio para investigar a Cospedal (7 abr 2026),
        declaración de Bárcenas (20 abr), declaración de Rajoy y Cospedal como
        testigos (23 abr 2026), sesiones de mayo 2026.
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - theobjective.com
    - elespanol.com
    - okdiario.com
    - vozpopuli.com
    - libertaddigital.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o en el lead. Se
    incluyen noticias, reportajes, análisis, columnas y coberturas en directo
    relevantes. Se incluyen piezas de agencia republicadas cuando aportan valor
    informativo propio sobre hitos del procedimiento.
  criterios_exclusion: >
    Se excluyen menciones de pasada en piezas sobre Villarejo u otros casos
    cuando no hacen referencia específica a la pieza Kitchen. Se excluyen
    republicaciones de agencia palabra por palabra. Se excluye El País
    y El Mundo por no ser accesibles vía WebFetch en el entorno del agente.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (may 2019 — may 2026).
    El caso tiene cobertura extensa en todos los medios nacionales desde 2019;
    este corpus es un muestreo sistemático. El período del juicio oral (abr-may
    2026) concentra la mayor densidad de piezas. Las url_archivo se rellenan
    con scripts/archivar-n4.mjs (pnpm archive:catchup o hook pre-commit).

estado: parcial

