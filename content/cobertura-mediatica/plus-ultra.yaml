# Cobertura mediática general — caso plus-ultra
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: plus-ultra
fecha_rastreo: "2026-05-26"

metodologia:
  terminos_busqueda:
    - "caso Plus Ultra"
    - "Plus Ultra SEPI rescate"
    - "Plus Ultra Zapatero"
    - "rescate aerolínea Plus Ultra 53 millones"
    - "juez Calama Plus Ultra"
  ventanas_temporales:
    - desde: "2021-03-01"
      hasta: "2024-06-30"
      notas: >
        Aprobación del rescate (9 mar 2021), reacciones políticas y primeras
        investigaciones administrativas. Primer período hasta apertura de
        diligencias penales por cooperación internacional.
    - desde: "2024-07-01"
      hasta: "2025-11-30"
      notas: >
        Instrucción judicial en el Juzgado de Instrucción nº 15 de Madrid tras
        cooperación internacional de Francia y Suiza. Anticorrupción sostiene
        que el rescate sirvió para blanquear dinero venezolano.
    - desde: "2025-12-01"
      hasta: "2026-05-26"
      notas: >
        Operación UDEF con detenciones de ejecutivos de Plus Ultra (11 dic 2025),
        querella Manos Limpias (23 dic 2025), asunción competencia JCI nº 4 AN
        (mar 2026), auto imputación Zapatero (19 may 2026).
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - infobae.com
    - theobjective.com
    - vozpopuli.com
    - okdiario.com
    - libertaddigital.com
    - elespanol.com
    - maldita.es
    - newtral.es
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o en el lead. Se
    incluyen noticias, reportajes, análisis, columnas y piezas de verificación
    firmadas. Se incluyen piezas de agencia republicadas cuando el titular o
    lead las identifica claramente como del caso y aportan valor informativo.
  criterios_exclusion: >
    Se excluyen menciones de pasada en piezas sobre otros temas. Se excluyen
    republicaciones palabra por palabra de agencia sin valor añadido. Se excluye
    El País (elpais.com) y El Mundo (elmundo.es) por no ser accesibles vía
    WebFetch en el entorno del agente. Se excluyen opiniones y columnas sin
    información fáctica adicional relevante.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (mar 2021 — may 2026).
    El caso tuvo escasa cobertura judicial hasta las detenciones de diciembre
    2025 y la imputación de Zapatero en mayo 2026, momento que concentra la
    mayor parte del corpus. Las url_archivo se rellenan con
    scripts/archivar-n4.mjs (pnpm archive:catchup o hook pre-commit).

estado: parcial

