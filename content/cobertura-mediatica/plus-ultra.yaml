    resumen: >
      La Fiscalía Anticorrupción afirma que Plus Ultra hizo un «uso impropio» de los
      53 millones de euros del rescate público porque al menos parte de esos fondos
      se emplearon para blanquear dinero «ilícito» procedente de Venezuela. El origen
      de la investigación deriva de solicitudes de cooperación judicial de Francia y Suiza.
