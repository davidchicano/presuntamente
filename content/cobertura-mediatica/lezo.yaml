# Cobertura mediática general — caso lezo
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: lezo
fecha_rastreo: "2026-05-26"

metodologia:
  terminos_busqueda:
    - "caso Lezo"
    - "operación Lezo"
    - "Ignacio González Canal de Isabel II"
    - "Canal Isabel II corrupción"
    - "Lezo Inassa Emissao"
  ventanas_temporales:
    - desde: "2017-04-01"
      hasta: "2019-12-31"
      notas: >
        Operación UCO de detención de Ignacio González (19 abr 2017), prisión
        preventiva (22 abr 2017), instrucción inicial, archivo pieza
        Ruiz-Gallardón / Inassa (30 may 2019), auto procesamiento Emissao
        (18 nov 2019).
    - desde: "2021-01-01"
      hasta: "2023-06-30"
      notas: >
        Procesamiento Ignacio González pieza golf (2021), apertura juicio oral
        pieza Navalcarnero (4 jun 2021), inicio vista oral pieza Inassa
        (24 may 2023), archivo investigación blanqueo González.
    - desde: "2025-12-01"
      hasta: "2026-05-26"
      notas: >
        Señalamiento juicio oral pieza golf para septiembre de 2027 (diciembre
        2025). Cambio de juez instructor: García-Castellón jubilado (2 sep 2024),
        magistrada Tardón provisional, Piña asume la titularidad (8 ene 2025).
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - infolibre.es
    - elespanol.com
    - vozpopuli.com
    - okdiario.com
    - theobjective.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o lead. Se incluyen
    noticias, reportajes, análisis y piezas de verificación. Se incluyen piezas
    de agencia republicadas cuando el titular o lead las identifica como del caso
    y aportan información sobre hitos procesales.
  criterios_exclusion: >
    Se excluyen menciones de pasada del caso Lezo en piezas sobre otros casos
    de Villarejo o García-Castellón. Se excluyen republicaciones de agencia
    sin valor añadido. Se excluyen El País y El Mundo por no ser accesibles vía
    WebFetch en el entorno del agente.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (abr 2017 — may 2026).
    El caso tiene cobertura extensa desde 2017. El período de mayor densidad
    es la apertura del procedimiento (abr 2017) y los procesamientos (2019-2021).
    El juicio oral de la pieza golf (señalado para sept 2027) concentrará la
    mayor cobertura futura. Las url_archivo se rellenan con
    scripts/archivar-n4.mjs (pnpm archive:catchup o hook pre-commit).

estado: parcial

