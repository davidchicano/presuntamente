    notas: "Pieza de agencia EFE sobre el mismo aniversario que confilegal-12-anos-malaya-condenados-libres-2018-03-30; incluida para documentar la segunda línea editorial."

  - id: publico-libertad-condicional-roca-2019-02-07
    url: "https://www.publico.es/politica/caso-malaya-juez-da-libertad-condicional-juan-antonio-roca.html"
    medio_id: publico-es
    titular: "El juez da la libertad condicional a Juan Antonio Roca"
    fecha_publicacion: "2019-02-07"
    autor: "Europa Press"
    resumen: >
      Un juez de la Audiencia Nacional concedió la libertad condicional a Juan
      Antonio Roca, cerebro del caso Malaya, al haber cumplido tres cuartas partes
      de su condena de 17 años y demostrar conducta positiva. La resolución impuso
      condiciones como mantener residencia fija y continuar pagando las
      responsabilidades civiles derivadas de la sentencia.
    tipo_pieza: pieza_agencia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

