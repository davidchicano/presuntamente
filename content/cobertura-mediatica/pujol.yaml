# Cobertura mediática general — caso pujol
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: pujol
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Pujol"
    - "familia Pujol Ferrusola"
    - "Jordi Pujol Soley"
    - "Jordi Pujol Ferrusola"
    - "patrimonio Pujol Andorra"
    - "Audiencia Nacional Pujol juicio"
  ventanas_temporales:
    - desde: "2014-07-01"
      hasta: "2014-12-31"
      notas: >-
        Confesión pública de Jordi Pujol Soley el 25-jul-2014: reconoce fondos no
        regularizados en el extranjero. Apertura de la investigación judicial ante
        la AN. Hito fundacional del caso en la cobertura mediática.
    - desde: "2021-06-01"
      hasta: "2021-12-31"
      notas: >-
        El juez Santiago Pedraz dicta apertura de juicio oral (jun 2021).
        Confirmación por la Sala de lo Penal de la AN de indicios para juzgar a
        la familia.
    - desde: "2024-07-01"
      hasta: "2025-10-31"
      notas: >-
        Décimo aniversario de la confesión (jul 2024). Señalamiento del juicio
        oral (oct 2024). Cobertura previa al inicio de las sesiones en noviembre
        de 2025.
    - desde: "2025-11-01"
      hasta: "2026-05-30"
      notas: >-
        Celebración del juicio oral (nov 2025 – abr 2026). Exclusión de Jordi
        Pujol Soley por deterioro cognitivo (abr 2026). Visto para sentencia
        (may 2026).
  fuentes_buscadas:
    - eldiario.es
    - elespanol.com
    - cronicaglobal.elespanol.com
    - vozpopuli.com
    - publico.es
    - okdiario.com
    - infolibre.es
  criterios_inclusion: >-
    Se incluyen piezas que mencionan el caso en el titular o en el lead. Se
    incluyen noticias, reportajes, análisis, cronologías y columnas firmadas.
    Se incluyen piezas de agencia republicadas cuando el titular o lead las
    identifica claramente con el caso.
  criterios_exclusion: >-
    Se excluyen menciones de pasada en piezas sobre otros temas (p. ej.,
    mención de Jordi Pujol en piezas sobre el «procés» si el caso de la
    fortuna oculta no es el asunto principal). Se excluyen republicaciones
    palabra por palabra de agencia sin valor añadido. Se excluyen medios
    con paywall duro no accesibles en este rastreo (elpais.com, elmundo.es,
    abc.es, lavanguardia.com). No se buscó en medios en catalán (ARA,
    Vilaweb, NacióDigital) en esta primera pasada; constituyen un corpus
    propio relevante para una segunda pasada.
  notas: >-
    Rastreo inicial v1 sobre cuatro ventanas temporales (jul 2014 – may 2026).
    La causa es de las más longevas del inventario (instrucción 2013-2021; juicio
    2025-2026). El País, El Mundo, ABC y La Vanguardia tienen cobertura propia y
    relevante no incluida en este corpus por restricciones de acceso del agente.
    La cobertura en catalán (ARA, Vilaweb, NacióDigital, 324/TV3) tiene entidad
    propia y se deja para una segunda pasada. Las url_archivo se rellenan con
    pnpm archive:catchup (ver docs/web/features/archive-org-pre-commit.md).

estado: parcial

