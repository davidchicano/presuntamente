# Cobertura mediática general — caso gonzalez-amador
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: gonzalez-amador
fecha_rastreo: "2026-05-26"

metodologia:
  terminos_busqueda:
    - "González Amador fraude fiscal"
    - "novio de Ayuso fraude Hacienda"
    - "Maxwell Cremona fraude fiscal"
    - "Alberto González Amador pareja Ayuso"
    - "González Amador juicio fiscal"
  ventanas_temporales:
    - desde: "2024-01-01"
      hasta: "2024-12-31"
      notas: >
        Origen del caso: expediente AEAT (22 ene 2024), confusión sobre la filtración
        del correo de la defensa de González Amador a la Fiscalía (2-3 mar 2024),
        y primeras diligencias de instrucción. Declaraciones aplazadas durante 2024.
    - desde: "2025-01-01"
      hasta: "2025-12-31"
      notas: >
        Auto de cierre de instrucción y procesamiento (29 may 2025), apertura
        de juicio oral (22 sep 2025), escritos de acusación de Fiscalía y PSOE/Más
        Madrid (jul 2025), confirmación del procesamiento por la AP Madrid
        (7 nov 2025).
    - desde: "2026-01-01"
      hasta: "2026-05-26"
      notas: >
        Fase intermedia: plazo de diez días para que la defensa responda a las
        acusaciones (feb 2026). Caso conectado al del Fiscal General por la
        firmeza de la condena de García Ortiz (feb 2026) y los recursos de
        amparo al TC.
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - theobjective.com
    - elespanol.com
    - libertaddigital.com
    - okdiario.com
    - infolibre.es
    - maldita.es
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o lead. Se incluyen
    noticias, reportajes y análisis sobre los hitos del procedimiento (procesamiento,
    acusaciones, apertura de juicio oral). Se incluyen piezas de verificación que
    contextualizan la conexión con el caso del Fiscal General.
  criterios_exclusion: >
    Se excluyen piezas cuyo objeto central es el caso del Fiscal General, aunque
    mencionen a González Amador como perjudicado; esas piezas pertenecen al corpus
    del caso FGE. Se excluyen republicaciones de agencia sin valor añadido. Se
    excluyen El País y El Mundo por no ser accesibles vía WebFetch en el entorno
    del agente.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (ene 2024 — may 2026).
    Este caso está factualmente conectado al caso FGE: la filtración del correo
    de la defensa de González Amador a la Fiscalía da origen al caso FGE. Las
    piezas que tratan ambos casos se asignan al corpus más relevante según el
    objeto central de la pieza. Las url_archivo se rellenan con
    scripts/archivar-n4.mjs (pnpm archive:catchup o hook pre-commit).

estado: parcial

