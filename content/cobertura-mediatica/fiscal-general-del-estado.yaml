# Cobertura mediática general — caso fiscal-general-del-estado
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: fiscal-general-del-estado
fecha_rastreo: "2026-05-26"

metodologia:
  terminos_busqueda:
    - "García Ortiz fiscal general"
    - "caso fiscal general del Estado"
    - "García Ortiz filtración González Amador"
    - "Álvaro García Ortiz Supremo"
    - "caso fiscal filtración pareja Ayuso"
  ventanas_temporales:
    - desde: "2024-03-01"
      hasta: "2024-12-31"
      notas: >
        Filtración del correo de González Amador (mar 2024), apertura de la causa
        ante el TSJM y elevación al Tribunal Supremo (oct 2024). Apertura de la
        Causa Especial nº 20557/2024 en el TS (15 oct 2024). Primeras diligencias
        de instrucción (nov-dic 2024).
    - desde: "2025-01-01"
      hasta: "2025-12-31"
      notas: >
        Procesamiento de García Ortiz por el magistrado Hurtado (9 jun 2025),
        sobreseimiento de Pilar Rodríguez (29 jul 2025), inicio del juicio oral
        (3 nov 2025), sentencia condenatoria 1000/2025 por 5 votos frente a 2
        (9 dic 2025), dimisión y cese de García Ortiz (24 nov y 9 dic 2025).
    - desde: "2026-01-01"
      hasta: "2026-05-26"
      notas: >
        Desestimación de los incidentes de nulidad (26 feb 2026), condena firme.
        Recursos de amparo al Tribunal Constitucional de la Fiscalía y del
        condenado (abril 2026). Inspección fiscal sobre posible expulsión del
        cuerpo.
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - theobjective.com
    - elespanol.com
    - libertaddigital.com
    - maldita.es
    - newtral.es
    - vozpopuli.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o lead. Se incluyen
    noticias, reportajes, análisis y piezas de verificación. Se incluyen piezas
    de agencia republicadas cuando el titular o lead las identifica como del
    caso y aportan información sobre hitos procesales.
  criterios_exclusion: >
    Se excluyen menciones de pasada del caso FGE en piezas sobre el caso
    González Amador cuando el FGE no es el objeto central de la pieza. Se excluyen
    republicaciones de agencia sin valor añadido. Se excluyen El País y El Mundo
    por no ser accesibles vía WebFetch en el entorno del agente.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (mar 2024 — may 2026).
    El caso tiene cobertura extensa en todos los medios nacionales desde la
    apertura de la causa en octubre de 2024. El período del juicio oral
    (nov 2025) y la sentencia (dic 2025) concentran la mayor densidad. Es el
    primer caso con sentencia firme del Tribunal Supremo en el inventario. Las
    url_archivo se rellenan con scripts/archivar-n4.mjs (pnpm archive:catchup
    o hook pre-commit).

estado: parcial

