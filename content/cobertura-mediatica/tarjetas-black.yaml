# Cobertura mediática general — caso tarjetas-black
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: tarjetas-black
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "tarjetas black"
    - "tarjetas black Caja Madrid"
    - "tarjetas opacas Caja Madrid"
    - "caso tarjetas black Bankia"
    - "Rodrigo Rato tarjetas black"
    - "Miguel Blesa tarjetas"
  ventanas_temporales:
    - desde: "2013-12-01"
      hasta: "2014-12-31"
      notas: >-
        Exclusiva de eldiario.es (dic 2013) que publica los correos de Blesa
        revelando la existencia de las tarjetas. Octubre 2014: confirmacion
        publica de que Anticorrupcion investiga el gasto de 15 millones de euros.
    - desde: "2015-01-01"
      hasta: "2016-12-31"
      notas: >-
        Instruccion y fase de juicio oral. Apertura del juicio ante la AN.
        Periodo de escasas grandes piezas; cobertura de seguimiento de diligencias.
    - desde: "2017-01-01"
      hasta: "2017-12-31"
      notas: >-
        Sentencia de la Audiencia Nacional (23 feb 2017): 65 condenas por
        apropiacion indebida continuada. Fallecimiento de Miguel Blesa
        (julio 2017) antes de la firmeza de su condena.
    - desde: "2018-01-01"
      hasta: "2018-12-31"
      notas: >-
        Tribunal Supremo confirma condenas en casacion (octubre 2018).
        Firmeza de las condenas. Rato ingresa en prision. El TS declara
        extinguida la responsabilidad penal de Blesa por fallecimiento.
    - desde: "2019-01-01"
      hasta: "2026-05-30"
      notas: >-
        Fase de ejecucion de penas. Condenados que acceden a tercer grado.
        Piezas de aniversario (10 anos del escandalo, 2024). Seguimiento difuso.
  fuentes_buscadas:
    - eldiario.es
    - elespanol.com
    - okdiario.com
    - vozpopuli.com
    - el-independiente.com
    - elindependiente.com
    - confilegal.com
    - el-confidencial.com
    - publico.es
    - poderjudicial.es
  criterios_inclusion: >-
    Se incluyen piezas cuyo titular o lead se centra en el caso de las tarjetas
    black de Caja Madrid y Bankia o en sus protagonistas directos en el marco
    del procedimiento. Se incluyen noticias, reportajes, analisis y piezas de
    investigacion periodistica. Se incluyen piezas de agencia cuando son la
    primera publicacion identificada de un hecho relevante.
  criterios_exclusion: >-
    Se excluyen menciones de pasada en piezas sobre otros casos o politicos
    sin desarrollo de la tarjeta black como tema principal. Se excluyen
    republicaciones palabra por palabra de agencia sin valor anadido. Se
    excluyen editoriales institucionales sin firma. No se incluyen piezas de
    El Pais (elpais.com) ni El Mundo (elmundo.es) por acceso no disponible
    via WebSearch en el entorno del agente. No se incluye La Vanguardia ni
    ABC por no estar modelados en el inventario en esta pasada.
  notas: >-
    Rastreo inicial v1 sobre cinco ventanas temporales (dic 2013 - may 2026).
    Las noticias de El Pais y El Mundo (grandes cabeceras generalistas con
    cobertura extensa del caso) no se incluyen por limitaciones de acceso del
    agente; el maintainer puede ampliar el corpus en una segunda pasada.
    El caso de las tarjetas black tiene una particularidad editorial clave:
    eldiario.es es el medio que destapa el caso en diciembre 2013 mediante
    la publicacion de los correos de Blesa, lo que lo convierte en actor
    directo de la investigacion, no solo observador. Las url_archivo se
    rellenan con scripts/archivar-n4.mjs (pnpm archive:catchup).

estado: parcial

