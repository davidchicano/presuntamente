    autor: "Redacción eldiario.es"
    resumen: >-
      Anticorrupcion investiga el uso de tarjetas de credito opacas por
      parte de los maximos responsables de Caja Madrid y Bankia, cuyo
      importe total asciende a 15 millones de euros entre 2003 y 2012.
      La investigacion judicial se origino en la publicacion de los correos
      de Miguel Blesa por eldiario.es en diciembre de 2013.
    tipo_pieza: investigacion_periodistica
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    notas: >-
      La pieza de octubre 2014 confirma publica la investigacion de
      Anticorrupcion. El origen editorial es la exclusiva de dic 2013
      sobre los correos de Blesa. La URL exacta de la pieza original de
      diciembre 2013 puede diferir; se usa la version del articulo que
      recoge la confirmacion de la investigacion.

