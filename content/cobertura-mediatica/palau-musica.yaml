# Cobertura mediática general — caso palau-musica
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: palau-musica
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Palau"
    - "caso Palau de la Música"
    - "Fèlix Millet"
    - "Jordi Montull"
    - "CDC Convergència comisiones Palau"
    - "Palau de la Música expolio"
  ventanas_temporales:
    - desde: "2009-07-01"
      hasta: "2009-12-31"
      notas: >-
        Registro policial el 23 de julio de 2009. Dimisión de Millet y Montull
        (27 jul). Confesión pública del expolio (16 sept 2009). Hito fundacional
        del caso en la cobertura mediática.
    - desde: "2016-07-01"
      hasta: "2018-01-31"
      notas: >-
        Séptimo aniversario del estallido sin juicio (jul 2016). Inicio del
        juicio oral en la Sección 10ª de la AP Barcelona (1 mar 2017). Visto
        para sentencia (16 jun 2017). Sentencia AP Barcelona hecha pública
        (15 ene 2018).
    - desde: "2019-07-01"
      hasta: "2020-07-01"
      notas: >-
        Décimo aniversario (jul 2019). Deliberación del Tribunal Supremo
        sobre 16 recursos (nov 2019). STS 813/2020 firme (30 abr 2020).
        Ingreso en prisión de Millet y Osàcar (25 jun 2020).
    - desde: "2022-01-01"
      hasta: "2022-12-31"
      notas: >-
        AP Barcelona paraliza pieza civil sobre sucesores CDC (feb 2022).
        Archivo causa contra Junts/PDeCat (feb 2022). Recuperación de más
        de 12 millones de euros (nov 2022).
    - desde: "2023-01-01"
      hasta: "2026-05-30"
      notas: >-
        Quinto aniversario de la sentencia AP (ene 2023). Fallecimiento de
        Fèlix Millet (16 mar 2023). Hijas de Millet frenan devolución
        (oct 2023). Investigación hijas por ocultación de rentas (2024-2025).
        Palau compra mansión Millet en L'Ametlla (feb 2025).
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - okdiario.com
    - vozpopuli.com
    - infolibre.es
    - confilegal.com
    - cronicaglobal.elespanol.com
  criterios_inclusion: >-
    Se incluyen piezas que mencionan el caso en el titular o en el lead. Se
    incluyen noticias, reportajes, análisis y crónicas sobre los hitos
    procesales clave (sentencias, ingresos en prisión, ejecución, fallecimiento
    del condenado). Se incluyen piezas de agencia republicadas cuando el
    titular o lead las identifica claramente con el caso. No se incluyen
    columnas de opinión de articulistas externos sin desarrollo factual propio.
  criterios_exclusion: >-
    Se excluyen menciones de pasada en piezas sobre el «cas Palau» por
    independencia o financiación de la Generalitat si el caso Palau de la
    Música no es el asunto central. Se excluyen republicaciones palabra por
    palabra de agencia sin valor añadido. Se excluyen medios con paywall
    duro no accesibles al agente (elpais.com, elmundo.es, abc.es,
    lavanguardia.com). No se buscó en medios en catalán (ARA, Vilaweb,
    NacióDigital, 324) en esta primera pasada; constituyen un corpus propio
    relevante para una segunda pasada dado que el caso tiene una dimensión
    editorial barcelonesa muy marcada.
  notas: >-
    Rastreo inicial v1 sobre cinco ventanas temporales (jul 2009 – may 2026).
    La causa tiene sentencia firme desde 2020 y un tramo de ejecución todavía
    activo. El País, El Mundo, ABC y La Vanguardia tienen cobertura extensa
    y propia no incluida por restricciones de acceso del agente. La cobertura
    en catalán (ARA, Vilaweb, 324/TV3) tiene entidad editorial propia y se
    deja para una segunda pasada. Las url_archivo se rellenan con
    pnpm archive:catchup (ver docs/web/features/archive-org-pre-commit.md).

estado: parcial

noticias:

  # ── VENTANA 1: APERTURA Y CONFESIÓN (jul–dic 2009) ─────────────────────────

  - id: eldiario-7-anos-estallido-sin-juicio-2016-07-22
    url: "https://www.eldiario.es/catalunya/politica/estallido-palau-convergencia-expolio-millet_1_3905285.html"
    medio_id: eldiario-es
    titular: "Siete años del estallido del caso Palau: Convergència y el expolio de Millet siguen sin juicio"
    fecha_publicacion: "2016-07-22"
    autor: "Oriol Solé Altimira"
    resumen: >-
      Pieza de balance en el séptimo aniversario del registro policial en el
      Palau (23 jul 2009), que destaca que la investigación sobre el expolio
      de 23 millones y las comisiones a CDC —más de seis millones a través de
      Ferrovial— seguía sin juicio oral celebrado siete años después del
      escándalo. Reconstituye los hechos fundacionales del caso y la cadena
      de imputaciones desde la confesión de Millet y Montull en septiembre
      de 2009.
    tipo_pieza: reportaje
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    notas: >-
      Pieza de balance que también documenta la apertura del caso (jul 2009).
      Publicada en 2016 pero cubre la ventana 2009-2016 con perspectiva
      histórica; se incluye aquí como referencia del hito de apertura.

