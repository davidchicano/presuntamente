      el procedimiento concursal de CDC en el Juzgado Mercantil 9 de
      Barcelona. El Palau de la Música se personó en el concurso para
      recuperar su crédito.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

