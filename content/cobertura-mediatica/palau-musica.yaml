    autor: "Oriol Solé Altimira"
    resumen: >-
      La Sala Segunda del Tribunal Supremo ratifica la STS 813/2020 que
      confirma las condenas a Fèlix Millet (9 años y 8 meses), Jordi Montull
      (7 años y 6 meses) y Daniel Osàcar (3 años y 6 meses), y mantiene el
      comiso de 6,67 millones de euros a Convergència Democràtica de Catalunya
      por las comisiones recibidas de Ferrovial-Agroman. La pieza subraya
      que el acuerdo criminal para el cobro de las «mordidas» estaba probado
      desde el comienzo de la trama.
    tipo_pieza: noticia
