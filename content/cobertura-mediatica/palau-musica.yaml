      por el expolio de 23,6 millones de euros y por la financiación ilegal de
      Convergència Democràtica de Catalunya a través de comisiones de Ferrovial.
      La pieza recoge la notificación pública de la sentencia de primera
      instancia firmada el 29 de diciembre de 2017.
