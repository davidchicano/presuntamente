    fecha_publicacion: "2022-02-25"
    autor: "infoLibre"
    resumen: >-
      La Sección 10ª de la AP Barcelona archiva la pieza civil abierta para
      recuperar los 6,67 millones de euros del comiso acordado a CDC de sus
