  # ── VENTANA 4: INSTRUCCIÓN VIAJES CERES / RESIGNIFICACIÓN 2022-2026 ───────

  - id: eldebate-juzgado-prepara-juicio-viajes-ceres-2024-03-16
    url: "https://www.eldebate.com/espana/20240316/juzgado-madrid-prepara-juicio-contra-rama-filesa-desvio-422-m-euros-financiar-psoe_182403.html"
    medio_id: el-debate
    titular: "Un juzgado de Madrid prepara el juicio contra una rama de Filesa que desvió 42,2 millones para financiar al PSOE"
    fecha_publicacion: "2024-03-16"
    resumen: >
      El Debate informa de que el Juzgado de Instrucción nº 26 de Madrid
      preparaba en marzo de 2024 el señalamiento del juicio oral contra la
      causa Viajes Ceres, la última rama del caso Filesa, investigando la
      presunta desviación de 42,2 millones de euros en subvenciones del
      Imserso hacia la red de empresas vinculada a la trama. La pieza detalla
      el objeto de la acusación y los perfiles de los nueve miembros del
      consejo de administración de Viajes Ceres investigados.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: eldiario-financiacion-ilegal-partidos-filesa-contexto
    url: "https://www.eldiario.es/agendapublica/nueva_politica/principales-financiacion-ilegal-partidos-politicos_1_4420229.html"
    medio_id: eldiario-es
    titular: "Las principales causas de la financiación ilegal de los partidos políticos"
    fecha_publicacion: "2015-03-17"
    resumen: >
      elDiario.es publica un análisis estructural sobre los mecanismos de
      financiación ilegal de los partidos políticos en España en el que el
      caso Filesa figura como referente histórico de la utilización de empresas
      pantalla para canalizar fondos electorales, junto con el caso Gürtel y
      el "3%" de CDC. La pieza identifica cuatro causas estructurales: nivel
      de gasto, bajo número de afiliados, falta de transparencia y ausencia
      de controles administrativos.
    tipo_pieza: analisis
    relevancia_editorial: media
    menciones: [cuerpo]
    fecha_rastreo: "2026-05-30"
    notas: >
      Pieza de análisis contextual; el caso Filesa no es el tema central sino
      un ejemplo estructural. Se incluye por ser la única pieza de elDiario.es
      localizada con tratamiento explícito del caso Filesa en el corpus.

  - id: confilegal-opinion-filesa-registros-ferraz-2026-05-29
    url: "https://confilegal.com/20260529-caso-filesa-psoe-responsabilidad-penal-corrupcion-financiacion-ilegal/"
    medio_id: confilegal
    titular: "La historia vuelve a repetirse: nuevos registros en la sede federal del PSOE, en Madrid"
    fecha_publicacion: "2026-05-29"
    autor: "Manuel Jaén Vallejo"
    resumen: >
      Confilegal publica un artículo de opinión jurídica del magistrado jubilado
      y profesor universitario Manuel Jaén Vallejo que analiza la reapertura de
      la investigación sobre financiación del PSOE en 2026 (registros UCO en
      la sede de Ferraz del 27 de mayo de 2026) en paralelo con el caso Filesa
      de 1991-1997. El autor repasa los elementos comunes —red de empresas
      pantalla, facturas ficticias, financiación de campañas— y señala que,
      a diferencia de Filesa, la legislación actual sí contempla la
      responsabilidad penal de personas jurídicas (art. 31 bis CP).
    tipo_pieza: opinion
    relevancia_editorial: media
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    notas: >
      Pieza de opinión jurídica firmada por un magistrado jubilado. Se incluye
      por ser la única pieza de 2026 que conecta explícitamente el caso Filesa
      histórico con la investigación de 2026, aportando análisis jurídico
      propio sobre la evolución del marco legal de responsabilidad penal de
      partidos.
