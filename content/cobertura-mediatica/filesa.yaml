# Cobertura mediática general — caso filesa
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: filesa
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Filesa"
    - "Trama Filesa"
    - "Filesa Malesa Time Export"
    - "Viajes Ceres financiación PSOE"
    - "Causa Especial 880/1991"
    - "financiación ilegal PSOE Filesa"
  ventanas_temporales:
    - desde: "1991-05-01"
      hasta: "1997-10-31"
      notas: >
        Fase de instrucción y juicio oral ante el Tribunal Supremo: estallido
        mediático del escándalo (29 may 1991), instrucción del magistrado Marino
        Barbero, sustitución por Bacigalupo en 1995, apertura de juicio oral
        (dic 1995) y sentencia STS 1/1997 (28 oct 1997). Cobertura hemeroteca
        (El Mundo, El País 1991-1997) accesible parcialmente en mirrors y
        archivos universitarios digitalizados; no accesible vía WebFetch.
    - desde: "1997-11-01"
      hasta: "2001-12-31"
      notas: >
        Período post-sentencia: recursos de amparo al TC (STCs 126/2001 y
        127/2001), indultos parciales concedidos por el Gobierno Aznar en
        diciembre de 2000 (RD 2700/2000 BOE Navarro; Flores y Oliveró en
        mismo BOE). Cobertura de Libertad Digital y otros medios digitales
        nacientes.
    - desde: "2019-01-01"
      hasta: "2022-03-31"
      notas: >
        Reapertura de la rama Viajes Ceres: Audiencia Provincial de Madrid
        archiva el procedimiento por prescripción (2019); el Tribunal Supremo
        estima el recurso del PP como acusación popular y ordena la reapertura
        (1 feb 2022).
    - desde: "2022-04-01"
      hasta: "2026-05-30"
      notas: >
        Instrucción Viajes Ceres ante el Juzgado de Instrucción nº 26 de
        Madrid, preparación del juicio oral en 2024. Reactivación editorial del
        caso Filesa en 2026 como referente histórico ante nuevas investigaciones
        sobre financiación del PSOE (registros UCO en Ferraz, may 2026).
  fuentes_buscadas:
    - elespanol.com
    - publico.es
    - theobjective.com
    - vozpopuli.com
    - eldebate.com
    - libertaddigital.com
    - confilegal.com
    - eldiario.es
    - newtral.es
    - economistjurist.es
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso Filesa o la rama Viajes Ceres en
    el titular o en el lead. Se incluyen noticias, reportajes, análisis y
    piezas de opinión jurídica que aporten contexto factual verificable sobre
    el procedimiento. Se incluyen piezas históricas de hemeroteca digital
    accesibles online (no solo cobertura reciente).
  criterios_exclusion: >
    Se excluyen menciones de pasada a Filesa en piezas centradas en otros
    casos (Gürtel, Koldo, Kitchen) cuando no abordan específicamente el
    procedimiento Filesa o Viajes Ceres. Se excluyen republicaciones de
    agencia palabra por palabra cuando no añaden valor propio. Se excluye El
    País y El Mundo por no ser accesibles vía WebFetch en el entorno del
    agente; su cobertura histórica de 1991-1997 es el núcleo mediático del
    caso pero no pudo rastrearse directamente en esta pasada.
  notas: >
    Rastreo inicial v1 sobre cuatro ventanas temporales (may 1991 — may 2026).
    El grueso de la cobertura mediática original del caso (1991-1997) se
    generó en prensa impresa (El Mundo y El País principalmente) y solo es
    accesible parcialmente en mirrors universitarios y hemerotecas digitalizadas
    no rastreables vía WebFetch. Esta limitación estructural se refleja en el
    estado "parcial" del corpus. El período de reapertura (2022) y el juicio
    oral de Viajes Ceres (2024) son los tramos mejor cubiertos en medios
    digitales actuales. Las url_archivo se rellenan con scripts/archivar-n4.mjs
    (pnpm archive:catchup).

estado: parcial

noticias:

  # ── VENTANA 2: POST-SENTENCIA (1997-2001) ─────────────────────────────────

  - id: libertad-digital-penas-condenados-filesa-2001
    url: "https://www.libertaddigital.com/espana/2001-06-04/las-penas-a-los-ocho-condenados-del-caso-filesa-32154/"
    medio_id: libertad-digital
    titular: "Las penas a los ocho condenados del «caso Filesa»"
    fecha_publicacion: "2001-06-04"
    autor: "Redacción"
    resumen: >
      Libertad Digital publica un cuadro con las penas definitivas impuestas a
      los ocho condenados en la STS 1/1997 tras la resolución de los recursos
      de amparo ante el Tribunal Constitucional. Se recogen las condenas
      individuales de Josep Maria Sala i Grisó, Carlos Navarro Gómez, Alberto
      Flores Valencia, Luis Oliveró Capellades, Aída Álvarez y su marido
      Miguel Molledo, y otros condenados, así como los indultos parciales
      concedidos por el Gobierno Aznar en diciembre de 2000.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    notas: >
      Pieza de hemeroteca digital accesible. Uno de los pocos resúmenes
      exhaustivos de las penas definitivas disponibles en abierto en la web.
      Libertad Digital es de las primeras publicaciones digitales en cubrir el
      desenlace del caso Filesa con este nivel de detalle.

  # ── VENTANA 3: REAPERTURA VIAJES CERES (ene 2019 — mar 2022) ─────────────

  - id: elespanol-pp-reabre-filesa-viajes-ceres-2022-02-01
    url: "https://www.elespanol.com/espana/tribunales/20220201/pp-reabrir-ultima-filesa-financiacion-psoe-despues/646935411_0.html"
    medio_id: el-espanol
    titular: "El PP logra reabrir la última rama de Filesa, sobre financiación ilegal del PSOE, 30 años después"
    fecha_publicacion: "2022-02-01"
    resumen: >
      El Tribunal Supremo estima el recurso presentado por el Partido Popular
      como acusación popular contra el auto de la Audiencia Provincial de
      Madrid de 2019 que archivó el procedimiento de la rama Viajes Ceres por
      prescripción. La Sala Segunda del Supremo ordena la reapertura de la
      instrucción ante el Juzgado de Instrucción nº 26 de Madrid, investigando
      la presunta desviación de subvenciones del Imserso de unos 42,2 millones
      de euros canalizados hacia la red Filesa.
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

