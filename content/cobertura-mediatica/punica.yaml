  - id: publico-condena-exalcaldes-cofely-2025-12-22
    url: "https://www.publico.es/politica/tribunales/audiencia-nacional-condena-seis-exalcaldes-comunidad-madrid-practicas-corruptas-contratos-punica-cofely.html"
