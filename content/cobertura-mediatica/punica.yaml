# Cobertura mediática general — caso punica
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: punica
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Púnica"
    - "operación Púnica"
    - "trama Púnica"
    - "Francisco Granados"
    - "David Marjaliza"
    - "Cofely Madrid corrupción"
    - "Juzgado Central Instrucción 6 Púnica"
  ventanas_temporales:
    - desde: "2014-10-27"
      hasta: "2014-12-31"
      notas: "Operación policial de la UCO (27-oct-2014): medio centenar de detenidos, incluido Francisco Granados. Primera cobertura masiva."
    - desde: "2015-01-01"
      hasta: "2017-12-31"
      notas: "Instrucción principal. Granados en prisión provisional (oct-2014 a jun-2017). Primera condena pieza filtración (AN dic-2017)."
    - desde: "2018-01-01"
      hasta: "2019-12-31"
      notas: "Granados acusa a Aguirre, Cifuentes y González (feb-2018). Tribunal Supremo confirma condena firme pieza filtración (14-mar-2019)."
    - desde: "2020-01-01"
      hasta: "2022-12-31"
      notas: "Archivo de la pieza de financiación del PP de Madrid (oct-2022). Instrucción pieza Cofely en tramo final."
    - desde: "2023-01-01"
      hasta: "2024-12-31"
      notas: "La AN propone juzgar a Marjaliza y exalcaldes en pieza Cofely (abr-2023). Juicio oral pieza Cofely (a partir de abr-2025 según conformidades). Contextualizaciones del caso una década después."
    - desde: "2025-01-01"
      hasta: "2025-12-31"
      notas: "Juicio oral pieza Cofely (2025). Conformidades de 13 acusados (abr-2025). Sentencia AN pieza Cofely (22-dic-2025): 29 condenados incluido Marjaliza (8 años y 2 meses)."
    - desde: "2026-01-01"
      hasta: "2026-05-30"
      notas: "Auto apertura juicio oral pieza 8 (suelo/obra pública) contra Granados y 40 acusados (21-may-2026). Fiscalía pide 42 años para Granados."
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - elespanol.com
    - theobjective.com
    - infolibre.es
    - libertaddigital.com
    - okdiario.com
    - vozpopuli.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso Púnica, la operación policial o sus actores
    principales (Granados, Marjaliza, Cofely) en el titular o en el lead. Se incluyen
    noticias, reportajes, análisis, columnas de opinión firmadas y piezas de agencia
    republicadas cuando el titular las identifica claramente como del caso.
  criterios_exclusion: >
    Se excluyen menciones de pasada en piezas sobre otros temas (corrupción genérica,
    PP de Madrid como contexto amplio). Se excluyen republicaciones palabra por palabra
    de agencia sin valor añadido. Se excluyen editoriales anónimos. No se han incluido
    en este rastreo: elpais.com (dominio no accesible vía WebFetch en el entorno del
    agente), elmundo.es, abc.es, lavanguardia.com por no ser objeto de búsqueda
    sistemática en esta pasada. Los medios de agencia (EFE, Europa Press) se recogen
    solo cuando se identifican como fuente firmada en una republicación.
  notas: >
    Rastreo inicial v1 sobre siete ventanas temporales (oct-2014 — may-2026).
    El caso Púnica es una macrocausa con cobertura sostenida durante más de una
    década: este corpus es un muestreo diverso y sistemático (8 piezas), no un
    listado exhaustivo. Se priorizan piezas en hitos procesales clave: operación
    policial (oct-2014), condena pieza filtración (mar-2019), archivo pieza
    financiación PP (2022), sentencia pieza Cofely (dic-2025) y apertura JO
    pieza 8 (may-2026). Las url_archivo se rellenan mediante pnpm archive:catchup
    (ver docs/web/features/archive-org-pre-commit.md); se dejan vacías en esta pasada.
    Se detectó que okdiario.com publicó la salida de Granados de
    la cárcel presentándolo como inocente; no se incluye como pieza del corpus
    por carecer de rigor procesal contrastable, pero se anota para revisión editorial.

estado: parcial

