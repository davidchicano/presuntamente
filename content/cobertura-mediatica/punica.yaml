    titular: "La Audiencia Nacional condena a seis exalcaldes de la Comunidad de Madrid por \"prácticas corruptas\" en contratos de 'Púnica' con Cofely"
    fecha_publicacion: "2025-12-22"
    resumen: >
      La Audiencia Nacional dicta sentencia (no firme) en la pieza Cofely del caso
      Púnica condenando a 29 personas, entre ellas a David Marjaliza (8 años y 2
      meses de prisión) y a seis exalcaldes de municipios madrileños. La sentencia
      acredita que los contratos de eficiencia energética se adjudicaron de forma
      presuntamente corrupta entre 2012 y 2014, con un volumen de 224 millones de euros.
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

