caso_id: barcenas-caja-b
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Bárcenas"
    - "papeles de Bárcenas"
    - "caja B del PP"
    - "caja B PP"
    - "Luis Bárcenas sentencia"
    - "Unifica reforma Génova"
  ventanas_temporales:
    - desde: "2020-12-01"
      hasta: "2021-07-31"
      notas: >
        Apertura del juicio oral ante la Sección Segunda de la Sala Penal de la AN
        (8 de febrero de 2021) y conclusión de las sesiones (mayo 2021). La sentencia
        de la Audiencia Nacional fue dictada el 28 de octubre de 2021.
    - desde: "2021-08-01"
      hasta: "2022-12-31"
      notas: >
        Sentencia AN (28 oct 2021) y archivo de la pieza de donaciones finalistas
        por auto del juez Pedraz (19 dic 2022).
    - desde: "2024-01-01"
      hasta: "2024-11-30"
      notas: >
        Sentencia de casación del Tribunal Supremo (15 nov 2024,
        ECLI:ES:TS:2024:5577) que confirma la condena al PP como responsable
        civil subsidiario y reduce penas por dilaciones indebidas.
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - infolibre.es
    - okdiario.com
    - elespanol.com
    - theobjective.com
    - confilegal.com
    - noticiasdenavarra.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o en el lead. Se incluyen
    noticias, reportajes, análisis y columnas firmadas que abordan los hitos
    procesales principales: apertura del juicio oral (feb 2021), sentencia de la AN
    (oct 2021), archivo de la pieza de donaciones (dic 2022) y sentencia de casación
    del TS (nov 2024). No se incluyen editoriales anónimos ni republicaciones sin
    autoría diferenciada.
  criterios_exclusion: >
    Se excluyen menciones de pasada en piezas sobre otros temas (caso Gürtel
    principal, caso Kitchen). Se excluyen republicaciones idénticas de sueltos
    de agencia. Se excluye El País (elpais.com) y El Mundo (elmundo.es) en este
    rastreo por limitaciones de acceso vía WebSearch. El Confidencial presenta
    cobertura relevante no recuperable mediante búsqueda directa en este rastreo.
  notas: >
    Rastreo inicial v1 sobre tres ventanas temporales (dic 2020 — nov 2024).
    El caso tiene cobertura amplia en todos los medios nacionales; este corpus
    es un muestreo sistemático por hitos procesales, no un listado exhaustivo.
    El País y El Mundo tienen cobertura propia y relevante no incluida por las
    limitaciones de acceso señaladas. Las url_archivo se rellenan con
    scripts/archivar-n4.mjs (pnpm archive:catchup).

estado: parcial

