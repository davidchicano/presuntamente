    medio_id: eldiario-es
    titular: "La tercera sentencia sobre la caja B entierra una década de negacionismo del PP"
    fecha_publicacion: "2021-10-28"
    autor: "Redacción"
    resumen: >
      El análisis sitúa la sentencia de la AN sobre los papeles de Bárcenas como
      la tercera resolución judicial que acredita la existencia de una caja B en el PP,
