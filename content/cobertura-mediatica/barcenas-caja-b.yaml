    url: "https://www.elespanol.com/espana/tribunales/20241115/supremo-confirma-condena-pago-sede-pp-reduce-penas-debido-dilaciones/901410036_0.html"
    medio_id: el-espanol
    titular: "El Supremo confirma la condena por el pago en B de la sede del PP pero reduce las penas debido a las dilaciones"
    fecha_publicacion: "2024-11-15"
    autor: "Redacción"
    resumen: >
      La Sala Segunda del TS ratifica en casación la sentencia de la AN sobre los
      papeles de Bárcenas. Mantiene los hechos probados y la condena del PP como
      responsable civil subsidiario por 123.669 euros, pero rebaja las penas privativas
      de libertad por apreciar la circunstancia atenuante de dilaciones indebidas
      —transcurrieron ocho años entre la apertura de la instrucción y la sentencia.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

