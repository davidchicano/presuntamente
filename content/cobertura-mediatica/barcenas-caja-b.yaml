  # ── VENTANA 2: SENTENCIA AN + ARCHIVO PIEZA DONACIONES (oct 2021 – dic 2022) ─

  - id: eldiario-sentencia-caja-b-hechos-probados-2021-10-28
    url: "https://www.eldiario.es/politica/hechos-probados-sentencia-pp-barcenas-manejo-donativos-metalico-traves-contabilidad-b_1_8439559.html"
    medio_id: eldiario-es
    titular: "Los hechos probados de la sentencia: Bárcenas manejó donativos en metálico a través de la caja B del PP"
    fecha_publicacion: "2021-10-28"
    autor: "Redacción"
    resumen: >
      El medio publica los hechos probados de la sentencia de la Sección Segunda de la AN
      que condena a Luis Bárcenas por fraude fiscal como cooperador necesario al abonar
      más de un millón de euros en negro a Unifica para la reforma de la sede del PP.
      La sala declara probada la existencia de una contabilidad B del PP manejada por Bárcenas
      y condena al PP como responsable civil subsidiario por 123.669 euros.
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

