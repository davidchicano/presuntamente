  # ── VENTANA 3: SENTENCIA TS CASACIÓN (nov 2024) ────────────────────────────

  - id: okdiario-supremo-confirma-condena-pp-2024-11-15
    url: "https://okdiario.com/espana/supremo-reduce-2-anos-8-meses-condena-carcel-barcenas-reforma-b-genova-13821691"
    medio_id: okdiario
    titular: "El Supremo confirma que el PP pagó en B la reforma de su sede, pero rebaja la condena a Bárcenas"
    fecha_publicacion: "2024-11-15"
    autor: "Redacción"
    resumen: >
      El Tribunal Supremo confirma en casación la condena de la Audiencia Nacional
      que acreditó el pago de más de un millón de euros en negro para las obras de
      reforma de la sede del PP. La Sala reduce la condena de Bárcenas de 2 años a
      8 meses de prisión y la de los administradores de Unifica de 2 años y 9 meses
      a 9 meses, apreciando dilaciones indebidas; absuelve del delito de falsedad.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

