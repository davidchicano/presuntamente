      La pieza destaca el impacto acumulado de los distintos pronunciamientos judiciales
      sobre la tesis oficial del partido de que la contabilidad B era responsabilidad
      exclusiva de Bárcenas.
    tipo_pieza: analisis
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

