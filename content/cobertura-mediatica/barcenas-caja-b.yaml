    titular: "El Supremo confirma la condena al PP por reformar su sede de Génova con dinero de su caja B"
    fecha_publicacion: "2024-11-15"
    autor: "Redacción"
    resumen: >
      El TS ratifica en lo sustancial la sentencia de la AN que declaró probado que
      el PP reformó su sede de Génova con fondos de la caja B. La resolución mantiene
      la responsabilidad civil subsidiaria del PP y confirma la existencia de la
      contabilidad paralela institucionalizada, aunque reduce las penas aplicando
      la atenuante de dilaciones indebidas.
    tipo_pieza: noticia
