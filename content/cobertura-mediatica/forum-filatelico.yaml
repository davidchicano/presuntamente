    titular: "El Supremo confirma la estafa piramidal de Fórum aunque rebaja levemente las condena a Briones por dilaciones indebidas"
    fecha_publicacion: "2020-03-05"
    autor: "infoLibre"
    resumen: >
      infoLibre recoge la sentencia del Tribunal Supremo que confirma la estafa agravada
      de Fórum Filatélico, que afectó a 268.000 personas con más de 3.700 millones de euros.
      La sala condena a 16 responsables y reduce levemente la pena de Briones por aplicación
