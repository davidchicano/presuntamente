  # ── HITO 6: CIERRE CONCURSO DE ACREEDORES (mayo 2025) ───────────────────────

  - id: vozpopuli-cierre-concurso-forum-2025
    url: "https://www.vozpopuli.com/economia/forum-filatelico-millones-muertos.html"
    medio_id: vozpopuli
    titular: "El caso Fórum Filatélico se cierra tras 15 años con un coste de 46 millones y 15.000 muertos"
    fecha_publicacion: "2025-05-26"
    autor: "Alberto Ortín"
    resumen: >
      Tras 15 años de proceso concursal, la administración de Fórum Filatélico presenta
      su informe final antes de la disolución de la empresa: de los aproximadamente 300.000
      acreedores, al menos 15.000 fallecieron durante el proceso y solo se pudo atender el
      23,5% de los créditos reconocidos, con un coste de gestión concursal de 46 millones
      de euros.
    tipo_pieza: reportaje
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  # ── HITO 7: DECOMISO ACTIVOS LLORCA EN LIECHTENSTEIN (enero 2026) ────────────

  - id: theobjective-decomiso-llorca-2026
    url: "https://theobjective.com/espana/tribunales/2026-01-15/audiencia-nacional-confisca-huido-forum-filatelico/"
    medio_id: the-objective
    titular: "La Audiencia Nacional confisca 2,6 millones a un huido por la estafa de Fórum Filatélico"
    fecha_publicacion: "2026-01-15"
    autor: "THE OBJECTIVE"
    resumen: >
      La Audiencia Nacional ordena el decomiso de 2,6 millones de euros de José Manuel
      Llorca Rodríguez, prófugo de la justicia desde 2007, depositados en Liechtenstein
      bajo la Fundación MALAPA. Los fondos serán destinados a indemnizar a las víctimas
      mediante la figura del decomiso autónomo, que permite intervenir bienes sin sentencia
      de condena cuando el imputado permanece en rebeldía.
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

