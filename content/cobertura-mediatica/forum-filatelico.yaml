    medio_id: el-espanol
    titular: "El TS pone punto final al caso Forum Filatélico tras 14 años de proceso y con 16 condenados"
    fecha_publicacion: "2020-03-05"
    autor: "E.E."
    resumen: >
      El Español recoge la sentencia 688/2019 del Tribunal Supremo que cierra el caso
      penal de Fórum Filatélico con 16 condenados tras 14 años desde la Operación Atrio.
      El expresidente Francisco Briones recibe la pena máxima de 11 años y 10 meses
      más multa de 49,7 millones, y la empresa deberá responder subsidiariamente de las
      indemnizaciones a los aproximadamente 268.000 clientes perjudicados.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

