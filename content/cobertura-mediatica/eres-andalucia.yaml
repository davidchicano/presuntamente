# Cobertura mediática general — caso eres-andalucia
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: eres-andalucia
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso ERE"
    - "ERE de Andalucía"
    - "EREs andaluces"
    - "Griñán ERE"
    - "Chaves ERE"
    - "jueza Alaya ERE"
    - "Diligencias Previas 174/2011"
  ventanas_temporales:
    - desde: "2011-01-19"
      hasta: "2019-11-19"
      notas: "Instrucción (apertura jueza Alaya ene 2011) hasta sentencia AP de Sevilla (19 nov 2019). Periodo más extenso; rastreo selectivo de hitos clave."
    - desde: "2019-11-20"
      hasta: "2022-07-31"
      notas: "Desde la sentencia AP Sevilla hasta la casación del Tribunal Supremo (jul 2022)."
    - desde: "2022-08-01"
      hasta: "2024-07-31"
      notas: "Desde la casación TS hasta las sentencias de amparo del TC (jul 2024)."
    - desde: "2024-08-01"
      hasta: "2026-05-30"
      notas: "Desde los amparos TC hasta hoy: rebelión judicial AP Sevilla, cuestión prejudicial TJUE, respuesta Comisión Europea."
  fuentes_buscadas:
    - eldiario.es
    - publico.es
    - elespanol.com
    - elindependiente.com
    - infolibre.es
    - okdiario.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en titular o lead. Se incluyen noticias,
    reportajes, análisis y columnas sobre hitos judiciales clave (apertura instrucción,
    sentencia AP, casación TS, amparos TC, cuestión prejudicial TJUE). Se incluyen
    piezas de agencia republicadas cuando se identifican claramente. Se busca
    diversidad de línea editorial con al menos cuatro medios distintos.
  criterios_exclusion: >
    Se excluyen menciones de pasada en piezas sobre otros temas.
    Se excluyen republicaciones palabra por palabra de agencia sin valor añadido
    identificable. Se excluyen El País, El Mundo, ABC y La Vanguardia: no son
    accesibles vía WebFetch en el sandbox de esta sesión (dominios bloqueados).
    Se excluyen columnas de opinión sin firmante identificable.
  notas: >
    Rastreo inicial v1 sobre cuatro ventanas temporales (ene 2011 — may 2026).
    El caso tiene cobertura amplísima de prácticamente todos los medios nacionales
    durante casi 15 años; este corpus es un muestreo sistemático, no un listado
    exhaustivo. Las url_archivo se rellenan con scripts/archivar-n4.mjs
    (pnpm archive:catchup; ver docs/web/features/archive-org-pre-commit.md).
    El País, El Mundo y ABC tienen cobertura propia muy relevante no incluida por
    las limitaciones de acceso señaladas. La AP de Sevilla elevó en 2025 una
    cuestión prejudicial al TJUE impugnando las sentencias del TC, que aún está
    pendiente de resolución (Comisión Europea solicitó su inadmisión en abr 2026).

estado: parcial

