  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso Koldo, Ábalos/Koldo o la sentencia del
    Supremo en titular o lead. El corpus prioriza piezas informativas y análisis sobre
    hitos procesales; no sustituye a los documentos probatorios del caso.
  criterios_exclusion: >
    Se excluyen directos políticos sin información procesal nueva, columnas puramente
    opinativas y piezas que agrupan Koldo con otros casos sólo como clima político. Las
    intenciones de recurso, incidente de nulidad o amparo se recogen sólo como cobertura
    contextual si no hay resolución judicial nueva.
  notas: >
    Rastreo parcial creado en la beta pública urgente del 23-jun-2026. Queda pendiente
    archivado en archive.org y ampliación retrospectiva sistemática por ventanas.

