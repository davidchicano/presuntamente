# Cobertura mediática general — caso gurtel
# Corpus rastreado con la skill /rastrear-cobertura v1.
# Separado del corpus de Documentos que respaldan Hechos (content/documentos/).
# Ver docs/web/features/cobertura-mediatica-general.md

caso_id: gurtel
fecha_rastreo: "2026-05-30"

metodologia:
  terminos_busqueda:
    - "caso Gürtel"
    - "trama Gürtel"
    - "Francisco Correa"
    - "Operación Gürtel"
    - "Juzgado Central Instrucción 5 Gürtel"
  ventanas_temporales:
    - desde: "2009-02-01"
      hasta: "2009-12-31"
      notas: "Apertura pública del caso: la trama Gürtel se revela en febrero de 2009 tras denuncias ante la Fiscalía Anticorrupción; Baltasar Garzón asume la instrucción."
    - desde: "2018-05-01"
      hasta: "2018-06-30"
      notas: "Hito central: sentencia 20/2018 de la Sección Segunda de la Sala de lo Penal de la AN (17-24 mayo 2018), 29 de 37 condenados; moción de censura que derriba a Rajoy el 1 de junio."
    - desde: "2020-10-01"
      hasta: "2020-10-31"
      notas: "Casación: el Tribunal Supremo confirma la sentencia 20/2018 (sentencia 507/2020, 14 oct 2020); primera condena firme de la Época I."
    - desde: "2022-04-01"
      hasta: "2023-12-31"
      notas: "Piezas secundarias: pieza Boadilla (sentencia AN abr 2022, firme TS nov 2023) y sentencias del TS sobre las piezas valencianas."
    - desde: "2024-01-01"
      hasta: "2026-05-30"
      notas: "Cierre editorial: absolución de Camps (may 2024), pieza Arganda (may 2025), situación penitenciaria de Correa (2025)."
  fuentes_buscadas:
    - eldiario.es
    - elespanol.com
    - vozpopuli.com
    - okdiario.com
    - infolibre.es
    - libertaddigital.com
    - newtral.es
    - confilegal.com
  criterios_inclusion: >
    Se incluyen piezas que mencionan el caso en el titular o en el lead.
    Se incluyen noticias, reportajes, análisis y piezas de verificación.
    Se incluye cobertura de los hitos procesales clave (apertura, sentencias,
    casación, absoluciones) y los grandes picos editoriales (sentencia AN may 2018,
    moción de censura jun 2018, sentencia TS oct 2020).
  criterios_exclusion: >
    Se excluyen republicaciones palabra por palabra de agencia sin valor añadido.
    Se excluyen editoriales anónimos sin firma. Se excluyen menciones laterales
    en piezas centradas en otro caso. El País (elpais.com) y El Mundo (elmundo.es)
    no son accesibles vía WebSearch con filtro de dominio en el entorno del agente;
    su cobertura es notoriamente extensa y se anota como limitación pendiente.
    El Confidencial (elconfidencial.com) tampoco es accesible vía WebSearch con
    filtro de dominio en este entorno.
  notas: >
    Rastreo inicial v1 sobre cinco ventanas temporales (feb 2009 — may 2026). El caso
    Gürtel es la macrocausa de corrupción más larga en la historia reciente española;
    la cobertura periodística es inabarcable y este corpus es un muestreo sistemático,
    no un listado exhaustivo. Las url_archivo se rellenan con scripts/archivar-n4.mjs
    (pnpm archive:catchup; ver docs/web/features/archive-org-pre-commit.md).
    Medios con cobertura propia muy relevante no incluida en este rastreo por
    limitaciones técnicas de acceso: El País, El Mundo, El Confidencial, ABC y La Vanguardia.

estado: parcial

noticias:

  # ── HITO 1: SENTENCIA AN 20/2018 — ÉPOCA I (mayo 2018) ─────────────────────

  - id: eldiario-sentencia-an-2018-condenas
    url: "https://www.eldiario.es/politica/audiencia-nacional-correa-barcenas_1_2109071.html"
    medio_id: eldiario-es
    titular: "Sentencia Gürtel: 51 años para Correa, 33 para Bárcenas y el PP condenado \"a título lucrativo\""
    fecha_publicacion: "2018-05-24"
    resumen: >
      La Sección Segunda de la Sala de lo Penal de la Audiencia Nacional dicta la
      sentencia 20/2018 sobre la Época I (1999-2005) de la trama Gürtel, con 29 de
      los 37 acusados condenados. Francisco Correa recibe la pena más alta (51 años),
      Luis Bárcenas es condenado a 33 años y el Partido Popular es declarado partícipe
      a título lucrativo y condenado a abonar 245.492,80 euros. La pieza describe
      el caso como "un auténtico y eficaz sistema de corrupción institucional".
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: elespanol-sentencia-an-2018-claves
    url: "https://www.elespanol.com/espana/tribunales/20180524/claves-sentencia-caso-gurtel/309720312_0.html"
    medio_id: el-espanol
    titular: "Cinco claves de la sentencia del caso Gürtel"
    fecha_publicacion: "2018-05-24"
    resumen: >
      Pieza analítica publicada el mismo día de la sentencia que identifica los cinco
      elementos editorialmente más relevantes: la cuantía de la condena al PP a título
      lucrativo, la pena máxima de Correa, las implicaciones sobre la caja B, la
      situación de los absueltos y las consecuencias políticas sobre la presidencia
      de Mariano Rajoy.
    tipo_pieza: analisis
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: elespanol-sentencia-an-2018-condenados
