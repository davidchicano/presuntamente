    medio_id: el-espanol
    titular: "Todos los condenados de Gürtel"
    fecha_publicacion: "2018-05-24"
    resumen: >
      Listado detallado de las 29 condenas individuales dictadas por la Audiencia
      Nacional en la Época I de la trama Gürtel, con las penas de prisión, las multas
      y los delitos por los que cada acusado es declarado culpable. Pieza de servicio
      publicada simultáneamente al análisis de las cinco claves.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    pieza_referenciada_id: elespanol-sentencia-an-2018-claves
    notas: "Pieza hermana del mismo medio publicada el mismo día; la vinculamos para dedup transparente aunque no es una republicación sino una pieza de servicio complementaria."

  - id: okdiario-sentencia-an-2018-pp-lucrativo
    url: "https://okdiario.com/espana/pp-condenado-pagar-245-000-euros-como-responsable-titulo-lucrativo-primera-epoca-gurtel-2325129"
    medio_id: okdiario
    titular: "El PP condenado a pagar 245.000 euros como responsable a título lucrativo en la primera época de Gürtel"
    fecha_publicacion: "2018-05-24"
    resumen: >
      La Audiencia Nacional condena al Partido Popular como responsable civil a título
      lucrativo por la primera época de la trama Gürtel, con la obligación de abonar
      245.492,80 euros: 133.628,48 correspondientes a Majadahonda y 111.864,32 a Pozuelo
      de Alarcón. La pieza destaca el carácter histórico de la condena a un partido político.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: vozpopuli-sentencia-an-2018-analisis
    url: "https://www.vozpopuli.com/espana/sentencia-gurtel-claves_0_1302170985.html"
    medio_id: vozpopuli
    titular: "Sentencia de 'Gürtel': claves de una decisión salomónica que busca contentar a todos"
    fecha_publicacion: "2018-05-24"
    resumen: >
      Vozpópuli publica un análisis de la sentencia de la Audiencia Nacional que
      la califica de "salomónica": el PP es condenado a título lucrativo pero la
      sala se divide sobre la existencia de la caja B, con los hechos probados
      incluidos por dos votos contra uno. La pieza analiza las implicaciones
      políticas sobre el partido y el Gobierno de Rajoy.
    tipo_pieza: analisis
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  # ── HITO 2: CASACIÓN TS 507/2020 (octubre 2020) ─────────────────────────────

  - id: eldiario-ts-ratifica-condena-pp-2020
    url: "https://www.eldiario.es/politica/supremo-confirma-condena-pp-caso-guertel-elimina-alusiones-caja-b_1_6287711.html"
    medio_id: eldiario-es
    titular: "El Supremo ratifica la condena al PP por lucrarse con la trama Gürtel"
    fecha_publicacion: "2020-10-14"
    resumen: >
      El Tribunal Supremo confirma en casación (sentencia 507/2020, ponente Juan Ramón
      Berdugo) la condena al PP como partícipe a título lucrativo y las penas individuales
      de la Época I, aunque elimina las referencias a la caja B del partido que la Audiencia
      Nacional había incluido en los hechos probados. Es la primera sentencia firme de la
      Época I de la trama.
    tipo_pieza: noticia
    relevancia_editorial: capital
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: eldiario-ts-financiacion-irregular-pp-2020
    url: "https://www.eldiario.es/politica/tribunal-supremo-consagra-existencia-financiacion-irregular-pp-durante-decadas_1_6293137.html"
    medio_id: eldiario-es
    titular: "El Tribunal Supremo confirma la existencia de una financiación irregular en el PP durante dos décadas"
    fecha_publicacion: "2020-10-14"
    resumen: >
      Pieza analítica de El Diario sobre el alcance doctrinal de la sentencia TS 507/2020:
      el tribunal acredita la existencia de una estructura de financiación irregular del
      PP durante al menos dos décadas, aunque matiza que su naturaleza de partícipe a
      título lucrativo —y no de acusado— limita la extensión de la declaración de hechos
      probados sobre la llamada caja B.
    tipo_pieza: analisis
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
    pieza_referenciada_id: eldiario-ts-ratifica-condena-pp-2020
    notas: "Pieza hermana del mismo medio publicada el mismo día; complementaria a la noticia, no una republicación."

  - id: confilegal-ts-confirma-gurtel-2020
    url: "https://confilegal.com/20201014-el-supremo-confirma-la-sentencia-de-la-audiencia-nacional-de-gurtel/"
    medio_id: confilegal
    titular: "El Supremo confirma la sentencia de la Audiencia Nacional de Gürtel"
    fecha_publicacion: "2020-10-14"
    resumen: >
      Cobertura jurídico-especializada de Confilegal sobre la sentencia 507/2020 del
      Tribunal Supremo que confirma en casación la sentencia de la Audiencia Nacional
      en el caso Gürtel Época I. La pieza analiza los aspectos procesales y de
      tipificación penal de la resolución, con énfasis en el tratamiento del principio
      acusatorio respecto al Partido Popular.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

