  # ── HITO 5: ABSOLUCIÓN CAMPS Y CIERRE EDITORIAL (2024-2025) ─────────────────

  - id: eldiario-absolucion-camps-2024
    url: "https://www.eldiario.es/comunitat-valenciana/audiencia-nacional-absuelve-francisco-camps-ultimo-juicio-caso-gurtel_1_11402199.html"
    medio_id: eldiario-es
    titular: "La Audiencia Nacional absuelve a Francisco Camps en el último juicio del 'caso Gürtel'"
    fecha_publicacion: "2024-05-29"
    resumen: >
      La Sección Segunda de la Sala de lo Penal de la Audiencia Nacional absuelve al
      expresidente de la Generalitat Valenciana Francisco Camps en el que se considera
      el último juicio del caso Gürtel, relativo a los contratos de la Generalitat con
      empresas del Grupo Correa. El tribunal estima que los indicios aportados son
      insuficientes para sostener los delitos de tráfico de influencias y prevaricación.
    tipo_pieza: noticia
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"

  - id: elespanol-camps-absolucion-2024
    url: "https://www.elespanol.com/valencia/20240530/gurtel-formula-francisco-camps-absuelto-todas-imputaciones-anos-investigaciones/858914405_0.html"
    medio_id: el-espanol
    titular: "Ni Gürtel ni la Fórmula 1: Francisco Camps, absuelto de todas las imputaciones tras 15 años de investigaciones"
    fecha_publicacion: "2024-05-30"
    resumen: >
      El Español repasa el historial judicial de Francisco Camps a raíz de su absolución
      en la última pieza de Gürtel: cinco imputaciones en nueve causas a lo largo de
      15 años sin una sola condena. La pieza analiza el contraste entre la relevancia
      mediática del caso y el resultado judicial final para el expresidente valenciano.
    tipo_pieza: reportaje
    relevancia_editorial: alta
    menciones: [titular, lead]
    fecha_rastreo: "2026-05-30"
