notas: |
  Fórum Filatélico S.A. es declarada responsable civil subsidiaria en la
  sentencia firme STS 688/2019 de 5 de marzo de 2020. La empresa ya fue
  declarada en concurso necesario el 22 de junio de 2006 por el Juzgado de
  lo Mercantil nº 7 de Madrid. A través del proceso concursal se canalizan
  las recuperaciones parciales de los 268.804 inversores perjudicados.
