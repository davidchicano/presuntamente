notas: |
  Condenado en sentencia firme STS 688/2019 de 5 de marzo de 2020.
  Ex director general de Fórum Filatélico S.A. Fue condenado como cómplice
  de la estafa agravada y por blanqueo de capitales, con multa de 15,9 millones
  de euros. La sentencia de la AN le impuso 2 años y 3 meses de prisión;
  el TS confirmó la condena por blanqueo.
