titulo: "STS 688/2019: Tribunal Supremo confirma la condena firme con reducción a 16 condenados"
descripcion: |
  La Sala Segunda del Tribunal Supremo, mediante sentencia 688/2019 de fecha
  5 de marzo de 2020 (recurso de casación 2891/2018, ponente Miguel Colmenero
  Menéndez de Luarca), confirma que los hechos probados constituyen un delito
  de estafa agravada en forma piramidal. Reduce el número de condenados de 20
  a 16 al absolver a 4 de los anteriores condenados por la Audiencia Nacional.
  La pena de Francisco Briones queda fijada en 11 años y 10 meses de prisión.
  La de Juan Ramón González Fernández se reduce a 3 años y 3 meses al pasar su
  participación de cooperador necesario a cómplice. La sentencia es firme y
  pone punto final al procedimiento penal. La responsabilidad civil queda
  fijada por el total de las cantidades entregadas a Fórum por los inversores,
  minoradas en lo recuperado en el proceso concursal, excluidos los intereses
  no pagados.
