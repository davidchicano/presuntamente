titulo: "Auto de procesamiento de 32 acusados por perjuicio de 3.702 millones de euros"
descripcion: |
  El magistrado Pablo Ruz, titular del Juzgado Central de Instrucción nº 5,
  dicta auto de procesamiento contra 32 personas como responsables del fraude
  de Fórum Filatélico S.A. Los procesa por los delitos de estafa continuada
  agravada, falseamiento de cuentas anuales, insolvencia punible y blanqueo
  de capitales. El auto cuantifica el perjuicio a los 269.203 inversores en
  3.702 millones de euros. Impone una fianza de responsabilidad civil de la
  misma cuantía a 22 de los 32 procesados. La condición de procesado no implica
  valoración de culpabilidad; rige la presunción de inocencia.
