titulo: "Intervención judicial de Fórum Filatélico en la «Operación Atrio»"
descripcion: |
  El 9 de mayo de 2006, por orden del Juzgado Central de Instrucción nº 5
  de la Audiencia Nacional (entonces a cargo del magistrado Baltasar Garzón),
  la Policía Nacional interviene simultáneamente las sedes de Fórum Filatélico
  S.A. y Afinsa Bienes Tangibles S.A. en la denominada «Operación Atrio», en
  el marco de las Diligencias Previas 148/2006. La Fiscalía Anticorrupción
  había impulsado la investigación al detectar indicios de que ambas empresas
  operaban como esquemas piramidales. La intervención supone el inicio del
  procedimiento penal y el cese de la actividad de captación de ahorro.
