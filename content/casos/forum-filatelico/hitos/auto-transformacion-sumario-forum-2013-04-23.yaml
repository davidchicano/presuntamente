titulo: "Auto de transformación a Sumario nº 3/2013"
descripcion: |
  El Juzgado Central de Instrucción nº 5 de la Audiencia Nacional, en este
  período a cargo del magistrado Pablo Ruz, dicta el auto de transformación
  de las Diligencias Previas 148/2006 en Sumario nº 3/2013. El auto acredita
  que la instrucción, que ha abarcado más de 500.000 páginas de documentación
  y 115 comisiones rogatorias a 25 países, está en condiciones de pasar a la
  fase de juicio oral.
