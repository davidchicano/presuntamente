titulo: "Inicio del juicio oral ante la Sección Primera de la Sala de lo Penal de la Audiencia Nacional"
descripcion: |
  El 18 de septiembre de 2017, once años después de la intervención policial,
  comienza el juicio oral del caso Fórum Filatélico ante la Sección Primera
  de la Sala de lo Penal de la Audiencia Nacional. En el banquillo se sientan
  27 acusados. La acusación popular ejercida por ADICAE solicita penas que en
  conjunto suman 195 años de prisión. La vista oral se prolonga hasta el 15 de
  abril de 2018, con numerosas sesiones que incluyen la práctica de prueba
  pericial y testifical.
