importe_nota: >-
  Perjuicio total cuantificado por la administración concursal: créditos
  reconocidos a 268.804 titulares de 269.570 contratos filatélicos por importe
  de 3.707.127.583 euros (capital más intereses pactados). El déficit
  patrimonial establecido por la administración concursal es de 2.843.503.812
  euros. La STS 688/2019 fija la responsabilidad civil penal como el total de
  cantidades entregadas, minoradas en lo recuperado en el concurso, sin incluir
  los intereses no abonados.
