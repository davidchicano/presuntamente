id: ff-esquema-piramidal-captacion
caso_id: forum-filatelico
enunciado: |
  La Sala de lo Penal del Tribunal Supremo declara probado, en su sentencia
  688/2019 de 5 de marzo de 2020, que Fórum Filatélico S.A. operó durante años
  un esquema de captación de ahorro mediante el que los inversores suscribían
  contratos de compraventa de sellos con garantía de recompra y rentabilidades
  superiores a las bancarias. Según el Alto Tribunal, los inversores desconocían
  que los sellos adquiridos no valían ni una pequeña parte del dinero que
  entregaban, que no se revalorizaban, y que el pago de rendimientos a los
  inversores anteriores se financiaba exclusivamente con las aportaciones de
  nuevos clientes —mecanismo constitutivo de la estafa piramidal—. El tribunal
  califica los hechos de «paradigma de las estafas piramidales».
tipo: atribuido
# Candidato a 'acreditado': la STS 688/2019 firme declara hechos probados. Pendiente revisión humana antes de promover según guardarraíl V-04.
