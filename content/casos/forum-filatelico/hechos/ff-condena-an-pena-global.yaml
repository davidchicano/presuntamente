id: ff-condena-an-pena-global
caso_id: forum-filatelico
enunciado: |
  La sentencia de la Sección Primera de la Sala de lo Penal de la Audiencia
  Nacional de 13 de julio de 2018 condena a 20 de los 27 acusados en el juicio
  oral del caso Fórum Filatélico. Los cuatro miembros del Consejo de
  Administración son absueltos. Las penas para los condenados distintos de
  Francisco Briones oscilan entre 6 meses y 6 años y 3 meses de prisión, con
  multas de hasta 63,5 millones de euros para algunos de ellos.
  La acusación popular de ADICAE había solicitado penas que en conjunto
  sumaban 195 años de prisión.
tipo: atribuido
