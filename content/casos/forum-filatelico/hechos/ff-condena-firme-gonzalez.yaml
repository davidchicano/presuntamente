id: ff-condena-firme-gonzalez
caso_id: forum-filatelico
enunciado: |
  La STS 688/2019 de 5 de marzo de 2020 reduce la condena a Juan Ramón
  González Fernández de 6 años y 3 meses (impuesta por la Audiencia Nacional)
  a 3 años y 3 meses de prisión, al requalificar su participación de cooperador
  necesario a cómplice en el delito de estafa agravada y blanqueo de capitales.
  Se le mantiene la multa de 15,9 millones de euros y la responsabilidad civil
  solidaria. La condena es firme.
