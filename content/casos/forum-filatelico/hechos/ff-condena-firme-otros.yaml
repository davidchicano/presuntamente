id: ff-condena-firme-otros
caso_id: forum-filatelico
enunciado: |
  La STS 688/2019 de 5 de marzo de 2020 confirma un total de 16 condenas
  firmes —cuatro menos que las 20 dictadas por la Audiencia Nacional, al
  absolver a cuatro condenados en primera instancia por falta de prueba
  suficiente— con penas que oscilan entre 6 meses y 11 años y 10 meses de
  prisión. Entre los confirmados se encuentra Antonio Merino (exdirector
  general, condenado por blanqueo de capitales). El Supremo confirma asimismo
  la condena de los dos auditores externos por falseamiento de cuentas
  societarias (1 y 2 años respectivamente).
tipo: atribuido
# Candidato a 'acreditado': STS 688/2019 es firme. Pendiente revisión humana para todos los condenados.
