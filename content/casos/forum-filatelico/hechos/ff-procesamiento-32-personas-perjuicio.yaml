id: ff-procesamiento-32-personas-perjuicio
caso_id: forum-filatelico
enunciado: |
  El juez Pablo Ruz, titular del Juzgado Central de Instrucción nº 5 de la
  Audiencia Nacional, dicta auto de procesamiento el 8 de octubre de 2014
  contra 32 personas como responsables, a diferentes grados, del fraude
  de Fórum Filatélico S.A. El auto los procesa por los delitos de estafa
  continuada agravada, falseamiento de cuentas anuales, insolvencia punible
  y blanqueo de capitales, y cuantifica el perjuicio a los 269.203 inversores
  en 3.702 millones de euros. La instrucción ha abarcado más de 500.000
  páginas de documentación y 115 comisiones rogatorias a 25 países, incluyendo
  investigación de un complejo entramado de sociedades pantalla internacionales
  utilizadas para inflar las valoraciones de los sellos.
