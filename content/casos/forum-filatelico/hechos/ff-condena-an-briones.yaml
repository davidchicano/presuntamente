id: ff-condena-an-briones
caso_id: forum-filatelico
enunciado: |
  La Sección Primera de la Sala de lo Penal de la Audiencia Nacional condena
  en su sentencia de 13 de julio de 2018 a Francisco Briones Nieto,
  expresidente de Fórum Filatélico S.A., a la pena de 12 años, 4 meses y
  16 días de prisión por un concurso de delitos de estafa agravada continuada,
  insolvencia punible, falseamiento de cuentas anuales y blanqueo de capitales.
  Se le impone además una multa de 49,7 millones de euros e inhabilitación
  especial para el ejercicio del derecho de sufragio pasivo y para la
  administración de sociedades. La sentencia es recurrible en casación.
tipo: atribuido
# Candidato a 'acreditado' cuando se promueva la STS 688/2019 que la confirma (con ajuste de pena). Pendiente revisión humana.
