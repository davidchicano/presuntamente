id: ff-condena-firme-briones
caso_id: forum-filatelico
enunciado: |
  La Sala Segunda del Tribunal Supremo, en sentencia 688/2019 de 5 de marzo
  de 2020 (recurso de casación 2891/2018, ponente Miguel Colmenero Menéndez
  de Luarca), confirma la condena a Francisco Briones Nieto, expresidente de
  Fórum Filatélico S.A., modificando ligeramente la pena de la Audiencia
  Nacional y fijándola en 11 años y 10 meses de prisión más multa de
  49,7 millones de euros, por los delitos de estafa agravada continuada en
  concurso con insolvencia punible, falseamiento de cuentas anuales continuado
  y blanqueo de capitales. La sentencia es firme.
tipo: atribuido
# Candidato a 'acreditado': STS 688/2019 es sentencia firme; los hechos de condena son probados. Pendiente revisión humana explícita (guardarraíl V-04).
