id: ff-perjuicio-civil
caso_id: forum-filatelico
enunciado: |
  La sentencia de la Audiencia Nacional de 13 de julio de 2018, confirmada por
  el Tribunal Supremo el 5 de marzo de 2020, declara responsables civiles
  solidarios a Francisco Briones, Juan Ramón González Fernández y, de forma
  subsidiaria, a Fórum Filatélico S.A., por el total de las cantidades
  entregadas por los 190.022 titulares de los 269.570 contratos filatélicos
  reconocidos en el proceso concursal, minoradas en lo ya recuperado a través
  de dicho proceso, y con exclusión de los intereses pactados no satisfechos.
  La Administración Concursal del Juzgado de lo Mercantil nº 7 de Madrid había
  cuantificado el déficit patrimonial de Fórum Filatélico S.A. en
  2.843.503.812 euros, con créditos reconocidos por 3.707.127.583 euros.
tipo: atribuido
# Candidato a 'acreditado' por ser consecuencia declarada en STS firme. Pendiente revisión humana.
