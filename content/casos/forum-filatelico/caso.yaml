resumen_cifras: |
  El perjuicio patrimonial cuantificado por la administración concursal
  asciende a 3.707 millones de euros (capital más intereses pactados
  reconocidos a los 268.804 titulares de contratos filatélicos) frente
  a un déficit patrimonial de 2.843 millones. La responsabilidad civil
  penal impuesta en la sentencia firme del Tribunal Supremo (STS 688/2019)
  recae solidariamente sobre los condenados por la totalidad de las
  cantidades entregadas por los inversores, minoradas en lo recuperado
  por el proceso concursal. La estimación de las pérdidas totales del
  conjunto del esquema filatélico (Fórum más Afinsa) que circula en prensa
  —en torno a 5.000 millones de euros— es una agregación periodística de
  ambas causas, no una cifra de un documento judicial único.

