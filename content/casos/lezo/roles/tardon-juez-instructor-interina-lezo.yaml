notas: |
  Magistrada titular del Juzgado Central de Instrucción nº 3 de
  la Audiencia Nacional que asumió interinamente las causas
  pendientes del Juzgado Central de Instrucción nº 6, incluido
  el procedimiento Lezo, tras la jubilación forzosa por edad
  del titular Manuel María García-Castellón García-Lomas con
  efectos del 2 de septiembre de 2024 (BOE-A-2024-17653). El
  rol interino se cierra el 8 de enero de 2025 con la toma de
  posesión del nuevo titular del JCI nº 6, Antonio Piña Alonso,
  destinado a la plaza por Real Decreto 1271/2024
  (BOE-A-2025-350). Durante el periodo interino la magistrada
  Tardón mantuvo la dirección de las macrocausas pendientes
  hasta el cambio efectivo de instructor.
