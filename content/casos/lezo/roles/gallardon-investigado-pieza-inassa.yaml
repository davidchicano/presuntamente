notas: |
  Alberto Ruiz-Gallardón Jiménez fue citado como investigado en
  la pieza Inassa del caso Lezo el 26 de abril de 2018 por la
  presuntamente fraudulenta compra en 2001 por el Canal de
  Isabel II del setenta y cinco por ciento de la sociedad
  colombiana Inassa por unos setenta y tres millones de
  dólares, operación ejecutada durante su mandato como
  presidente del Gobierno de la Comunidad de Madrid
  (1995-2003). La fecha exacta del hito de imputación
  específico se ha modelado conservadoramente apuntando al
  hito de origen del procedimiento (la operación UCO de
  19-abr-2017) como aproximación hasta localizar el auto
  específico de imputación. El rol se cierra el 30 de mayo de
  2019 con el sobreseimiento provisional acordado por el
  magistrado instructor a petición del Ministerio Fiscal. La
  condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia.
