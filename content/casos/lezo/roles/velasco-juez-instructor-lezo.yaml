notas: |
  Magistrado titular del Juzgado Central de Instrucción nº 6 de
  la Audiencia Nacional al momento de coordinar con la Unidad
  Central Operativa de la Guardia Civil la operación policial
  del 19 de abril de 2017 que abrió el procedimiento Lezo.
  Tres días después, el 22 de abril de 2017, dictó auto de
  prisión provisional incondicional sin fianza para Ignacio
  González González y de prisión eludible con fianza de cien
  mil euros para Ildefonso de Miguel Rodríguez. Cesó como
  titular del JCI nº 6 a finales de junio de 2017 al ascender
  por concurso a la Sala de Apelaciones de la Audiencia
  Nacional, dejando la instrucción del procedimiento Lezo en
  manos del magistrado Manuel María García-Castellón
  García-Lomas. La modelación del rol cubre exclusivamente el
  periodo de instrucción del caso Lezo bajo su titularidad
  formal, no su trayectoria previa al frente del JCI nº 6.
