notas: |
  Magistrado titular del Juzgado Central de Instrucción nº 6 de
  la Audiencia Nacional desde julio de 2017 (en sucesión del
  anterior titular Eloy Velasco) hasta el 2 de septiembre de
  2024 (jubilación forzosa por edad declarada por Acuerdo de la
  Comisión Permanente del Consejo General del Poder Judicial
  publicado en BOE-A-2024-17653). Instructor formal del
  procedimiento Lezo durante todo ese periodo. Dictó, entre
  otras resoluciones, el auto de procesamiento de 18 de
  noviembre de 2019 que propuso sentar en el banquillo a
  Ignacio González y a otros seis investigados en la pieza
  Emissao y el auto de apertura de juicio oral de la pieza del
  campo de golf en agosto de 2021. Entre la jubilación de
  García-Castellón y la incorporación efectiva de su sucesor,
  las causas pendientes del JCI nº 6 fueron asumidas
  interinamente por la magistrada María Tardón, titular del
  Juzgado Central de Instrucción nº 3.
