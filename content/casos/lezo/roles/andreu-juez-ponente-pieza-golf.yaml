notas: |
  Magistrado de la Sección Segunda de la Sala de lo Penal de la
  Audiencia Nacional designado ponente del juicio oral de la
  pieza relativa a las adjudicaciones del campo de golf del
  Canal de Isabel II del caso Lezo, señalado entre el 13 y el
  30 de septiembre de 2027. La fecha de inicio del rol se ha
  fijado en la del señalamiento del juicio oral por la propia
  Sección Segunda (22 de diciembre de 2025); el cargo de
  ponente cubre la fase de juicio oral, deliberación y
  sentencia.
