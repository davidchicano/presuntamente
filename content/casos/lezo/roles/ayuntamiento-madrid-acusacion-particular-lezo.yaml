notas: |
  El Ayuntamiento de Madrid se personó como acusación particular
  en el procedimiento Lezo bajo la alcaldía de Manuela Carmena
  por su condición de entidad partícipe históricamente en la
  empresa pública Canal de Isabel II junto con la Comunidad de
  Madrid, perjudicada por las adjudicaciones controvertidas. La
  personación fue aceptada por el titular del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional. La fecha exacta
  de admisión de la personación se ha estimado conservadoramente
  en septiembre de 2017 conforme a la cobertura periodística
  disponible y queda pendiente de confirmación con el auto de
  admisión específico.
