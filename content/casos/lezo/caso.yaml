    justificacion: >-
      Los actos presuntamente irregulares investigados en las distintas piezas
      de la causa se atribuyen a la gestión de la empresa pública Canal de
      Isabel II durante los gobiernos del Partido Popular en la Comunidad de
      Madrid (mandatos de Esperanza Aguirre, Ignacio González y Cristina
      Cifuentes, 2003-2017).
  - partido_id: partido-popular
    tipo_afectacion: imputacion_a_cargo_del_partido
    justificacion: >-
      Ignacio González, procesado en varias piezas de la causa, fue
      Vicepresidente y Presidente de la Comunidad de Madrid por el Partido
      Popular (2003-2015). Pedro Calvo Poch y Juan Bravo Rivera, también
      procesados en la pieza Inassa, fueron consejeros del gobierno autonómico
      del PP en la Comunidad de Madrid.

