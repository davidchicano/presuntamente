# Caso Lezo — versión consolidada tras PR1-PR7 (sesión 23-24 may 2026).
#
# Macrocausa por presunta corrupción en la gestión de la empresa pública
# Canal de Isabel II durante los gobiernos del Partido Popular en la
# Comunidad de Madrid (mandatos de Esperanza Aguirre, Ignacio González y
# Cristina Cifuentes). Instruida por el Juzgado Central de Instrucción
# nº 6 de la Audiencia Nacional. Sucesivamente titular del juzgado el
# magistrado Eloy Velasco (titular de la plaza hasta junio de 2017),
# Manuel María García-Castellón García-Lomas (julio de 2017 a 2 de
# septiembre de 2024) y Antonio Piña Alonso (desde el 8 de enero de
# 2025 por destino acordado en concurso resuelto por la Comisión
# Permanente del Consejo General del Poder Judicial). La operación
# policial de la Unidad Central Operativa (UCO) de la Guardia Civil
# del 19 de abril de 2017 supuso la detención del entonces senador y
# ex presidente de la Comunidad de Madrid Ignacio González y de una
# docena de personas más. La causa se ramifica en seis piezas
# documentadas en el inventario: (1) pieza del campo de golf del
# Canal de Isabel II, con juicio oral señalado para el 13 al 30 de
# septiembre de 2027 ante la Sección Segunda de la Sala de lo Penal
# de la Audiencia Nacional; (2) pieza Inassa (compra de la sociedad
# colombiana en 2001), con vista oral iniciada el 24 de mayo de 2023
# ante la misma Sección Segunda; (3) pieza Emissao (compra de la
# sociedad brasileña en 2013), con auto de procesamiento del 18 de
# noviembre de 2019 pendiente de señalamiento de juicio oral; (4)
# pieza separada nº 3 sobre el tren ligero Móstoles
# Central-Navalcarnero (adjudicación de 2007), con auto de apertura
# del juicio oral del 4 de junio de 2021 y señalamiento de fecha
# pendiente; (5) rama Ruiz-Gallardón de la pieza Inassa, archivada
# por auto del 30 de mayo de 2019; y (6) caso conexo modelado como
# `Caso` propio del ático de Estepona, vinculado a Lezo por
# `RelacionEntreCasos conexion_factual`. La regla de presunción de
# inocencia rige en todas las piezas no firmes.

