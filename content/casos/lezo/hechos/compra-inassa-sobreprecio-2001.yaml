id: compra-inassa-sobreprecio-2001
caso_id: lezo
enunciado: |
  La Fiscalía Anticorrupción atribuye en su escrito de calificación
  provisional de la pieza Inassa que en el año 2001, en el marco
  de la denominada «expansión internacional» del Canal de Isabel
  II promovida por el entonces gobierno de la Comunidad de Madrid
  presidido por Alberto Ruiz-Gallardón, se adquirió el setenta y
  cinco por ciento de la sociedad colombiana Inassa
  (Interamericana de Aguas y Servicios S.A.) por un total
  próximo a setenta y tres millones de dólares articulados a
  través de la sociedad panameña Aguas de América (SAA). La
  Fiscalía considera que la operación incurrió en sobreprecio y
  en la inclusión de activos no autorizados ni valorados que no
  reportaron beneficio al erario público madrileño, y cuantifica
  el perjuicio patrimonial cuya responsabilidad civil reclama
  conjunta y solidariamente a los veintidós procesados en torno
  a diecinueve millones de euros. La condición de procesados no
  implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
