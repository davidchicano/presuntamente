importe_nota: >-
  Perjuicio patrimonial por el sobreprecio abonado en la compra del 75% de
  Inassa, cuantificado por la Fiscalía Anticorrupción en torno a 19 M€ y
  reclamado conjunta y solidariamente a los 22 procesados de la pieza. La compra
  se articuló por unos 73 M USD vía la sociedad panameña Aguas de América (cifra
  en dólares, no estructurada aquí).
