id: prision-preventiva-gonzalez-velasco
caso_id: lezo
enunciado: |
  Tres días después de su detención por la Unidad Central
  Operativa de la Guardia Civil, el ex presidente de la Comunidad
  de Madrid Ignacio González González ingresó en prisión
  provisional incondicional sin fianza por auto del titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  Eloy Velasco del 22 de abril de 2017, al apreciarse
  indiciariamente su papel directivo en los actos investigados en la causa y
  riesgo de destrucción de pruebas y de reiteración delictiva. La
  medida cautelar permaneció vigente hasta la libertad bajo
  fianza posterior decretada por el sucesivo titular del juzgado
  Manuel García-Castellón. La adopción de medidas cautelares no
  implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
