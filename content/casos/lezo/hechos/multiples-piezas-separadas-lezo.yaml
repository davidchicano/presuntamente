id: multiples-piezas-separadas-lezo
caso_id: lezo
enunciado: |
  El procedimiento Lezo se ramifica en varias piezas separadas
  que se encuentran en distintas fases procesales. La pieza
  relativa a las adjudicaciones del campo de golf del Canal de
  Isabel II tiene auto de apertura de juicio oral dictado por el
  Juzgado Central de Instrucción nº 6 en agosto de 2021 y juicio
  oral señalado entre el 13 y el 30 de septiembre de 2027 ante
  la Sección Segunda de la Sala de lo Penal de la Audiencia
  Nacional. La pieza Emissao, relativa a la compra en 2013 por el
  Canal de Isabel II de la sociedad brasileña del mismo nombre
  por unos treinta millones de dólares, tiene auto de
  procesamiento de 18 de noviembre de 2019 que sienta en el
  banquillo a Ignacio González, Edmundo Rodríguez Sobrino y
  otros cinco investigados, con peticiones de pena por la
  Fiscalía Anticorrupción de hasta ocho años de prisión y
  diecinueve años de inhabilitación para el ex presidente. La
  pieza Inassa, sobre la compra en 2001 de la sociedad colombiana
  Inassa por el Canal de Isabel II por presunto sobreprecio,
  inició su vista oral ante la Sección Segunda de la Sala de lo
  Penal de la Audiencia Nacional el 24 de mayo de 2023, con
  veintidós procesados según cobertura periodística, y se
  encuentra pendiente de sentencia. Otras piezas (ático Estepona,
  Ruiz-Gallardón) fueron archivadas judicialmente. La regla de
  presunción de inocencia rige en todas las piezas no firmes.
