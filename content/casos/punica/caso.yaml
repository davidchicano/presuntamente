# Caso Púnica — versión inicial modelada el 2026-05-29/30.
#
# Macrocausa por presunta corrupción en adjudicaciones públicas en la
# Comunidad de Madrid, Valencia, Murcia y León articulada por el
# empresario David Marjaliza Torres y el ex consejero y ex secretario
# general del Partido Popular de Madrid Francisco Granados Lerena,
# entre otros. Instruida por el Juzgado Central de Instrucción nº 6 de
# la Audiencia Nacional. La operación policial de la Unidad Central
# Operativa de la Guardia Civil del 27 de octubre de 2014 («Operación
# Púnica») supuso la detención de medio centenar de personas. La causa
# se articula como macrocausa con numerosas piezas separadas; las mejor
# documentadas son la pieza de los contratos de eficiencia energética
# adjudicados a Cofely España (sentencia AN 22-dic-2025, no firme,
# 29 condenados) y la pieza de presuntas adjudicaciones irregulares de
# suelo y obra pública entre 2003 y 2011 (auto de apertura de juicio
# oral 21-may-2026, con 41 acusados encabezados por Francisco Granados).
# Granados fue ya condenado con sentencia firme del Tribunal Supremo
# (14-mar-2019) en la pieza de la filtración de la investigación.
# La pieza de presunta financiación irregular del PP de Madrid fue
# archivada en octubre de 2022, confirmándose el archivo por la AN.

id: punica
nombre_oficial: "Procedimiento Abreviado 91/2016 — Audiencia Nacional (caso Púnica, instruido por el Juzgado Central de Instrucción nº 6)"
nombre_mediatico: "Caso Púnica"
nombres_alternativos:
  - "Operación Púnica"
  - "Trama Púnica"

descripcion_corta: |
  Macrocausa ante el Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional sobre una presunta red de adjudicaciones públicas
  irregulares en la Comunidad de Madrid y otras comunidades, articulada
  presuntamente por el empresario David Marjaliza Torres y el ex
  consejero y ex secretario general del PP de Madrid Francisco Granados
  Lerena. La «Operación Púnica» de octubre de 2014 supuso la detención
  de medio centenar de personas. La causa se ramificó en numerosas
  piezas; la pieza de eficiencia energética (contratos adjudicados
  presuntamente de forma amañada a Cofely España) se saldó con
  sentencia de la Audiencia Nacional de 22 de diciembre de 2025
  (no firme) que condenó a 29 personas, incluido Marjaliza (8 años y 2
  meses de prisión). Francisco Granados ya cumplió condena firme de dos
  años de prisión por la filtración de la investigación (sentencia firme
  del Tribunal Supremo de 14 de marzo de 2019). En mayo de 2026 el
  instructor Antonio Piña dictó auto de apertura de juicio oral en la
  pieza de adjudicaciones de suelo y obra pública contra Granados y
  otras cuarenta personas, con petición de la Fiscalía de cuarenta y
  dos años de prisión para Granados. La pieza de presunta financiación
  irregular del PP de Madrid fue archivada en octubre de 2022. Rige la
  presunción de inocencia en todas las piezas no concluidas con
  sentencia firme.

sintesis_caso:
  que_se_investiga: "Una presunta red de adjudicaciones públicas irregulares en la Comunidad de Madrid y otras comunidades autónomas, articulada a cambio de comisiones y vinculada a cargos del Partido Popular de Madrid."
  hechos_clave:
    - "La «Operación Púnica» de la UCO (27-oct-2014) supuso la detención de medio centenar de personas, entre ellas Francisco Granados y David Marjaliza, siendo instructor el magistrado Eloy Velasco."
    - "La Audiencia Nacional condenó el 22 de diciembre de 2025 (no firme) a 29 personas en la pieza de los contratos de eficiencia energética adjudicados a Cofely España, incluido Marjaliza a 8 años y 2 meses de prisión."
    - "El Tribunal Supremo confirmó el 14 de marzo de 2019 la condena firme de dos años de prisión a Francisco Granados por la filtración de la investigación."
    - "En mayo de 2026 el instructor Antonio Piña dictó auto de apertura de juicio oral en la pieza de suelo y obra pública contra Granados y cuarenta personas más, con petición de 42 años de la Fiscalía."
  estado_actual: "Múltiples piezas en fases distintas: pieza Cofely en recurso de casación (sentencia AN dic-2025, no firme); pieza de suelo y obra pública con juicio oral pendiente de señalamiento; pieza de financiación PP archivada definitivamente en 2022; pieza de la filtración con condena firme de Granados desde 2019."
  cifras_clave:
    - "224 M€: volumen de contratos de eficiencia energética adjudicados presuntamente de forma amañada a Cofely (pieza Cofely)"
    - "Más de 3,5 M€ de multa a Cofely España como persona jurídica (sentencia AN dic-2025, no firme)"
    - "42 años de prisión: petición de la Fiscalía para Francisco Granados en la pieza de suelo y obra pública (2026)"
    - "2 años de prisión (firme): condena de Francisco Granados por la filtración de la investigación (TS, mar-2019)"

