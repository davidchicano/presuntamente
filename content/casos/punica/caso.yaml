resumen_cifras: |
  La pieza de los contratos de eficiencia energética adjudicados a
  Cofely España es la más avanzada con resultado conocido: la sentencia
  de la Audiencia Nacional de 22 de diciembre de 2025 (no firme, cabe
  casación) fija en torno a 224 millones de euros el volumen de
  contratos adjudicados presuntamente de forma amañada entre 2012 y
  2014, e impone a Cofely España como persona jurídica una multa
  superior a 3,5 millones de euros. Las comisiones presuntamente
  pagadas a intermediarios suman en torno a 2 millones de euros
  conforme a lo confesado, según la misma sentencia. En la pieza de
  adjudicaciones de suelo y obra pública (auto de apertura de juicio
  oral de 21 de mayo de 2026), la Fiscalía Especial solicita cuarenta
  y dos años de prisión para Francisco Granados, a quien se atribuyen
  presuntamente los delitos más graves. Las cifras globales de la
  macrocausa que circulan en la prensa son agregaciones por toda las
  piezas y no proceden de un único documento oficial; se citan sólo
  los importes verificados pieza por pieza.

