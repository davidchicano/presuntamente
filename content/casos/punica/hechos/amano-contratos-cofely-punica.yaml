  - documento_id: eldiario-condena-cofely-punica-2025-12-22
  - documento_id: infobae-condena-cofely-punica-2025-12-22
nivel_fuente_efectivo: 1
importe: 224000000
importe_moneda: EUR
importe_alcance: total_caso
importe_clase: objeto
importe_naturaleza: objeto_contrato
importe_nota: |
  Volumen de los contratos amañados en la pieza Cofely según la
  sentencia de la AN de 22-dic-2025 (cifra recogida por la cobertura
  cruzada de Infobae y otras cabeceras). Es el objeto del contrato de
  esta pieza, no un perjuicio ni una cantidad percibida por persona
  alguna; no se suma con la multa (consecuencia) ni con las comisiones
  (componente del mismo objeto).
importe_atribucion:
  - sujeto_tipo: organizacion
    sujeto: cofely-espana
    papel: activo
    nota: |
      Cofely España es la empresa adjudicataria de los contratos
      cuyo amaño se declara probado en la pieza; `activo` no afirma
      que percibiera el total como beneficio, sino que es el sujeto
      a cuya conducta se atribuye el hecho económico.
