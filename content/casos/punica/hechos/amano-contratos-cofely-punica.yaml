id: amano-contratos-cofely-punica
caso_id: punica
enunciado: |
  Según la sentencia de la Audiencia Nacional de 22 de diciembre de
  2025 (no firme), entre marzo de 2012 y octubre de 2014 se amañaron
  en favor de la empresa Cofely España contratos de eficiencia
  energética adjudicados por ayuntamientos de la Comunidad de Madrid
  por un volumen aproximado de 224 millones de euros, mediante la
  participación de la empresa en la confección de los pliegos y la
  manipulación de los criterios de valoración a cambio del pago de
  comisiones a cargos y funcionarios. El tribunal considera probado
  este amaño respecto de los condenados; rige la presunción de
  inocencia mientras la sentencia no sea firme.
tipo: atribuido
fecha_o_periodo:
  desde: "2012-03-01"
  hasta: "2014-10-31"
  precision: rango
personas_implicadas:
  - david-marjaliza
organizaciones_implicadas:
  - cofely-espana
  - comunidad-de-madrid
documentos_respaldo:
