id: peticion-pena-granados-pieza8-punica
caso_id: punica
enunciado: |
  En el auto de apertura de juicio oral de 21 de mayo de 2026 de la
  pieza relativa a presuntas adjudicaciones irregulares de suelo y
  obra pública entre 2003 y 2011, la Fiscalía Especial contra la
  Corrupción y la Criminalidad Organizada solicita cuarenta y dos
  años de prisión para Francisco Granados Lerena por presuntos
  delitos de prevaricación administrativa, cohecho, tráfico de
  influencias, malversación de caudales públicos, fraude a las
  administraciones públicas y falsedad documental. Se trata de una
  petición de pena no firme formulada por la acusación; rige la
  presunción de inocencia.
