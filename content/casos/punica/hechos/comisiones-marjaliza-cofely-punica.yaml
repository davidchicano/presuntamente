id: comisiones-marjaliza-cofely-punica
caso_id: punica
enunciado: |
  Según la sentencia de la Audiencia Nacional de 22 de diciembre de
  2025 (no firme), Cofely España habría acordado con el empresario
  David Marjaliza el pago por su labor de intermediación de una cuota
  fija de 1.500 euros mensuales más una parte variable de hasta
  155.000 euros, en el marco de un sistema de comisiones presuntamente
  ilícitas que el tribunal cifra, en su conjunto y en lo confesado,
  en torno a dos millones de euros. Rige la presunción de inocencia
  mientras la sentencia no sea firme.
tipo: atribuido
fecha_o_periodo:
  desde: "2012-03-01"
  hasta: "2014-10-31"
  precision: rango
