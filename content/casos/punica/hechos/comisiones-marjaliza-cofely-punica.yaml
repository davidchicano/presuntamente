  - documento_id: eldiario-condena-cofely-punica-2025-12-22
  - documento_id: publico-marjaliza-conformidad-punica-2025-12
nivel_fuente_efectivo: 1
importe: 2000000
importe_moneda: EUR
importe_alcance: componente
importe_clase: objeto
importe_naturaleza: comision_ilicita
importe_nota: |
  Comisiones confesas próximas a los 2 M€ según la sentencia de la
  pieza Cofely. Es un componente del objeto de esta pieza (no se suma
  al volumen de contratos de 224 M€, que ya contabiliza el objeto
  total, ni a la multa, que es consecuencia). El acuerdo concreto con
  Marjaliza (1.500 €/mes + hasta 155.000 € variable) es una parte de
  ese sistema de comisiones.
