notas: |
  Tras la detención del 27 de octubre de 2014 en el marco de la
  Operación Púnica, Francisco Granados Lerena adquirió la condición
  procesal de investigado en las diligencias instruidas por el
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional. Esta
  condición de investigado se refiere a la macrocausa y a las piezas
  no concluidas; su trayectoria procesal posterior varía por pieza
  (condena firme en la pieza de la filtración; acusado en la pieza de
  adjudicaciones de suelo y obra pública). La condición de
  investigado no implica valoración de culpabilidad: rige la
  presunción de inocencia.
