notas: |
  La Comunidad de Madrid y sus administraciones locales figuran entre
  las administraciones presuntamente perjudicadas por las
  adjudicaciones y contratos investigados en la macrocausa. La
  determinación del perjuicio concreto y de la responsabilidad civil
  corresponde a cada pieza; rige la presunción de inocencia respecto
  de los investigados y condenados no firmes.
