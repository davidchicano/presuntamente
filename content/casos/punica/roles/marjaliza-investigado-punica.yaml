notas: |
  Tras la detención del 27 de octubre de 2014 en el marco de la
  Operación Púnica, David Marjaliza Torres adquirió la condición
  procesal de investigado en las diligencias instruidas por el
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional.
  Durante la instrucción mantuvo una posición de colaboración con la
  Justicia. El rol se da por cerrado en la pieza Cofely con la
  sentencia de 22 de diciembre de 2025, que da paso al rol
  consecutivo de condenado no firme en esa pieza. La condición de
  investigado no implica valoración de culpabilidad: rige la
  presunción de inocencia.
