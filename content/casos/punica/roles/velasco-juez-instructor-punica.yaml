notas: |
  El magistrado Eloy Velasco Núñez, titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional, instruyó la causa desde
  su incoación en 2014, ordenó la operación policial de 27 de octubre
  de 2014 y dirigió la primera fase de la instrucción hasta su
  ascenso a la Sala de Apelaciones de la Audiencia Nacional en junio
  de 2017.
