notas: |
  El magistrado Antonio Piña Alonso instruye la causa Púnica como
  titular del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional desde el 8 de enero de 2025. El 21 de mayo de 2026 dictó
  el auto de apertura de juicio oral de la pieza relativa a presuntas
  adjudicaciones de suelo y obra pública contra Francisco Granados y
  otras cuarenta personas.
