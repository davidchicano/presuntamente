notas: |
  El magistrado Manuel María García-Castellón García-Lomas instruyó
  la causa Púnica como titular del Juzgado Central de Instrucción nº 6
  desde julio de 2017 hasta su jubilación forzosa por edad el 2 de
  septiembre de 2024. Durante su etapa acordó la transformación de la
  causa en procedimiento abreviado en distintas piezas y el archivo
  de la pieza de presunta financiación irregular del PP de Madrid.
