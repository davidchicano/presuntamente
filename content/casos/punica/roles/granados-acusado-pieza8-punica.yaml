notas: |
  En la pieza relativa a presuntas adjudicaciones irregulares de
  suelo y obra pública entre 2003 y 2011, Francisco Granados adquirió
  la condición de acusado con el auto de apertura de juicio oral
  dictado por el instructor Antonio Piña el 21 de mayo de 2026. La
  Fiscalía Anticorrupción solicita para él cuarenta y dos años de
  prisión, petición de pena no firme. Rige la presunción de
  inocencia mientras no recaiga sentencia firme en contrario.
