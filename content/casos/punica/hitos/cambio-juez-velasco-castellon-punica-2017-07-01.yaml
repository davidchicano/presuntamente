titulo: "Manuel García-Castellón sucede a Eloy Velasco como titular del Juzgado Central de Instrucción nº 6 y asume la instrucción de Púnica"
descripcion: |
  En junio de 2017 el magistrado Eloy Velasco cesa como titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional al
  ascender por concurso a la Sala de Apelaciones de la Audiencia
  Nacional, de reciente creación. La titularidad del juzgado y la
  instrucción de las macrocausas Púnica y Lezo, entre otras, las
  asume el magistrado Manuel María García-Castellón García-Lomas,
  que continuará al frente de la instrucción hasta su jubilación
  forzosa por edad en septiembre de 2024.
