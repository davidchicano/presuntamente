titulo: "La Audiencia Nacional confirma el archivo de Esperanza Aguirre, Ignacio González y varios exconsejeros en la pieza de Púnica sobre presunta financiación irregular del PP de Madrid"
descripcion: |
  El instructor del Juzgado Central de Instrucción nº 6, Manuel
  García-Castellón, acuerda el archivo de la pieza del caso
  Púnica relativa a la presunta financiación irregular del Partido
  Popular de Madrid respecto de las exjefas del Gobierno regional
  Esperanza Aguirre y Cristina Cifuentes, del expresidente Ignacio
  González y de varios exconsejeros y empresarios investigados. La
  Sección Cuarta de la Sala de lo Penal de la Audiencia Nacional
  confirma posteriormente ese archivo al rechazar los recursos
  presentados, sustentándose esencialmente en la prescripción y en
  la ausencia de indicios suficientes. El archivo deja sin efecto la
  condición de investigados de los afectados en esta pieza; rige la
  presunción de inocencia.
