titulo: "La Sección Novena de la Audiencia Provincial de Málaga desestima el recurso de las acusaciones populares y confirma el sobreseimiento provisional del caso del ático de Estepona"
descripcion: |
  La Sección Novena de la Audiencia Provincial de Málaga dicta
  el 9 de noviembre de 2020 (notificado el 13 de noviembre) auto
  por el que desestima el recurso de apelación interpuesto por
  las acusaciones populares contra el sobreseimiento provisional
  acordado por el Juzgado de Primera Instancia e Instrucción nº 5
  de Estepona el 14 de julio de 2020, confirmando así el archivo
  del procedimiento sobre la adquisición del ático de lujo en esa
  localidad por el ex presidente de la Comunidad de Madrid
  Ignacio González González y su esposa, en el que
  también figuraba investigado el empresario y presidente del
  Club Atlético de Madrid Enrique Cerezo Torres. Según la
  cobertura periodística, el tribunal de apelación razona que no
  constan indicios de cohecho —no se infiere vínculo entre los
  contratos de la sociedad estadounidense Coast Investors y la
  actuación de Ignacio González como vicepresidente o presidente
  de la Comunidad de Madrid— ni indicios de un delito antecedente
  del que procediera el dinero a efectos de blanqueo de
  capitales. La resolución confirma el sobreseimiento con
  carácter provisional, por lo que no implica condena ni
  absolución y queda sujeta a la posibilidad de reapertura si
  aparecieran nuevas pruebas relevantes. El auto íntegro de la
  Audiencia Provincial no se ha localizado en fuente oficial; el
  hito se sostiene en cobertura periodística de dos líneas
  editoriales distintas (Confilegal y El Independiente),
  coincidentes con Público e Infolibre.
