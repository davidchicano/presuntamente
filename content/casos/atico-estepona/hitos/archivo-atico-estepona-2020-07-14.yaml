titulo: "El Juzgado de Primera Instancia e Instrucción nº 5 de Estepona acuerda el sobreseimiento provisional del caso del ático contra Ignacio González, su esposa y Enrique Cerezo tras siete años de instrucción"
descripcion: |
  El Juzgado de Primera Instancia e Instrucción nº 5 de Estepona
  (Málaga) dicta el 14 de julio de 2020 auto por el que se
  acuerda el sobreseimiento provisional del procedimiento
  abierto sobre la presunta donación encubierta o adquisición a
  precio inferior al de mercado del ático de lujo ubicado en
  esa localidad atribuido al ex presidente de la Comunidad de
  Madrid Ignacio González González y a su esposa. El juez concluye, tras siete años de instrucción, que
  no se han obtenido indicios sobre el origen del dinero
  utilizado por la sociedad estadounidense Coast Investors para
  la adquisición del inmueble por 770.000 euros en 2011 ni
  sobre la procedencia de los fondos en relación con el
  empresario y presidente del Club Atlético de Madrid Enrique
  Cerezo Torres. El sobreseimiento provisional no implica
  condena ni absolución y queda sujeto a la posibilidad de
  reapertura si aparecen nuevas pruebas relevantes.
