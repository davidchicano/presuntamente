resumen_cifras: |
  La operación investigada consistió en el alquiler en 2008 por
  la sociedad estadounidense Coast Investors del ático ubicado
  en Estepona y su adquisición posterior en 2011 por una
  cuantía de 770.000 euros, presuntamente inferior al valor de
  mercado de un inmueble de las características del
  investigado.

