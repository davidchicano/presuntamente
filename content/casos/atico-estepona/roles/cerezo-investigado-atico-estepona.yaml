notas: |
  Enrique Cerezo Torres figura como investigado en el
  procedimiento del Juzgado de Primera Instancia e Instrucción
  nº 5 de Estepona en su condición de presunto donante
  encubierto de los fondos empleados por la sociedad
  estadounidense Coast Investors para adquirir el ático de
  lujo en esa localidad atribuido a Ignacio González González
  y a la esposa de Ignacio González. La fecha de inicio del rol es
  aproximada al año de apertura del procedimiento. El rol se
  cierra el 14 de julio de 2020 con el sobreseimiento
  provisional acordado por el juzgado al no apreciarse
  indicios sobre el origen del dinero ni sobre su procedencia
  en relación con Cerezo. La condición de investigado no
  implica valoración de culpabilidad: rige el principio de
  presunción de inocencia.
