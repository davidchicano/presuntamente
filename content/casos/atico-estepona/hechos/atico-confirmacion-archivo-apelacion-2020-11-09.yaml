id: atico-confirmacion-archivo-apelacion-2020-11-09
caso_id: atico-estepona
enunciado: |
  La Sección Novena de la Audiencia Provincial de Málaga, por
  auto de 9 de noviembre de 2020 (notificado el 13 de noviembre),
  desestimó el recurso de apelación de las acusaciones populares
  y confirmó el sobreseimiento provisional acordado por el
  Juzgado de Primera Instancia e Instrucción nº 5 de Estepona el
  14 de julio de 2020 sobre la adquisición del ático de lujo en
  esa localidad por Ignacio González González y su esposa, en el que también figuraba investigado el empresario
  Enrique Cerezo Torres. Según la cobertura periodística, el
  tribunal de apelación razonó que no constan indicios de cohecho
  —no se infiere vínculo entre los contratos de la sociedad
  estadounidense Coast Investors y la actuación de González como
  vicepresidente o presidente de la Comunidad de Madrid— ni
  indicios de un delito antecedente del que procediera el dinero
  a efectos de blanqueo. El sobreseimiento se confirma con
  carácter provisional: no implica condena ni absolución y queda
  sujeto a eventual reapertura si aparecieran nuevas pruebas.
