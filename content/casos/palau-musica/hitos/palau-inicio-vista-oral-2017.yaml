titulo: "Inicio del juicio oral del caso Palau ante la Sección 10ª de la Audiencia Provincial de Barcelona"
descripcion: |
  El 1 de marzo de 2017 comienza el juicio oral ante la Sección 10ª
  de la Audiencia Provincial de Barcelona, presidida por la magistrada
  Montserrat Comas-d'Argemir, con magistrados José Antonio Lagares y
  Julio Hernández como ponente. Se sientan en el banquillo 16 acusados.
  El juicio se prolongará en unas cincuenta sesiones de vista pública
  hasta el 16 de junio de 2017.
