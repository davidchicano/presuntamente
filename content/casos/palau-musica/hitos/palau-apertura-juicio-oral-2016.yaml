titulo: "El Juzgado de Instrucción nº 30 envía el caso Palau a la Audiencia Provincial de Barcelona para juicio oral"
descripcion: |
  Tras más de siete años de instrucción, el Juzgado de Instrucción nº 30
  de Barcelona envía el caso Palau de la Música Catalana a la Audiencia
  Provincial de Barcelona para la celebración del juicio oral. Se siguen
  diligencias como Procedimiento Abreviado 74/2016 ante la Sección 10ª
  de la Audiencia Provincial de Barcelona.
