notas: |
  Condena firme confirmada por la STS 813/2020 del Tribunal Supremo
  (30 de abril de 2020): 9 años y 8 meses de prisión y multa de
  4,1 millones de euros. Fèlix Millet i Tusell cumplió 2 años y 4 meses
  de prisión; la Generalitat de Catalunya le concedió el tercer grado
  por su delicado estado de salud. Falleció el 16 de marzo de 2023 a
  los 87 años. La presunción de inocencia decae respecto de los hechos
  declarados probados por sentencia firme.
