notas: |
  Convergència Democràtica de Catalunya (CDC) condenada como organización
  al comiso de 6.676.105,58 euros —declarados ganancias obtenidas por
  tráfico de influencias— por la STS 813/2020 del Tribunal Supremo.
  El partido incurrió en concurso de acreedores en marzo de 2020; por
  auto de 15 de febrero de 2022, la Sección 10ª de la Audiencia Provincial
  de Barcelona declaró su incompetencia para determinar la sucesión de
  CDC por PDeCat y Junts per Catalunya, derivando la ejecución al
  Juzgado Mercantil 9 de Barcelona. La responsabilidad penal de las
  personas jurídicas en el ordenamiento español es aplicable desde la
  LO 5/2010; la condena aquí es al comiso, no a una pena privativa de
  libertad, por lo que es compatible con el schema vigente.
