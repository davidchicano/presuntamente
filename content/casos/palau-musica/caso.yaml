nombre_oficial: "Procedimiento Abreviado 74/2016 — Sección 10ª de la Audiencia Provincial de Barcelona"
nombre_mediatico: "Caso Palau de la Música"
nombres_alternativos:
  - "Caso Palau"
  - "Caso Palau-Millet"
  - "Cas Palau"
  - "Caso Millet"

descripcion_corta: |
  Macrocausa por presunto expolio de la Fundació Orfeó Català-Palau de la
  Música Catalana —más de 23 millones de euros— y por la financiación
  ilegal de Convergència Democràtica de Catalunya (CDC) a través de
  comisiones de Ferrovial-Agroman canalizadas mediante el Palau como
  intermediario (1999-2009). Fèlix Millet i Tusell (presidente de la
  Fundació) y Jordi Montull Bagur (gerente) fueron los principales
  condenados en la sentencia firme del Tribunal Supremo (STS 813/2020).
  Daniel Osàcar, extesorero de CDC, también resultó condenado. CDC como
  organización fue objeto de comiso de 6,67 millones de euros, cuya
  ejecución sigue pendiente ante el Juzgado Mercantil 9 de Barcelona
  por el procedimiento concursal del partido.

sintesis_caso:
  que_se_investiga: >-
    El presunto expolio de fondos del Palau de la Música Catalana y la
    presunta financiación ilegal de CDC a través de comisiones de Ferrovial
    canalizadas por sus directivos.
  hechos_clave:
    - "Fèlix Millet y Jordi Montull desviaron más de 23 millones de euros de la Fundació Orfeó Català-Palau de la Música Catalana para uso personal durante 1999-2009."
    - "Ferrovial-Agroman pagó un mínimo de 6,67 millones de euros en comisiones a CDC, a razón del 2,5% de contratos de obra pública en Cataluña, a través del Palau como intermediario."
    - "La sentencia firme STS 813/2020 condenó a Millet a 9 años y 8 meses, a Montull a 7 años y 6 meses, y al extesorero de CDC Daniel Osàcar a 3 años y 6 meses. CDC fue condenada al comiso de 6,67 M€."
    - "Los directivos de Ferrovial acusados en la causa fueron absueltos por prescripción de los delitos imputados."
  estado_actual: >-
    Sentencia firme desde el 30 de abril de 2020 (STS 813/2020). En trámite
    de ejecución: más de 12 millones de euros recuperados por las entidades
    perjudicadas; el comiso a CDC (6,67 M€) sigue pendiente ante el Juzgado
    Mercantil 9 de Barcelona por el procedimiento concursal del partido (CDC
    en concurso desde marzo de 2020). Fèlix Millet falleció el 16 de marzo
    de 2023.
  cifras_clave:
    - "23,2 M€ expoliados de la Fundació, Associació y Consorci del Palau (sentencia firme)"
    - "6,67 M€ en comisiones ilícitas a CDC acordadas como comiso"
    - "9 años y 8 meses de prisión para Millet (condena firme)"
    - "Más de 12 M€ ya recuperados por las entidades perjudicadas (2022)"

