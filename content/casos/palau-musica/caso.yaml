# Caso Palau de la Música Catalana — modelado completo (sesión 2026-05-30).
#
# Macrocausa por presunto expolio del Palau de la Música Catalana y por la
# financiación ilegal de Convergència Democràtica de Catalunya (CDC) a través
# de comisiones de Ferrovial-Agroman canalizadas por Fèlix Millet i Tusell
# y Jordi Montull Bagur. Instruida por el Juzgado de Instrucción nº 30 de
# Barcelona y juzgada por la Sección 10ª de la Audiencia Provincial de
# Barcelona (PA 74/2016). Sentencia firme STS 813/2020 del Tribunal Supremo
# de 30 de abril de 2020 (ponente: Andrés Palomo del Arco). La presunción
# de inocencia decae únicamente respecto de los hechos declarados probados
# y firmes por la sentencia del TS; la ejecución de la responsabilidad civil
# y el comiso a CDC siguen en trámite.

