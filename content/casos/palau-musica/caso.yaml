resumen_cifras: |
  La sentencia firme STS 813/2020 del Tribunal Supremo declara probado
  que Fèlix Millet i Tusell y Jordi Montull Bagur desviaron un mínimo
  de 23,2 millones de euros de las entidades gestoras del Palau de la
  Música Catalana para uso particular. La responsabilidad civil se
  distribuye: más de 6,29 M€ a la Fundació Orfeó Català-Palau de la
  Música Catalana, más de 6,12 M€ a la Associació Orfeó Català, y más
  de 3,53 M€ al Consorci del Palau de la Música Catalana. Marta Vallès
  (cónyuge de Millet, fallecida) debe responder a título lucrativo por
  6,41 M€ y su hija Laila Millet por 112.782 euros.
  Adicionalmente, la sentencia acuerda el comiso de 6.676.105,58 euros
  a Convergència Democràtica de Catalunya como ganancias obtenidas por
  tráfico de influencias (comisiones del 2,5% de contratos de obra
  pública pagadas por Ferrovial-Agroman). Millet y Montull percibieron
  un mínimo de 3.505.895,37 euros como mediadores del esquema de
  comisiones. Las multas penales individuales suman: Millet 4,12 M€,
  Montull 2,99 M€, Gemma Montull 2,66 M€, Daniel Osàcar 3,79 M€.
  En trámite de ejecución, las entidades perjudicadas han recuperado
  más de 12 millones de euros (cobertura elDiario.es, 2022).

