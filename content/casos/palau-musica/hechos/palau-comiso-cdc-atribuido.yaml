id: palau-comiso-cdc-atribuido
caso_id: palau-musica
enunciado: |
  La sentencia de la Sección 10ª de la Audiencia Provincial de Barcelona
  (PA 74/2016), confirmada como firme por la STS 813/2020 del Tribunal
  Supremo (30 de abril de 2020), declara probado que Convergència
  Democràtica de Catalunya (CDC) percibió un mínimo de 6.676.105,58
  euros en comisiones ilícitas a través del Palau de la Música Catalana
  como intermediario: la empresa Ferrovial-Agroman abonaba dichas
  cantidades —a razón de un 2,5% de los contratos adjudicados— como
  contraprestación por la adjudicación de obras públicas en Cataluña
  durante el período 1999-2009. Las sentencias acuerdan el comiso de
  dicho importe a CDC como ganancias obtenidas mediante tráfico de
  influencias. Millet y Montull recibieron adicionalmente un mínimo de
  3.505.895,37 euros por su "mediación" en el esquema.
tipo: acreditado
