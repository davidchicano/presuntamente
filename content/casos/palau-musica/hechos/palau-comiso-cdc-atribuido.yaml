importe_nota: |
  Importe mínimo de las comisiones que Ferrovial-Agroman abonó a CDC
  a través del Palau de la Música, a razón de un 2,5% de los contratos
  adjudicados (del 4% total pactado, de los que Millet y Montull percibían
  el 1,5% restante). Importe declarado como ganancias sujetas a comiso
  en la sentencia firme STS 813/2020. Se trata de un componente del total
  del caso (no duplicar sumando al perjuicio de 23 M€, que es distinto
  concepto: el expolio institucional).
