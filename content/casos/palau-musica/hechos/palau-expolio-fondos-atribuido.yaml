id: palau-expolio-fondos-atribuido
caso_id: palau-musica
enunciado: |
  La sentencia de la Sección 10ª de la Audiencia Provincial de Barcelona
  (PA 74/2016, 29 de diciembre de 2017), confirmada como firme por la
  STS 813/2020 del Tribunal Supremo (30 de abril de 2020), declara
  probado que Fèlix Millet i Tusell y Jordi Montull Bagur desviaron
  fondos de la Fundació Orfeó Català-Palau de la Música Catalana, del
  Consorci del Palau de la Música Catalana y de la Associació Orfeó
  Català para uso particular durante aproximadamente la primera década
  del siglo XXI, en un importe mínimo acreditado de 23.200.000 euros
  de los que se atribuye a ambos responsabilidad civil solidaria de
  devolución.
tipo: acreditado
# PROMOVIDO A ACREDITADO: 2026-05-30. Autorización maintainer (V-04).
# Respaldo: nota oficial CGPJ N1 (nota-cgpj-sts-palau-2020) que recoge
# el fallo de la STS 813/2020, sentencia de casación firme de la Sala
# Segunda del Tribunal Supremo sin ulterior recurso ordinario.
