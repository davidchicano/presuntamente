titulo: "El magistrado instructor del Juzgado Central de Instrucción nº 6 declara investigado al chófer del ex tesorero del Partido Popular Luis Bárcenas, Sergio Ríos Esgueva, en la pieza Kitchen del Caso Tándem"
descripcion: |
  Tras la apertura de la pieza séptima de las Diligencias Previas
  96/2017 del Caso Tándem en julio de 2018, el magistrado instructor
  del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  formaliza la condición de investigado de Sergio Ríos Esgueva,
  agente del Cuerpo Nacional de Policía y chófer del ex tesorero del
  Partido Popular Luis Bárcenas Gutiérrez durante el periodo 2013-2015,
  en la pieza separada nº 7 conocida mediáticamente como Operación
  Kitchen. La imputación se basa en el informe de la Unidad de
  Asuntos Internos de la Dirección General de la Policía, que
  atribuye a Ríos la presunta función de confidente policial
  retribuido con cargo a fondos reservados del Ministerio del
  Interior a cambio de información sobre el entorno familiar y los
  movimientos del presunto perjudicado. La fecha exacta del auto se
  modela con precisión de mes mientras no se localice fuente con el
  día concreto. La condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia mientras
  no recaiga sentencia firme en contrario.
