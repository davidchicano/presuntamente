titulo: "El Juzgado Central de Instrucción nº 6 de la Audiencia Nacional confirma el sobreseimiento provisional respecto de María Dolores de Cospedal e Ignacio López del Hierro en la pieza Kitchen y desestima los recursos de las acusaciones"
descripcion: |
  Por auto del 7 de diciembre de 2022 el magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  confirma el sobreseimiento provisional acordado el 29 de julio de
  2021 respecto de María Dolores de Cospedal García y de Ignacio López
  del Hierro en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen) y desestima los recursos planteados
  contra el archivo por la Fiscalía Anticorrupción y las acusaciones
  populares personadas en la causa. La condición de desimputados no
  prejuzga la decisión que, en su caso, pudiera adoptar la Sala de
  Apelaciones de la Audiencia Nacional al resolver los recursos
  pendientes contra esta resolución; rige el principio de presunción
  de inocencia.
