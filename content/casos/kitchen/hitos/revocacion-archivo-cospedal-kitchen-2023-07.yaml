titulo: "La Sala de Apelaciones de la Audiencia Nacional estima los recursos de la Fiscalía Anticorrupción y de las acusaciones populares, revoca el archivo respecto de María Dolores de Cospedal e Ignacio López del Hierro y ordena reincorporar la causa contra ambos en la pieza Kitchen"
descripcion: |
  En julio de 2023 la Sala de Apelaciones de la Audiencia Nacional
  dicta auto por el que se estiman los recursos planteados por la
  Fiscalía Especial contra la Corrupción y la Criminalidad Organizada
  y por las acusaciones populares contra el sobreseimiento provisional
  confirmado el 7 de diciembre de 2022 por el Juzgado Central de
  Instrucción nº 6. La Sala acuerda revocar el archivo y reincorporar
  la causa contra María Dolores de Cospedal García y contra Ignacio
  López del Hierro en la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen). La fecha exacta del auto se
  modela con precisión de mes mientras no se localice fuente directa
  con día concreto. La reincorporación a la causa no implica
  valoración de culpabilidad: rige el principio de presunción de
  inocencia.
