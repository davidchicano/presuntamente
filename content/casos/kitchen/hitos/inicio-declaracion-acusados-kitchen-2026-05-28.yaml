titulo: "Empiezan a declarar los acusados en el juicio de la pieza Kitchen: el ex secretario de Estado de Seguridad Francisco Martínez y el ex ministro del Interior Jorge Fernández Díaz son los primeros procesados en responder ante la Sección Cuarta de la Sala de lo Penal de la Audiencia Nacional"
descripcion: |
  El 28 de mayo de 2026, tras concluir la fase de prueba testifical y
  documental del juicio de la pieza separada nº 7 de las Diligencias
  Previas 96/2017 (Operación Kitchen) —en la que, según la cobertura
  cruzada, declararon más de un centenar de testigos y se reprodujeron
  numerosas grabaciones atribuidas al comisario jubilado José Manuel
  Villarejo Pérez aportadas a instancia del Partido Socialista Obrero
  Español como acusación popular—, comenzó ante la Sección Cuarta de la
  Sala de lo Penal de la Audiencia Nacional (rollo de sala 13/2024) la
  declaración de los procesados. Abrieron el turno el ex secretario de
  Estado de Seguridad Francisco Martínez Vázquez y el ex ministro del
  Interior Jorge Fernández Díaz. Conforme a la cobertura periodística,
  Fernández Díaz se desvinculó del presunto dispositivo de espionaje al
  ex tesorero del Partido Popular Luis Bárcenas, sostuvo que no ordenó
  ni conoció operación alguna y afirmó que tuvo noticia de los hechos
  por la prensa a finales de 2015. Su declaración presentó
  contradicciones con la de Francisco Martínez sobre quién conocía la
  operación. La declaración de los acusados constituye la fase final
  del juicio, previa a los informes de conclusiones; según la
  cobertura, el juicio quedaría visto para sentencia en junio de 2026.
  Rige el principio de presunción de inocencia respecto de todos los
  procesados mientras no recaiga sentencia firme en contrario.
