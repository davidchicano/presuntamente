id: fondos-reservados-rios-kitchen
caso_id: kitchen
enunciado: |
  El instructor del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional atribuye a la cúpula del Ministerio del Interior
  y al dispositivo policial coordinado por Eugenio Pino Sánchez, según
  consta en la cobertura cruzada del informe de la Unidad de Asuntos
  Internos de la Dirección General de la Policía y del auto de
  procesamiento del 29 de julio de 2021, el presunto uso de fondos
  reservados del propio Ministerio para la contratación, como
  confidente policial, de Sergio Ríos Esgueva, chófer del ex tesorero
  del Partido Popular Luis Bárcenas. Conforme a la cobertura citada,
  el confidente habría sido presuntamente retribuido con cargo a esos
  fondos a cambio de información sobre el entorno familiar y los
  movimientos del presunto perjudicado. La atribución corresponde al
  instructor en sede de instrucción y no constituye declaración de
  hechos probados; rige el principio de presunción de inocencia.
