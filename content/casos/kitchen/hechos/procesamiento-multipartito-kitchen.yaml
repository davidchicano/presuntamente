id: procesamiento-multipartito-kitchen
caso_id: kitchen
enunciado: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional del 29 de julio de 2021 se transformó
  el procedimiento a abreviado en la pieza separada nº 7 de las
  Diligencias Previas 96/2017 (Operación Kitchen) y se acordó el
  procesamiento de Jorge Fernández Díaz, Francisco Martínez Vázquez,
  Eugenio Pino Sánchez, José Manuel Villarejo Pérez, Sergio Ríos
  Esgueva y otros agentes del Cuerpo Nacional de Policía por su
  presunta participación en la operación parapolicial contra el ex
  tesorero del Partido Popular Luis Bárcenas. El auto refiere indiciariamente los presuntos
  delitos de organización criminal, malversación de caudales públicos,
  cohecho, prevaricación y revelación de secretos. La condición de
  procesados no implica valoración de culpabilidad: rige el principio
  de presunción de inocencia.
