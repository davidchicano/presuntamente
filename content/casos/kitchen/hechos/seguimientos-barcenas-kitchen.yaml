id: seguimientos-barcenas-kitchen
caso_id: kitchen
enunciado: |
  Se investiga, conforme al auto de procesamiento del Juzgado Central
  de Instrucción nº 6 de la Audiencia Nacional del 29 de julio de
  2021 y al informe de la Unidad de Asuntos Internos remitido a dicho
  órgano, la presunta realización por parte del dispositivo policial
  coordinado por Eugenio Pino Sánchez de seguimientos, accesos y
  actuaciones de obtención de información sobre el entorno familiar y
  los movimientos personales del ex tesorero del Partido Popular
  Luis Bárcenas durante el periodo 2013-2015, presuntamente al margen
  del control jurisdiccional ordinario y por cauces ajenos a una
  investigación policial reglada. El instructor encuadra estas
  conductas indiciariamente en los tipos de organización criminal,
  prevaricación y revelación de secretos. Rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
