id: declaracion-fernandez-diaz-juicio-kitchen-2026-05-28
caso_id: kitchen
enunciado: |
  En la sesión del 28 de mayo de 2026 del juicio de la pieza séptima de
  las Diligencias Previas 96/2017 (Operación Kitchen) ante la Sección
  Cuarta de la Sala de lo Penal de la Audiencia Nacional, declararon
  como acusados el ex secretario de Estado de Seguridad Francisco
  Martínez Vázquez y el ex ministro del Interior Jorge Fernández Díaz,
  primeros procesados en responder tras la fase de prueba. Conforme a
  la cobertura cruzada, Fernández Díaz, para quien la Fiscalía Especial
  contra la Corrupción y la Criminalidad Organizada solicita quince
  años de prisión, negó haber ordenado o conocido un dispositivo de
  espionaje contra el ex tesorero del Partido Popular Luis Bárcenas,
  sostuvo que nadie del partido le trasladó inquietud alguna sobre él y
  afirmó que tuvo noticia de la operación por la prensa a finales de
  2015; un perito propuesto por su defensa cuestionó la autenticidad de
  los mensajes de 2013 incorporados a la causa y apreció en ellos,
  según esa cobertura, indicios de manipulación. Su versión presentó
  contradicciones con la de Francisco Martínez sobre quién conocía la
  operación. Las manifestaciones vertidas en el plenario son
  declaraciones de los acusados en ejercicio de su defensa y no
  constituyen, por sí mismas, hechos acreditados; rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
