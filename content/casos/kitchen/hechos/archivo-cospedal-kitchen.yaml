id: archivo-cospedal-kitchen
caso_id: kitchen
enunciado: |
  Por auto del Juzgado Central de Instrucción nº 6 de la Audiencia
  Nacional del 7 de diciembre de 2022, confirmando el sobreseimiento
  provisional acordado el 29 de julio de 2021, se acordó el archivo
  respecto de María Dolores de Cospedal García y de Ignacio López
  del Hierro en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen), desestimándose los recursos planteados
  contra el archivo por la Fiscalía Anticorrupción y las acusaciones
  populares personadas en la causa. Este hecho exculpatorio fue
  posteriormente revocado por la Sala de Apelaciones de la Audiencia
  Nacional en julio de 2023.
