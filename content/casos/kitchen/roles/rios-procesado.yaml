notas: |
  Por auto del 29 de julio de 2021 del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional se procesa a Sergio Ríos Esgueva por
  su presunta función como confidente policial retribuido con cargo a
  fondos reservados del Ministerio del Interior durante el periodo en
  que ejercía como chófer del ex tesorero del Partido Popular Luis
  Bárcenas. La condición de procesado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia mientras
  no recaiga sentencia firme en contrario.
