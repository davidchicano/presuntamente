notas: |
  Por auto del magistrado instructor del Juzgado Central de Instrucción
  nº 6 de la Audiencia Nacional dictado en septiembre de 2019, Ignacio
  López del Hierro Bravo queda investigado en la pieza separada nº 7
  de las Diligencias Previas 96/2017 (Operación Kitchen),
  conjuntamente con su esposa María Dolores de Cospedal García. La
  fecha exacta del auto se modela con precisión de mes mientras no se
  localice fuente con el día concreto. La condición de investigado no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia. El rol se cierra el 29 de julio de 2021 con el auto de
  transformación a procedimiento abreviado del mismo órgano, que en
  esa fecha acuerda simultáneamente el sobreseimiento provisional
  respecto de él y de Cospedal, lo que abre el rol consecutivo de
  desimputado.
