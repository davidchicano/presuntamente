descripcion_corta: |
  Pieza separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional, instruidas por
  el magistrado Manuel García-Castellón. La pieza séptima, conocida
  mediáticamente como Operación Kitchen, se incoó por la presunta
  existencia de una operación parapolicial atribuida al Ministerio del
  Interior del Reino de España entre 2013 y 2015, durante el gobierno
  presidido por Mariano Rajoy y bajo la titularidad del ministro Jorge
  Fernández Díaz, presuntamente dirigida —según el instructor— a
  obtener documentación sensible en poder del entonces ex tesorero del
  Partido Popular Luis Bárcenas. Por auto del Juzgado Central de
  Instrucción nº 6 de 29 de julio de 2021 se transformó el
  procedimiento a abreviado y se procesó a once personas: Jorge
  Fernández Díaz, Francisco Martínez Vázquez, Eugenio Pino Sánchez,
  José Manuel Villarejo Pérez, José Luis Olivera Serrano, Marcelino
  Martín-Blas Aritio, Enrique García Castaño, Andrés Manuel Gómez
  Gordo, José Ángel Fuentes Gago, Bonifacio Díez Sevillano y Sergio
  Ríos Esgueva, acordándose simultáneamente el sobreseimiento
  provisional respecto de María Dolores de Cospedal García y de
  Ignacio López del Hierro Bravo. El sobreseimiento de Cospedal y
  López del Hierro fue confirmado por auto del mismo órgano de 7 de
  diciembre de 2022 y devino firme en la fase de instrucción por auto
  de la Sección Tercera de la Sala de lo Penal de la Audiencia
  Nacional de 24 de febrero de 2023, que desestimó los recursos de
  apelación de la Fiscalía Anticorrupción, de Unidas Podemos y del
  PSOE. El auto de apertura del juicio oral fue dictado por el
  instructor el 13 de octubre de 2023 y rectificado el 23 de enero
  de 2024 para excluir los delitos de secuestro y de pertenencia a
  organización criminal por superar éstos el límite de pena del
  procedimiento abreviado. El juicio oral comenzó el 6 de abril de
  2026 ante la Sección Cuarta de la Sala de lo Penal de la Audiencia
  Nacional, presidida y ponente la magistrada Teresa Palacios Criado.
  Enrique García Castaño no se sienta en el banquillo por incapacidad
  mental sobrevenida tras un ictus sufrido en 2022. Rige el principio
  de presunción de inocencia respecto de los procesados mientras no
  recaiga sentencia firme en contrario.

