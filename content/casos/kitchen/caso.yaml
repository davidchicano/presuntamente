# Caso Kitchen — actualizado en PR3 (2026-05-24).
#
# Pieza separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
# Central de Instrucción nº 6 de la Audiencia Nacional, conocidas como
# Caso Tándem, instruidas por el magistrado Manuel García-Castellón
# García-Lomas tras la detención del comisario jubilado José Manuel
# Villarejo Pérez el 3 de noviembre de 2017. La pieza séptima, conocida
# mediáticamente como Operación Kitchen, se incoa por la presunta
# existencia de una operación parapolicial atribuida al Ministerio del
# Interior del Reino de España entre 2013 y 2015, durante el gobierno
# presidido por Mariano Rajoy y bajo la titularidad del ministro Jorge
# Fernández Díaz, presuntamente dirigida —según el instructor— a obtener
# documentación sensible en poder del entonces ex tesorero del Partido
# Popular Luis Bárcenas. Por auto del Juzgado Central de Instrucción nº
# 6 de 29 de julio de 2021 se dictó procesamiento contra once personas
# (Jorge Fernández Díaz, Francisco Martínez Vázquez, Eugenio Pino
# Sánchez, José Manuel Villarejo Pérez, José Luis Olivera Serrano,
# Marcelino Martín-Blas Aritio, Enrique García Castaño, Andrés Manuel
# Gómez Gordo, José Ángel Fuentes Gago, Bonifacio Díez Sevillano y
# Sergio Ríos Esgueva) y se acordó el sobreseimiento provisional
# respecto de María Dolores de Cospedal García y de Ignacio López del
# Hierro; este sobreseimiento fue confirmado por auto del mismo órgano
# el 7 de diciembre de 2022 y devino firme en la fase de instrucción
# por auto de la Sección Tercera de la Sala de lo Penal de la Audiencia
# Nacional de 24 de febrero de 2023. La fase intermedia se cerró con
# el auto de apertura del juicio oral del 13 de octubre de 2023 (con
# auto rectificador del 23 de enero de 2024 que excluyó los delitos de
# secuestro y de pertenencia a organización criminal por superar el
# límite de pena del procedimiento abreviado). El juicio oral comenzó
# el 6 de abril de 2026 ante la Sección Cuarta de la Sala de lo Penal
# de la Audiencia Nacional presidida por la magistrada Teresa Palacios
# Criado, sin Enrique García Castaño en el banquillo por incapacidad
# mental sobrevenida tras un ictus de 2022.

