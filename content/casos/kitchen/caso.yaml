resumen_cifras: |
  El instructor atribuye al dispositivo policial el uso indiciario de
  fondos reservados del Ministerio del Interior para la presunta
  contratación, como confidente, de Sergio Ríos Esgueva, chófer del ex
  tesorero del Partido Popular Luis Bárcenas, así como la realización
  de seguimientos, accesos y obtención de información sensible sobre el
  entorno familiar del presunto perjudicado. Por auto del Juzgado
  Central de Instrucción nº 6 de 29 de julio de 2021 se procesó a once
  personas: el ex ministro del Interior Jorge Fernández Díaz, el ex
  secretario de Estado de Seguridad Francisco Martínez Vázquez, el ex
  Director Adjunto Operativo de la Policía Eugenio Pino Sánchez, el
  comisario jubilado José Manuel Villarejo Pérez, los comisarios José
  Luis Olivera Serrano, Marcelino Martín-Blas Aritio, Enrique García
  Castaño y Andrés Manuel Gómez Gordo, los inspectores José Ángel
  Fuentes Gago y Bonifacio Díez Sevillano y el chófer Sergio Ríos
  Esgueva. La Fiscalía Especial contra la Corrupción y la Criminalidad
  Organizada solicitó en su escrito de acusación de febrero de 2023
  penas indiciariamente comprendidas entre dos años y medio y
  diecinueve años de prisión, con inhabilitación, según la persona;
  retiró su acusación respecto de Olivera, Fuentes Gago y Díez
  Sevillano por no apreciar indicios suficientes, manteniendo las
  acusaciones populares (PSOE, Unidas Podemos) y particulares (Luis
  Bárcenas, Rosalía Iglesias y Guillermo Bárcenas) sus reproches
  penales sobre ellos. Las cifras exactas de fondos reservados
  presuntamente desviados quedan pendientes de cuantificación
  jurisdiccional firme.

