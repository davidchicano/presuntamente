resumen_cifras: |
  El importe total dispuesto con las tarjetas black durante el periodo enjuiciado
  (aprox. 2003-2012) asciende a en torno a 12 millones de euros (cifra pendiente
  de verificar contra los hechos probados de la sentencia). Las penas individuales
  se graduaron segun el importe que cada condenado dispuso. No existe una cifra
  unica de responsabilidad civil global publicada oficialmente; la responsabilidad
  civil fue sustituida en varios casos por la devolucion de cantidades.
  # LLM-incierto: verificar cifras exactas y responsabilidades civiles en la sentencia.

