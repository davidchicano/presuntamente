  notas: >-
    Modelado inicial con hitos de sentencia AN (2017) y TS (2018), hecho
    central de uso de tarjetas y sentencia, y roles de Rato (condenado_firme)
    y Blesa (extinguido por fallecimiento). Faltan sentencias primarias en
    CENDOJ, cifras exactas por sujeto de los hechos probados, y roles de
    los demas condenados (consejeros y directivos de multiples sensibilidades
    politicas y sindicales, en torno a 65 acusados). Importe total del
    caso pendiente de verificar contra la sentencia. Vinculos modelados:
    Rato (cargo ministerial PP, presidente Caja Madrid y Bankia), Blesa
    (presidente Caja Madrid 1996-2010), Caja Madrid y Bankia como
    perjudicadas, PP como afectado indirecto. Pendiente: ~63 acusados
    restantes y vinculos PSOE/sindicatos. Cobertura mediatica: primera
    pasada el 2026-05-30 (16 piezas, 5 ventanas, 7 medios; ver NOTES.md).
