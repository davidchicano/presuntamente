id: tarjetas-black
nombre_oficial: "Diligencias Previas — Juzgado Central de Instrucción nº 6 de la Audiencia Nacional (DP 95/2013 y piezas derivadas)"
nombre_mediatico: "Caso de las tarjetas black de Caja Madrid / Bankia"
nombres_alternativos:
  - "Tarjetas black"
  - "Tarjetas opacas de Caja Madrid"
  - "Tarjetas B de Caja Madrid"
  - "Tarjetas de empresa de Caja Madrid"

descripcion_corta: |
  Causa penal por el uso durante aproximadamente una decada (2003-2012) de
  tarjetas de credito de empresa de Caja Madrid (y luego Bankia tras la
  fusion y posterior intervencion) por parte de miembros del consejo de
  administracion, de la comision de control y de altos directivos. Los
  gastos, en su mayoria personales, se cargaban a la entidad fuera de la
  retribucion formal declarada y sin tributar a la Hacienda Publica. El
  asunto afloró publicamente en octubre de 2014 a partir de la documentacion
  remitida al Juzgado Central de Instruccion nº 4 de la Audiencia Nacional
  en el marco de la causa por la salida a bolsa de Bankia. La Audiencia
  Nacional dicto sentencia el 23 de febrero de 2017 condenando a la mayoria
  de los acusados por apropiacion indebida, con penas graduadas segun el
  importe dispuesto por cada uno; el Tribunal Supremo confirmo en lo
  sustancial dicha sentencia en 2018, convirtiendo en firmes la mayoria de
  las condenas. Miguel Blesa, condenado en primera instancia, fallecio en
  julio de 2017 antes de que se dictara la sentencia de casacion, por lo
  que el Tribunal Supremo declaro extinguida su responsabilidad penal por
  fallecimiento. La regla de presuncion de inocencia rige para cualquier
  extremo no cubierto por una resolucion firme.

sintesis_caso:
  que_se_investiga: >-
    Si consejeros y directivos de Caja Madrid y Bankia usaron tarjetas de
    credito opacas entre 2003 y 2012 para gastos personales cargados a la
    entidad, al margen de su retribucion formal declarada y sin tributacion.
  hechos_clave:
    - >-
      Entre aproximadamente 2003 y 2012, consejeros y directivos de Caja
      Madrid y Bankia dispusieron de tarjetas de empresa cuyos gastos no
      constaban en la retribucion declarada ni se justificaron como gasto
      corporativo de la entidad.
    - >-
      La existencia del sistema afloró en octubre de 2014 a partir de
      documentacion remitida a la Audiencia Nacional en la causa paralela
      por la salida a bolsa de Bankia.
    - >-
      La Audiencia Nacional condeno el 23 de febrero de 2017 a la mayoria
      de los acusados por apropiacion indebida, con penas graduadas segun
      el importe dispuesto individualmente.
    - >-
      El Tribunal Supremo confirmo en lo sustancial las condenas en 2018,
      declarando firmes las de quienes no habian fallecido ni obtenido la
      absolucion; la de Blesa se extinguio por su fallecimiento en julio de 2017.
  estado_actual: >-
    Sentencia firme tras la STS de casacion de 2018. Fase de ejecucion de
    penas y responsabilidad civil. La condena de Miguel Blesa se extinguio
    por fallecimiento antes de la firmeza.
  cifras_clave:
    - >-
      Importe total dispuesto con las tarjetas enjuiciadas: en torno a
      12 millones de euros a lo largo del periodo.
      # LLM-incierto: cifra de memoria; verificar en hechos probados de la sentencia.

