id: tarjetas-black-extincion-blesa
caso_id: tarjetas-black
enunciado: |
  Miguel Blesa de la Parra fallecio el 28 de julio de 2017, tras haber sido
  condenado en primera instancia por la Audiencia Nacional en sentencia de 23
  de febrero de 2017 a seis anos de prision por delito continuado de
  apropiacion indebida, y antes de que el Tribunal Supremo resolviera los
  recursos de casacion. El procurador de sus herederos no aporto poder notarial
  para sostener el recurso en el plazo fijado, por lo que el Tribunal Supremo
  lo declaro desierto mediante resolucion publicada el 21 de noviembre de 2017
  y declaro extinguida su responsabilidad criminal por fallecimiento (conforme
  al articulo 130.1.1.a del Codigo Penal). En consecuencia, no existe condena
  firme contra Miguel Blesa en este caso.
tipo: acreditado
