id: tarjetas-black-condena-firme-ts-2018
caso_id: tarjetas-black
enunciado: |
  La Sala Segunda del Tribunal Supremo dicto el 3 de octubre de 2018 la
  sentencia ECLI:ES:TS:2018:3253 (ponente: magistrado Miguel Colmenero),
  que confirmo en casacion las condenas de la Audiencia Nacional de 23 de
  febrero de 2017. Con esa resolucion adquirieron firmeza las condenas de
  64 exdirectivos y exconsejeros de Caja Madrid por delito continuado de
  apropiacion indebida: Rodrigo Rato fue condenado a 4 anos y 6 meses de
  prision; las penas del resto oscilaron entre 4 meses y 4 anos y 6 meses
  segun el importe individualmente dispuesto. La responsabilidad civil fijada
  supero los 12 millones de euros (9,3 millones correspondientes al periodo de
  presidencia de Miguel Blesa, 2003-2010, y 2,6 millones al de Rodrigo Rato,
  2010-2012). La sentencia es firme; la presuncion de inocencia decae respecto
  de los hechos declarados probados para los condenados cuya condena adquirio
  firmeza. En el caso de Miguel Blesa, fallecido el 28 de julio de 2017 antes
  de la resolucion, el TS declaro extinguida su responsabilidad penal y su
  recurso desierto (ver hecho tarjetas-black-extincion-blesa).
tipo: acreditado
