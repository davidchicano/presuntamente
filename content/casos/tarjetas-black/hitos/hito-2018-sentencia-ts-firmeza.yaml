titulo: "El Tribunal Supremo confirma en casacion las condenas de las tarjetas black; Blesa: responsabilidad extinguida por fallecimiento"
descripcion: |
  La Sala Segunda del Tribunal Supremo resolvio los recursos de casacion y
  confirmo en lo sustancial la sentencia de la Audiencia Nacional de febrero
  de 2017, convirtiendo en firmes la mayoria de las condenas por apropiacion
  indebida. Con esta resolucion la causa adquirio firmeza y paso a fase de
  ejecucion. En el caso de Miguel Blesa, fallecido en julio de 2017 antes de
  dictarse la sentencia de casacion, el Tribunal Supremo declaro extinguida su
  responsabilidad penal por fallecimiento (art. 130.1.1.a CP), por lo que
  no existe para el condena firme. La presuncion de inocencia decae respecto
  de los hechos declarados probados y firmes de los condenados cuya sentencia
  adquirio firmeza.
