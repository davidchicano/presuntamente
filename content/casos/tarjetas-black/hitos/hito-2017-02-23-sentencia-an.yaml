titulo: "Sentencia de la Audiencia Nacional: condena a la mayoria de acusados por apropiacion indebida"
descripcion: |
  La Sala de lo Penal de la Audiencia Nacional dicto sentencia el 23 de
  febrero de 2017 condenando a la mayoria de los acusados por apropiacion
  indebida en razon del uso de tarjetas de credito de empresa de Caja Madrid
  y Bankia. Las penas se graduaron en funcion del importe dispuesto por cada
  acusado. La sentencia no es firme; cabe recurso de casacion ante el Tribunal
  Supremo. La condicion de condenados por sentencia de instancia no implica
  firmeza ni decaimiento de la presuncion de inocencia hasta resolucion firme.
