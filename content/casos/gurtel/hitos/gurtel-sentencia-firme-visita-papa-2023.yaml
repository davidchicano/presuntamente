titulo: "El Tribunal Supremo confirma las condenas de la pieza valenciana de la visita del Papa"
descripcion: |
  La Sala Segunda del Tribunal Supremo (ECLI:ES:TS:2023:1286, 10 de abril
  de 2023) confirma íntegramente la sentencia de la Audiencia Nacional en
  la pieza valenciana del caso Gürtel relativa al fraude en la visita del
  papa Benedicto XVI a Valencia en 2006, rechazando los recursos de siete
  acusados. La sentencia queda firme para los 19 condenados, entre ellos
  Pablo Crespo (pena más alta de la pieza), Francisco Correa (13 años y 7
  meses, según la cobertura periodística) y Álvaro Pérez «El Bigotes»
  (6 años y 9 meses, según la cobertura). El sobrecoste con cargo a fondos
  públicos asciende a 3.205.375,11 euros (RTVV). Nota oficial del CGPJ
  localizada y verificada el 2026-05-30.
