titulo: "Pablo Ruz asume la instrucción de Gürtel tras la salida de Garzón del JCI nº 5"
descripcion: |
  Tras la pérdida de la condición de magistrado de Baltasar Garzón en
  mayo de 2010 por una causa ajena a Gürtel, la instrucción del
  procedimiento en el Juzgado Central de Instrucción nº 5 de la
  Audiencia Nacional pasa al magistrado Pablo Ruz, que dirige la fase
  que conduce a la apertura del juicio oral de la primera época del
  procedimiento.
