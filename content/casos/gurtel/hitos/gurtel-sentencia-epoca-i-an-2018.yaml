titulo: "La Audiencia Nacional condena a 29 de los 37 acusados de la Época I de Gürtel"
descripcion: |
  La Sección Segunda de la Sala de lo Penal de la Audiencia Nacional
  dicta la sentencia 20/2018 (fechada el 17 de mayo y hecha pública el
  24 de mayo de 2018) sobre la primera época (1999-2005) del caso
  Gürtel: condena a 29 de los 37 acusados, con la pena más alta para
  Francisco Correa (51 años y 11 meses) y para Pablo Crespo (37 años y
  6 meses), y declara al Partido Popular partícipe a título lucrativo,
  condenándolo a abonar 245.492,80 euros. La resolución, de 1.687
  páginas, figura formalmente ponderada por el magistrado Julio de
  Diego (al quedar en minoría en varios aspectos la ponencia inicial
  de Ángel Hurtado) e incluye un voto particular del magistrado José
  Ricardo de Prada; no es firme, pues cabe recurso de casación ante el
  Tribunal Supremo. Las condenas son recurribles y rige la presunción
  de inocencia hasta que la resolución gane firmeza.
