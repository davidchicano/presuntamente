id: condena-firme-correa-crespo-epoca-i
caso_id: gurtel
enunciado: |
  La sentencia 507/2020 de la Sala Segunda del Tribunal Supremo (14 de
  octubre de 2020) confirmó, con ligeras variaciones, las condenas de
  la Época I del caso Gürtel y las hizo firmes: 51 años de prisión
  para Francisco Correa, 36 años y 8 meses para Pablo Crespo, 29 años
  y 1 mes para Luis Bárcenas y 12 años y 11 meses para Rosalía
  Iglesias, entre otras. Con esta resolución la presunción de
  inocencia decae respecto de los hechos declarados probados de esta
  época.
tipo: acreditado
