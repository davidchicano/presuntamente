id: condena-firme-piezas-valencianas-papa
caso_id: gurtel
enunciado: |
  En la pieza valenciana del caso Gürtel relativa a la visita del
  papa Benedicto XVI a Valencia en 2006, el Tribunal Supremo confirmó
  en abril de 2023 las condenas dictadas por la Audiencia Nacional
  contra los responsables de la rama valenciana de la red (Orange
  Market), entre ellos Pablo Crespo (la pena más alta de la pieza),
  Francisco Correa (13 años y 7 meses según la cobertura) y Álvaro
  Pérez «El Bigotes» (6 años y 9 meses). Con la confirmación en
  casación esta rama ganó firmeza.
