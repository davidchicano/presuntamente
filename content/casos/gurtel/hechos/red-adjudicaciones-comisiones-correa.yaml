id: red-adjudicaciones-comisiones-correa
caso_id: gurtel
enunciado: |
  La Audiencia Nacional declaró que entre 1999 y 2005 (Época I del
  procedimiento) existió una red liderada por el empresario Francisco Correa,
  estructurada en torno a un entramado de sociedades de organización
  de eventos, que obtenía adjudicaciones de contratos de
  administraciones gobernadas por el Partido Popular a cambio de
  comisiones y dádivas a cargos públicos. La sentencia 20/2018,
  confirmada en casación por el Tribunal Supremo, apreció en distintos
  acusados delitos de asociación ilícita, cohecho, prevaricación,
  falsedad documental, blanqueo de capitales, malversación de caudales
  públicos, fraude a las administraciones públicas y delitos contra la
  hacienda pública, entre otros.
tipo: acreditado
fecha_o_periodo:
  desde: "1999-01-01"
  hasta: "2005-12-31"
  precision: rango
personas_implicadas:
