id: condena-no-firme-correa-crespo-epoca-i
caso_id: gurtel
enunciado: |
  La sentencia 20/2018 de la Audiencia Nacional (hecha pública el 24
  de mayo de 2018) impuso, en primera instancia y de forma recurrible,
  las penas más altas de la Época I del caso Gürtel a Francisco
  Correa (51 años y 11 meses de prisión) y a Pablo Crespo (37 años y 6
  meses), además de penas a otros 27 condenados, entre ellos Luis
  Bárcenas (33 años y 4 meses) y Rosalía Iglesias (15 años y 1 mes).
  Al ser recurrible en casación, la resolución no era firme en esa
  fecha y regía la presunción de inocencia hasta su confirmación.
