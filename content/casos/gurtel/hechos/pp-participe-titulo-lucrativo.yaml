importe_nota: |
  Responsabilidad civil a título lucrativo del Partido Popular fijada
  por la Audiencia Nacional y confirmada por el Tribunal Supremo. Se
  desglosa en 133.628,48 euros por las operaciones de Majadahonda y
  111.864,32 euros por las de Pozuelo. No es una multa penal ni un
  perjuicio del partido: es la cuantía del beneficio del que se
  declaró partícipe lucrativo. La condena análoga del PP en la pieza
  Boadilla (204.000 euros, abril de 2022) corresponde a otra pieza y
  no se acumula aquí.
