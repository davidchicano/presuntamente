id: pp-participe-titulo-lucrativo
caso_id: gurtel
enunciado: |
  La Audiencia Nacional declaró al Partido Popular partícipe a título
  lucrativo de los delitos cometidos en la Época I del caso Gürtel
  y lo condenó a abonar 245.492,80 euros, al apreciar que la formación
  se benefició económicamente de actividades de la red (entre ellas
  actos y gastos electorales en Majadahonda y Pozuelo) que de otro
  modo habría tenido que financiar con recursos propios. El Tribunal
  Supremo confirmó en casación esta responsabilidad civil. La condena
  a título lucrativo es una responsabilidad civil, no una condena
  penal del partido.
tipo: acreditado
