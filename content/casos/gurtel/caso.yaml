descripcion_corta: |
  Macrocausa de presunta corrupción instruida desde 2009 por el
  Juzgado Central de Instrucción nº 5 de la Audiencia Nacional sobre
  una red de adjudicaciones públicas a cambio de comisiones articulada
  por el empresario Francisco Correa a través de un entramado de
  sociedades de organización de eventos (Special Events, Orange
  Market, entre otras), con presunta financiación irregular del
  Partido Popular en varias comunidades autónomas. La investigación
  estalló públicamente en febrero de 2009 a partir de denuncias ante
  la Fiscalía Anticorrupción, siendo instructor inicial el magistrado
  Baltasar Garzón y, tras su salida en mayo de 2010, el magistrado
  Pablo Ruz. El sobrenombre «Gürtel» es la traducción al alemán de
  «correa». La causa se dividió en numerosas piezas (Época I de
  1999-2005, Boadilla, Majadahonda, Pozuelo, Fundación, las piezas
  valencianas de Fitur y de la visita del papa Benedicto XVI a
  Valencia en 2006, entre otras) y de su instrucción derivó además la
  pieza de la «caja b» del Partido Popular, modelada como caso propio
  en este inventario. La Sección Segunda de la Sala de lo Penal de la
  Audiencia Nacional dictó la sentencia 20/2018 (fechada el 17 de
  mayo y hecha pública el 24 de mayo de 2018) sobre la Época I, que
  condenó a 29 de los 37 acusados —con la pena más alta para Francisco
  Correa, 51 años y 11 meses— y declaró al Partido Popular partícipe a
  título lucrativo por 245.492,80 euros; aquella sentencia, que
  precedió en pocos días a la moción de censura que llevó a la salida
  del Gobierno de Mariano Rajoy, fue confirmada en casación por la
  Sala Segunda del Tribunal Supremo el 14 de octubre de 2020
  (sentencia 507/2020, ECLI:ES:TS:2020:3191, ponente Juan Ramón
  Berdugo). Las piezas valencianas ganaron firmeza con posteriores
  sentencias del Tribunal Supremo en 2023. La regla de presunción de
  inocencia rige en las piezas que no han alcanzado sentencia firme.

sintesis_caso:
  que_se_investiga: "Una red de adjudicaciones públicas a cambio de comisiones vinculada a cargos del Partido Popular y articulada por el empresario Francisco Correa."
  hechos_clave:
    - "Instruida desde 2009 por el Juzgado Central de Instrucción nº 5 de la Audiencia Nacional, primero por Baltasar Garzón y después por Pablo Ruz."
    - "La sentencia de la Audiencia Nacional de mayo de 2018 sobre la Época I (1999-2005) condenó a 29 de los 37 acusados y fue confirmada por el Tribunal Supremo en 2020."
    - "El Partido Popular fue declarado partícipe a título lucrativo y condenado a abonar 245.492,80 euros."
    - "La causa se ramificó en numerosas piezas y de ella derivó la pieza de la «caja b» del partido."
  estado_actual: "Varias piezas con sentencia firme (Época I confirmada en 2020; pieza valenciana de la visita del Papa en 2023); otras ramas del macroprocedimiento en distintas fases."
  cifras_clave:
    - "29 de 37 acusados condenados en la Época I"
    - "Hasta 51 años de prisión (pena más alta, Francisco Correa)"
    - "245.492,80 € de responsabilidad civil del PP a título lucrativo"
    - "Cifras globales del caso (en torno a 200 M€ y unos 94 condenados sumando piezas) son agregaciones periodísticas, no de un documento oficial único"

