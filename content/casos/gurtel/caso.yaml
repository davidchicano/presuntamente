resumen_cifras: |
  La sentencia firme de la Época I (1999-2005) impuso las penas más
  altas a Francisco Correa (51 años) y Pablo Crespo (36 años y 8 meses
  tras el ajuste del Tribunal Supremo), y declaró al Partido Popular
  partícipe a título lucrativo, condenándolo a abonar 245.492,80 euros
  (133.628,48 por Majadahonda y 111.864,32 por Pozuelo). Las cifras
  globales que circulan sobre el conjunto del caso —del orden de
  200 millones de euros de responsabilidades económicas, en torno a 94
  condenados y más de 750 años de prisión sumando todas las piezas—
  son una agregación periodística del macroprocedimiento, no proceden
  de un único documento judicial y no se contabilizan aquí como cifra
  estructurada para evitar el doble cómputo entre piezas.

