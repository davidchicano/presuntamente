notas: |
  Extesorero del Partido Popular condenado en primera instancia a 33
  años y 4 meses por la Época I de Gürtel, en sentencia recurrible.
  Los delitos exactos atribuidos están sujetos a confirmación de la
  sentencia íntegra como primario; provisionalmente se listan los
  nucleares de la pieza. La presunción de inocencia formal se mantenía
  hasta la firmeza.
