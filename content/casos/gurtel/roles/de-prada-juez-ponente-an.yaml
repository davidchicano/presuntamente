notas: |
  Magistrado integrante del tribunal de la Sección Segunda de la
  Audiencia Nacional que dictó la sentencia 20/2018 de la Época I de
  Gürtel; firmó un voto particular en esa resolución. Se modela como
  juez_ponente (responsable directo del voto particular) por no existir
  el rol juez_integrante en el esquema, conforme al precedente del caso
  Fiscal General del Estado.
