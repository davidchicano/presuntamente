notas: |
  Condenada en primera instancia a 15 años y 1 mes (Audiencia
  Nacional, 2018) y firme tras la confirmación del Tribunal Supremo,
  que ajustó la pena a 12 años y 11 meses por la Época I de Gürtel. Los
  delitos atribuidos quedan pendientes de afinar contra la sentencia
  íntegra; provisionalmente se lista el nuclear de la pieza
  (blanqueo). La presunción de inocencia decae respecto de los hechos
  declarados probados y firmes.
