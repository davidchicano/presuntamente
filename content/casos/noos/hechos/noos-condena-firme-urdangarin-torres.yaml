id: noos-condena-firme-urdangarin-torres
caso_id: noos
enunciado: |
  La Sala Segunda del Tribunal Supremo, en la sentencia 277/2018 (ECLI:ES:TS:2018:2056,
  ponente Antonio del Moral García, dictada el 12 de junio de 2018), confirmó las condenas
  penales de los principales acusados del caso Nóos con las siguientes penas definitivas:
  Iñaki Urdangarin, 5 años y 10 meses de prisión por prevaricación continuada y malversación
  (en concurso), tráfico de influencias, fraude a la Administración y dos delitos fiscales;
  Diego Torres Pérez, 5 años y 8 meses por malversación, prevaricación y fraude;
  Jaume Matas Palou, 3 años y 8 meses; y otros cuatro acusados con penas de entre 1 año y
  15 meses sustituidas por multa. La sentencia es firme desde el 12 de junio de 2018;
  el recurso de nulidad presentado por Urdangarin fue rechazado el 26 de septiembre de 2018.
