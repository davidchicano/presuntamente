id: noos-absoluciones
caso_id: noos
enunciado: |
  La Sala Segunda del Tribunal Supremo (STS 277/2018) confirmó la absolución penal de la
  Infanta Cristina de Borbón de los dos delitos fiscales de los que la acusaba el sindicato
  Manos Limpias, al igual que la Audiencia Provincial de Palma lo había hecho el 17 de febrero
  de 2017. El Tribunal Supremo rebajó no obstante la responsabilidad civil a título lucrativo
  impuesta a la Infanta Cristina de 265.088,42 euros a 136.950 euros, al entender que no debía
  responder en esa forma por los delitos fiscales de su marido. También resultaron absueltos
  en primera instancia y confirmados en casación cinco ex altos cargos de la Generalitat
  Valenciana acusados de haber adjudicado al Instituto Nóos contratos sin concurso público.
tipo: exculpatorio
