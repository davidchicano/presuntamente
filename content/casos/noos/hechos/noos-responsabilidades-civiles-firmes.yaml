id: noos-responsabilidades-civiles-firmes
caso_id: noos
enunciado: |
  La STS 277/2018 impuso responsabilidades civiles a título lucrativo (partícipes que se
  beneficiaron de los delitos sin ser autores penalmente responsables): la Infanta Cristina
  de Borbón fue condenada a abonar 136.950 euros por los delitos de malversación y fraude
  a la Administración cometidos por su marido; Ana María Tejeiro, esposa de Diego Torres, a
  172.550 euros por los mismos conceptos. Ambas habían sido absueltas penalmente tanto por la
  Audiencia Provincial de Palma como por el Tribunal Supremo.
tipo: acreditado
# Promovido a 'acreditado' el 2026-05-30 (rev. maintainer). La nota CGPJ (N1) STS 277/2018
# confirma literalmente los importes de responsabilidad civil a título lucrativo:
# Cristina de Borbón 136.950 €, Ana María Tejeiro 172.550 €.
fecha_o_periodo:
  desde: "2018-06-12"
  hasta: "2018-06-12"
  precision: dia
personas_implicadas:
