id: noos-contratos-fondos-publicos-atribuido
caso_id: noos
enunciado: |
  La sentencia de la Audiencia Provincial de Palma (2017), confirmada en casación por el
  Tribunal Supremo (STS 277/2018), declaró que entre 2004 y 2007 el Instituto Nóos,
  presidido por Iñaki Urdangarin, percibió fondos públicos de las administraciones autonómicas
  de Baleares y la Comunitat Valenciana a través de contratos suscritos al margen de los
  procedimientos legales de contratación pública y por los que no se prestaron los servicios
  contratados o se prestaron de forma deficiente. La sentencia apreció que Urdangarin se valió
  de su posición privilegiada derivada de su matrimonio con una hija del entonces Jefe del Estado
  para influir sobre los responsables políticos y obtener la adjudicación de los contratos.
  La cifra de fondos públicos percibidos sin contraprestación correlativa fue cuantificada en
  445.000 euros por la Sala Segunda del Tribunal Supremo.
tipo: acreditado
# Promovido a 'acreditado' el 2026-05-30 (rev. maintainer). La nota CGPJ (N1) STS 277/2018
# incluye el pasaje literal sobre los 445.000 euros sin contraprestación. La nota CGPJ AP
# Palma 2017 respalda los contratos sin procedimiento legal.
