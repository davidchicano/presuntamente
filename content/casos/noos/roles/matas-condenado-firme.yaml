notas: |
  Ex president del Govern de les Illes Balears. Condenado en sentencia firme (STS 277/2018)
  a 3 años y 8 meses de prisión por su papel en la adjudicación irregular de contratos al
  Instituto Nóos durante su mandato (2003-2007). La presunción de inocencia decae respecto
  de los hechos declarados probados y firmes.
