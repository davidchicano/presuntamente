notas: |
  Condenado en sentencia firme por la Sala Segunda del Tribunal Supremo (STS 277/2018,
  ECLI:ES:TS:2018:2056, ponente Antonio del Moral García, 12 de junio de 2018) a 5 años y
  10 meses de prisión. El recurso de nulidad fue rechazado el 26 de septiembre de 2018,
  consolidando definitivamente la firmeza. Ingresó en prisión el 18 de junio de 2018 en
  Brieva (Ávila). Obtuvo tercer grado en enero de 2021 y libertad condicional en marzo de 2022.
  Condena extinguida en abril de 2024. La presunción de inocencia decae respecto de los
  hechos declarados probados y firmes por el Tribunal Supremo.
