notas: |
  Absuelta penalmente de los dos delitos fiscales de los que la acusaba Manos Limpias,
  tanto por la Audiencia Provincial de Palma (17 de febrero de 2017) como por el Tribunal
  Supremo (STS 277/2018). Sin embargo, fue condenada como partícipe a título lucrativo al pago
  de 136.950 euros por los delitos de malversación y fraude a la Administración cometidos por
  su marido. La responsabilidad civil a título lucrativo es compatible con la absolución penal.
