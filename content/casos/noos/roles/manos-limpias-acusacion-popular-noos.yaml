# LLM-incierto: fecha exacta de personación de Manos Limpias; estimada.
notas: |
  El sindicato Manos Limpias ejerció la acusación popular en el caso Nóos, siendo la única
  parte que solicitó la investigación y el enjuiciamiento penal de la Infanta Cristina por
  dos delitos fiscales. Fue la acusación que logró la segunda imputación de la Infanta en
  enero de 2014, pese a la oposición de la Fiscalía Anticorrupción. La Infanta resultó
  absuelta penalmente en ambas instancias.
