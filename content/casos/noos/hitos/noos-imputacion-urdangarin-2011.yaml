titulo: "El juez Castro investiga a Iñaki Urdangarin por fraude fiscal, prevaricación, falsedad y malversación"
descripcion: |
  El magistrado-juez José Castro acuerda el 29 de diciembre de 2011 citar a Iñaki Urdangarin
  como investigado por presuntos delitos de evasión de impuestos, fraude fiscal, prevaricación,
  falsedad documental y malversación de caudales públicos en relación con la gestión del
  Instituto Nóos. El Juzgado de Instrucción nº 3 de Palma de Mallorca es el órgano instructor.
