titulo: "La Audiencia Provincial de Palma condena a 7 acusados y absuelve a la Infanta Cristina"
descripcion: |
  La Audiencia Provincial de les Illes Balears, Sección Primera, presidida por la magistrada
  Samanta Romero Torrente, dicta sentencia en el Procedimiento Abreviado 58/2015. Condena a
  siete de los diecisiete acusados: Iñaki Urdangarin a 6 años y 3 meses de prisión, Diego
  Torres a 8 años y 3 meses, Jaume Matas a 3 años y 8 meses, y otros cuatro a penas menores
  sustituidas por multa. Absuelve a la Infanta Cristina de los dos delitos fiscales de los que
  la acusaba Manos Limpias, aunque la condena como partícipe a título lucrativo al pago de
  265.088,42 euros. Absuelve igualmente a cinco ex altos cargos valencianos y a otros acusados.
  La sentencia no es firme: los condenados interponen recurso de casación ante el Tribunal Supremo.
