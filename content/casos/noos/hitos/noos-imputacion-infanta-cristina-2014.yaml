titulo: "El juez Castro vuelve a citar a la Infanta Cristina como investigada"
descripcion: |
  El juez José Castro vuelve a acordar la citación de la Infanta Cristina de Borbón como
  investigada por su presunta participación en delitos fiscales vinculados a las actividades
  del Instituto Nóos. Es la segunda vez que el juez la imputa; la primera (marzo de 2013)
  fue anulada por la Audiencia Provincial de les Illes Balears en mayo de 2013. La acusación
  que sostiene la imputación es la del sindicato Manos Limpias, pues la Fiscalía
  Anticorrupción se opone a su investigación.
