titulo: "El juez Castro abre juicio oral contra 17 acusados en el caso Nóos, incluida la Infanta Cristina"
descripcion: |
  El juez José Castro dicta auto de apertura de juicio oral en la pieza 25 (caso Nóos) del
  caso Palma Arena contra 17 acusados, entre ellos la Infanta Cristina de Borbón como cooperadora
  necesaria en dos delitos fiscales. La causa se eleva a la Audiencia Provincial de les Illes
  Balears para la celebración del juicio oral. Es el hito que da por concluida la instrucción
  ante el Juzgado de Instrucción nº 3 de Palma y abre la fase de enjuiciamiento.
