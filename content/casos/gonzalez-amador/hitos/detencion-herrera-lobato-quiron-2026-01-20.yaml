titulo: "La Policía Nacional detiene a David Herrera Lobato en Arahal (Sevilla) por orden de la Audiencia Nacional en la pieza separada por presunta corrupción en negocios con Quirón Prevención"
descripcion: |
  El 20 de enero de 2026 la Policía Nacional detiene a David Herrera
  Lobato en Arahal (Sevilla) por orden de la Sección Segunda de la
  Sala de lo Penal de la Audiencia Nacional, a la que es trasladado
  para tomarle declaración. La detención se enmarca en una pieza
  separada del procedimiento instruido por el Juzgado de Instrucción
  nº 19 de Madrid en la que se investigan presuntos delitos de
  corrupción en los negocios y administración desleal en relación con
  operaciones facturadas por Maxwell Cremona Ingeniería y Procesos
  S.L. a Quirón Prevención S.L. en 2020, por importe próximo a 1,9
  millones de euros. La intervención de la Audiencia Nacional aquí
  se limita a la emisión de la orden de detención y la toma inicial
  de declaración; la sustanciación de la pieza separada continúa en
  el Juzgado de Instrucción nº 19 de Madrid. Rige el principio de
  presunción de inocencia mientras no recaiga resolución firme.
