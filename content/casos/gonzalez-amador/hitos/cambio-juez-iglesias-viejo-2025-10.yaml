titulo: "El magistrado Antonio Viejo Llorente asume la titularidad del Juzgado de Instrucción nº 19 de Madrid en sustitución de Inmaculada Iglesias, jubilada"
descripcion: |
  Tras la jubilación voluntaria de la magistrada María Inmaculada
  Iglesias Sánchez, declarada por Acuerdo de la Comisión Permanente
  del Consejo General del Poder Judicial del 13 de mayo de 2025
  (BOE-A-2025-16497) con efectos del 10 de agosto de 2025, el Real
  Decreto 838/2025, de 22 de septiembre (BOE-A-2025-19789), destina
  al magistrado Antonio Viejo Llorente, hasta entonces magistrado del
  orden penal de la Audiencia Provincial de Madrid, al Juzgado de
  Instrucción nº 19 de Madrid (Instrucción y Control de los Centros
  de Internamiento de Extranjeros y de las Salas de Inadmisión de
  fronteras), conforme al concurso resuelto por la Comisión
  Permanente del CGPJ el 16 de septiembre de 2025. Viejo asume la
  instrucción del procedimiento principal contra Alberto González
  Amador y los demás procesados, así como la pieza separada por
  presuntos delitos de corrupción en los negocios y administración
  desleal vinculados a operaciones de Quirón Prevención S.L. abierta
  por la magistrada saliente.
