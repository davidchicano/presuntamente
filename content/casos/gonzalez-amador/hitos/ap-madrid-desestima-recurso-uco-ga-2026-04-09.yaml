titulo: "La Audiencia Provincial de Madrid desestima el recurso de la defensa de González Amador para frenar la investigación de la UCO en la rama Quirón"
descripcion: |
  La Audiencia Provincial de Madrid (Sección 3ª) dicta auto el 9 de
  abril de 2026 por el que desestima el recurso de apelación interpuesto
  por la representación procesal de Alberto González Amador contra la
  encomienda de investigación a la Unidad Central Operativa de la
  Guardia Civil ordenada por el Juzgado de Instrucción nº 19 de Madrid
  en junio de 2025. El tribunal considera que la encomienda a la UCO
  constituye una diligencia ordinaria de investigación no recurrible
  en esta fase procesal y que no vulnera ningún derecho del investigado.
  La resolución permite a la UCO continuar con el informe encargado
  sobre la rama del caso que afecta a la clínica Quirón. A fecha de
  este barrido (27-may-2026), el informe de la UCO aún no ha sido
  entregado al juzgado (más de 300 días desde el encargo del
  27-jun-2025). Conforme al principio de presunción de inocencia,
  la condición de investigado no implica valoración de culpabilidad
  y persiste mientras no recaiga resolución firme en contrario.
