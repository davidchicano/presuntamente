# Caso González Amador — esqueleto inicial (PR1).
#
# Procedimiento penal por presunto fraude fiscal y falsedad documental
# seguido ante el Juzgado de Instrucción nº 19 de Madrid, con origen en
# una denuncia de la AEAT a la Fiscalía Provincial de Madrid sobre
# discrepancias en el Impuesto sobre Sociedades 2020 y 2021 de la
# mercantil Maxwell Cremona S.L., cuyo administrador único es Alberto
# González Amador, pareja de Isabel Díaz Ayuso. Por auto del 29 de mayo
# de 2025 el Juzgado de Instrucción nº 19 cerró la instrucción y propuso
# el enjuiciamiento de González Amador y otros cuatro investigados ante
# Juzgado de lo Penal. La apertura del juicio oral se acordó el 22 de
# septiembre de 2025; la Audiencia Provincial de Madrid (Sección 3ª)
# confirmó el procesamiento por auto del 7 de noviembre de 2025.

id: gonzalez-amador
nombre_oficial: "Diligencias Previas — Juzgado de Instrucción nº 19 de Madrid"
nombre_mediatico: "Caso González Amador"
nombres_alternativos:
  - "Caso del novio de Ayuso"
  - "Caso de la pareja de Ayuso"
  - "Caso Maxwell Cremona"

descripcion_corta: |
  Procedimiento penal seguido ante el Juzgado de Instrucción nº 19 de
  Madrid, instruido inicialmente por la magistrada Inmaculada Iglesias
  y, tras su jubilación, por el magistrado Antonio Viejo, sobre la
  presunta defraudación a la Hacienda Pública por importe de 350.951
  euros en los ejercicios 2020 y 2021 a través de la sociedad Maxwell
  Cremona Ingeniería y Procesos S.L., de la que Alberto González Amador
  es administrador único. El procedimiento se incoó tras denuncia
  presentada por la Fiscalía Provincial de Madrid sobre la base del
  expediente de inspección remitido por la AEAT el 22 de enero de 2024.
  Por auto del 29 de mayo de 2025 el Juzgado de Instrucción nº 19 cerró
  la instrucción y propuso el enjuiciamiento de Alberto González Amador
  y otros cuatro investigados por presuntos delitos contra la Hacienda
  Pública en concurso medial con falsedad en documento mercantil. Por
  auto del 22 de septiembre de 2025 se acordó la apertura del juicio
  oral. La Audiencia Provincial de Madrid (Sección 3ª) ratificó el
  procesamiento por auto del 7 de noviembre de 2025, desestimando el
  recurso de apelación de las defensas. El procedimiento se encuentra,
  a la fecha de redacción de esta ficha, en fase intermedia a la espera
  del señalamiento de juicio oral.

sintesis_caso:
  que_se_investiga: "Un presunto fraude fiscal y falsedad documental atribuidos a Alberto González Amador y otros investigados."
  hechos_clave:
    - "La causa nace de una denuncia basada en un expediente de la AEAT sobre el Impuesto sobre Sociedades de 2020 y 2021."
    - "El juzgado cerró la instrucción y acordó la apertura de juicio oral en 2025."
    - "La Audiencia Provincial de Madrid confirmó el procesamiento en noviembre de 2025."
  estado_actual: "El procedimiento está en fase intermedia; no hay sentencia firme."
  cifras_clave:
    - "350.951 € de perjuicio fiscal atribuido por la AEAT"
    - "3 años y 9 meses pide Fiscalía"
    - "5 años piden PSOE y Más Madrid"

