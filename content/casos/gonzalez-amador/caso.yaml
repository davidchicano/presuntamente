descripcion_corta: |
  Procedimiento penal seguido ante el Juzgado de Instrucción nº 19 de
  Madrid, instruido inicialmente por la magistrada Inmaculada Iglesias
  y, tras su jubilación, por el magistrado Antonio Viejo, sobre la
  presunta defraudación a la Hacienda Pública por importe de 350.951
  euros en los ejercicios 2020 y 2021 a través de la sociedad Maxwell
  Cremona Ingeniería y Procesos S.L., de la que Alberto González Amador
  es administrador único. El procedimiento se incoó tras denuncia
  presentada por la Fiscalía Provincial de Madrid sobre la base del
  expediente de inspección remitido por la AEAT el 22 de enero de 2024.
  Por auto del 29 de mayo de 2025 el Juzgado de Instrucción nº 19 cerró
  la instrucción y propuso el enjuiciamiento de Alberto González Amador
  y otros cuatro investigados por presuntos delitos contra la Hacienda
  Pública en concurso medial con falsedad en documento mercantil. Por
  auto del 22 de septiembre de 2025 se acordó la apertura del juicio
  oral. La Audiencia Provincial de Madrid (Sección 3ª) ratificó el
  procesamiento por auto del 7 de noviembre de 2025, desestimando el
  recurso de apelación de las defensas. El procedimiento se encuentra,
  a la fecha de redacción de esta ficha, en fase intermedia a la espera
  del señalamiento de juicio oral.

