resumen_cifras: |
  Conforme al informe de la AEAT que sostiene la denuncia inicial, el
  perjuicio cuantificado a la Hacienda Pública asciende a 350.951
  euros, correspondientes a los ejercicios 2020 y 2021 del Impuesto
  sobre Sociedades de la mercantil Maxwell Cremona Ingeniería y
  Procesos S.L. La Fiscalía Provincial de Madrid y la Abogacía del
  Estado solicitan 3 años y 9 meses de prisión para Alberto González
  Amador por dos delitos contra la Hacienda Pública en concurso medial
  con falsedad en documento mercantil. Las acusaciones populares del
  PSOE y Más Madrid elevan la petición a 5 años de prisión y multa,
  añadiendo delito contable continuado y pertenencia a grupo criminal.

