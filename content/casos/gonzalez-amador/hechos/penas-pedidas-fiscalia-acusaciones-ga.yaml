id: ga-penas-pedidas-fiscalia-acusaciones
caso_id: gonzalez-amador
enunciado: |
  En el escrito de calificación provisional, la Fiscalía Provincial
  de Madrid y la Abogacía del Estado solicitan 3 años y 9 meses de
  prisión y multa superior a 600.000 euros para Alberto González
  Amador por dos presuntos delitos contra la Hacienda Pública en
  concurso medial con un delito continuado de falsedad en documento
  mercantil. Las acusaciones populares ejercidas por el PSOE y Más
  Madrid elevan la petición a 5 años de prisión y multa, añadiendo a
  los anteriores un delito contable continuado y un delito de
  pertenencia a grupo criminal. Las peticiones son provisionales y se
  modificarán, en su caso, en función del juicio oral.
