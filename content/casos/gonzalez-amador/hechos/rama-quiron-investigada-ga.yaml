id: ga-rama-quiron-investigada
caso_id: gonzalez-amador
enunciado: |
  En una pieza separada del procedimiento principal, instruida por el
  Juzgado de Instrucción nº 19 de Madrid (titularidad inicial de la
  magistrada Inmaculada Iglesias, posteriormente del magistrado
  Antonio Viejo), se investiga indiciariamente que Alberto González
  Amador y David Herrera Lobato habrían intervenido en operaciones de
  facturación de Maxwell Cremona Ingeniería y Procesos S.L. a Quirón
  Prevención S.L. en 2020 por importe próximo a 1,9 millones de
  euros, posibles constitutivas de delitos de corrupción en los
  negocios y administración desleal. La pieza incluye un presunto
  pago encubierto presentado como comisión de 500.000 euros vinculado
  a la presidencia de Quirón Prevención. La pieza se encuentra en
  fase de instrucción, con prórroga del periodo acordada hasta el 23
  de octubre de 2025 y petición de seis meses adicionales formulada
  por las acusaciones populares del PSOE y Más Madrid el 9 de abril
  de 2026. Rige el principio de presunción de inocencia.
