id: ga-defensa-invoca-fge-vulneracion-proceso
caso_id: gonzalez-amador
enunciado: |
  Por escrito del 19 de febrero de 2026, la defensa de Alberto
  González Amador invoca la sentencia firme dictada por el Tribunal
  Supremo contra el ex-Fiscal General del Estado, Álvaro García
  Ortiz, por revelación de secretos del correo electrónico remitido
  el 2 de febrero de 2024 por el abogado del investigado al
  Ministerio Fiscal, como vulneración del derecho fundamental a un
  proceso penal justo y a la presunción de inocencia, y pide aplicar
  sus consecuencias al procedimiento principal por presunto fraude
  fiscal y falsedad documental. El escrito sostiene que "este
  procedimiento penal constituye, desde antes de existir y durante
  todo su desarrollo, la antítesis del procedimiento penal justo en
  un Estado Constitucional". Su admisión y resolución por el órgano
  competente está pendiente.
