id: ga-comision-quiron-500000-investigada
caso_id: gonzalez-amador
enunciado: |
  En la pieza separada instruida por el Juzgado de Instrucción nº 19
  de Madrid se investiga indiciariamente un pago encubierto, presentado
  como "comisión" de 500.000 euros, vinculado a la presidencia de
  Quirón Prevención S.L., como posible constitutivo de un delito de
  corrupción en los negocios en concurso con administración desleal.
  La encomienda del 27 de junio de 2025 a la Unidad Central Operativa
  de la Guardia Civil tiene por objeto, entre otros, el análisis de
  este pago y la determinación de su naturaleza efectiva. Rige el
  principio de presunción de inocencia.
