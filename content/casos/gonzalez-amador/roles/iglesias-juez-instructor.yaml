notas: |
  La magistrada María Inmaculada Iglesias Sánchez instruyó el
  procedimiento desde su incoación tras la denuncia de la AEAT del 22
  de enero de 2024 hasta su jubilación voluntaria, con efectos del 10
  de agosto de 2025 conforme al Acuerdo de la Comisión Permanente del
  CGPJ del 13 de mayo de 2025 (BOE-A-2025-16497). La fecha de inicio
  aquí (2024-04-01) es aproximada por mes (precisión real:
  fecha_precision=mes); el procedimiento se incoó tras la denuncia y
  Iglesias instruyó hasta su jubilación. Pendiente de afinar la fecha
  exacta de asignación con consulta directa al CGPJ.
