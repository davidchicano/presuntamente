notas: |
  El magistrado Antonio Viejo Llorente asume la titularidad del
  Juzgado de Instrucción nº 19 de Madrid por Real Decreto 838/2025,
  de 22 de septiembre (BOE-A-2025-19789), en virtud del concurso
  resuelto por la Comisión Permanente del Consejo General del Poder
  Judicial el 16 de septiembre de 2025. Hereda la instrucción del
  procedimiento principal por presunto fraude fiscal y falsedad
  documental y mantiene la fase intermedia abierta a la espera del
  señalamiento de juicio oral; mantiene asimismo abierta la pieza
  separada por presunta corrupción en los negocios y administración
  desleal en relación con Quirón Prevención. Este rol queda abierto.
