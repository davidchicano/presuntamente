notas: |
  La Abogacía General del Estado ejerce la representación procesal de
  la Hacienda Pública como perjudicada por la presunta defraudación
  cuantificada por la AEAT en 350.951 euros. Solicita, junto con la
  Fiscalía Provincial de Madrid, 3 años y 9 meses de prisión y multa
  superior a 600.000 euros para Alberto González Amador por dos
  presuntos delitos contra la Hacienda Pública en concurso medial
  con falsedad en documento mercantil. El rol queda abierto. La
  fecha de inicio aquí es aproximada a la fecha de remisión del
  expediente por la AEAT; el escrito formal de personación de la
  Abogacía del Estado en las actuaciones es posterior y aún no
  consta con fecha precisa en fuente pública.
