notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 David Herrera Lobato queda procesado por su presunta
  participación en la emisión de facturas que no se corresponderían
  con servicios efectivamente prestados, utilizadas por Maxwell
  Cremona Ingeniería y Procesos S.L. para minorar su tributación. El
  20 de enero de 2026 fue detenido por la Policía Nacional en Arahal
  (Sevilla) en el marco de una rama del procedimiento relacionada con
  presuntas irregularidades en contratos con el grupo sanitario
  Quirón. Rige el
  principio de presunción de inocencia mientras no recaiga
  resolución firme.
