notas: |
  Por auto del Juzgado de Instrucción nº 19 de Madrid del 29 de mayo
  de 2025 la mercantil Maxwell Cremona Ingeniería y Procesos S.L.
  queda procesada como persona jurídica al amparo de la Ley Orgánica
  5/2010, por dos presuntos delitos contra la Hacienda Pública en
  concurso medial con un delito continuado de falsedad en documento
  mercantil. Conforme al instructor, los hechos indiciariamente
  acreditados consisten en la deducción por la mercantil de gastos
  amparados en facturas que no se correspondían con servicios
  efectivamente prestados, minorando indebidamente su tributación
  por el Impuesto sobre Sociedades de los ejercicios 2020 y 2021. La
  Audiencia Provincial de Madrid (Sección 3ª) ratificó el
  procesamiento por auto del 7 de noviembre de 2025. La condición de
  procesada no implica valoración de culpabilidad: rige el principio
  de presunción de inocencia mientras no recaiga resolución firme en
  contrario. Este rol queda abierto hasta que un nuevo hito
  (sentencia firme, absolución, archivo) lo cierre.
