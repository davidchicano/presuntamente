titulo: "El Juzgado de Instrucción nº 41 de Madrid cierra la instrucción y procesa a Begoña Gómez, Cristina Álvarez y Juan Carlos Barrabés por cuatro delitos, archivando el intrusismo profesional"
descripcion: |
  El magistrado Juan Carlos Peinado, titular del Juzgado de Instrucción
  nº 41 de Madrid, dicta auto de 13 de abril de 2026 por el que da por
  concluida la instrucción y propone el enjuiciamiento de Begoña Gómez,
  María Cristina Álvarez Fernández y Juan Carlos Barrabés ante un
  Tribunal del Jurado por presuntos delitos de tráfico de influencias,
  corrupción en los negocios, malversación de caudales públicos y
  apropiación indebida. En el mismo auto el instructor acuerda el
  archivo del delito de intrusismo profesional respecto de Begoña
  Gómez por no apreciar indicios sólidos. Conforme al instructor,
  consta indiciariamente que la investigada habría utilizado su
  posición como esposa del presidente del Gobierno y residente en el
  Palacio de la Moncloa para mantener "interacciones institucionales
  excepcionales" relacionadas con la creación y gestión de la Cátedra
  Extraordinaria de Transformación Social Competitiva en la Universidad
  Complutense de Madrid. Conforme al principio de presunción de
  inocencia, la condición de procesados no implica valoración de
  culpabilidad y persiste mientras no recaiga resolución firme en
  contrario.
