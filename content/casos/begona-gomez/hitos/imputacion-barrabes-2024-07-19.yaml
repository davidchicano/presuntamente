titulo: "El Juzgado de Instrucción nº 41 de Madrid cita como investigado al empresario Juan Carlos Barrabés en el caso Begoña Gómez"
descripcion: |
  El Juzgado de Instrucción nº 41 de Madrid, tras la declaración como
  testigo del empresario Juan Carlos Barrabés celebrada el 15 de julio
  de 2024, eleva su condición a la de investigado en las diligencias
  previas seguidas por la presunta utilización por parte de Begoña
  Gómez de su posición institucional para favorecer intereses
  empresariales vinculados al primero. La imputación se produce por
  presuntos delitos de tráfico de influencias y corrupción en los
  negocios. La condición de investigado no implica valoración de
  culpabilidad: rige el principio de presunción de inocencia mientras
  no recaiga resolución firme en contrario.
