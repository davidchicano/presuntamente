titulo: "La Audiencia Provincial de Madrid revoca la condición de investigado del rector de la UCM Joaquín Goyache"
descripcion: |
  La Audiencia Provincial de Madrid, conociendo del recurso de
  apelación interpuesto contra la imputación acordada por el Juzgado
  de Instrucción nº 41 de Madrid, dicta auto el 16 de mayo de 2025 por
  el que estima el recurso del rector de la Universidad Complutense
  de Madrid, Joaquín Goyache, y deja sin efecto su condición de
  investigado al considerar que no concurren indicios racionales de
  criminalidad. La resolución cierra el rol procesal de imputación de
  Goyache, que recupera su condición ordinaria en relación con esta
  causa. Conforme al principio de presunción de inocencia, rige la
  inocencia mientras no recaiga resolución firme en contrario.
