titulo: "El Juzgado de Instrucción nº 41 de Madrid cita como investigada por malversación a la asesora de Begoña Gómez en Moncloa, Cristina Álvarez"
descripcion: |
  El Juzgado de Instrucción nº 41 de Madrid acuerda el 18 de agosto de
  2025 la imputación como investigada de María Cristina Álvarez
  Fernández, asesora de Begoña Gómez en el Complejo de la Moncloa, por
  un presunto delito de malversación de caudales públicos. La
  imputación se asienta indiciariamente, según el instructor, en la
  presunta utilización por parte de Álvarez de medios públicos
  asociados a su puesto de asesora para tareas vinculadas a la
  actividad privada de Gómez (entre otras, en relación con la Cátedra
  de Transformación Social Competitiva de la UCM). Álvarez había
  comparecido previamente como testigo el 20 de diciembre de 2024. La
  condición de investigada no implica valoración de culpabilidad: rige
  el principio de presunción de inocencia mientras no recaiga
  resolución firme en contrario.
