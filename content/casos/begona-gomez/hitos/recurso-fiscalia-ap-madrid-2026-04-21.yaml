titulo: "La Fiscalía Provincial de Madrid recurre ante la Audiencia Provincial el auto de procesamiento del 13 de abril de 2026 y pide el archivo de la causa"
descripcion: |
  La Fiscalía Provincial de Madrid presenta el 21 de abril de 2026
  recurso de apelación ante la Audiencia Provincial de Madrid contra
  el auto del Juzgado de Instrucción nº 41 de Madrid del 13 de abril
  de 2026, que cerraba la instrucción y proponía enjuiciamiento ante
  Tribunal del Jurado de Begoña Gómez, María Cristina Álvarez
  Fernández y Juan Carlos Barrabés por presuntos delitos de tráfico
  de influencias, corrupción en los negocios, malversación de
  caudales públicos y apropiación indebida. El Ministerio Fiscal
  solicita, con carácter principal, el archivo libre del procedimiento
  respecto de todos los delitos y todos los procesados al considerar
  que los hechos no son constitutivos de infracción penal, y, con
  carácter subsidiario, el sobreseimiento provisional. La Fiscalía
  ha sostenido desde la incoación de las diligencias previas (recurso
  contra el auto de 16 de abril de 2024 presentado el 25 de abril de
  2024) que no aprecia indicios racionales de criminalidad.
