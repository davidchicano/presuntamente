titulo: "La Audiencia Provincial de Madrid anula los autos del Juzgado de Instrucción nº 41 que abrían vía a Tribunal del Jurado por falta de motivación"
descripcion: |
  La Sección competente de la Audiencia Provincial de Madrid dicta
  auto el 23 de febrero de 2026 por el que estima los recursos de
  apelación interpuestos por las defensas y anula cuatro autos del
  Juzgado de Instrucción nº 41 de Madrid que abrían la vía al
  enjuiciamiento de Begoña Gómez ante un Tribunal del Jurado. La
  resolución considera que los autos del instructor carecen de la
  motivación necesaria — en particular, se limitan a mencionar a las
  personas a las que se dirigen sin un relato de los indicios
  plausibles que sostengan la decisión — y recuerda al instructor
  que, tras año y medio de instrucción, la mera plausibilidad inicial
  de la denuncia ya no es suficiente y se requieren indicios
  racionales de criminalidad suficientes. La resolución no descarta
  que la causa pueda llegar a Tribunal del Jurado en el futuro, pero
  ordena al instructor retrotraer las actuaciones a un momento
  anterior a la transformación procedimental.
