id: bg-archivo-intrusismo-2026-04-13
caso_id: begona-gomez
enunciado: |
  Consta en el auto del Juzgado de Instrucción nº 41 de Madrid del
  13 de abril de 2026 que el instructor acuerda el archivo del delito
  de intrusismo profesional respecto de Begoña Gómez, al considerar que
  no concurren indicios sólidos para sostenerlo. Los otros cuatro
  delitos investigados (tráfico de influencias, corrupción en los
  negocios, malversación de caudales públicos y apropiación indebida)
  se mantienen y el procedimiento continúa por ellos. El archivo del
  delito de intrusismo profesional no afecta a la condición procesal de
  los demás investigados ni a los demás objetos de la causa.
