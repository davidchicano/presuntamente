id: bg-fiscalia-pide-archivo
caso_id: begona-gomez
enunciado: |
  Consta en sucesivos escritos públicos de la Fiscalía Provincial de
  Madrid —desde el recurso de apelación contra el auto de incoación
  presentado el 25 de abril de 2024 hasta el recurso presentado ante
  la Audiencia Provincial de Madrid el 22 de abril de 2026 contra el
  auto de procesamiento del 13 de abril de 2026— que el Ministerio
  Fiscal sostiene de forma reiterada que no aprecia indicios de la
  comisión de los delitos investigados y solicita el archivo de la
  causa o, subsidiariamente, su sobreseimiento provisional.
