importe_nota: >-
  Desglose del gasto financiado por la UCM: 108.765,79 € en contratos
  administrativos (entre otros, Deloitte y Making Science) + 4.743,53 € en
  costes de personal. Misma cifra que el perjuicio cuantificado por la UCM,
  por lo que NO acumula al total del caso.
