id: bg-ucm-perjudicada-cuantificacion-2026-01-27
caso_id: begona-gomez
enunciado: |
  Según el escrito presentado por la Universidad Complutense de Madrid
  ya personada como perjudicada en la causa y recogido por Moncloa.com
  el 27 de enero de 2026, la propia universidad cuantifica
  indiciariamente en 113.509,32 euros el perjuicio económico que
  habría sufrido como consecuencia de los hechos imputados a Begoña
  Gómez en relación con la titularidad del software de la Cátedra
  Extraordinaria de Transformación Social Competitiva. Ese importe
  coincide con el coste de desarrollo del software financiado por la
  propia universidad.
