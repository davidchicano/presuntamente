id: bg-catedra-tsc-ucm
caso_id: begona-gomez
enunciado: |
  Consta en el auto del Juzgado de Instrucción nº 41 de Madrid del
  13 de abril de 2026 que se atribuye indiciariamente a Begoña Gómez
  Fernández la creación y la codirección, junto al empresario Juan
  Carlos Barrabés, de la Cátedra Extraordinaria de Transformación
  Social Competitiva (TSC) en la Universidad Complutense de Madrid.
  Según el instructor, la investigada habría registrado además a su
  nombre la marca "Transformación Social Competitiva" y el dominio
  transformatsc.org, y habría participado en la constitución de una
  sociedad mercantil con la misma denominación en noviembre de 2023,
  hechos que la acusación considera incompatibles con la asignación
  de los derechos a la propia UCM.
