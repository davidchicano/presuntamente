id: bg-carta-recomendacion-barrabes-2020
caso_id: begona-gomez
enunciado: |
  Se atribuye en la denuncia presentada por Manos Limpias el 8 de abril
  de 2024 y se recoge indiciariamente en el auto de procesamiento del
  13 de abril de 2026 que Begoña Gómez Fernández habría firmado en 2020
  cartas de recomendación favorables al empresario Juan Carlos Barrabés
  en relación con sociedades de su grupo que posteriormente habrían
  resultado adjudicatarias de contratos públicos por importe superior
  a diez millones de euros. El instructor considera indiciariamente
  que dichas cartas habrían sido emitidas prevaliéndose la firmante
  de su posición como esposa del presidente del Gobierno.
