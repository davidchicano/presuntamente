descripcion_corta: |
  Procedimiento penal seguido ante el Juzgado de Instrucción nº 41 de
  Madrid, instruido por el magistrado Juan Carlos Peinado, sobre la
  presunta utilización por Begoña Gómez —esposa del presidente del
  Gobierno Pedro Sánchez— de su posición institucional en relación con
  la creación y gestión de la Cátedra Extraordinaria de Transformación
  Social Competitiva de la Universidad Complutense de Madrid y con
  contratos públicos vinculados al empresario Juan Carlos Barrabés. El
  procedimiento se incoó tras denuncia presentada por la asociación
  Manos Limpias el 8 de abril de 2024. Por auto de 13 de abril de 2026
  el instructor cerró la instrucción y propuso enjuiciamiento ante
  Tribunal del Jurado por presuntos delitos de tráfico de influencias,
  corrupción en los negocios, malversación de caudales públicos y
  apropiación indebida, archivando el delito de intrusismo profesional.
  El 20 de junio de 2026 el instructor acordó la apertura del juicio
  oral y la imposición de medidas cautelares personales a Begoña Gómez
  y Cristina Álvarez. Dos días antes, mediante providencia de 18 de
  junio conocida el 19 de junio, abrió además una pieza separada
  dirigida solo contra Barrabés por presunta prevaricación y fraude a
  los intereses financieros de la Unión Europea en una adjudicación de
  Red.es. La Fiscalía Provincial de Madrid ha sostenido desde la
  apertura, de forma reiterada, que no concurren indicios de delito y
  ha solicitado el archivo de la causa principal.

sintesis_caso:
  que_se_investiga: "Si Begoña Gómez usó su posición institucional en relación con una cátedra de la Universidad Complutense y contratos vinculados a Juan Carlos Barrabés."
  hechos_clave:
    - "El procedimiento empezó en abril de 2024 por una denuncia de Manos Limpias."
    - "El instructor abrió juicio oral el 20 de junio de 2026 contra Begoña Gómez, Cristina Álvarez y Juan Carlos Barrabés en la causa principal."
    - "La Fiscalía sostiene que no hay indicios suficientes y ha pedido el archivo."
  estado_actual: "La causa principal está en fase intermedia tras el auto de apertura de juicio oral de 20 de junio de 2026, con retirada de pasaporte, prohibición de salida de España y comparecencia quincenal para Begoña Gómez y Cristina Álvarez; no hay sentencia firme. En paralelo, desde el 18 de junio de 2026 el instructor tramita una pieza separada dirigida solo contra Barrabés por presunta prevaricación y fraude a los intereses financieros de la Unión Europea en un contrato de Red.es."
  cifras_clave:
    - "113.509,32 € de gasto UCM citado"
    - "4 delitos presuntos en la causa"
    - "Apertura de juicio oral acordada"

