# Caso Begoña Gómez — esqueleto inicial (PR1 — primer caso de arranque
# con la skill /investigar-caso v0).
#
# Esta primera versión es deliberadamente conservadora: schema validable,
# datos verificables a partir de cobertura multimedio cruzada y de los
# datos oficiales publicados por la UCM. Decisiones editoriales
# sensibles y hitos sin documento N1 localizado quedan anotados en
# NOTES.md para PR2.

id: begona-gomez
nombre_oficial: "Diligencias Previas — Juzgado de Instrucción nº 41 de Madrid"
