descripcion_corta: |
  Procedimiento penal seguido ante el Juzgado de Instrucción nº 41 de
  Madrid, instruido por el magistrado Juan Carlos Peinado, sobre la
  presunta utilización por Begoña Gómez —esposa del presidente del
  Gobierno Pedro Sánchez— de su posición institucional en relación con
  la creación y gestión de la Cátedra Extraordinaria de Transformación
  Social Competitiva de la Universidad Complutense de Madrid y con
  contratos públicos vinculados al empresario Juan Carlos Barrabés. El
  procedimiento se incoó tras denuncia presentada por la asociación
  Manos Limpias el 8 de abril de 2024. Por auto de 13 de abril de 2026
  el instructor cerró la instrucción y propuso enjuiciamiento ante
  Tribunal del Jurado por presuntos delitos de tráfico de influencias,
  corrupción en los negocios, malversación de caudales públicos y
  apropiación indebida, archivando el delito de intrusismo profesional.
  La Fiscalía Provincial de Madrid ha sostenido desde la apertura, de
  forma reiterada, que no concurren indicios de delito y ha solicitado
  el archivo.

