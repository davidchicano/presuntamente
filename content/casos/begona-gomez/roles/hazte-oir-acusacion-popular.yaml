notas: |
  La asociación HazteOír.org se persona como acusación popular en el
  procedimiento poco después de la apertura de diligencias, en torno
  al 24 de abril de 2024 conforme a la cobertura periodística. La
  fecha exacta del auto de admisión de su personación queda pendiente
  de localizar para PR2; `fecha_inicio` se aproxima conforme a la
  cobertura disponible. Otras acusaciones populares personadas
  posteriormente (Vox, Iustitia Europa, Movimiento de Regeneración
  Política de España) se modelarán también en PR2.
