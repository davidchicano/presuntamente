notas: |
  Por auto del Juzgado de Instrucción nº 41 de Madrid del 13 de abril
  de 2026 Juan Carlos Barrabés queda procesado y propuesto para
  enjuiciamiento ante un Tribunal del Jurado por presuntos delitos de
  tráfico de influencias y corrupción en los negocios. La condición
  de procesado no implica valoración de culpabilidad: rige el
  principio de presunción de inocencia mientras no recaiga resolución
  firme en contrario.
