notas: |
  Begoña Gómez Fernández es investigada en el procedimiento del
  Juzgado de Instrucción nº 41 de Madrid desde la incoación de
  diligencias previas por auto de 16 de abril de 2024, dictado a raíz
  de la denuncia presentada por Manos Limpias el 8 de abril de 2024.
  Durante la instrucción se le fueron atribuyendo indiciariamente, en
  ampliaciones sucesivas, los delitos de tráfico de influencias y
  corrupción en los negocios (denuncia inicial), apropiación indebida
  e intrusismo profesional (admitidos por el instructor el 29 de
  octubre de 2024) y malversación de caudales públicos (admitido el
  18 de agosto de 2025). Por auto de 13 de abril de 2026 el instructor
  cierra la instrucción, archiva el delito de intrusismo profesional
  y procesa a la investigada por los otros cuatro delitos: este hito
  cierra su condición de investigada y abre la de procesada. La
  condición de investigada no implica valoración de culpabilidad: rige
  el principio de presunción de inocencia mientras no recaiga
  resolución firme en contrario.
