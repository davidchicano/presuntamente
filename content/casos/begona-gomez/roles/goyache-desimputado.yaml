notas: |
  Por auto de la Audiencia Provincial de Madrid del 16 de mayo de 2025
  Joaquín Goyache deja de tener la condición de investigado al no
  apreciar el tribunal indicios racionales de criminalidad. Rige el
  principio de presunción de inocencia; la causa continúa por los
  demás investigados pero no respecto del rector. Este rol queda
  abierto como condición procesal vigente del rector en relación con
  este procedimiento.
