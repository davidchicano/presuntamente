notas: |
  Por auto del Juzgado de Instrucción nº 41 de Madrid del 13 de abril
  de 2026 María Cristina Álvarez Fernández queda procesada y propuesta
  para enjuiciamiento ante un Tribunal del Jurado por presunta
  malversación de caudales públicos. La condición de procesada no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia mientras no recaiga resolución firme en contrario.
