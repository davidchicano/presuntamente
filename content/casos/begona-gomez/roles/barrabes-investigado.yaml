notas: |
  Juan Carlos Barrabés es citado como investigado por el Juzgado de
  Instrucción nº 41 de Madrid el 19 de julio de 2024, tras haber
  declarado como testigo el 15 de julio, por presuntos delitos de
  tráfico de influencias y corrupción en los negocios en relación con
  la presunta utilización por Begoña Gómez de su posición institucional
  para favorecer la actividad mercantil de sociedades vinculadas al
  empresario. Por auto de 13 de abril de 2026 esta condición se
  transforma en la de procesado. La condición de investigado no
  implica valoración de culpabilidad: rige el principio de presunción
  de inocencia mientras no recaiga resolución firme en contrario.
