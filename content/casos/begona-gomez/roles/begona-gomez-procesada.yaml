notas: |
  Por auto del Juzgado de Instrucción nº 41 de Madrid del 13 de abril
  de 2026 Begoña Gómez Fernández queda procesada y propuesta para
  enjuiciamiento ante un Tribunal del Jurado por presuntos delitos de
  tráfico de influencias, corrupción en los negocios, malversación de
  caudales públicos y apropiación indebida. La condición de procesada
  no implica valoración de culpabilidad: rige el principio de
  presunción de inocencia mientras no recaiga resolución firme en
  contrario. Esta ficha quedará abierta hasta que un nuevo hito
  (sentencia firme, revocación por la Audiencia Provincial, archivo)
  cierre el rol.
