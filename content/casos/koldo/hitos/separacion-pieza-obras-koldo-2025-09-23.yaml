titulo: "El Supremo forma una pieza separada sobre adjudicaciones de obras públicas dentro de la causa especial"
descripcion: |
  La Sentencia TS 418/2026 reproduce la parte dispositiva del auto de 23 de septiembre de
  2025 por el que se forma una pieza separada sobre adjudicaciones de obras públicas
  dentro de la Causa Especial 003/20775/2020-II. Esa pieza conserva como investigados, en
  ese momento, a José Luis Ábalos, Koldo García, Víctor de Aldama, Santos Cerdán, Joseba
  Antxon Alonso y otras personas citadas en el fallo. El inventario no incorpora todavía a
  todas las personas nombradas en esa pieza y limita la modelización nominal adicional a
  Joseba Antxon Alonso porque ya tiene rol formal modelado en el caso Leire Díez.
