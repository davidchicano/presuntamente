id: hecho-ts-asume-pieza-mascarillas-koldo
caso_id: koldo
enunciado: |
  El Tribunal Supremo asumió en diciembre de 2024 la investigación de José Luis Ábalos,
  Koldo García y Víctor de Aldama respecto de los hechos directamente vinculados al
  aforado, centrados en la supuesta contratación irregular de mascarillas y material
  sanitario durante la pandemia. La nota oficial del CGPJ precisa que el Juzgado Central de
  Instrucción nº 2 de la Audiencia Nacional continuaba con el resto de diligencias no
  vinculadas al aforado. Rige el principio de presunción de inocencia.
