enunciado: |
  La Sentencia TS 418/2026 acuerda que José Luis Ábalos y Koldo García indemnicen
  conjunta y solidariamente a INECO y a TRAGSATEC por importes de 34.450 euros y
  9.500,54 euros, respectivamente. Al tratarse de una sentencia reciente cuya firmeza no
  se ha verificado en el inventario, la consecuencia económica se registra como atribuida
  a la resolución y no como hecho firme.
