id: hecho-contratos-mascarillas-puertos-adif-koldo-2020
caso_id: koldo
enunciado: |
  La Sentencia TS 418/2026 declara en la pieza inicial que Soluciones de Gestión
  resultó adjudicataria de dos contratos de suministro de mascarillas vinculados al
  Ministerio de Transportes: uno de Puertos del Estado por importe de 20.000.000
  euros y otro de ADIF por importe de 12.500.000 euros. Hasta verificar firmeza y
  revisión humana explícita, el inventario registra esta cifra como objeto económico
  atribuido a la sentencia, no como hecho firme ni como total agregado de todas las
  piezas conexas del caso Koldo.
