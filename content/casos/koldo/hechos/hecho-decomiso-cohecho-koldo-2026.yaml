id: hecho-decomiso-cohecho-koldo-2026
caso_id: koldo
enunciado: |
  La Sentencia TS 418/2026 acuerda respecto de los tres acusados el decomiso de las
  ganancias provenientes del delito de cohecho por 430.298 euros. El fallo desglosa esa
  cifra en 340.000 euros de pagos mensuales, 82.295 euros de renta de una vivienda y
  8.000 euros de renta de un chalé en Marbella. Al tratarse de una sentencia reciente cuya
  firmeza no se ha verificado en el inventario, el decomiso se registra como consecuencia
  atribuida a la resolución.
