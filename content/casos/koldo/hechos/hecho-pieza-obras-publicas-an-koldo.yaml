id: hecho-pieza-obras-publicas-an-koldo
caso_id: koldo
enunciado: |
  El Tribunal Supremo remitió el 2 de febrero de 2026 al Juzgado Central de Instrucción nº 2
  de la Audiencia Nacional la pieza separada que investiga adjudicaciones presuntamente
  ilícitas de obras públicas, al haber perdido José Luis Ábalos la condición de aforado. La
  nota oficial del CGPJ y la Sentencia TS 418/2026 identifican en esa pieza a Ábalos,
  Santos Cerdán, Koldo García, Víctor de Aldama, Joseba Antxon Alonso y otras personas,
  y la distinguen de la pieza de mascarillas ya abierta a juicio oral ante el Supremo. Rige
  el principio de presunción de inocencia.
