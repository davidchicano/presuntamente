id: hecho-apertura-juicio-oral-koldo
caso_id: koldo
enunciado: |
  El auto de apertura de juicio oral del 11 de diciembre de 2025 sentó en el banquillo a
  José Luis Ábalos, Koldo García y Víctor de Aldama por la pieza inicial de contratos de
  mascarillas. La parte dispositiva reproducida por el CGPJ enumera como calificaciones
  provisionales integración en organización criminal, cohecho continuado, uso y
  aprovechamiento de información privilegiada, tráfico de influencias, malversación de
  fondos públicos, falsedad en documento oficial y prevaricación. La apertura de juicio oral
  no implica culpabilidad.
