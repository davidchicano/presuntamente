notas: |
  La nota oficial del CGPJ y el fallo de la Sentencia TS 418/2026 informan de condena a
  Víctor de Aldama con suspensión condicionada de la pena de prisión y absolución parcial
  por otros delitos objeto de acusación. El fallo condiciona la suspensión durante cinco
  años a no delinquir, comparecer semestralmente ante el Tribunal e informar de sus
  actividades, y realizar un año de trabajos en beneficio de la comunidad. Se modela como
  `condenado_no_firme` por cautela hasta verificar firmeza. No se promueve ningún hecho a
  `acreditado` sin revisión humana explícita.
