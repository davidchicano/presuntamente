notas: |
  La nota oficial del CGPJ y el fallo de la Sentencia TS 418/2026 informan de condena a
  Koldo García Izaguirre por la pieza inicial de contratos de mascarillas, con absolución
  parcial por otros delitos objeto de acusación. Se modela como `condenado_no_firme` por
  cautela hasta verificar firmeza y eventuales incidentes o recursos. No se promueve ningún
  hecho a `acreditado` sin revisión humana explícita.
