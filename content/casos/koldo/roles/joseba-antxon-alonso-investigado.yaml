notas: |
  La Sentencia TS 418/2026 reproduce el auto de 23 de septiembre de 2025 que forma la
  pieza separada de obras públicas y enumera a Joseba Antxon Alonso Egurrola entre las
  personas investigadas en esa pieza. Este rol se limita a la pieza separada y no lo vincula
  con la sentencia de mascarillas del 22 de junio de 2026. Rige el principio de presunción
  de inocencia.
