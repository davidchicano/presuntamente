contenido_no_modelado:
  - id: cifras-agregadas-piezas-comisiones
    fecha_revision: "2026-06-29"
    texto: |
      La Sentencia TS 418/2026 sí permite estructurar una cifra económica principal de la
      pieza inicial: 32,5 millones de euros en los dos contratos de mascarillas adjudicados
      a Soluciones de Gestión por Puertos del Estado y ADIF. Lo que el inventario no publica
      todavía es un total agregado de todo el caso Koldo que mezcle contratos, facturación,
      comisiones o piezas conexas —por ejemplo, 13 contratos denunciados, otras adjudicaciones
      no enjuiciadas en esta pieza o más de 50 millones de euros de facturación atribuida a
      Soluciones de Gestión durante 2020—. Esas magnitudes pertenecen a universos parcialmente
      solapados y requieren primarios completos, delimitación por pieza y revisión
      anti-doble-conteo.
