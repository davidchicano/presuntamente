resumen_cifras: |
  La Sentencia TS 418/2026 permite estructurar como objeto económico de la pieza inicial
  los dos contratos de mascarillas adjudicados a Soluciones de Gestión por Puertos del
  Estado y ADIF, por 32.500.000 euros en total. Además, permite estructurar dos
  consecuencias económicas de la sentencia: 43.950,54 euros de responsabilidad civil
  solidaria a favor de INECO y TRAGSATEC, y 430.298 euros de decomiso de ganancias
  provenientes del cohecho. El inventario no publica todavía un total agregado de todas
  las piezas, comisiones o ramificaciones del caso Koldo: esas cifras quedan pendientes
  de primarios completos para evitar doble conteo.

