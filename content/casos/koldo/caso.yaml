  - id: relacion-plus-ultra-koldo-apamate-aldama
    fecha_revision: "2026-06-29"
    texto: |
      Se ha considerado una posible relación pública entre el caso Koldo y el caso Plus
      Ultra a partir de cobertura que atribuye a informes policiales un nexo entre Apamate,
      Deluxe Fortune y Víctor de Aldama. El inventario no modela todavía una
      `RelacionEntreCasos` Plus Ultra-Koldo: la conexión procede de cobertura sobre material
      instructor y, a fecha de revisión, no se ha incorporado un auto, informe oficial o
      resolución pública que fije formalmente el nexo con cita verificable. Si aparece un
      primario accesible, se reevaluará como posible `conexion_factual` o
      `comparte_actor_con`.
