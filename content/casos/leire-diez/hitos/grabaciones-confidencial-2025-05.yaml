titulo: "El Confidencial publica grabaciones que relacionan a Leire Díez con presuntas gestiones de comisiones (mayo 2025)"
descripcion: |
  En mayo de 2025 el diario El Confidencial publica audios y grabaciones que, según el
  medio, vincularían a María Leire Díez Castro con presuntas gestiones orientadas a obtener
  comisiones ilegales. La publicación, junto con la posterior denuncia de la Asociación de
  Suboficiales de la Guardia Civil y de la asociación Hazte Oír, sirve de base a la apertura
  de diligencias en el Juzgado de Instrucción nº 9 de Madrid (pieza B, juez Arturo Zamarriego)
  por presuntos delitos de cohecho y tráfico de influencias. Rige el principio de presunción
  de inocencia respecto a todos los investigados.
