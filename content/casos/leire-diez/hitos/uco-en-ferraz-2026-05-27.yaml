titulo: "La UCO pasa 12 horas en la sede federal del PSOE (Ferraz) requiriendo documentación (27 mayo 2026)"
descripcion: |
  El 27 de mayo de 2026, agentes de la Unidad Central Operativa (UCO) de la Guardia Civil
  acceden a la sede federal del PSOE en la calle Ferraz de Madrid durante aproximadamente
  doce horas para requerir y recopilar documentación en ejecución del auto del JCI nº 5
  dictado por el magistrado Santiago Pedraz el día anterior. La actuación no es un registro
  domiciliario de tipo allanatorio sino un requerimiento de documentación autorizado
  judicialmente en el marco de la pieza separada bajo secreto sumarial. Rige el principio
  de presunción de inocencia respecto a todos los investigados.
  El 22 de junio de 2026 el magistrado accede además a la petición del PSOE de separar y
  expurgar en una pieza reservada la documentación ajena a la causa que fue aportada o
  intervenida en ese requerimiento, con intervención del Ministerio Fiscal y de la parte
  interesada. Se trata de una incidencia procesal posterior ligada al mismo requerimiento en
  Ferraz, no de un nuevo registro ni de una ampliación autónoma del objeto de la causa.
