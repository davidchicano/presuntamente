titulo: "La UCO detiene a Leire Díez Castro, Vicente Fernández Guerrero y Joseba Alonso (diciembre 2025)"
descripcion: |
  En diciembre de 2025 la Unidad Central Operativa (UCO) de la Guardia Civil detiene a
  María Leire Díez Castro, Vicente Fernández Guerrero y Joseba Antxon Alonso en el marco
  de la causa instruida inicialmente por el JCI nº 6 de la Audiencia Nacional, relacionada
  con una presunta red de obtención de comisiones ilegales en contratos públicos y ayudas
  SEPI. La causa es posteriormente trasladada al JCI nº 5 (juez Santiago Pedraz) por turno.
  Rige el principio de presunción de inocencia respecto a todos los investigados.
