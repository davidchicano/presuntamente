titulo: "El juez Pedraz levanta el secreto de la pieza separada sobre presuntas irregularidades en operaciones de la SEPI (15 junio 2026)"
descripcion: |
  El 15 de junio de 2026 se conoce que el magistrado Santiago Pedraz, del JCI nº 5 de la
  Audiencia Nacional, levanta el secreto de la pieza separada del caso Leire Díez que había
  mantenido reservada tras el auto del 1 de junio. La cobertura cruzada sitúa esa pieza en
  la investigación sobre presuntas irregularidades en operaciones de la SEPI, incluida la
  derivada Tubos Reunidos. La resolución permite a las partes personadas acceder a las
  actuaciones de esa rama y marca un cambio relevante de publicidad procesal, pero no
  comporta por sí sola cierre de instrucción ni juicio sobre el fondo. Rige el principio de
  presunción de inocencia respecto a todos los investigados.
