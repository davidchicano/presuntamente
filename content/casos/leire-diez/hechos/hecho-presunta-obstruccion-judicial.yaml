id: hecho-presunta-obstruccion-judicial
caso_id: leire-diez
enunciado: |
  Según el auto del juez Pedraz del 26 de mayo de 2026, se investiga si los investigados en
  la pieza A habrían llevado a cabo acciones presuntamente orientadas a desestabilizar
  procedimientos judiciales en curso. En concreto, el auto recoge la investigación de:
  (1) presunta búsqueda de información sensible sobre jueces y mandos de la UCO;
  (2) presunto ofrecimiento de 50.000 euros a una empresaria mencionada en el auto para
  que modificara su declaración judicial; (3) presuntos contactos con Juan Sánchez Yepes,
  excapitán de la UCO, para la presunta revelación de secretos de sumario. El auto menciona
  también acciones presuntamente dirigidas al procedimiento judicial contra Begoña Gómez
  (incluida la búsqueda de información sobre el magistrado instructor de ese caso). Rige
  el principio de presunción de inocencia respecto a todos los investigados.
tipo: investigado
