id: hecho-notas-encargo-fuentes-pacheco
caso_id: leire-diez
enunciado: |
  Según el auto del juez Pedraz del 26 de mayo de 2026, se investiga si Ana María Fuentes
  Pacheco, como gerente de la Secretaría Federal del PSOE, emitió notas de encargo con
  contenido presuntamente falso cuya finalidad sería justificar los pagos realizados a la
  red de María Leire Díez Castro. El auto la incluye entre los investigados en la pieza
  separada. Rige el principio de presunción de inocencia.
