id: hecho-red-hirurok-comisiones
caso_id: leire-diez
enunciado: |
  Se investiga si María Leire Díez Castro, Vicente Fernández Guerrero y Joseba Antxon Alonso
  constituyeron una estructura de obtención de comisiones ilegales —denominada internamente
  "Hirurok" (término en euskera que significa "nosotros tres")— presuntamente orientada a
  obtener beneficios económicos en contratos públicos y en la tramitación de ayudas
  concedidas por la SEPI por un importe superior a 700.000 euros durante el periodo 2021-2023.
  Consta en el auto del JCI nº 6 de la Audiencia Nacional (diciembre de 2025), reproducido
  extensamente por prensa cruzada.
