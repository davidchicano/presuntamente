id: hecho-grabaciones-leire-2025
caso_id: leire-diez
enunciado: |
  En mayo de 2025 El Confidencial publicó grabaciones en las que se atribuye a María Leire
  Díez Castro conversaciones sobre presuntas gestiones de comisiones vinculadas a contratos
  públicos y posibles contactos con cargos del Ministerio de Interior. La publicación
  generó denuncias de la Asociación de Suboficiales de la Guardia Civil y de la asociación
  Hazte Oír ante el Juzgado de Instrucción nº 9 de Madrid, que abrió diligencias por
  presuntos delitos de cohecho y tráfico de influencias. Rige el principio de presunción
  de inocencia.
