id: hecho-pagos-psoe-red-leire
caso_id: leire-diez
enunciado: |
  Según el auto del juez Pedraz del 26 de mayo de 2026, se investiga si Santos Cerdán García
  habría autorizado pagos del PSOE a la red de Díez Castro por un importe mínimo documentado
  de 188.000 euros, canalizados presuntamente mediante facturas falsas a través de empresas
  vinculadas a Gaspar Zarrías Arévalo y de la sociedad del abogado Ismael Oliver. El auto
  incluye a Cerdán, Zarrías y Oliver, entre otros, entre los investigados en relación con
  esta presunta financiación irregular, sin que ello suponga prejuicio de culpabilidad.
  Rige el principio de presunción de inocencia.
