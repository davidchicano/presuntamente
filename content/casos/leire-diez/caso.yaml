  - id: relacion-descartada-fiscal-general-del-estado
    fecha_revision: "2026-06-12"
    texto: |
      Al evaluar las conexiones de este caso se consideró documentar una relación con el
      caso del fiscal general del Estado, sugerida por la coincidencia temporal y de
      protagonistas políticos en el debate público. Se descartó: no existe nexo procesal
      documentado entre ambas causas (no comparten órgano, objeto ni investigados, y la
      causa del fiscal general es firme desde febrero de 2026). Una relación basada sólo
      en contexto político equivaldría a cuota, no a trazabilidad (principio editorial
      "sin cuota política"). Se reevaluará si un documento judicial estableciera un nexo.
