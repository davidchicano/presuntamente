delitos_atribuidos_en_la_causa:
  - organizacion-criminal
  - cohecho
  - trafico-de-influencias
  - falsedad-documental
  - revelacion-de-secretos
  - prevaricacion
  # Delitos confirmados por la nota oficial del CGPJ del 27-may-2026 (cgpj-nota-requerimiento-psoe-leire-2026-05-27, N1): organización criminal, cohecho, revelación de secretos, inducción al falso testimonio, acusación falsa, falsedad en documento mercantil, prevaricación, tráfico de influencias y delito contra las instituciones del Estado. Se listan los que tienen slug en content/delitos/. SIN slug todavía (pendiente de decisión de modelo, no se inventa en pasada /actualizar-caso): "inducción al falso testimonio", "acusación falsa" y "delito contra las instituciones del Estado" (este último es el que fundamenta la competencia de la AN y la petición de inhibición al JI nº 9 de Madrid).

resumen_cifras: |
  Se investiga una presunta red de comisiones en contratos públicos y ayudas SEPI por valor
  superior a 700.000 euros (2021-2023). El auto Pedraz del 26 de mayo de 2026 documentó un
  mínimo de 188.000 euros en pagos del PSOE a la red, canalizados mediante facturas
  presuntamente falsas. Se investiga también un presunto ofrecimiento de 50.000 euros a
  una empresaria para modificar su declaración judicial.

