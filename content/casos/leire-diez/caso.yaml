id: leire-diez
nombre_oficial: "Pieza separada del Juzgado Central de Instrucción nº 5 de la Audiencia Nacional, magistrado Santiago Pedraz, sobre presunta financiación irregular y obstrucción de la Justicia"
nombre_mediatico: "Caso Leire Díez"
nombres_alternativos:
  - "caso Ferraz"
  - "caso Hirurok"

descripcion_corta: |
  Procedimiento instruido por el JCI nº 5 de la Audiencia Nacional (juez Santiago Pedraz)
  que investiga una presunta estructura denominada "Hirurok" orientada a obtener comisiones
  ilegales en contratos públicos y ayudas SEPI (2021–2023), con ramificaciones hacia la
  sede federal del PSOE. En paralelo, el JI nº 9 de Madrid investiga presuntos delitos de
  cohecho y tráfico de influencias.

sintesis_caso:
  que_se_investiga: |
    Se investiga si María Leire Díez Castro, Vicente Fernández Guerrero y Joseba Antxon
    Alonso habrían constituido una estructura —denominada internamente "Hirurok"—
    presuntamente orientada a obtener comisiones ilegales en contratos públicos y ayudas
    SEPI por valor superior a 700.000 euros entre 2021 y 2023. El auto del juez Pedraz del
    26 de mayo de 2026 abre pieza separada e investiga si Cerdán, Zarrías y Fuentes Pacheco
    (exsecretario de Organización, exvicepresidente de la Junta de Andalucía y gerente
    federal del PSOE, respectivamente) habrían autorizado y canalizado pagos a esa red
    mediante facturas presuntamente falsas, y si se llevaron a cabo acciones presuntamente
    orientadas a desestabilizar procedimientos judiciales. En paralelo, el JI nº 9 de
    Madrid investiga presuntos delitos de cohecho y tráfico de influencias.
  hechos_clave:
    - "Se investiga si la red Hirurok habría actuado en contratos públicos y ayudas SEPI por importe superior a 700.000 euros entre 2021 y 2023."
    - "El auto Pedraz del 26 de mayo de 2026 abre pieza separada e incluye entre los investigados a Santos Cerdán, Gaspar Zarrías y cinco personas más, y autoriza la entrada de la UCO en la sede federal del PSOE."
    - "La UCO realizó un registro de 12 horas en la sede federal del PSOE (Ferraz) el 27 de mayo de 2026 en busca de documentación."
    - "Se investiga si se habrían ofrecido 50.000 euros a una empresaria para que modificara su declaración judicial, y si se buscó información sensible sobre jueces y mandos UCO."
  estado_actual: |
    Causa bajo secreto sumarial (pieza separada JCI nº 5 AN) en fase de instrucción.
    La UCO ejecutó el registro en Ferraz el 27 de mayo de 2026. El procedimiento ante el
    JI nº 9 de Madrid se sustancia de forma paralela.
  cifras_clave:
    - "Presunta comisión superior a 700.000 euros en contratos SEPI (2021-2023)"
    - "188.000 euros mínimo documentado en pagos del PSOE a la red (auto Pedraz)"
    - "50.000 euros presuntamente ofrecidos para modificar declaración de testigo"

