  notas: "PR1+PR2: 4 hitos, 5 hechos, 10 roles investigados + 1 juez. Vínculos institucionales: 16 vínculos creados (3 afectación, 13 cargos/nombramientos), incluyendo BOE-A-2018-8601 (RD 616/2018, nombramiento Fernández Guerrero SEPI) descargado con hash_sha256 y nota FESOFI (N3) + Newtral (N4) para el cargo de Leire Díez en Correos. Faltan, para próximas pasadas: nota oficial CGPJ del auto Pedraz cuando aparezca; auto JI 9 con número exacto; cargo previo de Zarrías como Consejero de Presidencia de la Junta de Andalucía (1996-2008); BOE-A-2019-14254 de cese de Fernández Guerrero en SEPI (opcional); nombramiento BORME de Leire Díez como apoderada de Correos (acto registral 01-04-2022). Barrido 2026-06-03: levantamiento parcial del secreto (auto 01-jun) catalogado como hito; localizada y catalogada la nota oficial CGPJ del 27-may (N1, documentos_primarios reforzados: respaldo oficial del marco de delitos); delitos ampliados con organización criminal y prevaricación (CGPJ N1). Barrido 2026-06-06: catalogado el auto del 04-jun de rechazo (por el momento) de la personación del magistrado jubilado García-Castellón como acusación particular (hito auto_diligencias, N4 Confilegal+Público+The Objective). Anotados en NOTES sin modelar: recurso de Cerdán contra la petición de inhibición, petición de la Fiscalía de declaración testifical de Cristina Narbona, y contenido del sumario ya parcialmente público (libretas UCO; pieza de contratos SEPI/Tubos Reunidos que sigue secreta hasta julio). Piloto 2026-06-12: añadida sección pública contenido_no_modelado con 3 decisiones editoriales atribuidas y sin crear personas, roles ni nodos."
