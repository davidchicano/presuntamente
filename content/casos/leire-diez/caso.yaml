        fecha: "2026-06-05"
        url: "https://www.publico.es/politica/tribunales/encuentros-directora-guardia-civil-papel-sanchez-hechos-indicios-suposiciones-uco-caso-leire.html"
      - medio_id: the-objective
        titular: "Leire Díez anotó una «reunión con P. S.» en su agenda en febrero de 2025"
        fecha: "2026-06-05"
        url: "https://theobjective.com/espana/tribunales/2026-06-05/leire-diez-reunion-sanchez-agenda/"

  - id: mencion-mercedes-gonzalez-informes-uco
    fecha_revision: "2026-06-12"
    texto: |
      La misma cobertura recoge que informes de la UCO y una nota del Servicio de
      Información de la Guardia Civil incorporados a la causa describen tres encuentros
      entre Leire Díez y la directora general de la Guardia Civil, Mercedes González, entre
      2024 y 2025, así como anotaciones de Díez sobre su presunta capacidad de influir en
      nombramientos del departamento. Mercedes González no tiene rol procesal en esta
      causa y no consta imputación ni citación alguna contra ella; el ministro del Interior
      ha sostenido públicamente que la directora no trató con Díez la trama investigada.
      El sitio no crea ficha de persona ni rol procesal: la mención procede de informes
      policiales según cobertura periodística (regla V-13) y, de consolidarse en un
      documento primario accesible, se modelaría como hecho sobre el procedimiento, no
      sobre la persona.
    fuentes:
