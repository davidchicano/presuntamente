contenido_no_modelado:
  - id: referencias-one-presidente-informes-uco
    fecha_revision: "2026-06-12"
    texto: |
      Los informes de la UCO incorporados a la causa y las agendas intervenidas a Leire Díez
      contienen, según la cobertura publicada tras el levantamiento parcial del secreto del
      sumario, referencias a "el one", "P.S." y "el presidente". Esa cobertura, de líneas
      editoriales distintas, recoge que la propia UCO interpreta en un informe que "el one"
      aludiría al presidente del Gobierno, Pedro Sánchez. Ningún órgano judicial ha hecho
      suya esa identificación, Pedro Sánchez no tiene rol procesal en esta causa, y las
      mismas piezas subrayan que no consta indicio de que conociera u ordenara las
      actividades investigadas; fuentes de Moncloa han negado cualquier encuentro o
      conocimiento. El sitio no modela estas referencias como Hecho: el documento primario
      no está accesible de forma verificable y la identificación es interpretación recogida
      en cobertura periodística (regla V-13).
    fuentes:
      - medio_id: eldiario-es
        titular: 'Qué dice la UCO al juez sobre "el One" y las conversaciones de la trama Leire sobre Sánchez'
        fecha: "2026-06-05"
        url: "https://www.eldiario.es/politica/dice-uco-juez-one-conversaciones-trama-leire-sanchez_1_13277318.html"
      - medio_id: publico-es
