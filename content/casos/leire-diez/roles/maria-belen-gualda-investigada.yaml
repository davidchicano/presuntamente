notas: |
  Cobertura cruzada del 29 de junio de 2026 informa de que el magistrado Pedraz incorpora
  como investigada a María Belén Gualda González, presidenta de la SEPI, en la derivada
  relativa a presuntas adjudicaciones irregulares vinculadas a SEPI/Tubos Reunidos. El rol
  se limita a esa cobertura N4 hasta localizar el auto íntegro. Rige el principio de
  presunción de inocencia.
