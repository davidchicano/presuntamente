descripcion_corta: |
  Causa especial seguida ante la Sala Segunda de lo Penal del Tribunal
  Supremo, instruida por el magistrado Ángel Luis Hurtado, por presunto
  delito de revelación de datos reservados (art. 417.1 del Código
  Penal) en relación con la filtración del correo electrónico
  remitido el 2 de febrero de 2024 por el abogado Carlos Neira, en
  representación de su cliente Alberto González Amador, a la Fiscalía
  Provincial de Madrid proponiendo un acuerdo de conformidad por dos
  delitos contra la Hacienda Pública. La causa se abrió en el
  Tribunal Supremo el 15 de octubre de 2024 tras la exposición
  razonada elevada por el Tribunal Superior de Justicia de Madrid.
  Fueron inicialmente investigados el entonces Fiscal General del
  Estado, Álvaro García Ortiz, y la entonces Fiscal Jefa Provincial
  de Madrid, Pilar Rodríguez Fernández; por auto de la Sala de lo
  Penal de 29 de julio de 2025 se acordó el sobreseimiento respecto
  de Rodríguez Fernández y se confirmó el procesamiento de García
  Ortiz, que fue enjuiciado por un tribunal de siete magistrados
  entre el 3 y el 13 de noviembre de 2025. Por Sentencia 1000/2025
  de la Sala Segunda de 9 de diciembre de 2025, de la que fue ponente
  el presidente de la sala Andrés Martínez Arrieta, García Ortiz fue
  condenado por mayoría de cinco votos frente a dos, con voto
  particular disidente de las magistradas Ana María Ferrer García y
  Susana Polo García, a multa de doce meses con cuota diaria de
  veinte euros, a inhabilitación especial para el cargo de Fiscal
  General del Estado durante dos años y al pago de una indemnización
  de diez mil euros por daños morales al perjudicado Alberto González
  Amador. La condena devino firme el 26 de febrero de 2026 al
  desestimar la Sala los incidentes de nulidad. El 24 de noviembre de
  2025 García Ortiz presentó su dimisión y por Real Decreto 1138/2025
  de 9 de diciembre fue cesado, siendo sustituido en el cargo por
  Teresa Peramato Martín mediante Real Decreto 1140/2025. La causa,
  pese a estar firme en la jurisdicción ordinaria, sigue abierta en
  amparo ante el Tribunal Constitucional por sendos recursos
  presentados por la Fiscalía y por el propio condenado en abril de
  2026.

sintesis_caso:
  que_se_investiga: "La presunta filtración de un correo de la defensa de Alberto González Amador relacionado con una propuesta de conformidad ante Fiscalía. La causa concluyó con condena firme por revelación de datos reservados."
  hechos_clave:
    - "El Tribunal Supremo investigó al entonces Fiscal General del Estado, Álvaro García Ortiz, y a la entonces Fiscal Jefa Provincial de Madrid, Pilar Rodríguez Fernández."
    - "El Supremo acordó el sobreseimiento respecto de Rodríguez Fernández."
    - "García Ortiz fue condenado por revelación de datos reservados."
  estado_actual: "La condena es firme en la jurisdicción ordinaria, aunque hay recursos de amparo ante el Tribunal Constitucional."
  cifras_clave:
    - "7.200 € de multa"
    - "2 años de inhabilitación especial"
    - "10.000 € de indemnización"
    - "Condena por 5 votos frente a 2"

