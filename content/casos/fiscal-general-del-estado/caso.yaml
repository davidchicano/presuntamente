resumen_cifras: |
  Por Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo de
  9 de diciembre de 2025 se impuso a Álvaro García Ortiz una pena de
  multa de doce meses con cuota diaria de veinte euros (7.200 euros
  en total), inhabilitación especial para el cargo de Fiscal General
  del Estado durante dos años y el pago de una indemnización de
  10.000 euros por daños morales al perjudicado Alberto González
  Amador, así como las costas procesales incluyendo las de la
  acusación particular. La condena fue adoptada por mayoría de cinco
  votos frente a dos.

