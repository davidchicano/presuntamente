# Caso del Fiscal General del Estado — esqueleto inicial (PR1).
#
# Causa Especial nº 20557/2024 seguida ante la Sala Segunda de lo Penal
# del Tribunal Supremo por presunto delito de revelación de datos
# reservados (art. 417.1 del Código Penal) contra el entonces Fiscal
# General del Estado Álvaro García Ortiz y, en un primer momento,
# contra la entonces Fiscal Jefa Provincial de Madrid Pilar Rodríguez
# Fernández, en relación con la filtración del correo electrónico
# remitido el 2 de febrero de 2024 por el abogado Carlos Neira (en
# nombre de su cliente Alberto González Amador) a la Fiscalía
# Provincial de Madrid proponiendo un acuerdo de conformidad. Por
# Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo, de 9
# de diciembre de 2025, García Ortiz fue condenado por mayoría de
# cinco votos frente a dos, con dos votos particulares disidentes, a
# multa de doce meses con cuota diaria de veinte euros, a
# inhabilitación especial para el cargo de Fiscal General del Estado
# durante dos años y a indemnizar al perjudicado en diez mil euros.
# La condena devino firme tras la desestimación, por Acuerdo de la
# misma Sala de 26 de febrero de 2026, de los incidentes de nulidad
# planteados por la defensa y por el Ministerio Fiscal.

