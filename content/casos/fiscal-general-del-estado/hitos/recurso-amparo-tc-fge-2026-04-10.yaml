titulo: "La Fiscalía presenta recurso de amparo ante el Tribunal Constitucional para anular la condena a Álvaro García Ortiz"
descripcion: |
  El 10 de abril de 2026, la Abogacía del Estado, en nombre de la
  Fiscalía General del Estado, presenta ante el Tribunal Constitucional
  recurso de amparo contra la Sentencia 1000/2025 de la Sala Segunda
  del Tribunal Supremo que condenó a Álvaro García Ortiz por revelación
  de datos reservados. El recurso alega vulneración de cinco derechos
  fundamentales: presunción de inocencia (art. 24.2 CE), tutela judicial
  efectiva (art. 24.1 CE), libertad de expresión (art. 20 CE), derecho
  a no declarar contra sí mismo (art. 24.2 CE) y derecho a un juez
  imparcial (art. 24.2 CE). La presentación del amparo no tiene efecto
  suspensivo automático sobre la ejecución de la pena de inhabilitación
  especial ya ejecutada ni sobre las obligaciones económicas (multa e
  indemnización pagadas el 30-ene-2026). A fecha de este barrido
  (30-may-2026), la admisibilidad del recurso aún no ha sido resuelta
  por el TC; según la cobertura periodística (El Independiente,
  15-may-2026), el Tribunal Constitucional tiene previsto resolver la
  admisión a trámite de los dos recursos de amparo —el de la Fiscalía
  y el presentado por la defensa de García Ortiz el 13 de abril de
  2026— antes del verano de 2026. Conforme al principio de presunción
  de inocencia, la condena adquirió firmeza el 26 de febrero de 2026
  pero el amparo abre una vía extraordinaria de revisión en sede
  constitucional.
