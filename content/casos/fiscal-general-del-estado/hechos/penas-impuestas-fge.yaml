id: penas-impuestas-fge
caso_id: fiscal-general-del-estado
enunciado: |
  El fallo dispositivo de la Sentencia 1000/2025 de la Sala Segunda
  del Tribunal Supremo, dictada por mayoría de cinco votos frente
  a dos, condena a Álvaro García Ortiz «como autor de un delito de
  revelación de datos reservados, art. 417.1 del Código Penal a la
  pena de multa de 12 meses con una cuota diaria de 20 euros e
  inhabilitación especial para el cargo de Fiscal General del
  Estado por tiempo de 2 años, y al pago de las costas procesales
  correspondientes incluyendo las de la acusación particular pero
  con exclusión de la mitad de las restantes» (FALLO, p. 180). La
  cuantía total de la multa asciende a 7.200 euros (12 meses × 20
  euros × 30 días). La sentencia absuelve al condenado de los
  restantes delitos objeto de la acusación. La condena es firme
  desde el 26 de febrero de 2026, al desestimar la Sala los
  incidentes de nulidad de actuaciones presentados por la defensa
  y por el Ministerio Fiscal; la pena de inhabilitación se ejecuta
  desde el cese efectivo del condenado el 10 de diciembre de 2025
  mediante el Real Decreto 1138/2025, de 9 de diciembre (BOE-A-
  2025-25142).
