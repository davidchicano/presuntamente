id: votos-particulares-fge
caso_id: fiscal-general-del-estado
enunciado: |
  Las magistradas Susana Polo García y Ana María Ferrer García
  formulan voto particular conjunto, anejo a la Sentencia
  1000/2025 (pp. 184-238), expresando su discrepancia con el
  relato de hechos probados y con la subsunción típica de la
  sentencia mayoritaria. Las magistradas sostienen que «no ha
  quedado probado que el Fiscal General del Estado filtrara a la
  prensa el correo del día 2 de febrero de 2024, además, los
  hechos relatados en la nota informativa publicada por el mismo,
  no constituyen el delito de revelación de secretos o
  informaciones por el que se le condena en la sentencia
  mayoritaria, por lo que mostramos nuestro desacuerdo con la
  misma, indicando que lo procedente debería haber sido acordar
  la libre absolución del Fiscal General del Estado del delito por
  el que se le condena» (voto particular, conclusión V, p. 237).
  Como argumento principal sostienen que la nota informativa
  publicada por la Fiscalía el 14 de marzo de 2024 «solo contenía
  consideraciones neutrales, exactas, y veraces, y se le dio
  publicidad en un contexto de interés general», y que la actuación
  del Fiscal General desmentía una «acusación falsa de actuación
  ilícita de la Fiscalía —haber ofrecido un acuerdo y posteriormente
  retirarlo por razones políticas— impulsada desde el aparato de
  un poder público». La discrepancia no afecta a la firmeza ni a
  la ejecutividad de la sentencia, pero sustenta los recursos de
  amparo presentados posteriormente ante el Tribunal
  Constitucional.
