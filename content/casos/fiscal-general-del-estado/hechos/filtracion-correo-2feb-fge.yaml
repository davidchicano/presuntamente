id: filtracion-correo-2feb-fge
caso_id: fiscal-general-del-estado
enunciado: |
  La Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo,
  firme desde el 26 de febrero de 2026, declara probado que el 13
  de marzo de 2024 entre las 23:25 y las 23:51 horas, el correo
  electrónico remitido el 2 de febrero de 2024 a las 12:45 horas
  por el abogado Carlos Neira a la Sección de Delitos Económicos
  de la Fiscalía Provincial de Madrid —en el que se manifestaba la
  voluntad de Alberto González Amador de alcanzar un acuerdo de
  conformidad penal reconociendo «dos delitos contra la Hacienda
  Pública»— fue comunicado «desde la Fiscalía General del Estado,
  con intervención directa, o a través de un tercero, pero con
  pleno conocimiento y aceptación por parte del Sr. García Ortiz,
  al periodista de la Cadena SER, D. Miguel Ángel Campos» (Hechos
  Probados, p. 18). El programa Hora 25 difundió en directo el
  contenido y la web de la emisora publicó a las 23:51 horas el
  texto completo del correo, «la primera vez que se reproducía
  públicamente el texto completo» (Hechos Probados, p. 19). La
  divulgación se completó, conforme al fallo, con la nota
  informativa de la Fiscalía del 14 de marzo de 2024 cuya redacción
  fue dictada por el propio Fiscal General del Estado a su
  directora de comunicación y filtrada anticipadamente al diario
  EL PAÍS «con autorización del Fiscal General del Estado» (Hechos
  Probados, p. 21). El Tribunal Supremo califica esta unidad de
  acción (filtración del correo + nota oficial) como subsumible en
  el delito de revelación de datos reservados del artículo 417.1
  del Código Penal por afectar derechos fundamentales del
  perjudicado y comprometer el funcionamiento de la Fiscalía
  General del Estado como garante de tales derechos (FJ Tercero,
  p. 147). El voto particular conjunto de las magistradas Susana
  Polo García y Ana María Ferrer García sostiene en contra que
  «no ha quedado probado que el Fiscal General del Estado filtrara
  a la prensa el correo del día 2 de febrero de 2024» (voto
  particular, p. 237).
