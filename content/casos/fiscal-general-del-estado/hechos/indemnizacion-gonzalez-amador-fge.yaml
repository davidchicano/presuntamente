id: indemnizacion-gonzalez-amador-fge
caso_id: fiscal-general-del-estado
enunciado: |
  La Sentencia 1000/2025 de la Sala Segunda del Tribunal Supremo
  declara probada, como responsabilidad civil derivada del delito,
  la obligación del condenado de indemnizar al perjudicado en una
  cantidad fija. En el fallo dispositivo se establece literalmente:
  «Como responsabilidad civil se declara que el condenado deberá
  indemnizar a D. Alberto González Amador a 10.000 euros por daños
  morales» (FALLO, p. 180). La sentencia identifica
  inequívocamente a Alberto González Amador como perjudicado en el
  procedimiento por la divulgación de datos reservados del
  expediente de conformidad. La condena no cuantifica daño
  patrimonial autónomo. El Tribunal Supremo ordena el 17 de
  diciembre de 2025 la ejecución de la sentencia y remite la causa
  a la Fiscalía a los efectos oportunos, debiendo el condenado
  depositar los importes en la cuenta de consignaciones del
  Tribunal Supremo.
