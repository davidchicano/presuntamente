descripcion_corta: |
  Pieza separada del caso Gürtel instruida por el Juzgado Central de
  Instrucción nº 5 de la Audiencia Nacional sobre la presunta contabilidad
  paralela (caja B) del Partido Popular. Las investigaciones abarcaron dos
  ramas: la pieza «Génova», que enjuició el pago en negro de más de un
  millón de euros para la reforma de la sede del partido, y la pieza de las
  «donaciones finalistas», que investigaba si empresarios del entorno Gürtel
  realizaban aportaciones irregulares al PP a cambio de contratos públicos.
  La pieza Génova concluyó con sentencia condenatoria de la Audiencia Nacional
  el 28 de octubre de 2021 —confirmada en casación por el Tribunal Supremo el
  15 de noviembre de 2024 (ECLI:ES:TS:2024:5577, ponente Antonio del Moral)—,
  que acredita la existencia de una contabilidad B institucionalizada en el PP
  y condena a Luis Bárcenas, a los administradores de Unifica S.L. (Gonzalo
  Urquijo Fernández de Córdoba y Belén García), y declara al Partido Popular
  responsable civil subsidiario. La pieza de donaciones fue sobreseída
  provisionalmente por auto del juez Santiago Pedraz el 19 de diciembre de
  2022, al no quedar acreditada la relación causal entre las aportaciones
  y adjudicaciones concretas.

sintesis_caso:
  que_se_investiga: >-
    La presunta existencia de una contabilidad paralela («caja B») en el
    Partido Popular y el uso de fondos no declarados para sufragar obras de
    reforma de su sede en la calle Génova de Madrid, así como la posible
    correlación entre aportaciones de empresarios y adjudicaciones de
    contratos públicos.
  hechos_clave:
    - >-
      La pieza «Génova» culminó con sentencia firme (TS, 15 de noviembre de
      2024, ECLI:ES:TS:2024:5577) que acredita que el entonces tesorero
      Luis Bárcenas pagó 1.072.000 euros fuera de facturación oficial a la
      empresa Unifica S.L. para la reforma de la sede del PP.
    - >-
      La Audiencia Nacional constató que Bárcenas gestionó una contabilidad
      paralela institucionalizada en el PP entre 1982 y 2009; la sentencia
      señala que los «papeles de Bárcenas» registran hechos reales o
      plausibles corroborados por otros medios de prueba, aunque no les
      reconoce valor contable íntegro.
    - >-
      La pieza de donaciones (relación entre aportaciones de empresarios y
      contratos públicos) fue sobreseída provisionalmente por el juez Pedraz
      el 19 de diciembre de 2022 a petición de la Fiscalía Anticorrupción
      tras informe de la Intervención General del Estado (IGAE).
    - >-
      El extesorero Álvaro Lapuerta —también investigado— fue sobreseído en
      2016 por demencia sobrevenida y falleció en junio de 2018; Cristóbal
      Páez (exgerente del PP) y Laura Montero (empleada de Unifica) fueron
      absueltos por la Audiencia Nacional.
  estado_actual: >-
    Sentencia firme en la pieza Génova (TS, 15 de noviembre de 2024,
    ECLI:ES:TS:2024:5577). Pieza de donaciones sobreseída provisionalmente
    (auto de 19 de diciembre de 2022).
  cifras_clave:
    - "1.072.000 € pagados fuera de contabilidad oficial a Unifica por obras en Génova"
    - "8 meses de prisión (Luis Bárcenas, pena reducida por dilaciones indebidas en TS)"
    - "9 meses de prisión (Gonzalo Urquijo y Belén García, pena reducida en TS)"
    - "123.669 € de responsabilidad civil subsidiaria del Partido Popular"

