resumen_cifras: |
  La pieza Génova acredita con sentencia firme (TS, 2024) que se pagaron
  1.072.000 euros en negro a Unifica S.L. por obras de reforma de la sede
  del PP en la calle Génova, correspondientes a un descuento del 7-8 %
  pactado con Bárcenas sobre el importe de obra ejecutado entre 2005 y 2010.
  La cuota tributaria defraudada al ejercicio de 2007 fue fijada en
  374.000 euros (la AN la fijó inicialmente en 870.000 €; el TS la redujo
  a 374.000 € al excluir importes de ejercicios no constitutivos de delito).
  El Partido Popular fue condenado como responsable civil subsidiario por
  123.669 euros. Las multas impuestas por el TS son de 180.000 € a Bárcenas
  y de 200.000 € a cada administrador de Unifica. La pieza de donaciones
  finalistas fue sobreseída sin cuantificación de daño acreditado.

