id: barcenas-pieza-donaciones-sobreseida
caso_id: barcenas-caja-b
enunciado: |
  La pieza que investigaba si los empresarios anotados en la presunta caja B
  del PP realizaban aportaciones a cambio de adjudicaciones concretas de
  contratos públicos fue sobreseída provisionalmente por auto del juez Santiago
  Pedraz el 19 de diciembre de 2022, a petición de la Fiscalía Anticorrupción,
  tras recibir el informe de la Intervención General del Estado (IGAE) de
  4 de noviembre de 2022, que no detectó incumplimientos de la normativa de
  contratación ni acreditó relación entre aportaciones y adjudicaciones. El
  juez señaló que «no existe una anotación, un correo electrónico, un
  documento, una conversación grabada, una declaración testifical… que aporte
  dato incriminatorio alguno». Esta decisión no implica pronunciamiento sobre
  el fondo ni afecta a las condenas ya firmes de la pieza Génova.
tipo: exculpatorio
