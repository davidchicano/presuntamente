id: barcenas-caja-b-contabilidad-paralela
caso_id: barcenas-caja-b
enunciado: |
  Según los hechos declarados probados por la sentencia de la Audiencia
  Nacional de 28 de octubre de 2021 —confirmados en casación por el Tribunal
  Supremo el 15 de noviembre de 2024 (ECLI:ES:TS:2024:5577)—, Luis Bárcenas,
  como gerente y posteriormente tesorero del Partido Popular entre 1990 y 2009,
  gestionó los fondos en metálico aportados a la formación política como
  donaciones privadas a través de una contabilidad paralela —«contabilidad B»—
  cuyo ingreso y gasto no quedó reflejado en la contabilidad oficial ni
  sometido al control del Tribunal de Cuentas. La Audiencia Nacional concluye
  que los «papeles de Bárcenas» registran hechos reales o plausibles
  corroborados por otros medios de prueba, si bien no les reconoce valor
  contable íntegro como documentos en su totalidad.
tipo: acreditado
fecha_o_periodo:
  desde: "1990-01-01"
  hasta: "2009-07-22"
  precision: rango
personas_implicadas:
  - luis-barcenas
organizaciones_implicadas:
  - partido-popular
documentos_respaldo:
  - documento_id: cgpj-sentencia-an-barcenas-genova-2021
    pasaje: >-
      Hechos Probados — «Bárcenas gestionó los fondos en metálico aportados a
      la formación política Partido Popular como donaciones privadas a través de
      una contabilidad paralela -contabilidad B- cuyo ingreso y gasto no quedó
      reflejado en la contabilidad oficial» (sentencia AN 28-oct-2021,
      Sección Segunda Sala Penal AN)
  - documento_id: cgpj-sentencia-ts-barcenas-caja-b-2024
    pasaje: >-
      Hechos Probados confirmados — el TS ratifica que la AN «contó con prueba
      de cargo válida y suficiente para concluir la existencia de una "caja B"
      del PP» sobre la cual Bárcenas «ostentaba plena capacidad de control y
      disponibilidad» (STS ECLI:ES:TS:2024:5577, 15-nov-2024)
nivel_fuente_efectivo: 1
vigencia: vigente
redaccion_neutra_revisada: true
