id: barcenas-caja-b-responsabilidad-civil-pp
caso_id: barcenas-caja-b
enunciado: |
  La sentencia de la Audiencia Nacional de 28 de octubre de 2021, confirmada
  en casación por el Tribunal Supremo el 15 de noviembre de 2024
  (ECLI:ES:TS:2024:5577), declara al Partido Popular responsable civil
  subsidiario del fraude tributario en el Impuesto de Sociedades del ejercicio
  2007 de la empresa Unifica S.L. La cuota tributaria defraudada, según el
  Tribunal Supremo, asciende a 374.000 euros (reducida desde los 870.000 €
  fijados por la Audiencia Nacional al excluir importes de ejercicios que no
  constituyeron delito). La cuantía de la responsabilidad civil subsidiaria
  del PP queda fijada en 123.669 euros.
tipo: acreditado
fecha_o_periodo:
  desde: "2021-10-28"
  precision: dia
personas_implicadas: []
organizaciones_implicadas:
  - partido-popular
  - audiencia-nacional
  - tribunal-supremo
importe: 123669
importe_moneda: EUR
importe_alcance: individual
importe_clase: consecuencia
importe_naturaleza: responsabilidad_civil
importe_nota: >-
  Responsabilidad civil subsidiaria del PP por la cuota del Impuesto de
  Sociedades 2007 de Unifica S.L. no ingresada. Confirmada por el TS pero
  no equiparable a la condena penal (Bárcenas y Unifica son los penalmente
  responsables; el PP responde civilmente de modo subsidiario).
importe_atribucion:
  - sujeto_tipo: organizacion
    sujeto: partido-popular
    papel: obligado
    nota: >-
      Condenado como responsable civil subsidiario por la cuota tributaria
      defraudada, de conformidad con la sentencia firme TS ECLI:ES:TS:2024:5577.
documentos_respaldo:
  - documento_id: cgpj-sentencia-an-barcenas-genova-2021
    pasaje: >-
      Fallo — el PP condenado como responsable civil subsidiario de 123.669 euros
      del Impuesto de Sociedades 2007 de Unifica S.L.; «no consta que el PP, a
      través de sus órganos directivos ejerciera un control adecuado sobre la
      gestión del gerente Luis Bárcenas» (sentencia AN 28-oct-2021,
      Sección Segunda Sala Penal AN)
  - documento_id: cgpj-sentencia-ts-barcenas-caja-b-2024
    pasaje: >-
      Fallo — el TS confirma la responsabilidad civil subsidiaria del PP;
      reduce la cuota tributaria defraudada a 374.000 euros (desde los 870.000 €
      de la AN, al excluir ejercicios no constitutivos de delito);
      el importe de responsabilidad civil subsidiaria del PP queda en 123.669 euros
      (STS ECLI:ES:TS:2024:5577, 15-nov-2024)
nivel_fuente_efectivo: 1
vigencia: vigente
