id: barcenas-condena-firme-genova
caso_id: barcenas-caja-b
enunciado: |
  El Tribunal Supremo confirma el 15 de noviembre de 2024
  (ECLI:ES:TS:2024:5577, ponente: Antonio del Moral García) las condenas
  dictadas por la Audiencia Nacional en la pieza Génova, reduciendo las penas
  al apreciar la atenuante de dilaciones indebidas (cinco años transcurridos
  entre el cierre de la instrucción y el inicio del juicio oral). Luis Bárcenas
  queda condenado por sentencia firme a ocho meses de prisión y multa de
  180.000 euros. Gonzalo Urquijo y Belén García, administradores de Unifica,
  quedan condenados a nueve meses de prisión y multa de 200.000 euros cada uno.
tipo: acreditado
