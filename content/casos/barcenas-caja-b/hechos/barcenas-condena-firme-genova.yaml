documentos_respaldo:
  - documento_id: cgpj-sentencia-ts-barcenas-caja-b-2024
    pasaje: >-
      Fallo — «los dos administradores de Unifica S.L. reducen su condena de
      2 años y 9 meses a 9 meses de prisión» y «Luis Bárcenas [...] reduce su
      condena de 2 años a 8 meses de prisión»; multa de 200.000 euros a cada
      administrador y de 180.000 euros a Bárcenas; «la mitigación de las penas
      obedece [...] a la apreciación de una atenuante de dilaciones indebidas,
      basada en el largo tiempo transcurrido (cinco años) entre [...]
      la investigación y el juicio oral» (STS ECLI:ES:TS:2024:5577, 15-nov-2024)
  - documento_id: elespanol-sentencia-ts-barcenas-2024
