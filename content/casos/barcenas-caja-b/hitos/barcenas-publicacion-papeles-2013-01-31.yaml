titulo: >-
  El País publica los presuntos «papeles de Bárcenas» con la presunta contabilidad
  B del PP
descripcion: |
  El 31 de enero de 2013, el diario El País publica una serie de presuntos
  documentos contables en los que el entonces extesorero del Partido Popular
  Luis Bárcenas habría registrado, entre 1990 y 2009, ingresos y pagos de
  fondos procedentes de donaciones privadas que no constan en la contabilidad
  oficial del partido. El 18 de enero El Mundo había publicado previamente
  que Bárcenas habría pagado sobresueldos a cargos del PP con fondos no
  declarados. La publicación de los papeles desencadena el inicio de
  investigaciones judiciales como pieza separada del caso Gürtel ante el
  Juzgado Central de Instrucción nº 5 de la Audiencia Nacional.
