titulo: >-
  El juez Ruz sobresee provisionalmente la pieza de donaciones y mantiene
  abierta la pieza Génova
descripcion: |
  El 23 de marzo de 2015, el juez Pablo Ruz acuerda el sobreseimiento
  provisional de la investigación sobre las presuntas aportaciones de
  empresarios al Partido Popular en los «papeles de Bárcenas», al no
  hallar acreditada la relación causal entre las supuestas donaciones y
  adjudicaciones concretas de contratos públicos. El juez declara, sin
  embargo, que la financiación irregular del PP queda probada en el ámbito
  de la pieza Gürtel principal. Mantiene abierta la pieza sobre la reforma
  de la sede en Génova con fondos no declarados, que continúa instruyéndose.
