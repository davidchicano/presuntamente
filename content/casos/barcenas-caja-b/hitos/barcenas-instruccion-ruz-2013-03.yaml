titulo: >-
  El juez Pablo Ruz inicia la instrucción de la pieza separada sobre los
  «papeles de Bárcenas» y la presunta caja B del PP
descripcion: |
  En marzo de 2013, el magistrado Pablo Ruz, titular del Juzgado Central de
  Instrucción nº 5 de la Audiencia Nacional, acuerda iniciar las diligencias
  previas sobre los presuntos documentos de contabilidad paralela del Partido
  Popular publicados por El País, separando esta investigación como pieza
  autónoma de las Diligencias Previas del caso Gürtel ya en instrucción.
  El 27 de junio de 2013 Bárcenas ingresa en prisión preventiva por riesgo
  de fuga, y en julio de 2013 declara ante Ruz y confirma la autoría de los
  documentos, afirmando que el PP se financió irregularmente durante dos
  décadas.
