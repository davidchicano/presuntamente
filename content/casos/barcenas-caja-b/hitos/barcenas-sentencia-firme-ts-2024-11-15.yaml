titulo: >-
  El Tribunal Supremo confirma la condena en la pieza Génova y reduce las penas
  por dilaciones indebidas
descripcion: |
  La Sala Segunda del Tribunal Supremo, con ponencia del magistrado Antonio del
  Moral García, dicta el 15 de noviembre de 2024 la sentencia
  ECLI:ES:TS:2024:5577 que resuelve los recursos de casación contra la
  sentencia de la Audiencia Nacional de 28 de octubre de 2021. El Supremo
  confirma en lo sustancial la condena: mantiene la culpabilidad de Luis
  Bárcenas, Gonzalo Urquijo y Belén García por el delito de defraudación
  tributaria, y la responsabilidad civil subsidiaria del Partido Popular.
  Reduce las penas de prisión al apreciar una atenuante de dilaciones indebidas
  (cinco años transcurridos entre el cierre de la instrucción y el juicio oral):
  la pena de Bárcenas se reduce de dos años a ocho meses, y las de los
  administradores de Unifica de dos años y nueve meses a nueve meses. Las
  multas quedan fijadas en 180.000 euros para Bárcenas y 200.000 euros para
  cada administrador. La cuota tributaria defraudada se recalcula en 374.000
  euros (la AN la había fijado en 870.000 €). La sentencia gana firmeza con
  esta resolución.
