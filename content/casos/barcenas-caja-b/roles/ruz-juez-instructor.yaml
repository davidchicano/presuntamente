notas: |
  Pablo Ruz fue el magistrado instructor del Juzgado Central de Instrucción
  nº 5 de la Audiencia Nacional que inició la investigación de la pieza
  separada sobre los papeles de Bárcenas en 2013. Acordó el sobreseimiento
  provisional de la pieza de donaciones el 23 de marzo de 2015 y dictó la
  apertura de juicio oral de la pieza Génova.
