notas: |
  Condenado por la Sección Segunda de la Audiencia Nacional el 28 de octubre
  de 2021 a dos años de prisión y multa de 1,2 millones de euros como
  cooperador necesario en un delito continuado de falsedad en documento
  mercantil y un delito contra la Hacienda Pública. Sentencia recurrible en
  casación ante el Tribunal Supremo. La presunción de inocencia formal se
  mantiene hasta la firmeza.
