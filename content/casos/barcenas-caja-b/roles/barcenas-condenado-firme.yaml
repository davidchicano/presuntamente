notas: |
  Condena firme por sentencia del Tribunal Supremo de 15 de noviembre de 2024
  (ECLI:ES:TS:2024:5577, ponente Antonio del Moral García). Pena reducida a
  ocho meses de prisión y multa de 180.000 euros por apreciación de atenuante
  de dilaciones indebidas. La presunción de inocencia decae respecto de los
  hechos declarados probados y firmes (cooperador necesario en el delito
  contra la Hacienda Pública de Unifica, ejercicio 2007).
