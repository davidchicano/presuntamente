notas: |
  Condena firme por sentencia del Tribunal Supremo de 15 de noviembre de 2024
  (ECLI:ES:TS:2024:5577). Coadministradora de Unifica S.L. Pena reducida a
  nueve meses de prisión y multa de 200.000 euros por atenuante de dilaciones
  indebidas. La presunción de inocencia decae respecto de los hechos probados
  y firmes (coautora del delito contra la Hacienda Pública de Unifica,
  ejercicio 2007).
