id: filesa-condenas-firmes-1997
caso_id: filesa
enunciado: |
  La STS 1/1997 de la Sala Segunda del Tribunal Supremo (28 de octubre
  de 1997, ponente José Augusto de Vega Ruiz) condenó a ocho personas
  en la Causa Especial nº 880/1991: Carlos Navarro Gómez a 11 años de
  prisión; Alberto Flores Valencia y Luis Oliveró Capellades a 10 años
  cada uno (más multa solidaria de 258.827.765 pesetas por delito
  fiscal); Josep Maria Sala i Grisó a 3 años de prisión y 6 años y un
  día de inhabilitación especial; Aida Álvarez Álvarez y Miguel
  Guillermo Molledo Martín a 2 años, 4 meses y 1 día cada uno;
  Juan Antonio Molina Vivas y Eugenio García Mansilla a 6 meses de
  arresto con indemnización. Tres acusados fueron absueltos (Luis
  Sánchez Marcos, Francisco Javier Iglesias Díaz y Julio Calleja
  González-Camino). La sentencia es firme al dictarse por el Tribunal
  Supremo en única instancia.
