id: malaya-trama-urbanistica
caso_id: malaya
enunciado: |
  La sentencia firme del Tribunal Supremo de 27 de julio de 2015
  declara probada la existencia de una «trama de corrupción política
  y económica generalizada» en el Ayuntamiento de Marbella bajo el
  poder de hecho ejercido por Juan Antonio Roca, asesor del área de
  Urbanismo. La conducta atribuida consistía en el favorecimiento
  mercantil de promotores, constructores e inversores mediante
  resoluciones municipales a cambio de dádivas, vulnerando
  sistemáticamente la normativa urbanística en perjuicio del
  interés general y de las arcas municipales.
  La presunción de inocencia decae con carácter general respecto
  de los 48 condenados por sentencia firme; quedan absueltos los
  restantes.
tipo: acreditado
# Promovido a 'acreditado' el 2026-05-30 (rev. maintainer V-04).
# Respaldo: nota oficial CGPJ (N1) sobre sentencia TS de 27-jul-2015 confirma
# que el TS mantiene la existencia de la trama corrupta declarada por la AP
# Málaga (sentencia 535/2013); nota oficial CGPJ (N1) sobre sentencia AP Málaga
# de 4-oct-2013 describe la práctica corrupta con detalle. La sentencia del TS
# es firme. El enunciado usa verbos y calificaciones tomados de los propios
# documentos del CGPJ; no se añaden calificaciones propias.
