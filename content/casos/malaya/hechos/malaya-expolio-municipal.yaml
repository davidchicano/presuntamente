id: malaya-expolio-municipal
caso_id: malaya
enunciado: |
  La investigación y las sentencias documentan un perjuicio a los
  fondos públicos del Ayuntamiento de Marbella estimado entre 300 y
  550 millones de euros en concepto de fondos municipales detraídos
  o defraudados durante el período de gobierno del GIL. A fecha de
  2026, el Ayuntamiento ha recuperado aproximadamente 92 millones de
  euros procedentes de las condenas dictadas por los tribunales, incluyendo
  la venta de bienes de condenados (más de 60 M€ procedentes de los
  bienes de Roca) y los procedimientos contables ante el Tribunal de
  Cuentas (17 M€ aproximados). Las deudas heredadas por el periodo
  corrupto ascienden a 450 millones de euros, pagados a lo largo de
  los veinte años siguientes.
tipo: atribuido
# Candidato a 'acreditado' parcialmente: el importe de 92 M€ recuperados
# está confirmado por fuentes periodísticas de 2026. El rango 300-550 M€ es
# estimación periodística/investigadora, no cifra de un único documento judicial.
# Ver NOTES.md del caso.
fecha_o_periodo:
  desde: "1991-01-01"
  hasta: "2006-04-07"
  precision: rango
personas_implicadas:
  - juan-antonio-roca
  - marisol-yague
  - julian-munoz
organizaciones_implicadas:
  - ayuntamiento-de-marbella
  - grupo-independiente-liberal
documentos_respaldo:
