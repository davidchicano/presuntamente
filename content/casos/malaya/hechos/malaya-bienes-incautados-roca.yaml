id: malaya-bienes-incautados-roca
caso_id: malaya
enunciado: |
  En la primera fase de la Operación Malaya (29 de marzo de 2006)
  se declara la incautación de bienes cuyo valor se cifró inicialmente
  en 2.600 millones de euros, incluyendo 251 fincas, 42 automóviles
  de lujo, dos aviones, un banco y 30 millones en efectivo.
  Según la investigación, Roca habría invertido los fondos municipales
  desviados en coches de lujo, propiedades inmobiliarias en Madrid y
  obras de arte de alto valor, utilizando como testaferro a Montserrat
  Corulla. La cifra de 2.600 millones refleja la valoración provisional
  policial inicial, no la cuantificada judicialmente como perjuicio.
