titulo: "Disolución del Ayuntamiento de Marbella por el Consejo de Ministros"
descripcion: |
  El 7 de abril de 2006 el Consejo de Ministros aprueba la disolución
  del Ayuntamiento de Marbella, primera vez en la historia democrática
  española en que un consistorio es disuelto por esta vía. La medida
  se adopta como consecuencia directa de las detenciones y del
  desmoronamiento del gobierno municipal tras la Operación Malaya.
  Tomás Reñones, que ejercía como alcalde en funciones, cesa en el
  cargo. Se designa una comisión gestora para administrar el municipio.
