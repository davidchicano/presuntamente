titulo: "Inicio del juicio oral del caso Malaya ante la Audiencia Provincial de Málaga (Sección 1ª)"
descripcion: |
  El 27 de septiembre de 2010 da comienzo la vista oral del caso
  Malaya ante la Sección 1ª de la Audiencia Provincial de Málaga
  (Rollo Sumario 21/2007), con 95 acusados inicialmente, que
  finalmente quedan en 86 en el banquillo. El juicio se desarrolla a
  lo largo de casi 200 sesiones hasta su conclusión. Es el mayor
  macrojuicio por corrupción urbanística municipal en España.
