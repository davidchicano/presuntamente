titulo: "Sentencia 535/2013 de la Audiencia Provincial de Málaga: 52 condenados, 11 años de prisión a Roca"
descripcion: |
  La Sección 1ª de la Audiencia Provincial de Málaga dicta el
  4 de octubre de 2013 la sentencia 535/2013 (Rollo Sumario 21/2007),
  que condena a 52 de los 84 procesados y absuelve a los restantes.
  Las penas más destacadas son: Juan Antonio Roca, 11 años de prisión
  y multa de 240 millones de euros; Tomás Reñones, 12 años; Marisol
  Yagüe, 7 años y 9 meses; Montserrat Corulla, 4 años y multa de
  30 millones de euros; Pedro Román, 4 años; Isabel García Marcos,
  4 años; Julián Muñoz, 2 años y 5 años de inhabilitación. Los
  magistrados ponentes son José Godino (presidente), Rafael Linares
  y Manuel Caballero. La sentencia ocupa cinco tomos y más de 5.000
  folios. Se ordena que bienes decomisados reviertan al Ayuntamiento
  de Marbella para satisfacer deudas públicas.
