fecha_inicio: "2005-11-01"
notas: |
  La Fiscalía Anticorrupción es el órgano que inicia la investigación
  y ejerce la acusación pública en el caso Malaya desde 2005. Presentó
  dos escritos de acusación contra los principales encausados el 26
  de julio de 2006. Sus tesis sobre los delitos y condenas son en
  gran parte recogidas por la sentencia firme del TS de 2015.
