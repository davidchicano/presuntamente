fecha_inicio: "2006-03-29"
notas: |
  El Ayuntamiento de Marbella es reconocido como perjudicado
  institucional por el conjunto de la estructura de corrupción urbanística.
  Las sentencias condenaron a los acusados a indemnizar al consistorio,
  que ha recuperado aproximadamente 92 M€ en 20 años de ejecución.
