id: malaya
nombre_oficial: "Sumario 7/07 — Juzgado de Instrucción nº 5 de Marbella / Rollo Sumario 21/2007 — Audiencia Provincial de Málaga, Sección 1ª (Sentencia firme Tribunal Supremo, 27 de julio de 2015)"
nombre_mediatico: "Caso Malaya"
nombres_alternativos:
  - "Operación Malaya"
  - "trama Malaya"

descripcion_corta: |
  Macrocausa de corrupción urbanística y económica generalizada en el
  Ayuntamiento de Marbella, instruida desde noviembre de 2005 por el
  Juzgado de Instrucción nº 5 de Marbella (magistrado Miguel Ángel
  Torres Segura) a partir de la Operación Malaya, impulsada por la
  Fiscalía Anticorrupción y la UCO de la Guardia Civil. La
  investigación destapó una red de adjudicaciones de licencias
  urbanísticas ilegales a promotores y constructores a cambio de
  comisiones y dádivas, bajo el control de hecho de Juan Antonio Roca,
  asesor de Urbanismo y exgerente municipal, con complicidad de altos
  cargos del Ayuntamiento gobernado por el Grupo Independiente Liberal
  (GIL). La primera fase de detenciones (29 de marzo de 2006) afectó a
  29 personas con incautaciones valoradas inicialmente en 2.600 millones
  de euros, y la causa derivó en la primera disolución de un
  Ayuntamiento en la historia democrática española (7 de abril de 2006).
  El juicio oral ante la Audiencia Provincial de Málaga (Sección 1ª)
  se celebró a lo largo de casi 200 sesiones a partir de septiembre de
  2010. La sentencia 535/2013 de la AP Málaga, de 4 de octubre de 2013,
  condenó a 52 de los 84 procesados, con la pena más alta para Tomás
  Reñones (12 años) y Juan Antonio Roca (11 años y 240 M€ de multa).
  El Tribunal Supremo dictó sentencia firme el 27 de julio de 2015
  (ponente Juan Saavedra Ruiz), elevando la condena de Roca a 17 años
  de prisión y 232 M€ de multa, reduciendo los condenados a 48 y
  modificando la distribución de los bienes decomisados. A 2026, el
  Ayuntamiento de Marbella ha recuperado aproximadamente 92 millones
  de euros procedentes de las condenas.

sintesis_caso:
  que_se_investiga: "Una red de corrupción urbanística y económica en el Ayuntamiento de Marbella, con licencias ilegales concedidas a promotores a cambio de comisiones bajo el control de Juan Antonio Roca."
  hechos_clave:
    - "La Operación Malaya, iniciada en noviembre de 2005, culminó el 29 de marzo de 2006 con la detención de 29 personas y la incautación de bienes valorados inicialmente en 2.600 millones de euros."
    - "El Ayuntamiento de Marbella fue disuelto el 7 de abril de 2006, primera vez en la historia democrática española que se disuelve un consistorio."
    - "El Tribunal Supremo dictó sentencia firme el 27 de julio de 2015, confirmando 48 condenas y elevando la pena de Roca a 17 años de prisión y 232 millones de euros de multa."
    - "En 20 años de ejecución de condenas, el Ayuntamiento de Marbella ha recuperado unos 92 millones de euros, frente a una deuda heredada de 450 millones."
  estado_actual: "Sentencia firme del Tribunal Supremo desde el 27 de julio de 2015. La causa se encuentra en fase de ejecución de sentencia."
  cifras_clave:
    - "48 condenados por sentencia firme del TS (2015)"
    - "17 años de prisión para Juan Antonio Roca (pena más alta)"
    - "232 M€ de multa penal impuesta a Juan Antonio Roca"
    - "92 M€ recuperados por el Ayuntamiento de Marbella en 20 años"
    - "450 M€ de deudas heredadas del período corrupto"

