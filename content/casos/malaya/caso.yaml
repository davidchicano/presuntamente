resumen_cifras: |
  La sentencia firme del Tribunal Supremo de 27 de julio de 2015
  elevó la pena de Juan Antonio Roca, al que el tribunal considera figura central de la red de corrupción, a 17
  años de prisión y 232 millones de euros de multa, agravando la
  condena inicial de la Audiencia Provincial de Málaga (11 años y 240
  M€). El blanqueo de capitales acreditado judicialmente asciende a
  al menos 12 millones de euros, aunque las estimaciones del expolio
  total a las arcas municipales oscilan entre 300 y 550 millones de
  euros en cifras periodísticas. En 20 años de ejecución, el
  Ayuntamiento de Marbella ha recuperado aproximadamente 92 millones
  de euros (más de 60 M€ por venta de bienes de Roca y 17 M€ por
  procedimientos del Tribunal de Cuentas), frente a una deuda
  heredada que el consistorio cifra en 450 millones de euros.

