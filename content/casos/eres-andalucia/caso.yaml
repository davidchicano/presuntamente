  - malversacion-caudales-publicos

resumen_cifras: |
  La acusación cifró en torno a los 680 millones de euros el volumen de
  ayudas afectado por el sistema de transferencias de financiación a lo
  largo del periodo investigado. La sentencia condenatoria firme del
  Tribunal Supremo (2022) abarca solo los hechos de la pieza política;
  otras piezas con importes específicos están en distintas fases.

