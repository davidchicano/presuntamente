notas: |
  Gaspar Zarrías, exconsejero de la Presidencia de la Junta de Andalucía,
  fue condenado por la Audiencia de Sevilla y de forma firme por el
  Tribunal Supremo por prevaricación. Toda referencia a su
  responsabilidad se limita a lo declarado por los tribunales. Rige la
  presunción de inocencia para cualquier extremo no amparado por
  sentencia.
