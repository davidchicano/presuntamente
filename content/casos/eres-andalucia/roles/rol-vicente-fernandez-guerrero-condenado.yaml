notas: |
  Vicente Fernández Guerrero, exconsejero de Empleo de la Junta de
  Andalucía, figura entre los condenados de la pieza política. Toda
  referencia a su responsabilidad se limita a lo declarado por los
  tribunales. Rige la presunción de inocencia para cualquier extremo no
  amparado por sentencia.
