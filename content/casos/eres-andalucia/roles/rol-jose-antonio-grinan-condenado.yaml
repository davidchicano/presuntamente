notas: |
  José Antonio Griñán fue condenado por la Audiencia de Sevilla (2019) y
  de forma firme por el Tribunal Supremo (2022) por prevaricación y
  malversación, con pena de prisión. En 2024 el Tribunal Constitucional
  estimó parcialmente su recurso de amparo en lo referido a la
  malversación; el alcance exacto de ese pronunciamiento sobre la condena
  debe leerse en los primarios. Rige la presunción de inocencia para
  cualquier extremo no amparado por sentencia.
