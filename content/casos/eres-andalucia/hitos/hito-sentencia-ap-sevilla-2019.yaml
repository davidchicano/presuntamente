titulo: "La Audiencia de Sevilla condena a exaltos cargos de la Junta en la pieza política"
descripcion: |
  La Sección Primera de la Audiencia Provincial de Sevilla dicta
  sentencia en la pieza política del caso ERE. El tribunal condena a un
  grupo de exaltos cargos de la Junta de Andalucía por prevaricación y,
  a varios de ellos, además por malversación de caudales públicos, por
  el diseño y mantenimiento del sistema de ayudas. El expresidente
  Manuel Chaves resulta condenado por prevaricación y el expresidente
  José Antonio Griñán por prevaricación y malversación (con pena de
  prisión). La sentencia es recurrible en casación ante el Tribunal
  Supremo; las condenas no son firmes.
