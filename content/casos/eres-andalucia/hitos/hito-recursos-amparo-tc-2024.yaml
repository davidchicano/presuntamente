titulo: "El Tribunal Constitucional resuelve los amparos y matiza parte de las condenas"
descripcion: |
  El Tribunal Constitucional resuelve los recursos de amparo presentados
  por los condenados en la pieza política del caso ERE. El tribunal de
  garantías estima parcialmente varios de los amparos en lo relativo a
  la condena por malversación de caudales públicos, al apreciar que en
  algunos casos se habría vulnerado un derecho fundamental, y desestima
  las quejas referidas a la condena por prevaricación. La resolución
  obliga a revisar el alcance de algunas condenas por malversación.
