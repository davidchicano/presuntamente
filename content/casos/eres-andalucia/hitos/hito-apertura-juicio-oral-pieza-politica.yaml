titulo: "Comienza en la Audiencia de Sevilla el juicio de la pieza política del caso ERE"
descripcion: |
  La Sección Primera de la Audiencia Provincial de Sevilla inicia el
  juicio oral de la denominada pieza política del caso ERE, que sienta
  en el banquillo a exaltos cargos de la Junta de Andalucía, entre
  ellos los expresidentes Manuel Chaves y José Antonio Griñán. El
  juicio se prolonga durante meses con numerosas sesiones.
