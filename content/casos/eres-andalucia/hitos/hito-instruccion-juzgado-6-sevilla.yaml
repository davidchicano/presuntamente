titulo: "El Juzgado de Instrucción nº 6 de Sevilla asume la instrucción de la causa de los ERE"
descripcion: |
  La investigación sobre la presunta concesión irregular de ayudas
  sociolaborales y a empresas por la Junta de Andalucía se sustancia en
  el Juzgado de Instrucción nº 6 de Sevilla, que dirige durante años la
  instrucción y separa la causa en distintas piezas. La instrucción
  indaga el uso de "transferencias de financiación" a la agencia
  IFA/IDEA como cauce de las ayudas.
organizaciones_afectadas:
