titulo: "El Tribunal Supremo confirma en casación las condenas de la pieza política"
descripcion: |
  La Sala Segunda del Tribunal Supremo resuelve los recursos de
  casación contra la sentencia de la Audiencia de Sevilla y confirma,
  en lo sustancial, las condenas por prevaricación y malversación
  dictadas en la pieza política del caso ERE. La resolución incluye
  votos particulares de parte de los magistrados. Con la casación, las
  condenas devienen firmes en tanto no se resuelvan los recursos de
  amparo pendientes ante el Tribunal Constitucional.
