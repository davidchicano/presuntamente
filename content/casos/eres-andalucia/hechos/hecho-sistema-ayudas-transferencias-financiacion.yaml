id: hecho-sistema-ayudas-transferencias-financiacion
caso_id: eres-andalucia
enunciado: |
  La acusación sostiene que la Junta de Andalucía articuló durante una
  década un sistema de concesión de ayudas sociolaborales y a empresas
  mediante transferencias de financiación a la agencia IFA/IDEA que,
  según el tribunal, eludía los controles legales de las subvenciones.
tipo: atribuido
fecha_o_periodo:
  desde: "2000-01-01"
  hasta: "2010-12-31"
  precision: rango
personas_implicadas: []
organizaciones_implicadas:
  - junta-de-andalucia
  - consejeria-empleo-junta-andalucia
  - agencia-idea
documentos_respaldo:
  - documento_id: sentencia-ap-sevilla-ere-2019
    pasaje: "Hechos probados (descripción del sistema de transferencias de financiación)"
  - documento_id: sentencia-ts-ere-2022
    pasaje: "Fundamentos jurídicos sobre la calificación del sistema"
nivel_fuente_efectivo: 1
importe: 680000000
importe_moneda: EUR
importe_alcance: total_caso
importe_clase: objeto
importe_naturaleza: fondo_publico_concedido
importe_nota: |
  En torno a 680 millones de euros en ayudas afectadas por el sistema de
  transferencias de financiación durante el periodo investigado, según la
  cuantificación de la acusación. La cifra representa el volumen del
  programa cuya regularidad se discute; no todo ese importe equivale a
  perjuicio acreditado ni a enriquecimiento de persona alguna.
importe_atribucion:
