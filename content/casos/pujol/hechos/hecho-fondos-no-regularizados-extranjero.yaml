id: hecho-fondos-no-regularizados-extranjero
caso_id: pujol
enunciado: >-
  Se investiga que la familia Pujol Ferrusola mantuvo durante décadas fondos no
  regularizados en el extranjero, principalmente en Andorra, situación que el
  propio Jordi Pujol Soley reconoció públicamente el 25 de julio de 2014
  atribuyendo el origen del dinero a una herencia de su padre, Florenci Pujol.
tipo: investigado
fecha_o_periodo:
  desde: "1980-01-01"
  hasta: "2014-07-25"
  precision: rango
personas_implicadas:
  - jordi-pujol-soley
  - marta-ferrusola-llados
  - jordi-pujol-ferrusola
documentos_respaldo:
