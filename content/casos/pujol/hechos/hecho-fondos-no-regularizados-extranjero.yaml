    pasaje: "Comunicado de 25 de julio de 2014: reconocimiento de fondos no regularizados en el extranjero"
  - documento_id: cobertura-elpais-confesion-pujol-2014
  - documento_id: cobertura-vozpopuli-confesion-pujol-2014
nivel_fuente_efectivo: 4
