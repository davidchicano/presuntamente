titulo: "Jordi Pujol reconoce públicamente fondos no regularizados en el extranjero"
descripcion: >-
  Jordi Pujol Soley difundió un comunicado en el que reconocía que la familia
  había mantenido durante décadas dinero no regularizado en el extranjero,
  atribuyendo su origen a una herencia de su padre, Florenci Pujol. El
  comunicado desencadenó la apertura formal de la investigación en la Audiencia
  Nacional.
