titulo: "Inicio del juicio oral contra la familia Pujol en la Audiencia Nacional"
descripcion: >-
  La Sección Primera de la Sala de lo Penal de la Audiencia Nacional dio inicio
  el 10 de noviembre de 2025 al juicio oral contra Jordi Pujol Soley, sus siete
  hijos y otras personas acusadas por los presuntos delitos de organización
  criminal o asociación ilícita, blanqueo de capitales, delito contra la
  Hacienda Pública y falsedad documental. El juicio, con 51 sesiones programadas
  para celebrarse entre noviembre de 2025 y abril de 2026 en la sede de San
  Fernando de Henares (Madrid), está presidido por la magistrada María Riera,
  con la magistrada María Fernanda García como ponente y Carolina Rius como
  tercera integrante. La Fiscalía Anticorrupción mantiene penas que van de 8 a
  29 años de prisión. En los primeros días del juicio se constata el deterioro
  cognitivo de Jordi Pujol Soley, de 95 años, que comparece mediante
  videoconferencia desde su domicilio en Barcelona, conforme a un auto del
  tribunal de 24 de noviembre de 2025.
