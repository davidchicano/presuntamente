titulo: "Sobreseimiento libre de la causa contra Jordi Pujol Soley por deterioro cognitivo"
descripcion: >-
  El 27 de abril de 2026 el tribunal de la Sección Primera de la Sala de lo
  Penal de la Audiencia Nacional acordó el sobreseimiento libre de la causa
  respecto de Jordi Pujol Soley, de 95 años, al constatar que padece un
  trastorno neurocognitivo mayor mixto —de tipo Alzheimer y de tipo vascular—
  que le impide ejercer su derecho de defensa con las garantías constitucionales
  exigibles. La decisión fue anunciada públicamente el 11 de mayo de 2026 por
  el magistrado presidente del tribunal, José Ricardo de Prada, durante la fase
  de conclusiones definitivas. El auto formal de sobreseimiento libre fue
  dictado en los días siguientes al anuncio. El juicio oral continúa activo
  contra los siete hijos del expresident y demás acusados.
