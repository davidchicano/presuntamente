id: pujol
nombre_oficial: "Diligencias Previas — Juzgado Central de Instrucción nº 5 de la Audiencia Nacional (Familia Pujol)"
nombre_mediatico: "Caso Pujol"
nombres_alternativos:
  - "Caso de la familia Pujol"
  - "Patrimonio Pujol en el extranjero"

descripcion_corta: >-
  Investigación en la Audiencia Nacional sobre el presunto origen ilícito del
  patrimonio que la familia Pujol Ferrusola mantuvo durante décadas en el
  extranjero y sobre el presunto cobro de comisiones.

sintesis_caso:
  que_se_investiga: >-
    Se investiga el origen del patrimonio que la familia Pujol mantuvo durante
    décadas no regularizado en el extranjero y el presunto cobro de comisiones
    vinculadas a contratos públicos.
  hechos_clave:
    - >-
      El 25 de julio de 2014 Jordi Pujol Soley reconoció públicamente que la
      familia había mantenido durante décadas dinero no regularizado en el
      extranjero, atribuyendo su origen a una herencia de su padre.
    - >-
      El juicio oral comenzó el 10 de noviembre de 2025 en la Sección Primera
      de la Sala de lo Penal de la Audiencia Nacional, con 38 sesiones y más de
      200 testigos.
    - >-
      El 27 de abril de 2026 la Audiencia Nacional acordó el sobreseimiento
      libre de la causa contra Jordi Pujol Soley, de 95 años, por trastorno
      neurocognitivo mayor mixto que le impide ejercer su derecho de defensa.
    - >-
      El 14 de mayo de 2026 el juicio quedó visto para sentencia para los siete
      hijos; la Fiscalía Anticorrupción mantiene penas de entre 8 y 29 años.
  estado_actual: >-
    El juicio oral celebrado entre noviembre de 2025 y mayo de 2026 quedó visto
    para sentencia el 14 de mayo de 2026 respecto de los siete hijos del
    expresident (Jordi, Oriol, Oleguer, Pere, Marta, Mireia y Josep Pujol
    Ferrusola). La causa contra Jordi Pujol Soley fue sobreseída libremente el
    27 de abril de 2026 por deterioro cognitivo. No existe sentencia en esta
    causa a fecha de la última revisión editorial. El tribunal está en fase de
    deliberación.

