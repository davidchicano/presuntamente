notas: >-
  Oriol Pujol Ferrusola figura como acusado en esta causa sobre el patrimonio
  familiar por el auto de apertura de juicio oral de 15 de junio de 2021, con
  independencia de procedimientos distintos en los que hubiera podido ser
  condenado. La Fiscalía Anticorrupción solicita para él 8 años de prisión
  (petición acusatoria, no condena). Acusado bajo plena presunción de inocencia
  en esta causa: no existe sentencia en ella.
