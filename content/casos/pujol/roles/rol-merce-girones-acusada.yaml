notas: >-
  Mercè Gironès Riera, exmujer de Jordi Pujol Ferrusola, fue enviada a juicio por
  el auto de apertura de juicio oral de 15 de junio de 2021. La Fiscalía
  Anticorrupción solicita para ella 17 años de prisión (petición acusatoria, no
  condena), situándola en el presunto entramado patrimonial junto al
  primogénito. Acusada bajo plena presunción de inocencia: no existe sentencia en
  este procedimiento. Los delitos se toman del escrito de acusación reseñado en
  la cobertura cruzada (N4); pendiente de cotejo con el escrito íntegro.
