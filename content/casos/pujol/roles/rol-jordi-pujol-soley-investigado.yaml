notas: >-
  Jordi Pujol Soley quedó fuera del juicio por su deterioro cognitivo y el
  tribunal acordó el sobreseimiento libre de la causa respecto de él (decisión
  comunicada en abril-mayo de 2026). El sobreseimiento libre cierra la causa
  frente a él sin pronunciamiento sobre el fondo: no es absolución ni
  declaración de culpabilidad. Rige plena presunción de inocencia. Detalle y
  fuentes en NOTES.md.
