notas: >-
  Luis Delso Heras fue enviado a juicio por el auto de apertura de juicio oral de 15 de
  junio de 2021. La Fiscalía Anticorrupción le atribuye el presunto pago de
  comisiones a Jordi Pujol Ferrusola camufladas como servicios de intermediación
  y solicita 5 años de prisión (petición acusatoria, no condena). Acusado bajo
  plena presunción de inocencia: no existe sentencia en este procedimiento.
  Identidad, delitos y pena tomados de la cobertura cruzada (N4); pendiente de
  cotejo con el escrito íntegro.
