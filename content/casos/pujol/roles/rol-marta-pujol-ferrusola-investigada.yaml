notas: >-
  Marta Pujol Ferrusola (hija del expresident, no confundir con su madre Marta
  Ferrusola i Lladós) fue enviada a juicio por el auto de apertura de juicio
  oral de 15 de junio de 2021. La Fiscalía Anticorrupción solicita para ella 8
  años de prisión (petición acusatoria, no condena). Acusada bajo plena
  presunción de inocencia: no existe sentencia en este procedimiento.
