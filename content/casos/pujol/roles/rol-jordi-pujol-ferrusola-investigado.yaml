notas: >-
  Jordi Pujol Ferrusola, primogénito de la familia, fue enviado a juicio por el
  auto de apertura de juicio oral de 15 de junio de 2021; es la persona sobre la
  que la instrucción centró el presunto cobro de comisiones y los movimientos de
  capital en el extranjero. La Fiscalía Anticorrupción solicita para él 29 años
  de prisión (petición acusatoria, no condena). Acusado bajo plena presunción de
  inocencia: no existe sentencia en este procedimiento. Los delitos se toman del
  escrito de acusación reseñado en la cobertura cruzada; pendiente de cotejo con
  el escrito íntegro.
