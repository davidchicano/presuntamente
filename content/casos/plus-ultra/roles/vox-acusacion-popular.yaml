notas: |
  Vox figura entre las acusaciones populares personadas en el caso Plus Ultra.
  Según la cobertura periodística del 29 de mayo de 2026, fue la primera parte
  en presentar escrito de personación, pero el JCI nº 4 consideró que esa
  personación no era "válida y plenamente eficaz" por carecer del poder de
  representación exigido, y agrupó las acusaciones populares bajo la dirección
  letrada del Partido Popular. Vox mantiene su condición de parte personada
  dentro de la representación conjunta. Pendiente de confirmar con el auto
  íntegro o nota CGPJ los términos exactos de su admisión.
