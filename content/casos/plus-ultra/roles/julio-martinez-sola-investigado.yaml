notas: |
  Julio Martínez Sola, presidente y dueño de Plus Ultra Líneas Aéreas,
  es detenido el 11 de diciembre de 2025 por la UDEF en el registro de
  la sede de la compañía. Tras pasar a disposición judicial es puesto
  en libertad con medidas cautelares y mantiene la condición de
  investigado por presunto blanqueo de capitales en relación con el uso
  de los 53 millones de euros del rescate. Posibles delitos adicionales
  (tráfico de influencias, organización criminal, falsedad documental
  apuntados por el auto del JCI nº 4 del 19 de mayo de 2026 contra
  terceros de la trama) podrán incorporarse cuando un documento oficial
  los atribuya formalmente a este investigado. La condición de
  investigado no implica valoración de culpabilidad: rige el principio
  de presunción de inocencia mientras no recaiga resolución firme.
