notas: |
  El Partido Popular ejerce la acusación popular en el caso Plus Ultra. Según
  la cobertura periodística del 29 de mayo de 2026, el JCI nº 4 de la Audiencia
  Nacional acordó agrupar las acusaciones populares personadas bajo una
  representación y dirección letrada conjunta y la atribuyó al PP, al
  considerar que su escrito fue la primera personación procesalmente válida y
  eficaz. La fecha de inicio refleja la resolución de agrupación; pendiente de
  confirmar con el auto íntegro o nota CGPJ la fecha de admisión formal de su
  personación.
