notas: |
  José Luis Rodríguez Zapatero es citado como investigado por el JCI nº 4
  de la Audiencia Nacional mediante auto del 19 de mayo de 2026. Tras el
  aplazamiento acordado el 26 de mayo, declara como investigado el 17 de
  junio de 2026; ese mismo día el magistrado José Luis Calama rechaza
  retirarle el pasaporte o imponerle comparecencias periódicas, por no
  apreciar un riesgo procesal actual que lo justifique. La condición de
  investigado no implica valoración de culpabilidad: rige el principio
  de presunción de inocencia mientras no recaiga resolución firme. Esta
  ficha quedará abierta hasta que un nuevo hito (sentencia firme,
  desimputación, archivo) cierre el rol.
