notas: |
  El magistrado José Luis Calama, titular del Juzgado Central de
  Instrucción nº 4 de la Audiencia Nacional, asume la instrucción del
  caso Plus Ultra cuando la causa se traslada desde el Juzgado de
  Instrucción nº 15 de Madrid. Día exacto de la asunción de competencia
  pendiente de verificar con el auto correspondiente; se utiliza el
  primero del mes con anotación interna en NOTES.md.
