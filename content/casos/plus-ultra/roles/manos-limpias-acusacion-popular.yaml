hito_origen_id: querella-manos-limpias-presentada-2025-12-23
notas: |
  La asociación Manos Limpias actúa como acusación popular en el
  procedimiento desde la presentación de su querella ante el JI nº 15
  de Madrid el 23 de diciembre de 2025. Según la cobertura periodística
  del 29 de mayo de 2026, figura entre las ocho acusaciones populares
  personadas que el JCI nº 4 de la Audiencia Nacional agrupó ese día bajo
  la representación y dirección letrada conjunta del Partido Popular
  (hito `auto-acusaciones-populares-pp-2026-05-29`), lo que confirma su
  personación efectiva tras el traslado de la causa a la Audiencia
  Nacional.
