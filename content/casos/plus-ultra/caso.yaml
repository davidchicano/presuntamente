# Caso Plus Ultra — esqueleto inicial (PR1 Fase 1).
# Esta primera versión es deliberadamente conservadora: schema validable,
# datos verificables a partir de fuentes oficiales y prensa multi-medio, y
# decisiones editoriales sensibles diferidas a PR2 (ver NOTES.md).

id: plus-ultra
nombre_oficial: "Diligencias Previas — JCI nº 4 de la Audiencia Nacional"
nombre_mediatico: "Caso Plus Ultra"
nombres_alternativos:
  - "Rescate Plus Ultra"
  - "Préstamo SEPI a Plus Ultra"

descripcion_corta: |
  Procedimiento penal en instrucción en la Audiencia Nacional sobre el
  préstamo de 53 millones de euros concedido por la SEPI a la aerolínea
  Plus Ultra Líneas Aéreas en marzo de 2021, a través del Fondo de Apoyo a
  la Solvencia de Empresas Estratégicas. La causa, originada por una
  petición de cooperación internacional procedente de Francia y Suiza,
  investiga el presunto uso irregular de esos fondos y su posible relación
  con esquemas de blanqueo de capitales con origen en Venezuela.

sintesis_caso:
  que_se_investiga: "Si el préstamo público de 53 millones de euros concedido a Plus Ultra se otorgó o se usó de forma irregular, y si habría operado en torno a la decisión una estructura estable de tráfico de influencias presuntamente liderada por el expresidente José Luis Rodríguez Zapatero."
  hechos_clave:
    - "El Consejo de Ministros aprobó en marzo de 2021 un préstamo de 53 millones de euros a través de la SEPI."
    - "La causa procede de cooperación internacional con Francia y Suiza y se instruye en la Audiencia Nacional."
    - "José Luis Rodríguez Zapatero declaró como investigado ante el JCI nº 4 el 17 de junio de 2026 y, tras esa comparecencia, el instructor rechazó imponerle medidas cautelares personales."
    - "El instructor investiga también el posible uso irregular de fondos públicos y su conexión con esquemas de blanqueo con origen en Venezuela."
  estado_actual: "La causa sigue en instrucción. José Luis Rodríguez Zapatero declaró como investigado ante el JCI nº 4 el 17 de junio de 2026 y, tras su comparecencia, el magistrado José Luis Calama rechazó retirarle el pasaporte o imponerle comparecencias periódicas al no apreciar un riesgo procesal actual. El 25 de junio, el CGPJ informó de que el instructor dedujo testimonio para investigar filtraciones de documentación y datos incorporados a la causa y acordó formar una pieza de información sensible; los escritos de nulidad de la defensa quedan pendientes de resolución. El 29 de mayo de 2026 el instructor agrupó las ocho acusaciones populares personadas bajo una representación y dirección letrada conjunta, atribuida al Partido Popular; un auto posterior de 16 de junio confirmó que su presencia en las diligencias debía canalizarse a través de esa representación unificada. Rige el principio de presunción de inocencia."
  cifras_clave:
    - "53 M€ de préstamo público"
    - "4 delitos atribuidos en la causa"
    - "Audiencia Nacional"

organo_judicial_id: juzgado-central-instruccion-4
numero_procedimiento: "Diligencias Previas"
