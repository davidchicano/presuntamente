# Caso Plus Ultra — esqueleto inicial (PR1 Fase 1).
# Esta primera versión es deliberadamente conservadora: schema validable,
# datos verificables a partir de fuentes oficiales y prensa multi-medio, y
# decisiones editoriales sensibles diferidas a PR2 (ver NOTES.md).

id: plus-ultra
nombre_oficial: "Diligencias Previas — JCI nº 4 de la Audiencia Nacional"
nombre_mediatico: "Caso Plus Ultra"
nombres_alternativos:
  - "Rescate Plus Ultra"
  - "Préstamo SEPI a Plus Ultra"

descripcion_corta: |
  Procedimiento penal en instrucción en la Audiencia Nacional sobre el
  préstamo de 53 millones de euros concedido por la SEPI a la aerolínea
  Plus Ultra Líneas Aéreas en marzo de 2021, a través del Fondo de Apoyo a
  la Solvencia de Empresas Estratégicas. La causa, originada por una
  petición de cooperación internacional procedente de Francia y Suiza,
  investiga el presunto uso irregular de esos fondos y su posible relación
  con esquemas de blanqueo de capitales con origen en Venezuela.

sintesis_caso:
  que_se_investiga: "Si el rescate público de Plus Ultra se concedió o usó de forma irregular."
  hechos_clave:
    - "El Consejo de Ministros aprobó en marzo de 2021 un préstamo de 53 millones de euros a través de la SEPI."
    - "La causa procede de cooperación internacional con Francia y Suiza y se instruye en la Audiencia Nacional."
    - "El instructor investiga el posible uso irregular de fondos públicos y su conexión con esquemas de blanqueo con origen en Venezuela."
  estado_actual: "La causa sigue en instrucción; no hay sentencia firme ni hechos penales acreditados contra las personas investigadas."
  cifras_clave:
    - "53 M€ de préstamo público"
    - "4 delitos atribuidos en la causa"
    - "Audiencia Nacional"

organo_judicial_id: juzgado-central-instruccion-4
numero_procedimiento: "DP (pendiente de confirmar número exacto público)"
tipo_procedimiento: diligencias_previas

fase_actual: instruccion
fecha_apertura: "2024-07-01"

origen_denuncia: fiscalia_anticorrupcion
querellante_inicial_id: fiscalia-anticorrupcion

delitos_atribuidos_en_la_causa:
  - trafico-de-influencias
  - organizacion-criminal
  - falsedad-documental
  - blanqueo-de-capitales

resumen_cifras: |
  Préstamo público de 53 millones de euros aprobado el 9 de marzo de 2021
  por el Consejo de Ministros a través de la SEPI.

partidos_afectados:
  - partido_id: psoe
    tipo_afectacion: gobierno_responsable_del_acto_investigado
    justificacion: >-
      El Consejo de Ministros que autorizó el préstamo de 53 M€ a Plus Ultra
      (9 de marzo de 2021) era el gobierno de coalición presidido por Pedro
      Sánchez, cuyo partido, el PSOE, encabezaba el ejecutivo.
  - partido_id: psoe
    tipo_afectacion: militancia_o_cargo_organico_relevante
    justificacion: >-
      José Luis Rodríguez Zapatero, citado como investigado por el JCI nº 4
      en mayo de 2026, fue Secretario General del PSOE de 2000 a 2012 y
      presidente del Gobierno de España de 2004 a 2011. El vínculo orgánico
      es histórico y no estaba activo al momento de los hechos investigados
      (2021).
  - partido_id: podemos
    tipo_afectacion: gobierno_responsable_del_acto_investigado
    justificacion: >-
      Unidas Podemos formaba parte de la coalición de gobierno que aprobó el
      préstamo a Plus Ultra el 9 de marzo de 2021, siendo el partido
      codirector del ejecutivo en el momento del acto investigado.

estado_publicacion: beta_publica
ultima_revision_editorial: "2026-05-21"
nivel_relevancia_editorial: capital

# Honestidad editorial sobre el trabajo de presuntamente.org en esta ficha
# (ver docs/web/features/estado-ficha-caso.md). No mide el procedimiento
# judicial — su fase procesal está en `fase_actual`.
estado_ficha:
  cronologia: completo
  roles_procesales: completo
  documentos_primarios: completo
  hechos_modelados: completo
  fuentes_cruzadas: completo
  composicion_fuentes_citadas: pendiente
  vinculos_institucionales: completo
  grafo_relaciones: pendiente
  cobertura_mediatica_general: parcial
  revision_editorial: completo
  fecha_actualizacion: "2026-05-26"
