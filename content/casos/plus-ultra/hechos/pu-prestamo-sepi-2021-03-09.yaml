id: pu-prestamo-sepi-2021-03-09
caso_id: plus-ultra
enunciado: |
  El Consejo de Ministros autorizó el 9 de marzo de 2021 un préstamo de
  53 millones de euros a Plus Ultra Líneas Aéreas, S.A. a través del
  Fondo de Apoyo a la Solvencia de Empresas Estratégicas (FASEE), fondo
  creado por el Real Decreto-ley 25/2020 de 3 de julio (BOE-A-2020-7311)
  y gestionado por la Sociedad Estatal de Participaciones Industriales
  (SEPI). La concesión del préstamo es objeto de investigación por el
  Juzgado Central de Instrucción nº 4 de la Audiencia Nacional desde
  2025 por su presunta irregularidad; el acto administrativo de
  autorización en sí no está cuestionado y consta tanto en la nota
  oficial de la SEPI como en la base normativa publicada en el BOE.
