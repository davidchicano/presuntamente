caso_id: plus-ultra
enunciado: >-
  El 17 de junio de 2026 José Luis Rodríguez Zapatero declaró como
  investigado ante el JCI nº 4 de la Audiencia Nacional y, tras esa
  comparecencia, el magistrado José Luis Calama rechazó retirarle el
  pasaporte o imponerle comparecencias periódicas al no apreciar un riesgo
  procesal actual que justificara esas medidas cautelares.
