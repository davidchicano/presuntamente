id: pu-trama-organizada-zapatero-2026-05-19
caso_id: plus-ultra
enunciado: |
  Consta en el auto del Juzgado Central de Instrucción nº 4 de la
  Audiencia Nacional del 19 de mayo de 2026, conforme a la nota
  institucional del Consejo General del Poder Judicial, que la
  investigación ha identificado indiciariamente una "red organizada
  para el ejercicio ilícito de influencia, estructurada y liderada por
  José Luis Rodríguez Zapatero", según la calificación indiciaria del
  magistrado instructor. La existencia y los contornos de esa
  estructura están bajo investigación y no han sido acreditados por
  sentencia firme.
