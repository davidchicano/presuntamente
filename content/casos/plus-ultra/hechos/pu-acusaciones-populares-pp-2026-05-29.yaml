id: pu-acusaciones-populares-pp-2026-05-29
caso_id: plus-ultra
enunciado: >-
  Según la cobertura periodística del 29 de mayo de 2026, el JCI nº 4 de la
  Audiencia Nacional acordó agrupar las ocho acusaciones populares personadas
  en el caso Plus Ultra —entre ellas el Partido Popular, Vox, Hazte Oír, el
  sindicato Manos Limpias, Ciudadanos, Iustitia Europa, la organización
  Liberum y un particular— bajo una representación y dirección letrada
  conjunta, atribuida al Partido Popular. El instructor consideró que la
  personación de Vox, primera en presentarse, no era válida por carecer del
  poder de representación exigido, y que la del PP fue la primera
  procesalmente eficaz.
