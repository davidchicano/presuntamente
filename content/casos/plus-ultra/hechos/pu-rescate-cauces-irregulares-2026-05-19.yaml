enunciado: |
  Consta en el auto del JCI nº 4 de la Audiencia Nacional del 19 de mayo
  de 2026 que el magistrado instructor sostiene indiciariamente que
  responsables de Plus Ultra Líneas Aéreas habrían intentado obtener el
  préstamo de 53 millones de euros concedido por la SEPI mediante
  mecanismos al margen de los cauces legalmente establecidos para el
  Fondo de Apoyo a la Solvencia de Empresas Estratégicas.
