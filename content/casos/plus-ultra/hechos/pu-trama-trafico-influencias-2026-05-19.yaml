id: pu-trama-trafico-influencias-2026-05-19
caso_id: plus-ultra
enunciado: |
  Consta en el auto del JCI nº 4 de la Audiencia Nacional del 19 de mayo
  de 2026 que se investiga, con carácter indiciario, la existencia de
  una presunta estructura estable y jerárquica de tráfico de
  influencias cuyo objeto habría sido la obtención de beneficios
  económicos mediante la intermediación y el ejercicio de influencia
  ante organismos públicos en favor de terceros, principalmente Plus
  Ultra Líneas Aéreas. Según el mismo auto, el magistrado instructor
  considera indiciariamente que dicha estructura habría utilizado
  sociedades instrumentales, documentación simulada y canales
  financieros opacos.
