titulo: "El juez Calama abre una vía para investigar filtraciones de documentación del caso Plus Ultra"
descripcion: |
  El 25 de junio de 2026 el CGPJ informa de que el magistrado José Luis Calama acuerda
  deducir testimonio para investigar filtraciones de documentación incorporada a la causa
  Plus Ultra y formar una pieza de información sensible para preservar el carácter reservado
  de actuaciones. La incidencia aparece tras los escritos de la defensa de José Luis
  Rodríguez Zapatero sobre la licitud de parte del material incorporado a las actuaciones.

  Este hito se limita a la dimensión procesal de la decisión sobre filtraciones. No modela
  como hechos los contenidos filtrados, ni incorpora personas privadas citadas en esa
  documentación, ni resuelve las alegaciones de nulidad formuladas por la defensa, que
  quedan pendientes de resolución judicial. Rige el principio de presunción de inocencia.
