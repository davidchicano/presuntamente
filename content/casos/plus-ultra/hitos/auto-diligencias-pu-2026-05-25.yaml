titulo: "El JCI nº 4 acuerda el bloqueo de 490.780 € en cuentas de Zapatero, el acceso a sus correos y el secreto absoluto sobre la UDEF"
descripcion: |
  El magistrado José Luis Calama, titular del Juzgado Central de
  Instrucción nº 4 de la Audiencia Nacional, dicta auto en el que
  acuerda un conjunto de diligencias de investigación sobre el
  expresidente del Gobierno José Luis Rodríguez Zapatero en el marco
  del caso Plus Ultra.

  Entre las medidas acordadas constan, según la cobertura periodística
  disponible a fecha de este barrido (27-may-2026): el bloqueo
  cautelar de 490.780 euros en cuentas bancarias tituladas por
  Zapatero; la orden de acceso al contenido de sus correos electrónicos
  y los de sus hijas, solicitada a la empresa Acens Technologies
  (filial de Telefónica); y la imposición de secreto absoluto sobre la
  actuación de la Unidad de Delincuencia Económica y Fiscal (UDEF) en
  la causa, con veto a filtraciones del sumario.

  El auto se inscribe en la misma instrucción que, el 19 de mayo de
  2026, acordó el levantamiento del secreto del sumario y la citación
  de Zapatero como investigado por presuntos delitos de tráfico de
  influencias, pertenencia a organización criminal y falsedad
  documental. A fecha de barrido, el auto íntegro no ha aparecido
  publicado en CENDOJ.

  Conforme al principio de presunción de inocencia, la condición de
  investigado no implica valoración de culpabilidad y persiste mientras
  no recaiga resolución firme en contrario.
