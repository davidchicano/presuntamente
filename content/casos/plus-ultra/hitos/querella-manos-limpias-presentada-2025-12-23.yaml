titulo: "Manos Limpias presenta querella ante el JI nº 15 de Madrid en el caso Plus Ultra"
descripcion: |
  La asociación Manos Limpias presenta una querella ante el Juzgado de
  Instrucción nº 15 de Madrid en relación con el rescate público de la
  aerolínea Plus Ultra. La querella se incorpora a unas diligencias
  previas ya abiertas por el mismo juzgado a petición de la Fiscalía
  Anticorrupción tras peticiones de cooperación internacional
  procedentes de Francia y Suiza en 2024.
