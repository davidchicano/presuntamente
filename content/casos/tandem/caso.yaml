resumen_cifras: |
  El procedimiento principal (Diligencias Previas 96/2017) agrupa más
  de cuarenta y siete piezas separadas en fases procesales heterogéneas.
  Las penas de Villarejo derivadas de sentencias ya dictadas ascienden a
  trece años de prisión por Iron, Land y Pintor (sentencia de apelación
  septiembre 2025, pendiente de posible casación) y tres años y seis meses
  por la pieza Dina (sentencia mayo 2026, no firme). En la pieza
  BBVA/Trampa (pieza 9), la Fiscalía reclama 173 años para el expresidente
  Francisco González y 180 millones de euros de multa para la entidad. La
  empresa Cenyt, vehículo de los encargos, habría facturado más de diez
  millones de euros en trabajos de dudosa legalidad. La pieza Salamanca
  (pieza 1) se saldó con condena firme de tres años para el excomisario
  Carlos Salamanca por cohecho pasivo (resolución confirmada en apelación
  en enero de 2025). La cifra de encargos al BBVA supera los diez millones
  de euros en contratos entre 2004 y 2016 según el escrito acusatorio.
  Las cifras globales de penas acumuladas en toda la macrocausa no son
  comparables entre sí al corresponder a piezas y acusados distintos.

