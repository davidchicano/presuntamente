fecha_inicio: "2017-11-03"
notas: |
  La Fiscalía Especial contra la Corrupción y la Criminalidad Organizada
  (Fiscalía Anticorrupción) ejerce la acusación pública en la macrocausa
  Tándem desde su apertura en noviembre de 2017. En la pieza Kitchen
  (pieza 7), los fiscales Ignacio Stampa y Miguel Serrano han llevado
  el peso de la acusación. La Fiscalía retiró su acusación contra tres
  de los once procesados de Kitchen (Olivera, Fuentes Gago y Díez
  Sevillano) en su escrito de conclusiones de 2023.
