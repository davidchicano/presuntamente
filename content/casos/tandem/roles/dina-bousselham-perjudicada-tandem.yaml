notas: |
  Dina Bousselham reconocida como perjudicada en la pieza separada nº 10
  (caso Dina) por la sentencia de la Sección Cuarta de la Sala de lo Penal
  de la Audiencia Nacional de 5 de mayo de 2026. La indemnización fijada
  a su favor es de 5.000 euros.
