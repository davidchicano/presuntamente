notas: |
  Gemma Alcalá Garcés fue absuelta por la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional en el juicio conjunto de las piezas Iron,
  Land y Pintor (sentencia julio 2023). Sigue figurando como investigada
  en otras piezas del procedimiento troncal sin sentencia. Rige la
  presunción de inocencia respecto de las piezas activas.
