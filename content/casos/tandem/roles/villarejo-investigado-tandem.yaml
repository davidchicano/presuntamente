notas: |
  Rol inicial de Villarejo en el procedimiento troncal (Diligencias Previas
  96/2017). La detención del 3 de noviembre de 2017 marcó la apertura de
  la causa. La sentencia de julio de 2023 transformó su situación procesal
  en las piezas Iron, Land y Pintor; en el resto de piezas activas permanece
  como investigado/procesado. Rige la presunción de inocencia en las piezas
  sin sentencia firme.
