notas: |
  El Banco Bilbao Vizcaya Argentaria (BBVA) como persona jurídica fue
  procesado en la pieza separada nº 9 del caso Tándem (pieza BBVA/Trampa)
  al confirmarse el auto de apertura del procedimiento abreviado en febrero
  de 2026. La Fiscalía solicita una multa de 180 millones de euros. La
  responsabilidad penal de las personas jurídicas en España está reconocida
  desde la LO 5/2010. Rige la presunción de inocencia mientras no recaiga
  sentencia firme.
