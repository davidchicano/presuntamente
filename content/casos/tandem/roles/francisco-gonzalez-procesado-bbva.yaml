notas: |
  Francisco González Rodríguez, expresidente del BBVA, fue procesado en
  la pieza separada nº 9 del caso Tándem (pieza BBVA/Trampa) al confirmar
  la Sala de lo Penal de la AN en febrero de 2026 el auto de apertura del
  procedimiento abreviado. La Fiscalía solicita 173 años de prisión.
  La causa está pendiente de señalamiento de juicio oral. Rige la
  presunción de inocencia mientras no recaiga sentencia firme.
