notas: |
  Condena de 3 años y 6 meses de prisión en sentencia de la Sección Cuarta
  de la Sala de lo Penal de la Audiencia Nacional de 5 de mayo de 2026,
  pieza separada nº 10 (caso Dina). Sentencia no firme a fecha de revisión
  editorial. El delito apreciado es revelación de secretos de particulares
  con difusión a terceros cometido con prevalimiento de la condición de
  funcionario público. Adicionalmente: multa de 18 meses, 6 años de
  inhabilitación absoluta, indemnizaciones. Rige la presunción de inocencia
  formal hasta firmeza.
