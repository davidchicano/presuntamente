notas: |
  Pablo Iglesias Turrión reconocido como perjudicado en la pieza separada
  nº 10 (caso Dina) por la sentencia de la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional de 5 de mayo de 2026. La indemnización
  fijada a su favor es de 1.000 euros. Había ejercido acusación particular
  en la pieza junto a Dina Bousselham; ambos retiraron la acusación contra
  los periodistas Alberto Pozas y Luis Rendueles.
