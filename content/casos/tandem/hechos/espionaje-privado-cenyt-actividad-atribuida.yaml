id: espionaje-privado-cenyt-actividad-atribuida
caso_id: tandem
enunciado: |
  La Fiscalía Anticorrupción atribuye a José Manuel Villarejo Pérez que,
  valiéndose de su condición de comisario activo del Cuerpo Nacional de
  Policía y del acceso privilegiado a bases de datos reservadas del Estado,
  prestó a través de su empresa Cenyt Organizational Consultancy S.L. y de
  las restantes sociedades del grupo Cenyt servicios de espionaje,
  vigilancia e inteligencia privada a clientes corporativos y particulares
  entre 2004 y 2017. Según el instructor, Cenyt facturó más de diez millones
  de euros en encargos de dudosa legalidad, incluidos contratos con el BBVA
  (pieza 9), con Iberdrola (pieza separada relativa a esa empresa), y con
  clientes particulares (piezas Iron, Land y Pintor entre otras). El
  instrumento central de la actividad atribuida era el uso de su posición
  policial para acceder a información reservada y elaborar informes que
  simulaban notas policiales. La condición de investigado/procesado no
  implica valoración de culpabilidad; rige la presunción de inocencia.
