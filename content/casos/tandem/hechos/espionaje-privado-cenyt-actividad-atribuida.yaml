importe_nota: >-
  El instructor del JCI nº 6 estima que Cenyt facturó más de 10 millones de
  euros en encargos de dudosa legalidad en el conjunto del caso Tándem
  (múltiples piezas). Esta cifra es una estimación del procedimiento
