id: condena-iron-land-pintor-revelacion-secretos
caso_id: tandem
enunciado: |
  La Sección Cuarta de la Sala de lo Penal de la Audiencia Nacional condenó
  el 24 de julio de 2023 a José Manuel Villarejo Pérez a diecinueve años de
  prisión en el juicio conjunto de las piezas Iron, Land y Pintor del caso
  Tándem: cuatro años por un delito de revelación de secretos de empresa
  (pieza Iron, consistente en el encargo del bufete Herrero y Asociados para
  obtener información reservada del despacho rival Balder IP Law por 302.500
  euros), tres años por falsedad continuada en documento mercantil (pieza
  Iron), tres años por falsedad en documento mercantil (pieza Land) y nueve
  años por tres delitos de revelación de secretos de particulares (pieza
  Land, sobre el entorno familiar del empresario Francisco García Cereceda).
  Fue absuelto de cohecho en todas las piezas al considerar el tribunal que
  actuó en el ámbito privado, y de extorsión en grado de conspiración en la
  pieza Pintor. Rafael Redondo fue condenado a trece años. Gemma Alcalá
  fue absuelta. La Sala de Apelación de la Audiencia Nacional redujo la
  condena de Villarejo a trece años y la de Redondo a nueve años mediante
  sentencia de 17 de septiembre de 2025, al absolver del delito de falsedad
  documental. La condena de apelación no es firme a fecha de revisión
  editorial.
