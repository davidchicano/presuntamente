id: contratos-bbva-cenyt-2004-2016
caso_id: tandem
enunciado: |
  La Fiscalía Anticorrupción atribuye en su escrito de acusación de marzo de
  2026 (pieza separada nº 9 del caso Tándem, conocida como pieza BBVA o
  Trampa) que el Banco Bilbao Vizcaya Argentaria, con el impulso de su
  entonces presidente Francisco González Rodríguez, contrató entre 2004 y
  2016 los servicios de la empresa Cenyt y sociedades vinculadas al comisario
  José Manuel Villarejo Pérez para la realización de encargos presuntamente
  ilegales. Según la acusación, esos encargos incluían vigilancias a personas
  concretas, interceptación de comunicaciones, consulta de bases de datos
  reservadas y elaboración de informes de inteligencia sobre competidores,
  accionistas críticos y otras personas del entorno del banco. La Sala de lo
  Penal de la Audiencia Nacional confirmó en febrero de 2026 el procesamiento
  de Francisco González, del BBVA como persona jurídica y de otros trece
  imputados. La Fiscalía solicita 173 años de prisión para Francisco González
  y 180 millones de euros de multa para el BBVA. La condición de procesados
  no implica valoración de culpabilidad; rige la presunción de inocencia
  mientras no recaiga sentencia firme.
