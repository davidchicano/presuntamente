importe_nota: >-
  La Fiscalía cuantifica los contratos del BBVA con Cenyt en más de
  10 millones de euros entre 2004 y 2016. Esta cifra es un componente del
  importe total del caso Tándem (ya estructurado en el hecho troncal de
  Cenyt), por lo que se registra aquí como 'componente' para evitar el
  doble cómputo (V-23). Los 180 millones de multa pedidos al BBVA son
  una petición de pena (consecuencia), no el objeto de la conducta.
