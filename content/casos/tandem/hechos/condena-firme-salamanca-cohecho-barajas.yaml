id: condena-firme-salamanca-cohecho-barajas
caso_id: tandem
enunciado: |
  La Sala de Apelación de la Audiencia Nacional (Sentencia 3/2025, de 15 de
  enero) confirmó en segunda instancia la condena a tres años de prisión del
  ex comisario Carlos Salamanca Sánchez por un delito continuado de cohecho
  pasivo: entre 2010 y 2015, en su condición de jefe de fronteras del
  aeropuerto Adolfo Suárez Madrid-Barajas, se investiga que recibió regalos
  valorados en 273.915 euros a cambio de dar trato preferente en el control
  de fronteras a ciudadanos ecuatoguineanos vinculados a un empresario con
  relaciones con el gobierno de Guinea Ecuatorial. Los regalos consistieron
  en un automóvil Porsche Cayenne, el uso durante un año de un Porsche
  Panamera, dos relojes de lujo, un viaje a Londres, el pago de un estudio
  de grabación y cinco entregas en metálico que totalizaron 135.000 euros.
  La resolución acordó el comiso de los bienes recibidos. La sentencia de
  apelación no es firme: contra ella cabe recurso de casación ante el
  Tribunal Supremo (Sala Segunda); no consta a fecha de revisión que se
  haya resuelto dicho recurso.
  # Corrección 2026-05-30: la Sentencia 3/2025 establece expresamente que
  # no es firme (cabe casación ante el TS). Se corrige el enunciado.
  # Hecho se mantiene en tipo: atribuido hasta firmeza acreditada.
