titulo: "Sentencia de la Sección Cuarta de la AN: 3 años y 6 meses para Villarejo en pieza Dina (pieza 10)"
descripcion: |
  El 5 de mayo de 2026 la Sección Cuarta de la Sala de lo Penal de la
  Audiencia Nacional, con ponencia de la magistrada Teresa Palacios Criado,
  dictó sentencia en la pieza separada nº 10 del caso Tándem, conocida
  mediáticamente como caso Dina. Condenó a José Manuel Villarejo Pérez a
  tres años y seis meses de prisión como autor de un delito de
  descubrimiento y revelación de secretos de particulares con difusión a
  terceros cometido con prevalimiento de su condición de funcionario
  público. La sentencia le impuso además una multa de 18 meses a razón de
  10 euros diarios, seis años de inhabilitación absoluta y la obligación de
  indemnizar a Dina Bousselham con 5.000 euros y a Pablo Iglesias Turrión
  con 1.000 euros. Los hechos probados recogen que Villarejo obtuvo en
  febrero de 2016 la tarjeta microSD del móvil sustraído a Bousselham en
  noviembre de 2015, descargó su contenido y lo distribuyó a periodistas
  de su entorno para elaborar informaciones en descrédito de Podemos.
  Los periodistas Alberto Pozas y Luis Rendueles fueron absueltos al
  retirar Bousselham e Iglesias la acusación contra ellos. La sentencia
  no es firme.
