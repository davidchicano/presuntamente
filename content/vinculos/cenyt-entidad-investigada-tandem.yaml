    pasaje: "La nota del CGPJ sobre la sentencia de julio de 2023 identifica a Cenyt como la empresa instrumental a través de la cual se articularon los encargos de espionaje e inteligencia privada objeto de las piezas Iron, Land y Pintor."
  - documento_id: newtral-claves-condena-villarejo-tandem-2023-07-24
    pasaje: "Newtral describe la estructura del grupo Cenyt y su papel como vehículo empresarial de los servicios presuntamente ilegales investigados en la macrocausa Tándem."
