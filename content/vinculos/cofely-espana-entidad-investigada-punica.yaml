    pasaje: "Nota oficial de la Audiencia Nacional: la empresa Cofely España fue condenada el 22-dic-2025 a una multa de más de 3,5 millones de euros como persona jurídica por los delitos de cohecho y tráfico de influencias en la pieza de los contratos de eficiencia energética."
  - documento_id: eldiario-condena-cofely-punica-2025-12-22
    pasaje: "elDiario.es confirma la condena de Cofely España como persona jurídica en la sentencia de 22 de diciembre de 2025 por los contratos de eficiencia energética adjudicados a ayuntamientos de la Comunidad de Madrid."
