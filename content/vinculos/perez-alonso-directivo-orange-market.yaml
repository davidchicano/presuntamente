    pasaje: >
      elDiario.es identifica a Álvaro Pérez «El Bigotes» como el responsable
      de Orange Market y de la rama valenciana de la trama Gürtel, condenado
      con firmeza por el Tribunal Supremo en la pieza de la visita del papa.
  - documento_id: elespanol-ts-visita-papa-gurtel-2023
