id: perez-alonso-directivo-orange-market
naturaleza: cargo_directivo_organizacion_privada
descripcion: >
  Álvaro Pérez Alonso, conocido como «El Bigotes», dirigió Orange Market
  S.L., la filial valenciana de la red empresarial de Francisco Correa.
  Las resoluciones de la Audiencia Nacional y el Tribunal Supremo lo
  sitúan como responsable de la rama valenciana de la trama Gürtel,
  condenado con firmeza en las piezas relativas a la visita del papa
  Benedicto XVI a Valencia y a Fitur.
