    pasaje: "El Español identifica al investigado como pareja sentimental de Isabel Díaz Ayuso, presidenta de la Comunidad de Madrid por el PP, al cubrir el auto de procesamiento del JI nº 19 de Madrid del 29 de mayo de 2025."
  - documento_id: maldita-cronologia-ga-2025-12-09
    pasaje: "Maldita.es describe el contexto institucional del caso González Amador haciendo referencia a su condición de pareja sentimental de la presidenta de la Comunidad de Madrid, militante y dirigente del PP."
