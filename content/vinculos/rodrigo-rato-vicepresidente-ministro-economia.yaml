id: rodrigo-rato-vicepresidente-ministro-economia
naturaleza: cargo_publico_designado
descripcion: >-
  Vicepresidente Primero del Gobierno de Espana y Ministro de Economia durante
  los Gobiernos Aznar I y II (1996-2004). Cargo ejercido antes del periodo
  enjuiciado en el caso de las tarjetas black, documentado en la sentencia de
  la Audiencia Nacional de 23 de febrero de 2017 y en cobertura periodistica
  cruzada que identifica a Rodrigo de Rato y Figaredo por su anterior funcion
  ministerial.
