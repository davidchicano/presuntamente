    pasaje: "Hechos probados: descripción del sistema de transferencias de financiación desde la Consejería de Empleo a IFA/IDEA."
  - documento_id: sentencia-ts-ere-2022
    pasaje: "Fundamentos jurídicos sobre la calificación del sistema de transferencias articulado desde la Consejería de Empleo."
