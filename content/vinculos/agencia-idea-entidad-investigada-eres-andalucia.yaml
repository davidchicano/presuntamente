id: agencia-idea-entidad-investigada-eres-andalucia
naturaleza: entidad_investigada_en_caso
descripcion: "La Agencia IDEA (y su predecesora IFA) aparece en la causa como la entidad pública a través de la cual, según la instrucción, transitaron las ayudas sociolaborales y a empresas concedidas presuntamente de forma irregular. Las sentencias condenatorias describen IFA/IDEA como el vehículo instrumental del sistema de transferencias de financiación investigado."
