objeto_organizacion_id: juzgado-instruccion-6-sevilla
desde: "2000-01-01"
hasta: "2010-12-31"
precision_desde: anio
precision_hasta: anio
vigente: false
relevancia_para_caso_ids: [eres-andalucia]
nivel_afectacion: directa
justificacion_afectacion: "IFA/IDEA es la entidad instrumental a través de la cual, según los hechos probados, se canalizaron las transferencias de financiación desde la Consejería de Empleo; su papel como vehículo del sistema es central para la descripción del ilícito investigado."
documentos_respaldo:
  - documento_id: sentencia-ap-sevilla-ere-2019
    pasaje: "Hechos probados: descripción del papel de IFA/IDEA como receptor de las transferencias de financiación de la Consejería de Empleo y canal de distribución de las ayudas investigadas."
  - documento_id: sentencia-ts-ere-2022
    pasaje: "Fundamentos jurídicos sobre la calificación jurídica del papel de IFA/IDEA en el sistema de transferencias de financiación."
