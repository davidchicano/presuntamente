    pasaje: "Real Decreto 836/2022, de 2 de agosto, por el que se nombra Fiscal General del Estado a don Álvaro García Ortiz."
  - documento_id: boe-cese-garcia-ortiz-fge-2025-12-10
    pasaje: "Real Decreto 1138/2025, de 9 de diciembre, por el que se dispone el cese de don Álvaro García Ortiz como Fiscal General del Estado, tras la apreciación por el Consejo de Ministros de la concurrencia de la causa prevista en la ley aplicable."
