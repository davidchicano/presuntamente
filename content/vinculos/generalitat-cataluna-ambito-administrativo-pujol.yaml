documentos_respaldo:
  - documento_id: hecho-presuntas-comisiones-jordi-pujol-ferrusola
    # Nota: se referencia el Hecho como apoyo documental del ámbito; la fuente
    # primaria es el informe-uco-patrimonio-pujol y el auto-transformacion-procedimiento-abreviado-pujol.
    pasaje: "La instrucción atribuye el presunto cobro de comisiones a la adjudicación de contratos públicos durante la etapa de Jordi Pujol al frente de la Generalitat."
  - documento_id: informe-uco-patrimonio-pujol
    pasaje: "El informe patrimonial de la UCO sobre la familia Pujol incorporado a la causa analiza los movimientos de fondos vinculados al periodo de la Generalitat (1980-2003)."
