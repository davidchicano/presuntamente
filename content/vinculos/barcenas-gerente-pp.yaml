documentos_respaldo:
  - documento_id: elespanol-barcenas-tesorero-pp-gurtel-2018-05-24
    pasaje: "El Español acredita que Bárcenas fue gerente del PP desde 1990 y describe su condena en el caso Gürtel como extesorero de la formación. La sentencia de la Audiencia Nacional consideró probada su función central en el sistema de financiación irregular del partido durante su etapa como gerente y tesorero."
  - documento_id: publico-caja-b-pieza-separada-gurtel
    pasaje: "Público acredita que la pieza sobre la caja B del PP era una pieza separada del caso Gürtel, y que Bárcenas ocupó funciones de gerente y tesorero del partido durante el período investigado."
