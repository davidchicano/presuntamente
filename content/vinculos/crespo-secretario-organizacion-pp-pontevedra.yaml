id: crespo-secretario-organizacion-pp-pontevedra
naturaleza: cargo_organico_partido
descripcion: >
  Pablo Crespo Sabarís ocupó el cargo de Secretario de Organización del
  Partido Popular de Pontevedra entre 1997 y 2004, aproximadamente. Este
  cargo orgánico precedió a su actividad como número dos del entramado
  empresarial de Francisco Correa en la trama Gürtel. Su condición de
  exdirigente orgánico del PP fue relevante en la causa al documentar el
  nexo entre la red de adjudicaciones y los cargos del partido. Fue
  condenado con firmeza en la Época I de la trama y en las piezas
  valencianas.
sujeto_persona_id: pablo-crespo-sabaris
objeto_organizacion_id: partido-popular
cargo_o_rol: "Secretario de Organización del Partido Popular de Pontevedra"
desde: "1997-01-01"
precision_desde: anio
hasta: "2004-12-31"
precision_hasta: anio
vigente: false
relevancia_para_caso_ids: [gurtel]
documentos_respaldo:
  - documento_id: publico-diez-anos-gurtel-2019
    pasaje: >
      Público identifica a Pablo Crespo como exsecretario de organización
      del PP de Pontevedra y número dos de Francisco Correa en la trama
      Gürtel, acreditando su vínculo orgánico con el partido en el período
      investigado.
  - documento_id: elpais-cronologia-gurtel-2018
    pasaje: >
      El País menciona a Pablo Crespo como el hombre de confianza de Correa
      dentro de la trama, con perfil de exdirigente local del PP, en la
      cronología del caso Gürtel.
