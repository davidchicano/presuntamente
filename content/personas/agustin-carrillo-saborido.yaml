biografia_corta: |
  Agustín Carrillo Saborido es empresario español con trayectoria
  municipal en el Partido Popular en la provincia de Sevilla. Es uno
  de los cinco procesados por el Juzgado de Instrucción nº 19 de
  Madrid en el procedimiento por presunto fraude fiscal y falsedad
  documental contra Alberto González Amador y la sociedad Maxwell
  Cremona Ingeniería y Procesos S.L. La Fiscalía sostiene
  indiciariamente que habría participado en la emisión de facturas
  ficticias por importes superiores a 41.000 euros que la mercantil
  Maxwell Cremona habría deducido sin contraprestación real. Rige el
  principio de presunción de inocencia hasta resolución firme.
