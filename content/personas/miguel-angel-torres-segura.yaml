biografia_corta: |
  Magistrado instructor del caso Malaya desde noviembre de 2005 en
  el Juzgado de Instrucción nº 5 de Marbella. Dirigió la mayor
  operación contra la corrupción urbanística municipal registrada en
  España hasta entonces. Fue trasladado a Granada en 2007, siendo
  relevado en la instrucción por el magistrado Óscar Pérez.

