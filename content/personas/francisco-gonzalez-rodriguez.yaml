biografia_corta: |
  Francisco González Rodríguez es un economista español que presidió
  el Banco Bilbao Vizcaya Argentaria (BBVA) entre los años 2000 y 2018.
  En el marco del caso Tándem, la Sala de lo Penal de la Audiencia
  Nacional confirmó su procesamiento en la pieza separada nº 9 (conocida
  mediáticamente como pieza BBVA o Trampa) al rechazar en febrero de 2026
  los recursos de apelación contra el auto que daba paso al procedimiento
  abreviado. La Fiscalía Anticorrupción solicita en su escrito de
  acusación de marzo de 2026 una pena de 173 años de cárcel por un
  delito continuado de cohecho activo y cuarenta y dos delitos de
  revelación de secretos de particulares, derivados de la contratación
  entre 2004 y 2016 de la empresa Cenyt, vinculada al comisario Villarejo,
  para la realización de encargos presuntamente ilegales. Rige el
  principio de presunción de inocencia mientras no recaiga sentencia firme.
