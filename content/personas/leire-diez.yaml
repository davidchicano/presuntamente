biografia_corta: |
  Periodista y política española originaria de Portugalete (Bizkaia, 1975).
  Vinculada al PSOE desde los años 2000, ejerció como secretaria general
  del PSOE de Vega de Pas y como teniente de alcalde. Posteriormente
  desarrolló una trayectoria en la comunicación institucional en ENUSA
  Industrias Avanzadas (2018–2021) y en Correos, donde fue directora de
  Filatelia y Relaciones Institucionales hasta marzo de 2024. Abandonó
  el PSOE el 3 de junio de 2025. Investigada en la pieza A del caso
  instruido por el JCI nº 5 de la Audiencia Nacional y en la pieza B
  del JI nº 9 de Madrid.
