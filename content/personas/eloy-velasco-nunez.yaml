biografia_corta: |
  Magistrado español nacido en Bilbao. Licenciado en Derecho por la
  Universidad de Deusto con especialidad jurídico-económica. Ingresó
  en la Carrera Judicial en 1988 con destino inicial en la
  Comunidad Valenciana (juzgados de Sagunto y Torrent). Entre
  1995 y noviembre de 2003 fue director de Justicia en los
  gobiernos del Partido Popular en la Comunidad Valenciana
  presididos por Eduardo Zaplana. Titular del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional desde 2008, en cuya
  etapa abrió y comenzó a instruir las macrocausas Lezo y Púnica.
  En junio de 2017 cesó como titular del JCI nº 6 al ascender por
  concurso a la Sala de Apelaciones de la Audiencia Nacional, de
  reciente creación. En el caso Lezo dictó, entre otras
  resoluciones, el auto de prisión provisional incondicional sin
  fianza para Ignacio González el 22 de abril de 2017 y el auto
  de prisión eludible con fianza de cien mil euros para
  Ildefonso de Miguel. Ha sido corresponsal nacional de Eurojust
  para asuntos de corrupción.
