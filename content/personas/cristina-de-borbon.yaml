biografia_corta: |
  Hija del rey Juan Carlos I y hermana del rey Felipe VI, esposa de Iñaki Urdangarin.
  Investigada en el caso Nóos por la acusación popular de Manos Limpias. Absuelta penalmente
  por la Audiencia Provincial de Palma y el Tribunal Supremo (STS 277/2018) de los dos
  delitos fiscales que se le atribuían. Condenada como partícipe a título lucrativo al pago
  de 136.950 euros por delitos cometidos por su marido.
