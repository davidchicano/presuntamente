biografia_corta: |
  Ex asesor jurídico y director legal de Fórum Filatélico S.A. Condenado por
  la Audiencia Nacional (sentencia 13 de julio de 2018) a 6 años y 3 meses de
  prisión por delitos de estafa agravada y blanqueo de capitales. El Tribunal
  Supremo redujo la condena a 3 años y 3 meses al requalificar su participación
  de cooperador necesario a cómplice (sentencia 688/2019, de 5 de marzo de 2020).
  Multa de 15,9 millones de euros. Declarado responsable civil solidario con
  Francisco Briones por el total de la indemnización a los perjudicados.
  La condena es firme salvo posibles recursos extraordinarios.
