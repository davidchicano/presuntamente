biografia_corta: |
  Empresario español del sector de la construcción. La instrucción
  del Juzgado Central de Instrucción nº 6 de la Audiencia Nacional
  lo considera indiciariamente uno de los cabecillas empresariales
  de la trama Púnica y antiguo socio del ex consejero madrileño
  Francisco Granados. Detenido el 27 de octubre de 2014 en la
  operación policial de la Unidad Central Operativa de la Guardia
  Civil, durante la instrucción adoptó una posición de colaboración
  con la Justicia, reconociendo hechos y aportando documentación.
  Por sentencia de la Audiencia Nacional de 22 de diciembre de 2025,
  no firme y recurrible en casación, fue condenado en la pieza de
  los contratos de eficiencia energética adjudicados a la empresa
  Cofely. Rige el principio de presunción de inocencia mientras no
  recaiga sentencia firme en contrario.
