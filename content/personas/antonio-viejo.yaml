biografia_corta: |
  Antonio Viejo es magistrado español, miembro de la Asociación Judicial
  Francisco de Vitoria. Fue decano de los Juzgados de Plaza de Castilla
  de Madrid (2014-2018) y Secretario General de la Administración de
  Justicia entre 2018 y febrero de 2020 con la entonces ministra de
  Justicia Dolores Delgado. Posteriormente magistrado del orden penal
  de la Audiencia Provincial de Madrid hasta septiembre de 2025. Por
  Real Decreto 838/2025, de 22 de septiembre, en virtud del concurso
  resuelto por la Comisión Permanente del Consejo General del Poder
  Judicial el 16 de septiembre de 2025, fue destinado al Juzgado de
  Instrucción nº 19 de Madrid en sustitución de Inmaculada Iglesias,
  asumiendo la instrucción del procedimiento contra Alberto González
  Amador.
