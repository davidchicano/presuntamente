biografia_corta: |
  Empresario y exdeportista olímpico (balonmano), cuñado del Rey Felipe VI por su matrimonio
  con la Infanta Cristina de Borbón. Presidente del Instituto Nóos entre 2004 y 2006.
  Condenado en sentencia firme (STS 277/2018) a 5 años y 10 meses por malversación de caudales
  públicos, prevaricación continuada, tráfico de influencias, fraude a la Administración y dos
  delitos fiscales derivados de su actividad al frente del Instituto Nóos.
