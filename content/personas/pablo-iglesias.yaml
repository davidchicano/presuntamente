biografia_corta: |
  Político español. Fue Secretario General de Podemos desde la fundación
  del partido en octubre de 2014 hasta su dimisión el 4 de mayo de 2021,
  anunciada tras perder las elecciones a la Comunidad de Madrid. Ejerció
  como Vicepresidente Segundo del Gobierno de España y Ministro de Derechos
  Sociales y Agenda 2030 en el gobierno de coalición PSOE-Unidas Podemos
  entre el 13 de enero de 2020 y el 17 de mayo de 2021. Fue diputado por
  Madrid desde diciembre de 2015 hasta su renuncia al escaño en marzo de
  2021, para presentarse como candidato en las autonómicas madrileñas.
