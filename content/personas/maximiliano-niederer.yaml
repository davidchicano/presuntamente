biografia_corta: |
  Maximiliano Eduardo Niederer González es uno de los cinco procesados
  por el Juzgado de Instrucción nº 19 de Madrid en el procedimiento por
  presunto fraude fiscal y falsedad documental contra Alberto González
  Amador y la sociedad Maxwell Cremona Ingeniería y Procesos S.L. La
  Fiscalía Provincial de Madrid sostiene indiciariamente que habría
  intervenido como "cooperador necesario" en la emisión de facturas que
  no se correspondían con servicios efectivamente prestados, con cuya
  deducción Maxwell Cremona habría minorado su tributación por el
  Impuesto sobre Sociedades de 2020 y 2021. Rige el principio de
  presunción de inocencia hasta resolución firme.
