biografia_corta: |
  Empresario del sector de la organización de eventos, señalado por
  la Audiencia Nacional como cabecilla de la red de adjudicaciones
  públicas conocida como trama Gürtel. Su entramado societario
  (Special Events, Easy Concept, Orange Market, entre otras)
  canalizó, según las resoluciones judiciales, la contratación
  pública a cambio de comisiones. El apodo «Gürtel» procede de la
  traducción al alemán de su apellido. Condenado por sentencia firme
  en varias piezas del macroprocedimiento.
