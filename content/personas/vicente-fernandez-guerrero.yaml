biografia_corta: |
  Expresidente de la Sociedad Estatal de Participaciones Industriales (SEPI) entre 2018
  y 2019 y posteriormente director general hasta abril de 2021, periodo que comprende la
  aprobación del préstamo público de 53 millones de euros a Plus Ultra Líneas Aéreas
  (marzo de 2021). Investigado por el JCI nº 5 de la Audiencia Nacional (juez Santiago
  Pedraz) en la pieza A del caso Leire Díez, en relación con una presunta estructura
  orientada a obtener comisiones ilegales en contratos públicos y ayudas SEPI.
