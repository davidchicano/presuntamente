biografia_corta: |
  Gemma Alcalá Garcés es la esposa del comisario jubilado José Manuel
  Villarejo Pérez. Fue detenida el 3 de noviembre de 2017 junto a su
  marido, aunque puesta en libertad con cargos y obligada a entregar
  el pasaporte. Figura como investigada en varias piezas del caso
  Tándem por su presunta participación en las sociedades del grupo
  Cenyt (Cenyt SL, Stuart & McKenzie SL, Cenyt Data SL y CPD Real
  State), de las que ejercía como apoderada. En el juicio conjunto de
  las piezas Iron, Land y Pintor fue absuelta por la Sección Cuarta
  de la Sala de lo Penal de la Audiencia Nacional. Rige el principio
  de presunción de inocencia respecto de cualquier cargo en piezas
  sin sentencia firme.
