biografia_corta: |
  Ignacio López del Hierro Bravo es un empresario y consultor español,
  esposo de María Dolores de Cospedal García, secretaria general del
  Partido Popular entre 2008 y 2018 y ministra de Defensa del Reino
  de España entre 2016 y 2018. Por auto del magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional fue
  investigado en la pieza separada nº 7 de las Diligencias Previas
  96/2017 (Operación Kitchen). El sobreseimiento provisional acordado
  respecto de él el 29 de julio de 2021 y confirmado el 7 de diciembre
  de 2022 fue revocado por auto de la Sala de Apelaciones de la
  Audiencia Nacional dictado en julio de 2023, que ordenó la
  reincorporación de la causa contra él en la pieza séptima. Rige el
  principio de presunción de inocencia mientras no recaiga sentencia
  firme en contrario.
