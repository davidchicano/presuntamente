biografia_corta: |
  Política española. Vicepresidenta Segunda del Gobierno de España y
  Ministra de Trabajo y Economía Social desde el 12 de julio de 2021,
  cargo que heredó de Pablo Iglesias cuando este dimitió. Previamente
  fue Ministra de Trabajo y Economía Social desde la formación del
  gobierno de coalición PSOE-Unidas Podemos en enero de 2020. Fue
  coordinadora de Izquierda Unida de Galicia y diputada en el Congreso.
  En 2023 lanzó la coalición Sumar, de la que es coordinadora, que
  concurrió a las elecciones generales de julio de 2023 integrando a
  Izquierda Unida, Podemos y otras formaciones de izquierda.
