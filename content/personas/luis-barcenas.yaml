biografia_corta: |
  Luis Bárcenas Gutiérrez es un político y ex tesorero del Partido
  Popular. Ingresó en la formación a comienzos de los años ochenta y
  ocupó la gerencia del partido desde 1990 y la tesorería desde julio
  de 2008. Fue senador por Cantabria entre 2004 y 2010. Es la persona
  física en cuyo contexto se sitúa, en condición de presunto
  perjudicado, la operación parapolicial conocida mediáticamente como
  Operación Kitchen, atribuida al Ministerio del Interior bajo el
  gobierno presidido por Mariano Rajoy y dirigida indiciariamente,
  según el instructor, a sustraer información sensible en su poder.
  Según la cobertura periodística citada en este inventario, ha sido
  vinculado también a otras causas ajenas a la presente pieza —entre
  ellas el caso Gürtel (modelado en este inventario, con condena firme
  del Tribunal Supremo) y la pieza separada de la presunta caja B del
  Partido Popular (modelada también en este inventario).
