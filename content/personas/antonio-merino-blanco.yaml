biografia_corta: |
  Ex director general de Fórum Filatélico S.A. Condenado por la Audiencia
  Nacional (sentencia 13 de julio de 2018) a 2 años y 3 meses de prisión
  como cómplice de estafa agravada continuada en concurso con insolvencia
  punible, y por blanqueo de capitales. Multa de 15,9 millones de euros.
  La sentencia del Tribunal Supremo de 5 de marzo de 2020 (688/2019) confirmó
  su condena por blanqueo de capitales; condenado en sentencia firme salvo
  posibles recursos extraordinarios.
