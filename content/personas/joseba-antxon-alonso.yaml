biografia_corta: |
  Empresario vasco, administrador de la sociedad Servinabar S.L. Investigado
  por el JCI nº 5 de la Audiencia Nacional (juez Santiago Pedraz) en la
  pieza A del caso Leire Díez, en relación con la presunta red denominada
  internamente "Hirurok" que habría actuado entre 2021 y 2023. Fue detenido
  junto a María Leire Díez Castro y Vicente Fernández Guerrero en diciembre
  de 2025.
