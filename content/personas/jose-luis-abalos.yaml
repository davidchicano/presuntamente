biografia_corta: |
  Político español, exministro de Transportes y exdiputado. Figura en el caso Koldo por
  la pieza de contratos de mascarillas enjuiciada por la Sala Segunda del Tribunal Supremo
  y por piezas conexas remitidas a la Audiencia Nacional. La sentencia del Supremo del
  22 de junio de 2026 le condena, según la nota oficial del CGPJ y la copia íntegra
  localizada; en esta ficha se conserva el rol como no firme hasta verificar firmeza.
