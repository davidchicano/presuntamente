biografia_corta: |
  Sergio Ríos Esgueva es un ciudadano español, agente del Cuerpo
  Nacional de Policía, que entre 2013 y 2015 trabajó como chófer
  personal del entonces ex tesorero del Partido Popular Luis Bárcenas
  Gutiérrez. Según el instructor de la pieza separada nº 7 de las
  Diligencias Previas 96/2017 del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional (Operación Kitchen) y el informe de la
  Unidad de Asuntos Internos de la Dirección General de la Policía,
  habría desempeñado simultáneamente la función de presunto
  confidente policial retribuido con cargo a fondos reservados del
  Ministerio del Interior. Por auto del mismo órgano del 29 de julio
  de 2021 quedó procesado en la pieza séptima. Rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
