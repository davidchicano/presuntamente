biografia_corta: |
  Economista y politico espanol del Partido Popular. Fue Vicepresidente
  Primero del Gobierno y Ministro de Economia (1996-2004) y Director Gerente
  del Fondo Monetario Internacional (2004-2007). Posteriormente presidio Caja
  Madrid y Bankia (2010-2012) hasta la intervencion de la entidad. Figura
  en multiples procedimientos judiciales: en el caso de las tarjetas black de
  Caja Madrid / Bankia fue condenado por la Audiencia Nacional (sentencia de
  23 de febrero de 2017) y dicha condena fue confirmada y adquirio firmeza
  por el Tribunal Supremo en 2018. Figura tambien como imputado/investigado
  en procedimientos por fraude fiscal y blanqueo de capitales (caso
  rato-fraude-fiscal). La presuncion de inocencia rige para los extremos
  no cubiertos por resolucion firme.
