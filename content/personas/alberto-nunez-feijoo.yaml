biografia_corta: |
  Político español. Presidente Nacional del Partido Popular desde el 2 de
  abril de 2022, elegido en el XX Congreso Extraordinario del partido
  celebrado en Sevilla. Antes ejerció como Presidente de la Xunta de
  Galicia durante cuatro legislaturas consecutivas (2009-2022), siendo el
  presidente autonómico con mayor tiempo de permanencia ininterrumpida en
  el cargo en la historia de Galicia. Fue senador por designación autonómica
  entre septiembre de 2022 y noviembre de 2023.
