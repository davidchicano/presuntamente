biografia_corta: |
  Rafael Redondo Rodríguez es un abogado español que actuó como principal
  colaborador y socio de José Manuel Villarejo Pérez a través de las
  sociedades del grupo Cenyt. Fue detenido el 3 de noviembre de 2017 junto
  a Villarejo y acordada su prisión provisional. Por auto del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional fue procesado en
  varias piezas del caso Tándem. La Sección Cuarta de la Sala de lo Penal
  de la Audiencia Nacional le condenó el 24 de julio de 2023 a trece años
  de prisión en el juicio conjunto de las piezas Iron, Land y Pintor; la
  Sala de Apelación redujo la condena a nueve años en septiembre de 2025
  al absolver del delito de falsedad documental. Figura igualmente procesado
  en la pieza 9 (BBVA/Trampa). Rige el principio de presunción de inocencia
  en las piezas sin sentencia firme.
