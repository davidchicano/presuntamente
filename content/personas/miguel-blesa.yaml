biografia_corta: |
  Abogado del Estado y directivo bancario espanol. Fue presidente de Caja
  Madrid desde 1996 hasta 2010. En el caso de las tarjetas opacas de Caja
  Madrid / Bankia fue acusado y condenado en primera instancia por la
  Audiencia Nacional en sentencia de 23 de febrero de 2017. Fallecio en
  julio de 2017, antes de que la Sala Segunda del Tribunal Supremo dictara
  sentencia de casacion, por lo que su responsabilidad penal quedo
  extinguida por fallecimiento conforme al articulo 130.1.1.a del Codigo
  Penal. No existe condena firme en su contra. La presuncion de inocencia
  rige para cualquier extremo no cubierto por una resolucion firme.
  # LLM-incierto: tratamiento exacto en la STS; verificar el texto de la
  # resolucion en CENDOJ para confirmar el art. CP aplicado y la fecha.
