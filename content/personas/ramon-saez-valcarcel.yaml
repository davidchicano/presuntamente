biografia_corta: |
  Magistrado de la Sala de lo Penal de la Audiencia Nacional. Fue magistrado
  ponente de la sentencia de 13 de julio de 2018 de la Sección Primera de la
  Sala de lo Penal de la Audiencia Nacional que condenó a 20 de los 27 acusados
  en el caso Fórum Filatélico. Conocido por su posición crítica con el uso
  de la prisión provisional y por sus opiniones doctrinales sobre garantías
  procesales. La prensa le identifica como firmante de la sentencia del caso
  Fórum Filatélico.
