biografia_corta: |
  Empresario español vinculado procesalmente al caso Koldo. La Sala Segunda del Tribunal
  Supremo le enjuició junto a José Luis Ábalos y Koldo García en la pieza inicial de
  contratos de mascarillas. La nota oficial del CGPJ del 22 de junio de 2026 informa de
  una condena con suspensión condicionada de la pena, cruzada con la copia íntegra
  localizada de la sentencia; esta ficha la modela como no firme hasta verificar firmeza.
