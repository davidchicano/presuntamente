biografia_corta: |
  Político español. Presidente del Gobierno de España durante las X y XI
  Legislaturas (diciembre de 2011 a junio de 2018), cuando fue sustituido
  tras una moción de censura del PSOE liderada por Pedro Sánchez. Fue
  Presidente Nacional del Partido Popular entre 2004 y 2018. Ocupó las
  carteras de Interior (1996-2000), Educación (1996-1999) y Presidencia
  (2000-2002) durante el gobierno de José María Aznar. Fue diputado por
  Pontevedra entre 1986 y 2019. En el juicio oral de la causa del Caso
  Gürtel (Sección Segunda de la Sala de lo Penal de la Audiencia Nacional)
  declaró como testigo en julio de 2017 y de nuevo en el juicio del caso
  Kitchen en julio de 2024; no ha tenido rol procesal de investigado ni
  acusado en ninguna de esas causas.
