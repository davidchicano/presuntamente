es_figura_publica: true
biografia_corta: >-
  Político del PSOE. Fue presidente de la Junta de Andalucía entre 1990 y
  2009 y posteriormente vicepresidente tercero del Gobierno de España y
  ministro de Política Territorial. En la causa de los ERE fue enjuiciado
  por su responsabilidad como presidente autonómico durante el periodo
  investigado. Condenado por la Audiencia de Sevilla (2019) por
  prevaricación (no por malversación); el TS confirmó la condena (2022).
estado_publicacion: borrador
ultima_revision_editorial: "2026-05-30"
