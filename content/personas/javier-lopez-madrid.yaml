biografia_corta: |
  Empresario español, consejero del grupo constructor OHL
  (Obrascón Huarte Lain, hoy OHLA) y yerno del empresario Juan
  Miguel Villar Mir. Figura como procesado en la pieza separada
  nº 3 del caso Lezo, relativa a la presunta adjudicación
  irregular en 2007 por el Consorcio Regional de Transportes de
  Madrid de las obras del tren ligero entre Móstoles Central y
  Navalcarnero a la unión temporal de empresas liderada por OHL,
  por presuntos delitos de tráfico de influencias, cohecho,
  falsedad en documento mercantil y fraude a las administraciones
  públicas. El auto de apertura del juicio oral del 4 de junio de
  2021 del titular del Juzgado Central de Instrucción nº 6 de la
  Audiencia Nacional Manuel María García-Castellón García-Lomas
  acuerda sentarlo en el banquillo junto al ex presidente de la
  Comunidad de Madrid Ignacio González González, el ex director
  gerente del Canal de Isabel II Ildefonso de Miguel Rodríguez,
  el empresario Adrián de la Joya y los ex directivos de OHL
  Rafael Martín de Nicolás Martín y Felicísimo Damián Ramos Ramos.
  La Fiscalía Anticorrupción solicita para Javier López Madrid
  seis años y medio de prisión por esta pieza. Le es de
  aplicación el principio de presunción de inocencia mientras
  no recaiga resolución firme. Según cobertura periodística
  citada en este inventario, ha sido también vinculado a otras
  causas ajenas al caso Lezo —entre ellas el caso Púnica y el
  procedimiento de las llamadas tarjetas «black» de Caja Madrid—,
  ambos modelados en este inventario.
