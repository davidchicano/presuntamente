biografia_corta: |
  Político español, ex consejero de la Comunidad de Madrid durante
  los gobiernos de Esperanza Aguirre y ex secretario general del
  Partido Popular de Madrid. El 27 de octubre de 2014 fue detenido
  en el marco de la operación policial de la Unidad Central
  Operativa de la Guardia Civil conocida como Operación Púnica e
  ingresó en prisión provisional, de la que salió bajo fianza el 14
  de junio de 2017. La instrucción del Juzgado Central de
  Instrucción nº 6 de la Audiencia Nacional lo considera
  indiciariamente una de las figuras centrales de la trama. Por
  sentencia de la Audiencia Nacional de 4 de diciembre de 2017,
  confirmada por el Tribunal Supremo el 14 de marzo de 2019, fue
  condenado por su participación en la filtración de información
  sobre la propia investigación. Está pendiente de juicio en la
  pieza relativa a presuntas adjudicaciones irregulares de suelo y
  obra pública entre 2003 y 2011, cuyo auto de apertura de juicio
  oral se dictó el 21 de mayo de 2026. Rige el principio de
  presunción de inocencia mientras no recaiga sentencia firme en
  contrario en las piezas no concluidas.
