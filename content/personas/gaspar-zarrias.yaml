biografia_corta: |
  Político andaluz del PSOE. Fue vicepresidente de la Junta de Andalucía y
  secretario de Organización del PSOE federal. Condenado por la Audiencia
  Provincial de Sevilla (sentencia de noviembre de 2019) por prevaricación
  en el marco del caso ERE de Andalucía; el Tribunal Supremo confirmó la
  condena en casación (2022). Investigado por el JCI nº 5
  de la Audiencia Nacional (auto Pedraz del 26 de mayo de 2026) en la pieza A
  del caso Leire Díez, en relación con la presunta canalización de pagos
  mediante empresas vinculadas.
