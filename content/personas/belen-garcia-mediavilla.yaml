biografia_corta: |
  Socia y coadministradora de la empresa constructora Unifica S.L. Condenada
  por sentencia firme del Tribunal Supremo (15 de noviembre de 2024,
  ECLI:ES:TS:2024:5577) a nueve meses de prisión y multa de 200.000 euros
  como coautora de un delito contra la Hacienda Pública (Impuesto de
  Sociedades de Unifica del ejercicio 2007) por haber participado junto con
  Gonzalo Urquijo en el acuerdo con el entonces tesorero del PP Luis Bárcenas
  para que parte de los pagos por la reforma de la sede del partido en la
  calle Génova de Madrid se realizaran fuera de facturación oficial. La
  presunción de inocencia decae respecto de los hechos declarados probados y
  firmes en la pieza Génova del caso Bárcenas.
