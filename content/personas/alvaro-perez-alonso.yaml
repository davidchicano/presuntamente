biografia_corta: |
  Empresario conocido como «El Bigotes», responsable de la rama
  valenciana de la red de Francisco Correa (Orange Market) en la
  trama Gürtel. Condenado por sentencia firme en las piezas
  valencianas del macroprocedimiento, entre ellas la relativa a la
  visita del papa Benedicto XVI a Valencia en 2006.
