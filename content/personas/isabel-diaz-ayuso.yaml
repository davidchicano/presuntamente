biografia_corta: |
  Política española del Partido Popular. Presidenta de la Comunidad de
  Madrid desde el 28 de abril de 2021, tras las elecciones autonómicas
  del 4 de mayo de 2021 que otorgaron al PP la mayoría absoluta en la
  Asamblea de Madrid. Previamente ejerció como diputada autonómica desde
  2011. Su pareja sentimental, Alberto González Amador, está procesado
  en el procedimiento penal seguido ante el Juzgado de Instrucción nº 19
  de Madrid por presuntos delitos contra la Hacienda Pública. Isabel Díaz
  Ayuso no tiene ningún rol procesal en esa causa.
