biografia_corta: |
  David Herrera Lobato, empresario con domicilio en Arahal (Sevilla),
  es uno de los cinco procesados por el Juzgado de Instrucción nº 19 de
  Madrid en el procedimiento por presunto fraude fiscal y falsedad
  documental seguido contra Alberto González Amador y la sociedad
  Maxwell Cremona Ingeniería y Procesos S.L. La Fiscalía Provincial de
  Madrid sostiene indiciariamente que habría participado en la emisión
  de facturas que no se correspondían con servicios efectivamente
  prestados. El 20 de enero de 2026 fue detenido por la Policía
  Nacional en Arahal en el marco de una rama del procedimiento
  relacionada con presuntas irregularidades en contratos con el grupo
  sanitario Quirón. Rige el principio de presunción de inocencia hasta
  resolución firme.
