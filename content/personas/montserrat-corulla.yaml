  Persona señalada en el caso Malaya como testaferro de Juan Antonio
  Roca, a través de quien se atribuye que Roca controlaba parte del
  dinero procedente de los impuestos municipales de Marbella,
  invirtiéndolo en coches de lujo, propiedades y obras de arte.
  Condenada por sentencia firme del Tribunal Supremo en 2015.

