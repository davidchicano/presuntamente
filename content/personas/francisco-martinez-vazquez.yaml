biografia_corta: |
  Francisco Martínez Vázquez es un jurista y político español del
  Partido Popular, secretario de Estado de Seguridad del Ministerio
  del Interior entre el 4 de enero de 2012 y el 4 de noviembre de
  2016 bajo el mandato del ministro Jorge Fernández Díaz, y diputado
  en el Congreso por Soria en la IX legislatura. Por auto del
  magistrado instructor del Juzgado Central de Instrucción nº 6 de
  la Audiencia Nacional fue investigado y, por auto posterior del
  mismo órgano, procesado en la pieza separada conocida mediáticamente
  como Operación Kitchen por su presunta participación en la operación
  parapolicial atribuida al Ministerio del Interior durante su gestión.
  Rige el principio de presunción de inocencia mientras no recaiga
  sentencia firme en contrario.
