biografia_corta: |
  José Miguel Carrillo Saborido, hermano de Agustín Carrillo Saborido,
  es uno de los cinco procesados por el Juzgado de Instrucción nº 19 de
  Madrid en el procedimiento por presunto fraude fiscal y falsedad
  documental contra Alberto González Amador y la sociedad Maxwell
  Cremona Ingeniería y Procesos S.L. La Fiscalía sostiene
  indiciariamente su participación en la emisión de facturas ficticias
  utilizadas por la sociedad investigada para minorar su tributación.
  Rige el principio de presunción de inocencia hasta resolución firme.
