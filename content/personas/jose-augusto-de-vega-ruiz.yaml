biografia_corta: |
  Magistrado ponente de la Sala Segunda del Tribunal Supremo en la
  Sentencia 1/1997 (caso Filesa), dictada el 28 de octubre de 1997.
  Actuó también como presidente del tribunal enjuiciador, integrado
  asimismo por los magistrados Ramón Montero y Luis Román Puerta.
