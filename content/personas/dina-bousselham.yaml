biografia_corta: |
  Dina Bousselham es una politóloga y activista española que ejerció
  como asesora de Pablo Iglesias Turrión en Podemos. En noviembre de
  2015 le fue sustraído el teléfono móvil en un establecimiento de
  Ikea en Alcorcón (Madrid); la tarjeta microSD del dispositivo fue
  entregada al comisario José Manuel Villarejo, quien distribuyó su
  contenido a periodistas de su confianza. En la pieza separada nº
  10 del caso Tándem (caso Dina), la Sección Cuarta de la Sala de lo
  Penal de la Audiencia Nacional reconoció en sentencia de 5 de mayo
  de 2026 su condición de perjudicada, condenando a Villarejo a tres
  años y seis meses de prisión e imponiéndole una indemnización de
  5.000 euros a su favor.
