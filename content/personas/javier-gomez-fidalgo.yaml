biografia_corta: |
  Javier Luis Gómez Fidalgo es abogado fiscalista de origen leonés,
  asesor fiscal de Alberto González Amador y administrador de la
  sociedad Babia Capital. El 14 de abril de 2025 fue citado como
  investigado por la magistrada Inmaculada Iglesias en el procedimiento
  seguido ante el Juzgado de Instrucción nº 19 de Madrid contra
  González Amador y Maxwell Cremona Ingeniería y Procesos S.L., al
  apreciar la Fiscalía indicios de su participación como cooperador
  necesario en la elaboración de las autoliquidaciones impugnadas. Por
  auto del 29 de mayo de 2025 la propia magistrada acordó el
  sobreseimiento provisional de la causa respecto a Gómez Fidalgo al
  no apreciar indicios suficientes de su participación material en los
  hechos. Rige el principio de presunción de inocencia.
