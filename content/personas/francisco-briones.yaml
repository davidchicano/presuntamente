biografia_corta: |
  Expresidente de Fórum Filatélico S.A., cargo que ocupó desde 2001 hasta la
  intervención judicial de la compañía en mayo de 2006. Condenado por la
  Sección Primera de la Sala de lo Penal de la Audiencia Nacional en sentencia
  de 13 de julio de 2018 a 12 años, 4 meses y 16 días de prisión por delitos
  de estafa agravada continuada, insolvencia punible, falseamiento de cuentas
  anuales y blanqueo de capitales. El Tribunal Supremo rebajó ligeramente la
  condena a 11 años y 10 meses mediante sentencia 688/2019 de 5 de marzo de 2020.
  Es sujeto de investigación y condena firme; rige la presunción de inocencia
  hasta agotar todas las vías de recurso disponibles.
