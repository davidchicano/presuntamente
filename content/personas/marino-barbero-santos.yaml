biografia_corta: |
  Magistrado de la Sala Segunda del Tribunal Supremo designado instructor
  de la Causa Especial nº 880/1991 (caso Filesa) en noviembre de 1991.
  Llevó la instrucción hasta julio de 1995, cuando renunció a la
  judicatura en un contexto de fuertes presiones. La instrucción pasó
  entonces a Enrique Bacigalupo Zapater.
