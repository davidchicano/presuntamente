biografia_corta: |
  Político español del Partido Popular. Fue presidente de la
  Comunidad de Madrid entre el 29 de junio de 1995 y el 13 de
  junio de 2003, alcalde de Madrid entre el 14 de junio de 2003
  y el 22 de diciembre de 2011, y ministro de Justicia del
  Reino de España entre el 22 de diciembre de 2011 y el 29 de
  septiembre de 2014. Fue citado como investigado en la pieza
  Inassa del caso Lezo en abril de 2018 por la presuntamente
  fraudulenta compra en 2001 por Canal de Isabel II del setenta
  y cinco por ciento de la sociedad colombiana Inassa, ejecutada
  durante su mandato al frente del gobierno autonómico
  madrileño. Por auto de 30 de mayo de 2019 del titular del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional,
  Manuel María García-Castellón García-Lomas, su causa fue
  sobreseída provisionalmente a petición del propio Ministerio
  Fiscal, junto con la de otros catorce investigados. El
  sobreseimiento provisional no implica condena ni absolución:
  rige el principio de presunción de inocencia.
