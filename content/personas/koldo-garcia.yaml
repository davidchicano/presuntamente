biografia_corta: |
  Exasesor de José Luis Ábalos en el Ministerio de Transportes. Figura como uno de los
  principales encausados del caso Koldo en relación con la contratación de mascarillas
  durante la pandemia y con piezas conexas en la Audiencia Nacional. La sentencia del
  Supremo del 22 de junio de 2026 le condena, según la nota oficial del CGPJ y la copia
  íntegra localizada; en esta ficha se conserva el rol como no firme hasta verificar firmeza.
