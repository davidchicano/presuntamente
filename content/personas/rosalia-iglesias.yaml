biografia_corta: |
  Rosalía Iglesias Villar es una ciudadana española, esposa del ex
  tesorero del Partido Popular Luis Bárcenas Gutiérrez. En la pieza
  separada nº 7 de las Diligencias Previas 96/2017 del Juzgado
  Central de Instrucción nº 6 de la Audiencia Nacional, conocida
  mediáticamente como Operación Kitchen, figura como acusación
  particular junto a su esposo Luis Bárcenas y a su hijo Guillermo
  Bárcenas, en relación con la presunta operación parapolicial
  atribuida al Ministerio del Interior contra el entorno familiar del
  ex tesorero entre 2013 y 2015. Según la cobertura periodística
  citada en este inventario, ha sido vinculada también a otras causas
  ajenas a la presente pieza —entre ellas el caso Gürtel, modelado en
  este inventario con sentencia firme—.
