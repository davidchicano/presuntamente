biografia_corta: |
  Asesor del área de Urbanismo del Ayuntamiento de Marbella y
  exgerente de urbanismo durante la etapa de Jesús Gil. Se le
  atribuye haber ejercido como «alcalde de hecho» y cabecilla de
  la trama de corrupción urbanística desarticulada por la Operación
  Malaya. Condenado por sentencia firme del Tribunal Supremo en 2015
  a 17 años de prisión.

