biografia_corta: |
  Administrador de la empresa pantalla Filesa en el período investigado.
  Condenado por la STS 1/1997 a 10 años de prisión. El TC desestimó su
  recurso de amparo 4805/97 (STC 126/2001). Fue indultado parcialmente
  por el Gobierno de Aznar el 1 de diciembre de 2000.
