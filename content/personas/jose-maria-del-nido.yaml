biografia_corta: |
  Abogado y expresidente del Sevilla Fútbol Club. Condenado en el
  marco de la corrupción de Marbella en el caso Malaya (modelado en
  este inventario) por fraude, malversación y cohecho; también
  condenado en el caso Fergocon, procedimiento no modelado en este
  inventario. La Fiscalía Anticorrupción le señaló como cooperador
  necesario en delitos de fraude y malversación de fondos municipales
  de Marbella.

