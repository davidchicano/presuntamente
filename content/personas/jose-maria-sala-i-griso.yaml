biografia_corta: |
  Senador del Partido dels Socialistes de Catalunya (PSC), afiliado al
  grupo parlamentario socialista en el Senado. Su condición de aforado
  ante el Tribunal Supremo determinó la competencia de la Sala Segunda
  para conocer la Causa Especial nº 880/1991 (caso Filesa). Condenado
  por la STS 1/1997 a 3 años de prisión por asociación ilícita y
  falsedad en documento mercantil; el TC estimó parcialmente su recurso
  de amparo, reduciendo la condena a 2 años por asociación ilícita.
