biografia_corta: |
  Magistrado-juez titular del Juzgado de Instrucción nº 3 de Palma de Mallorca desde 1990.
  Instructor del caso Palma Arena y de su pieza separada nº 25, el caso Nóos. Conocido por
  haber acordado la investigación y la segunda imputación de la Infanta Cristina de Borbón
  durante la instrucción, frente a la posición contraria de la Fiscalía Anticorrupción.
