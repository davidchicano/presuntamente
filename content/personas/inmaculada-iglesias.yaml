biografia_corta: |
  María Inmaculada Iglesias Sánchez es magistrada española, titular
  durante dieciséis meses del Juzgado de Instrucción nº 19 de Madrid,
  en cuya jurisdicción instruyó el procedimiento por presunto fraude
  fiscal y falsedad documental contra Alberto González Amador y otras
  cuatro personas, así como una pieza separada en relación con
  presuntos delitos de corrupción en los negocios y administración
  desleal vinculados a operaciones de Quirón Prevención S.L. Por
  Acuerdo del 13 de mayo de 2025 de la Comisión Permanente del
  Consejo General del Poder Judicial (BOE-A-2025-16497) se declaró su
  jubilación voluntaria con efectos del 10 de agosto de 2025.
