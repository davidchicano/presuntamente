biografia_corta: |
  Inmaculada Iglesias es magistrada española titular durante dieciséis
  meses del Juzgado de Instrucción nº 19 de Madrid, en cuya jurisdicción
  instruyó el procedimiento por presunto fraude fiscal y falsedad
  documental contra Alberto González Amador y otras cuatro personas, así
  como una pieza derivada en relación con presuntas irregularidades en
  contratos con el grupo sanitario Quirón. El 18 de agosto de 2025 se
  publicó en el Boletín Oficial del Estado su jubilación voluntaria,
  efectiva esa misma fecha.
