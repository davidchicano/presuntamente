biografia_corta: |
  Político del Partido Popular, ex presidente del Govern de les Illes Balears (1996-1999 y
  2003-2007) y ex ministro de Medio Ambiente del Gobierno de Aznar. Condenado en sentencia
  firme (STS 277/2018) a 3 años y 8 meses por prevaricación, malversación y fraude a la
  Administración en el caso Nóos. Condenado asimismo en otras causas derivadas de su gestión.
