biografia_corta: |
  Empresario español con presencia en cobertura periodística
  desde los años noventa por su actividad de intermediación
  comercial. Figura como procesado en la pieza separada nº 3 del
  caso Lezo por auto de apertura del juicio oral del 4 de junio
  de 2021 del titular del Juzgado Central de Instrucción nº 6
  de la Audiencia Nacional Manuel María García-Castellón
  García-Lomas, en relación con la presunta adjudicación
  irregular en 2007 por el Consorcio Regional de Transportes de
  Madrid de las obras del tren ligero Móstoles
  Central-Navalcarnero a la unión temporal de empresas liderada
  por OHL. La Fiscalía Anticorrupción solicita para él tres años
  y medio de prisión por presuntos delitos de tráfico de
  influencias, cohecho, falsedad en documento mercantil y fraude
  a las administraciones públicas. La cobertura periodística
  citada en este inventario lo vincula también a otras causas
  penales en curso ajenas al caso Lezo: el caso Villarejo (no
  modelado en este inventario) y ramificaciones del caso Gürtel
  (modelado en este inventario). Le es de
  aplicación el principio de presunción de inocencia mientras
  no recaiga resolución firme.
