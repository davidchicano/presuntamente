biografia_corta: |
  Magistrado español, miembro de la Audiencia Nacional. Titular
  del Juzgado Central de Instrucción nº 4 desde 2002, en cuya
  etapa instruyó procedimientos de relevancia internacional
  ligados a la jurisdicción universal española (crímenes contra
  la humanidad, genocidio, terrorismo) e instruyó causas como
  el procedimiento sobre las tarjetas «black» de Caja Madrid a
  petición de la Fiscalía Anticorrupción a partir del 1 de
  octubre de 2014, además del caso Bankia. Es asimismo
  magistrado de la Sección Segunda de la Sala de lo Penal de la
  Audiencia Nacional, en cuya condición ha sido designado
  ponente del juicio oral de la pieza relativa a las
  adjudicaciones del campo de golf del Canal de Isabel II del
  caso Lezo, señalado entre el 13 y el 30 de septiembre de
  2027.
