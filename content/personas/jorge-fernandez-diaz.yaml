biografia_corta: |
  Jorge Fernández Díaz es un político español del Partido Popular,
  ministro del Interior del Reino de España entre el 22 de diciembre
  de 2011 y el 4 de noviembre de 2016 bajo la presidencia de Mariano
  Rajoy, y diputado en el Congreso por la circunscripción de Barcelona
  durante seis legislaturas. Por auto del magistrado instructor del
  Juzgado Central de Instrucción nº 6 de la Audiencia Nacional fue
  investigado en la pieza separada conocida mediáticamente como
  Operación Kitchen, encuadrada en las diligencias previas 96/2017
  del caso Tándem, y por auto posterior del mismo órgano fue procesado
  por su presunta participación en la operación parapolicial atribuida
  al Ministerio del Interior durante su mandato y dirigida
  indiciariamente, según el instructor, a obtener información en poder
  de Luis Bárcenas, ex tesorero del Partido Popular. Rige el principio
  de presunción de inocencia mientras no recaiga sentencia firme en
  contrario.
