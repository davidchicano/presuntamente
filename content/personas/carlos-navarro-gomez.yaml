biografia_corta: |
  Exdiputado del PSOE en el Congreso de los Diputados, hombre de
  confianza en la estructura financiera del partido. Condenado en el
  caso Filesa a 11 años de prisión (la pena más alta entre los
  condenados) por la STS 1/1997. Fue indultado parcialmente por el
  Gobierno de Aznar el 1 de diciembre de 2000 (Real Decreto 2700/2000).
