biografia_corta: |
  Político español, presidente del Gobierno de España desde el 2 de
  junio de 2018 tras prosperar la moción de censura contra Mariano
  Rajoy. Secretario general del Partido Socialista Obrero Español en
  dos etapas (2014-2016 y desde 2017). Doctor en Economía por la
  Universidad Camilo José Cela. Está casado con Begoña Gómez Fernández
  desde 2006. En el procedimiento del Juzgado de Instrucción nº 41 de
  Madrid relativo a la Cátedra Extraordinaria de Transformación Social
  Competitiva codirigida por su esposa compareció como testigo el 22 de
  julio de 2024 y se acogió a su derecho a no declarar contra parientes
  reconocido en el artículo 416 de la Ley de Enjuiciamiento Criminal.
  No tiene rol procesal de investigado, procesado ni acusado en esta
  causa ni en ninguna otra; figura aquí exclusivamente como contexto
  institucional y familiar del caso.
