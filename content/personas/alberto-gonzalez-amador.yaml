biografia_corta: |
  Alberto González Amador es empresario español, administrador único de
  la sociedad Maxwell Cremona Ingeniería y Procesos S.L. y pareja de la
  presidenta de la Comunidad de Madrid, Isabel Díaz Ayuso. Ante el
  Juzgado de Instrucción nº 19 de Madrid se sigue procedimiento penal
  contra él por presuntos delitos contra la Hacienda Pública en concurso
  medial con falsedad en documento mercantil, en relación con los
  ejercicios 2020 y 2021 del Impuesto sobre Sociedades de Maxwell
  Cremona. La causa, originada en denuncia de la AEAT del 22 de enero
  de 2024, cifra el perjuicio a la Hacienda Pública en 350.951 euros.
  Por auto del 29 de mayo de 2025 quedó procesado y por auto del 22 de
  septiembre de 2025 se abrió el juicio oral contra él y otros cuatro
  investigados. La Audiencia Provincial de Madrid (Sección 3ª) ratificó
  el procesamiento el 7 de noviembre de 2025. Rige el principio de
  presunción de inocencia hasta que recaiga resolución firme.
