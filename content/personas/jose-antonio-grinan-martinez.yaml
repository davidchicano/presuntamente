es_figura_publica: true
biografia_corta: >-
  Político del PSOE. Fue consejero de Economía y Hacienda de la Junta de
  Andalucía y, posteriormente, presidente de la Junta entre 2009 y 2013.
  En la causa de los ERE fue enjuiciado por su responsabilidad como
  consejero de Hacienda y presidente durante el periodo investigado.
  Condenado por la Audiencia de Sevilla (2019) por prevaricación y
  malversación; el TS confirmó la condena (2022). El TC estimó parcialmente
  su amparo en 2024 (matiz sobre la malversación).
estado_publicacion: borrador
