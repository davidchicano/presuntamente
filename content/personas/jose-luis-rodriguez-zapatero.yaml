biografia_corta: |
  Político español. Fue Presidente del Gobierno de España entre 2004 y
  2011, tras dos victorias del PSOE en las elecciones generales de 2004
  y 2008. Antes ocupó la Secretaría General del PSOE (2000-2012) y fue
  diputado por León durante más de dos décadas. Desde su salida del
  cargo ha participado en actividades de mediación internacional,
  especialmente vinculadas a América Latina.
