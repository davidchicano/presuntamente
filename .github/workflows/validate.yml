name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        # versión de pnpm la determina `packageManager` en package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate YAML against schemas
        run: pnpm validate

      - name: Build site
        run: pnpm build

      - name: Run tests (unit + contrato de la API sobre dist/)
        # Tras el build, así los tests de contrato encuentran dist/api y no se saltan.
        run: pnpm test
