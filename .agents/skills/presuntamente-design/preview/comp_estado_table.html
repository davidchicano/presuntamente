<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Tabla de estado procesal</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .et { width: 100%; border-collapse: collapse; border: 1px solid var(--color-border); background: #fff; font-size: 13px; }
  .et th { text-align: left; background: #f0f0f0; padding: 6px 12px; font: 700 11px/1.3 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-fg-muted); border-bottom: 1px solid var(--color-border); width: 36%; vertical-align: top; }
  .et td { padding: 6px 12px; border-bottom: 1px solid var(--color-border); color: #15171a; }
  .et tr:last-child th, .et tr:last-child td { border-bottom: 0; }
  .mono { font-family: var(--font-mono); }
  .b { display: inline-flex; padding: 1px 6px; border: 1px solid #a8a8a2; border-radius: 0; font: 700 10px/1.5 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; background: #f0f0f0; }
</style>
<table class="et">
  <tbody>
    <tr><th>Fase</th><td><span class="b">Sentencia firme</span></td></tr>
    <tr><th>Órgano judicial</th><td>JCI nº6, Audiencia Nacional</td></tr>
    <tr><th>Fiscalía</th><td>Fiscalía Anticorrupción</td></tr>
    <tr><th>N.º procedimiento</th><td class="mono">DPA 275/2008</td></tr>
  </tbody>
</table>
</div>
</body>
</html>
