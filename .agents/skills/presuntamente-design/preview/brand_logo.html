<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Logo institucional</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .cell { padding: 16px; border: 1px solid var(--color-border); background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
  .cell--dark { background: #15171a; color: #ece9e0; }
  .cell--soft { background: #f0f0f0; }
  .cell img { width: 72px; height: 72px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); }
  .cell--dark .label { color: #a8a59a; }
  .note { margin-top: 12px; font-size: 11px; color: var(--color-fg-muted); }
</style>
<div class="row">
  <div class="cell"><img src="../assets/logo.png"><span class="label">sobre blanco · primario</span></div>
  <div class="cell cell--soft"><img src="../assets/logo.png"><span class="label">sobre surface-muted</span></div>
  <div class="cell cell--dark"><img src="../assets/logo.png" style="filter: brightness(1.4) contrast(0.95);"><span class="label">sobre fondo oscuro</span></div>
</div>
<div class="note">Silueta de España con manos+sobre+billetes en negativo · navy institucional · pendiente vectorizar a SVG</div>
</div>
</body>
</html>
