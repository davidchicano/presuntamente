<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Encabezado de sección administrativo</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .sh { display: flex; align-items: baseline; gap: 12px; padding: 6px 14px; border-top: 2px solid #1f3a68; border-bottom: 1px solid var(--color-border); background: #f0f0f0; margin-bottom: 12px; }
  .num { font-family: var(--font-mono); font-size: 13px; color: #1f3a68; font-weight: 600; }
  .h { margin: 0; font: 700 17px/1.2 var(--font-sans); letter-spacing: -0.005em; color: #15171a; }
  .r { margin-left: auto; font-family: var(--font-mono); font-size: 12px; color: var(--color-fg-muted); }
  .sub { font: 700 11px/1.4 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; color: #a78100; border-bottom: 1px solid var(--color-border); padding-bottom: 4px; margin: 16px 0 8px; }
</style>
<div class="sh">
  <span class="num">2.7</span>
  <h2 class="h">Hechos clasificados por estado epistémico</h2>
  <span class="r">12 hechos · 8 N1 · 3 N2 · 1 N3</span>
</div>
<p class="sub">2.7.1 · Hechos acreditados</p>
</div>
</body>
</html>
