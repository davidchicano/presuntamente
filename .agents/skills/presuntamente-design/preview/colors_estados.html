<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Estados epistémicos · NO rojo</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .est { border: 1px solid; padding: 10px 12px; }
  .lbl { font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 700; }
  .name { font-family: var(--font-mono); font-size: 11px; margin-top: 6px; opacity: 0.7; }
  .a { color:#2f6a3a; background:#eef4ef; border-color:#b6cdb8; }
  .i { color:#8a6b1f; background:#f7f0dd; border-color:#dec999; }
  .e { color:#5b6878; background:#ecedf1; border-color:#bdc4cf; }
  .d { color:#7a7d82; background:#f0f0f0; border-color:#cfcfcf; }
  .note { margin-top: 10px; padding: 10px 12px; border-left: 3px solid #c89b00; background: #f7ecc5; font-size: 12px; color: var(--color-fg); line-height: 1.5; }
</style>
<div class="grid">
  <div class="est a"><div class="lbl">Acreditado</div><div class="name">verde sobrio</div></div>
  <div class="est i"><div class="lbl">Investigado</div><div class="name">ámbar apagado</div></div>
  <div class="est e"><div class="lbl">Exculpatorio</div><div class="name">gris-azul neutro</div></div>
  <div class="est d"><div class="lbl">Desmentido</div><div class="name">gris claro neutro</div></div>
</div>
<div class="note"><strong>NUNCA rojo en estados epistémicos.</strong> Riesgo político (PSOE/IU), error semántico (desmentido EXCULPA), violación de presunción de inocencia (investigado en rojo pre-juzga).</div>
</div>
</body>
</html>
