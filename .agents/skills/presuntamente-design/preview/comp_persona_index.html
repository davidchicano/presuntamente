<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Card de persona · listado</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .p { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center; padding: 14px 16px; border: var(--border); border-radius: 2px; background: #fff; cursor: pointer; }
  .p:hover { background: var(--color-bg-muted); }
  .name { font: 600 18px/1.2 var(--font-sans); margin: 0 0 2px; letter-spacing: -0.005em; }
  .cargo { font: 400 13px/1.3 var(--font-sans); color: var(--color-fg-muted); }
  .count { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); }
  .badge { display: inline-flex; padding: 2px 8px; border: 1px solid var(--color-border-strong); border-radius: 2px; font: 600 11px/1.4 var(--font-sans); letter-spacing: 0.04em; text-transform: uppercase; background: #fff; color: var(--color-fg); }
</style>
<article class="p">
  <div>
    <h3 class="name">Francisco Correa Sánchez</h3>
    <div class="cargo">Empresario · figura pública</div>
  </div>
  <span class="badge">Condenado</span>
  <span class="count">3 casos</span>
</article>
</div>
</body>
</html>
