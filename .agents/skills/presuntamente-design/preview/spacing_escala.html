<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Escala de espaciado</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .row { display: grid; grid-template-columns: 90px 1fr 60px; gap: 14px; align-items: center; padding: 6px 0; border-bottom: var(--border); }
  .row:last-child { border: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); }
  .bar { background: var(--color-accent); height: 12px; border-radius: 1px; }
  .val { font-family: var(--font-mono); font-size: 11px; text-align: right; color: var(--color-fg-muted); }
</style>
<div class="row"><span class="tok">--space-1</span><div class="bar" style="width:4px"></div><span class="val">4 px</span></div>
<div class="row"><span class="tok">--space-2</span><div class="bar" style="width:8px"></div><span class="val">8</span></div>
<div class="row"><span class="tok">--space-3</span><div class="bar" style="width:12px"></div><span class="val">12</span></div>
<div class="row"><span class="tok">--space-4</span><div class="bar" style="width:16px"></div><span class="val">16</span></div>
<div class="row"><span class="tok">--space-5</span><div class="bar" style="width:24px"></div><span class="val">24</span></div>
<div class="row"><span class="tok">--space-6</span><div class="bar" style="width:32px"></div><span class="val">32</span></div>
<div class="row"><span class="tok">--space-7</span><div class="bar" style="width:48px"></div><span class="val">48</span></div>
<div class="row"><span class="tok">--space-8</span><div class="bar" style="width:64px"></div><span class="val">64</span></div>
</div>
</body>
</html>
