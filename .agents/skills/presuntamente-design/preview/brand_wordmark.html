<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Lockup logo + wordmark</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .lockup { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 1px solid var(--color-border); background: #fff; }
  .lockup img { width: 56px; height: 56px; }
  .text { display: flex; flex-direction: column; line-height: 1; }
  .name { font: 700 26px/1 var(--font-sans); letter-spacing: -0.005em; color: #1f3a68; }
  .sub { font: 400 12px/1 var(--font-sans); color: var(--color-fg-muted); margin-top: 6px; }
  .meta { display: flex; justify-content: space-between; margin-top: 10px; font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); }
</style>
<div class="lockup">
  <img src="../assets/logo.png" alt="">
  <div class="text">
    <span class="name">presuntamente</span>
    <span class="sub">Inventario público de casos de corrupción</span>
  </div>
</div>
<div class="meta"><span>Gill Sans 700 / −0.005em / #1f3a68</span><span>Lockup horizontal estándar</span></div>
</div>
</body>
</html>
