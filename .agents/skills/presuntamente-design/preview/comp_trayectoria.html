<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Swimlane de trayectoria</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card-root">
<style>
  .tr { border: var(--border); border-radius: 2px; padding: 14px; background: #fff; }
  .axis { display: grid; grid-template-columns: 130px 1fr; gap: 12px; font-family: var(--font-mono); font-size: 11px; color: var(--color-fg-muted); margin-bottom: 6px; }
  .ticks { display: flex; justify-content: space-between; }
  .row { display: grid; grid-template-columns: 130px 1fr; gap: 12px; align-items: center; padding: 8px 0; border-top: var(--border); }
  .row:first-of-type { border-top: 0; }
  .lbl { font: 600 10px/1.3 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: var(--color-fg); }
  .lbl .d { display: block; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0; text-transform: none; color: var(--color-fg-muted); font-weight: 400; margin-top: 2px; }
  .track { position: relative; height: 16px; background: repeating-linear-gradient(to right, var(--color-border) 0 1px, transparent 1px 100px); }
  .bar { position: absolute; top: 0; bottom: 0; display: flex; align-items: center; padding: 0 6px; font: 600 9px/1 var(--font-sans); letter-spacing: var(--ls-caps); text-transform: uppercase; color: #fff; }
  .bar--inv  { background: #8a6b1f; }
  .bar--pro  { background: #5b6878; }
  .bar--cond { background: #2f6a3a; }
</style>
<div class="tr">
  <div class="axis"><span></span><div class="ticks"><span>2009</span><span>2012</span><span>2015</span><span>2018</span><span>2021</span><span>2024</span><span>2026</span></div></div>
  <div class="row"><div class="lbl">Investigado<span class="d">2009-02 → 2014-09</span></div><div class="track"><div class="bar bar--inv" style="left:0%;width:33%">Investigado</div></div></div>
  <div class="row"><div class="lbl">Procesado<span class="d">2014-09 → 2018-05</span></div><div class="track"><div class="bar bar--pro" style="left:33%;width:21%">Procesado</div></div></div>
  <div class="row"><div class="lbl">Condenado<span class="d">2018-05 → vigente</span></div><div class="track"><div class="bar bar--cond" style="left:54%;width:46%">Condenado</div></div></div>
</div>
</div>
</body>
</html>
